*{box-sizing:border-box;margin:0;padding:0;}
body{background:#fff9fb;font-family:Lora,serif;color:#3e1828;min-height:100vh;}
.btn{background:linear-gradient(135deg,#d4607a,#b84060);color:#fff;border:none;border-radius:11px;padding:11px 18px;cursor:pointer;font-weight:700;font-family:Lora,serif;font-size:14px;transition:opacity .2s;}
.btn:active{opacity:.85;}
.btn-sec{background:#fef2f6;color:#7a3a52;border:1.5px solid #f5d5e0;border-radius:11px;padding:10px 16px;cursor:pointer;font-weight:700;font-family:Lora,serif;font-size:13px;}

.card{background:#fff;border:1.5px solid #f5d5e0;border-radius:14px;margin-bottom:12px;}
.page{display:none;padding:14px 12px 60px;}
.page.active{display:block;}
.tab-btn{border:1.5px solid #c9a84c;border-radius:20px;padding:6px 14px;font-size:12px;font-weight:700;font-family:Lora,serif;cursor:pointer;white-space:nowrap;color:#a07828;background:#fff !important;transition:all .2s;}
.tab-btn.active{background:linear-gradient(135deg,#c9a84c,#a8872e) !important;color:#fff !important;border-color:transparent !important;box-shadow:0 2px 8px rgba(180,140,40,0.30) !important;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.gold-text{background:linear-gradient(135deg,#a8872e,#c9a84c 45%,#96711a);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}

function editGuestRegimes(id){
  const g=GUESTS.find(x=>x.id===id);
  if(!g)return;
  const current=g.regime?g.regime.split(', '):[];
  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(62,24,40,.5);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px;';
  const box=document.createElement('div');

  const title=document.createElement('div');
  title.style.cssText='font-family:Playfair Display,serif;font-size:16px;color:#3e1828;margin-bottom:16px;';
  title.textContent='Régimes de '+g.nom;
  box.appendChild(title);
  REGIMES.filter(r=>r!=='Aucun').forEach(r=>{
    const lbl=document.createElement('label');
    lbl.style.cssText='display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f5d5e0;cursor:pointer;';
    const cb=document.createElement('input');
    cb.type='checkbox';cb.value=r;cb.checked=current.includes(r);
    cb.style.cssText='accent-color:#d4607a;width:17px;height:17px;';
    const span=document.createElement('span');
    span.style.cssText='font-size:13px;color:#3e1828;';
    span.textContent=r;
    lbl.appendChild(cb);lbl.appendChild(span);
    box.appendChild(lbl);
  });
  const btns=document.createElement('div');
  btns.style.cssText='display:flex;gap:8px;margin-top:16px;';
  const save=document.createElement('button');
  save.style.cssText='flex:1;background:linear-gradient(135deg,#d4607a,#b84060);color:#fff;border:none;border-radius:10px;padding:10px;cursor:pointer;font-weight:700;font-family:Lora,serif;';
  save.textContent='Enregistrer';
  save.onclick=function(){
    const checked=Array.from(box.querySelectorAll('input:checked')).map(i=>i.value);
    updGuest(id,'regime',checked.length>0?checked.join(', '):'Aucun');
    overlay.remove();
  };
  const cancel=document.createElement('button');
  cancel.style.cssText='flex:1;background:#fef2f6;color:#b07a90;border:1.5px solid #f5d5e0;border-radius:10px;padding:10px;cursor:pointer;font-weight:700;font-family:Lora,serif;';
  cancel.textContent='Annuler';
  cancel.onclick=function(){overlay.remove();};
  btns.appendChild(save);btns.appendChild(cancel);
  box.appendChild(btns);
  overlay.appendChild(box);
  document.body.appendChild(overlay);
}

async function doLogin(){
  const email=document.getElementById('a-email-l').value.trim();
  const pass=document.getElementById('a-pass-l').value;
  const err=document.getElementById('err-login');
  const btn=document.querySelector('#form-login .btn');
  err.style.display='none';
  if(!email||!pass){err.textContent='Veuillez remplir tous les champs.';err.style.display='block';return;}

  let u=ld('u_'+email,null);

  // Local login - works offline
  if(u && u.pass===pass){
    sv('sess',email);
    const remember = document.getElementById('remember-me')?.checked;
    if(remember){
      sv('rem_e',email);sv('rem_p',pass);
    } else {
      sv('rem_e',null);sv('rem_p',null);
    }
    startApp(u);
    return;
  }

  if((!u||u.pass!==pass) && window.firebaseDB){
    if(btn){btn.textContent='Connexion...';btn.disabled=true;}
    try{
      const {doc,getDoc}=window.firebaseLib;
      const albumId=btoa(email).replace(/[^a-zA-Z0-9]/g,'').substring(0,20);
      const snap=await getDoc(doc(window.firebaseDB,'mariages',albumId));
      if(snap.exists()){
        const data=snap.data();
        if(data.pass===pass){
          u={email,pass,p1:data.p1,p2:data.p2,wDate:data.wDate};
          sv('u_'+email,u);
        }
      }
    }catch(e){console.warn('Firebase login error:',e);}
    if(btn){btn.textContent='Se connecter';btn.disabled=false;}
  }

  if(!u||u.pass!==pass){err.textContent='Email ou mot de passe incorrect.';err.style.display='block';return;}
  sv('rem_e',email);sv('rem_p',pass);
  sv('sess',email);
  syncUserToFirebase(u);
  startApp(u);
}

function doRegister(){
  const email=document.getElementById('a-email-r').value.trim();
  const pass=document.getElementById('a-pass-r').value;
  const p1=document.getElementById('a-p1').value.trim();
  const p2=document.getElementById('a-p2').value.trim();
  const wDate=document.getElementById('a-date').value;
  const err=document.getElementById('err-register');
  err.style.display='none';
  if(!email||!pass){err.textContent='Veuillez remplir email et mot de passe.';err.style.display='block';return;}
  if(!p1||!p2||!wDate){err.textContent='Veuillez remplir tous les champs du mariage.';err.style.display='block';return;}
  if(ld('u_'+email,null)){err.textContent='Un compte existe déjà avec cet email.';err.style.display='block';return;}
  const albumCode = Math.random().toString(36).substring(2,8).toUpperCase();
  const u={email,pass,p1,p2,wDate,albumCode};
  sv('u_'+email,u);
  sv('rem_e',email);sv('rem_p',pass);
  sv('sess',email);
  // Sauvegarder dans Firebase
  if(window.firebaseDB && window.firebaseLib){
    const {doc,setDoc,serverTimestamp}=window.firebaseLib;
    setDoc(doc(window.firebaseDB,'mariages',email),{
      p1,p2,wDate,albumCode,createdAt:serverTimestamp()
    }).catch(e=>console.log('Firebase sync:',e));
  }
  startApp(u);
}

function doLogout(){
  localStorage.removeItem('sess');
  // Verify session is cleared before reloading
  if(!localStorage.getItem('sess')){
    window.location.reload(true);
  }
}

function deleteAccount(){
  if(!confirm('Êtes-vous sûr de vouloir supprimer votre compte ? Toutes vos données locales seront effacées.')) return;
  if(!USER) return;
  // Remove all localStorage keys for this user
  const email = USER.email;
  const keysToRemove = [];
  for(let i=0; i<localStorage.length; i++){
    const key = localStorage.key(i);
    if(key && (key.includes(email) || key === 'sess' || key === 'rem_e' || key === 'rem_p')) {
      keysToRemove.push(key);
    }
  }
  keysToRemove.forEach(k => localStorage.removeItem(k));
  // Also delete from Firebase if available
  if(window.firebaseDB && window.firebaseLib){
    try{
      const {doc, deleteDoc} = window.firebaseLib;
      const albumId = btoa(email).replace(/[^a-zA-Z0-9]/g,'').substring(0,20);
      deleteDoc(doc(window.firebaseDB,'mariages',albumId)).catch(e=>console.warn(e));
    }catch(e){console.warn(e);}
  }
  alert('Compte supprimé. Vous allez être redirigé.');
  location.reload();
}

function startCountdown(){
  if(cdInt)clearInterval(cdInt);
  if(!USER.wDate)return;
  const tick=()=>{
    const diff=new Date(USER.wDate)-new Date();
    const w=el('countdown-wrap'); if(!w)return;
    if(diff<=0){w.innerHTML=`<div style="color:${gd};font-family:Playfair Display,serif;font-size:16px;padding:6px 0;">🎊 C'est le grand jour !</div>`;return;}
    const d=Math.floor(diff/86400000),hh=Math.floor((diff%86400000)/3600000),m=Math.floor((diff%3600000)/60000),s=Math.floor((diff%60000)/1000);
    w.innerHTML=[['d',d,'Jours'],['h',hh,'Heures'],['m',m,'Min'],['s',s,'Sec']].map(([,v,l])=>`<div style="text-align:center;background:#ffffff;border-radius:10px;padding:6px 12px;min-width:56px;border:1.5px solid ${br}"><div style="font-family:Playfair Display,serif;font-size:22px;font-weight:700;color:${pk};line-height:1">${String(v).padStart(2,'0')}</div><div style="font-size:9px;color:${tl};letter-spacing:1.5px;text-transform:uppercase;margin-top:1px">${l}</div></div>`).join('');

}

function resetTasks(){

    const custom = TASKS.filter(t=>t.month==='Personnalisé');

    const restoredDef = DEF_TASKS.map(def => {

}

function addBudget(){const cat=el('bgt-cat').value.trim();if(!cat)return;BUDGET.push({id:Date.now(),cat,est:Number(el('bgt-est').value)||0,reel:0,paye:0});el('bgt-cat').value='';el('bgt-est').value='';saveBudget();renderBudget();}
function resetBudget(){
  if(confirm('Restaurer toutes les catégories par défaut ? Les noms modifiés seront également restaurés.')){
    // Restore names of existing categories that match by id or position
    const restored = DEF_BUDGET.map(def => {
      const existing = BUDGET.find(b => b.id === def.id);
      if(existing) return {...existing, cat: def.cat};
      return {...def, id: Date.now()+Math.random(), reel:0, paye:0};
    });
    // Keep user-added categories (not in DEF_BUDGET)
    const defIds = new Set(DEF_BUDGET.map(b => b.id));
    const userAdded = BUDGET.filter(b => !defIds.has(b.id));
    BUDGET = [...restored, ...userAdded];
    saveBudget();renderBudget();
  }
}
function updBudget(id,f,v){BUDGET=BUDGET.map(i=>i.id===id?{...i,[f]:v===''?0:Number(v)}:i);saveBudget();renderBudget();}
function removeBudget(id){BUDGET=BUDGET.filter(i=>i.id!==id);saveBudget();renderBudget();}
function renameBudget(id){
  const span=document.querySelector('[data-budget-cat="'+id+'"]');
  if(!span)return;
  const item=BUDGET.find(i=>i.id===id);
  const inp=document.createElement('input');
  inp.value=item.cat;
  inp.style.cssText='font-size:14px;font-weight:700;color:#3e1828;border:none;border-bottom:2px solid #d4607a;outline:none;background:transparent;font-family:Playfair Display,serif;width:100%;';
  span.replaceWith(inp);
  inp.focus();inp.select();
  function save(){
    if(inp.value.trim()){BUDGET=BUDGET.map(i=>i.id===id?{...i,cat:inp.value.trim()}:i);}
    saveBudget();renderBudget();
  }
  inp.addEventListener('blur',save);
  inp.addEventListener('keydown',function(e){if(e.key==='Enter')inp.blur();if(e.key==='Escape'){renderBudget();}});
}

function importGuests(e){
  const file=e.target.files?.[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const text=ev.target.result;
      const lines=text.split(/\r?\n/).filter(l=>l.trim());
      if(lines.length<2){showImportMsg('⚠️ Fichier vide ou sans données.','err');return;}
      const header=lines[0].split(',').map(c=>c.replace(/"/g,'').trim().toLowerCase());
      const findCol=patterns=>header.findIndex(c=>patterns.some(p=>c.includes(p)));
      const iNom=findCol(['nom complet','nom']);
      const iPre=findCol(['prénom','prenom']);
      const imported=[];
      for(let i=1;i<lines.length;i++){
        const cols=lines[i].match(/(".*?"|[^,]+)/g)||[];
        const get=idx=>idx>=0?(cols[idx]||'').replace(/"/g,'').trim():'';
        const nom=iNom>=0&&header[iNom].includes('complet')?get(iNom):(iPre>=0&&iNom>=0?get(iPre)+' '+get(iNom):get(iNom>=0?iNom:iPre));
        if(!nom.trim())continue;
        imported.push({id:Date.now()+i,nom:nom.trim(),email:'',cote:'p1',invitation:'non envoyée',presence:'en attente',role:'Invité·e',regime:'Aucun',vinHonneur:false,seatTableId:null,seatIdx:null});
      }
      GUESTS=[...GUESTS,...imported];saveGuests();renderGuests();
      showImportMsg(`✓ ${imported.length} invité(s) importé(s) !`,'ok');
    }catch{showImportMsg('❌ Erreur lors de l\'import.','err');}
  };
  reader.readAsText(file,'UTF-8');e.target.value='';
}
function showImportMsg(msg,type){
  const m=el('import-msg');if(!m)return;
  m.textContent=msg;m.style.display='block';
  m.style.background=type==='ok'?'#f0f8f0':'#fff0f0';
  m.style.border=`1px solid ${type==='ok'?gn:rd}`;
  m.style.color=type==='ok'?gn:rd;
  setTimeout(()=>{if(m)m.style.display='none';},4000);
}

    <svg style="position:absolute;inset:0;width:100%;height:100%;opacity:.05;pointer-events:none;"><defs><pattern id="pg" width="28" height="28" patternUnits="userSpaceOnUse"><path d="M28 0L0 0 0 28" fill="none" stroke="${pk}" stroke-width="0.5"/></pattern></defs><rect width="100%" height="100%" fill="url(#pg)"/></svg>

function addTableEl(table){

  else if(isSq){surf.style.cssText=`position:absolute;left:${cx-SQ/2}px;top:${cy-SQ/2}px;width:${SQ}px;height:${SQ}px;border-radius:6px;background:linear-gradient(135deg,${sf},#fff);border:2px solid ${pm};box-shadow:0 2px 10px rgba(212,96,122,.1);z-index:1;`;}
  else{surf.style.cssText=`position:absolute;left:${cx-TW/2}px;top:${cy-TH/2}px;width:${TW}px;height:${TH}px;border-radius:10px;background:linear-gradient(135deg,${sf},#fff);border:2px solid ${pm};box-shadow:0 2px 10px rgba(212,96,122,.1);z-index:1;`;}
  div.appendChild(surf);

  const n=Math.min(table.seats,12);

    if(isR){const a=(i/n)*2*Math.PI-Math.PI/2;sx=cx+(R-1)*Math.cos(a)-13;sy=cy+(R-1)*Math.sin(a)-13;}
    else if(isSq){const side=Math.floor(i/(n/4));const idx=i%(Math.ceil(n/4));const sp=SQ/Math.ceil(n/4);if(side===0){sx=(cx-SQ/2)+idx*sp+sp/2-13;sy=cy-SQ/2-16;}else if(side===1){sx=cx+SQ/2+2;sy=(cy-SQ/2)+idx*sp+sp/2-13;}else if(side===2){sx=(cx-SQ/2)+idx*sp+sp/2-13;sy=cy+SQ/2+2;}else{sx=cx-SQ/2-16;sy=(cy-SQ/2)+idx*sp+sp/2-13;}}
    else{const half=Math.ceil(n/2);const isTop=i<half;const idx=isTop?i:i-half;const sp=TW/half;sx=(cx-TW/2)+idx*sp+sp/2-13;sy=isTop?cy-TH/2-16:cy+TH/2+2;}

  div.addEventListener('pointerdown',e=>{
    if(tpPanMode||e.target===lbl||e.target===del||e.target.tagName==='INPUT')return;
    div.setPointerCapture(e.pointerId);
    const rect=canvas.getBoundingClientRect();
    const t=TABLES.find(t=>t.id===table.id);

    tpDrag={id:table.id,ox:(e.clientX-rect.left-tpPanX)/tpScale-t.x,oy:(e.clientY-rect.top-tpPanY)/tpScale-t.y};

  div.addEventListener('pointermove',e=>{

    const rect=canvas.getBoundingClientRect();
    const nx=Math.max(0,(e.clientX-rect.left-tpPanX)/tpScale-tpDrag.ox);

  div.addEventListener('pointercancel',()=>{tpDrag=null;});
  inner.appendChild(div);
}

function geoSearch(){

  const btn=el('vnd-geo-btn');btn.textContent='📍 Localisation...';btn.disabled=true;
  navigator.geolocation.getCurrentPosition(
    pos=>{
      window._userLat=pos.coords.latitude;
      window._userLng=pos.coords.longitude;
      btn.textContent='📍 Autour de moi';btn.disabled=false;
      const query=el('vnd-loc')?.value.trim()||'prestataire mariage';
      searchVendorsWithLocation(query,pos.coords.latitude,pos.coords.longitude);
    },
    err=>{btn.textContent='📍 Autour de moi';btn.disabled=false;alert('Impossible d\'obtenir votre position. Vérifiez les permissions.');}
  );
}


async function searchVendors(){
  const query=el('vnd-loc')?.value.trim();if(!query)return;
  const lat=window._userLat||null;const lng=window._userLng||null;
  if(!lat){
    // Ask for geolocation first
    if(navigator.geolocation){
      navigator.geolocation.getCurrentPosition(
        pos=>{window._userLat=pos.coords.latitude;window._userLng=pos.coords.longitude;searchVendorsWithLocation(query,pos.coords.latitude,pos.coords.longitude);},
        ()=>searchVendorsWithLocation(query,null,null)
      );
    } else { searchVendorsWithLocation(query,null,null); }
  } else { searchVendorsWithLocation(query,lat,lng); }
}

function toggleMenuItem(si,ii,checked){
  MENU[si].items[ii].done=checked;
  saveMenu();renderMenu();
}
function removeMenuItem(si,ii){
  MENU[si].items.splice(ii,1);
  saveMenu();renderMenu();
}
function addMenuItem(si){
  const inp=document.getElementById('menu-add-'+si);
  if(!inp||!inp.value.trim())return;
  MENU[si].items.push({id:Date.now(),text:inp.value.trim(),done:false});
  saveMenu();renderMenu();
}
function saveMenu(){sv('menu_'+USER.email,MENU);}
function resetMenu(){
  if(confirm('Réinitialiser le menu par défaut ? Vos modifications seront perdues.')){
    MENU = DEF_MENU.map(s=>({...s, items:s.items.map(i=>({...i}))}));
    saveMenu(); renderMenu();
  }
}
function addMenuCategory(){
  const inp=document.getElementById('menu-new-cat');
  if(!inp||!inp.value.trim())return;
  MENU.push({id:Date.now(),section:inp.value.trim(),items:[]});
  inp.value='';saveMenu();renderMenu();
}
function removeMenuCategory(si){
  if(MENU[si].items.length>0 && !confirm('Supprimer cette catégorie et tous ses plats ?'))return;
  MENU.splice(si,1);saveMenu();renderMenu();
}
function renameMenuCategory(si){
  const span=document.querySelector('[data-menu-cat="'+si+'"]');
  if(!span)return;
  const old=MENU[si].section;
  const inp=document.createElement('input');
  inp.value=old;
  inp.style.cssText='flex:1;font-size:13px;font-weight:700;color:#d4607a;border:none;border-bottom:2px solid #d4607a;outline:none;background:transparent;text-transform:uppercase;letter-spacing:1px;width:100%;';
  span.replaceWith(inp);inp.focus();inp.select();
  function save(){if(inp.value.trim())MENU[si].section=inp.value.trim();saveMenu();renderMenu();}
  inp.addEventListener('blur',save);
  inp.addEventListener('keydown',function(e){if(e.key==='Enter')inp.blur();if(e.key==='Escape'){MENU[si].section=old;renderMenu();}});
}
function renameMenuItem(si,ii){
  const span=document.querySelector('[data-menu="'+si+'-'+ii+'"]');
  if(!span)return;
  const old=MENU[si].items[ii].text;
  const inp=document.createElement('input');
  inp.value=old;
  inp.style.cssText='flex:1;font-size:13px;border:1.5px solid #d4607a;border-radius:6px;padding:2px 6px;outline:none;font-family:Lora,serif;';
  span.replaceWith(inp);
  inp.focus();inp.select();
  function save(){
    if(inp.value.trim())MENU[si].items[ii].text=inp.value.trim();
    saveMenu();renderMenu();
  }
  inp.addEventListener('blur',save);
  inp.addEventListener('keydown',function(e){if(e.key==='Enter')inp.blur();if(e.key==='Escape'){MENU[si].items[ii].text=old;renderMenu();}});
}

function resetMenuQty(){
  sv('menuqty_'+USER.email, {});
  renderMenu();
}
function saveMenuQty(manualH, manualR){
  const mq = ld(`menuqty_${USER.email}`, {});
  const hVal = document.getElementById('mnu-h')?.value;
  const rVal = document.getElementById('mnu-r')?.value;
  if(hVal !== undefined) mq.honneur = hVal;
  if(rVal !== undefined) mq.repas = rVal;
  if(manualH) mq._manual_h = true;
  if(manualR) mq._manual_r = true;
  sv(`menuqty_${USER.email}`, mq);
  renderMenu();
}

    result[cat] = custom[cat] !== undefined ? custom[cat] : [...items];

let _3r=null,_3s=null,_3c=null,_3g=null,_3id=null;

// Safely convert hex → THREE.Color
function _col(hex){
  try{const r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255;
  return new window.THREE.Color(r,g,b);}
  catch{return new window.THREE.Color(1,0.9,0.85);}
}
function _hex2rgb(hex){
  try{return{r:parseInt(hex.slice(1,3),16)/255,g:parseInt(hex.slice(3,5),16)/255,b:parseInt(hex.slice(5,7),16)/255};}
  catch{return{r:1,g:0.9,b:0.85};}
}

function destroyThree(){
  if(_3id){cancelAnimationFrame(_3id);_3id=null;}
  if(_3r){try{_3r.dispose();}catch(e){}_3r=null;}
  _3s=null;_3c=null;_3g=null;
}

function initThree(canvas){
  const T=window.THREE;
  const W=canvas.clientWidth,H=canvas.clientHeight;

  _3r=new T.WebGLRenderer({canvas,antialias:true,alpha:false,powerPreference:'high-performance'});
  _3r.setPixelRatio(Math.min(window.devicePixelRatio,3));
  _3r.setSize(W,H,false);
  _3r.shadowMap.enabled=true;
  _3r.shadowMap.type=T.PCFSoftShadowMap;
  _3r.toneMapping=T.ACESFilmicToneMapping;
  _3r.toneMappingExposure=1.25;
  _3r.physicallyCorrectLights=true;

  _3s=new T.Scene();
  _3s.background=new T.Color(0x0d0612);
  _3s.fog=new T.Fog(0x0d0612,14,22);

  // ── STUDIO LIGHTING SETUP ──
  // Soft ambient
  _3s.add(new T.AmbientLight(0xfff0e8,0.4));
  // Hemisphere sky/ground
  _3s.add(new T.HemisphereLight(0xfff5e0,0x1a0810,0.5));

  // Key light — main shadow caster, upper left
  const key=new T.DirectionalLight(0xfff8f0,3.0);
  key.position.set(-4,10,6);
  key.castShadow=true;
  key.shadow.mapSize.set(2048,2048);
  key.shadow.camera.near=1;key.shadow.camera.far=35;
  key.shadow.camera.left=-3.5;key.shadow.camera.right=3.5;
  key.shadow.camera.top=7;key.shadow.camera.bottom=-2;
  key.shadow.bias=-0.0003;key.shadow.normalBias=0.02;
  _3s.add(key);

  // Fill light — soft right
  const fill=new T.DirectionalLight(0xd8e8ff,0.9);
  fill.position.set(6,4,-2);_3s.add(fill);

  // Rim light — warm backlight for silhouette
  const rim=new T.DirectionalLight(0xffd890,1.2);
  rim.position.set(0,6,-7);_3s.add(rim);

  // Top light — overhead for top surfaces
  const top=new T.DirectionalLight(0xffffff,0.5);
  top.position.set(0,12,0);_3s.add(top);

  // Warm candle-like point light at front-low
  const candle=new T.PointLight(0xff9050,1.5,12,2);
  candle.position.set(1.5,1.5,5);_3s.add(candle);

  // Camera
  _3c=new T.PerspectiveCamera(34,W/H,0.1,50);
  _3c.position.set(0,2.4,8.0);
  _3c.lookAt(0,0.6,0);
}

// Make a physically accurate material
function _mat(col,texId,isChoc){
  const T=window.THREE;
  const tex=TEXTURES_CAKE.find(t=>t.id===texId)||TEXTURES_CAKE[0];
  const m=new T.MeshStandardMaterial({
    color:col,
    roughness:isChoc?0.62:tex.roughness,
    metalness:isChoc?0.0:tex.metalness,
    envMapIntensity:0.8,
  });
  // Ombré / gradient effect: handled via vertex colors below if needed
  return m;
}

// Create a cream rosette ring
function _creamRing(T,cx,cy,radius,isRound,segs,baseCol){
  const g=new T.Group();
  const c=_hex2rgb(baseCol);
  const cream=new T.Color(Math.min(1,c.r+0.22),Math.min(1,c.g+0.22),Math.min(1,c.b+0.22));
  const mat=new T.MeshStandardMaterial({color:cream,roughness:0.55,metalness:0.0});
  const n=isRound?Math.round(radius*32):4;
  for(let i=0;i<n;i++){
    const a=isRound?(i/n)*Math.PI*2:((i+0.5)/4)*Math.PI*2;
    const geo=new T.SphereGeometry(0.048,8,6);
    const m=new T.Mesh(geo,mat.clone());
    m.scale.set(1,0.62,1);
    m.position.set(Math.sin(a)*radius*0.96,cy,Math.cos(a)*radius*0.96);
    m.castShadow=true;
    g.add(m);
  }
  return g;
}

function buildCake3D(data){

  if(_3g){_3s.remove(_3g);_3g=null;}

  _3tierR=[];_3tierY=[];

  const etages=Math.min(5,data.etages||2);
  const layers=data.layers||[];
  const isRound=data.forme!=='carre'&&data.forme!=='hexagonal'&&data.forme!=='asymetrique';
  const isHex=data.forme==='hexagonal';
  const segs=isHex?6:isRound?80:4;
  const texId=data.texture||'lisse';
  const hauteur=data.hauteur||'standard';
  const hFactor=hauteur==='haut'?1.40:hauteur==='mini'?0.65:1.0;

  // Tier proportions (realistic wedding cake)
  const RADII=[1.08,0.78,0.57,0.42,0.31];
  const BASE_H=[0.84,0.76,0.66,0.58,0.50];
  const HEIGHTS=BASE_H.map(h=>h*hFactor);

  // ── GOLD PEDESTAL ──────────────────────────────────────────────────────────
  const goldM=new T.MeshStandardMaterial({color:0xC9A020,metalness:0.90,roughness:0.10});
  const pedM=new T.Mesh(new T.CylinderGeometry(0.13,0.22,0.22,32),goldM);
  pedM.position.y=0.11;pedM.castShadow=true;pedM.receiveShadow=true;_3g.add(pedM);

  // Plate
  const pR=RADII[0]+0.22;
  const plateM=new T.Mesh(new T.CylinderGeometry(pR,pR*0.95,0.055,64),goldM.clone());
  plateM.position.y=0.233;plateM.castShadow=true;plateM.receiveShadow=true;_3g.add(plateM);
  // Plate rims
  [pR+0.02,pR-0.07,pR-0.15].forEach(r=>{
    const rm=new T.Mesh(new T.TorusGeometry(r,0.010,8,64),
      new T.MeshStandardMaterial({color:0xFFE860,metalness:0.95,roughness:0.06}));
    rm.rotation.x=Math.PI/2;rm.position.y=0.262;_3g.add(rm);
  });

  let curY=0.260;

  for(let i=0;i<etages;i++){
    const layer=layers[i]||{parfum:'Vanille',glacage:'#F3E5AB'};
    const gl=layer.glacage||'#F3E5AB';
    const rgb=_hex2rgb(gl);
    const isChoc=gl==='#5A3A2E'||gl==='#6F4E37';
    const rB=RADII[i]||0.32;
    const rT=isRound?rB*0.968:rB;
    const tH=HEIGHTS[i]||0.55;

    _3tierR.push(rB);_3tierY.push(curY);

    const tMat=_mat(_col(gl),texId,isChoc);

    // ── TIER BODY ──────────────────────────────────────────────────────────
    let tGeo;
    if(isHex){
      tGeo=new T.CylinderGeometry(rT,rB,tH,6,1);
    } else if(isRound){
      tGeo=new T.CylinderGeometry(rT,rB,tH,segs,1);
    } else {
      tGeo=new T.BoxGeometry(rB*1.90,tH,rB*1.90,1,1,1);
    }
    const tier=new T.Mesh(tGeo,tMat);
    tier.position.y=curY+tH/2;
    tier.castShadow=true;tier.receiveShadow=true;
    _3g.add(tier);

    // ── FROSTED TOP CAP ───────────────────────────────────────────────────
    const capRgb=_hex2rgb(gl);
    const capCol=new T.Color(Math.min(1,capRgb.r+0.08),Math.min(1,capRgb.g+0.08),Math.min(1,capRgb.b+0.08));
    const capGeo=isHex?new T.CylinderGeometry(rT,rT,0.030,6,1):
                 isRound?new T.CylinderGeometry(rT,rT,0.030,segs,1):
                 new T.BoxGeometry(rB*1.90,0.030,rB*1.90,1,1,1);
    const cap=new T.Mesh(capGeo,new T.MeshStandardMaterial({
      color:capCol,roughness:_mat(capCol,texId,isChoc).roughness*0.75,metalness:0.01}));
    cap.position.y=curY+tH+0.015;cap.castShadow=true;_3g.add(cap);

    // ── CREAM ROSETTES TOP ────────────────────────────────────────────────
    _3g.add(_creamRing(T,0,curY+tH+0.040,rT,isRound||isHex,segs,gl));

    // ── CREAM ROSETTES BOTTOM ─────────────────────────────────────────────
    _3g.add(_creamRing(T,0,curY+0.028,rB,isRound||isHex,segs,gl));

    // ── DRIP CAKE ────────────────────────────────────────────────────────
    const dripInfo=DRIP_COLS.find(d=>d.id===(data.drip||'aucun'));
    if(dripInfo&&dripInfo.col){
      const dc=_hex2rgb(dripInfo.col);
      const dripMat=new T.MeshStandardMaterial({
        color:new T.Color(dc.r,dc.g,dc.b),roughness:0.28,metalness:0.04,transparent:true,opacity:0.94});
      const nDrip=Math.round(rB*22);
      for(let d=0;d<nDrip;d++){
        const da=(d/nDrip)*Math.PI*2;
        const len=0.055+Math.sin(d*1.9+i*0.7)*0.048+Math.cos(d*3.1)*0.028;
        const geo=new T.SphereGeometry(0.040,7,7);geo.scale(0.75,len*6,0.75);
        const dm=new T.Mesh(geo,dripMat.clone());
        dm.position.set(Math.sin(da)*rT*0.96,curY+tH-len*0.5,Math.cos(da)*rT*0.96);
        _3g.add(dm);
      }
      // Drip pool on top edge
      const poolGeo=isRound?new T.CylinderGeometry(rT*0.98,rT*0.98,0.018,segs,1):
                            new T.BoxGeometry(rB*1.88,0.018,rB*1.88,1,1,1);
      _3g.add(new T.Mesh(poolGeo,new T.MeshStandardMaterial({
        color:new T.Color(dc.r,dc.g,dc.b),roughness:0.18,metalness:0.05,transparent:true,opacity:0.88})));
    }

    // ── DECORATION BAND ───────────────────────────────────────────────────
    if(data.decoration&&data.decoration!=='aucune'){
      const rc2=_hex2rgb(data.couleurRuban||'#D4607A');
      const RC=new T.Color(rc2.r,rc2.g,rc2.b);
      const bCY=curY+tH*0.40,bH=tH*0.10;
      const isMetal=['perles','etoiles'].includes(data.decoration);
      const bGeo=isHex?new T.CylinderGeometry(rT*1.002,rB*1.002,bH,6,1):
                 isRound?new T.CylinderGeometry(rT*1.002,rB*1.002,bH,segs,1):
                 new T.BoxGeometry(rB*1.903,bH,rB*1.903,1,1,1);
      const band=new T.Mesh(bGeo,new T.MeshStandardMaterial({
        color:RC,roughness:isMetal?0.08:0.38,metalness:isMetal?0.78:0.06}));
      band.position.y=bCY+bH/2;_3g.add(band);

      const np=isRound?Math.round(rB*42):isHex?6:4;
      if(data.decoration==='perles'){
        const pLight=new T.Color(Math.min(1,rc2.r*1.7),Math.min(1,rc2.g*1.7),Math.min(1,rc2.b*1.7));
        for(let p=0;p<np;p++){
          const a=(p/np)*Math.PI*2;
          const pm=new T.Mesh(new T.SphereGeometry(0.032,9,9),
            new T.MeshStandardMaterial({color:pLight,metalness:0.90,roughness:0.05}));
          pm.position.set(Math.sin(a)*(rT*1.012),bCY+bH/2,Math.cos(a)*(rT*1.012));_3g.add(pm);
        }
      }
      if(data.decoration==='fleurs'){
        const nf=Math.round(rB*14);
        for(let f=0;f<nf;f++){
          const a=(f/nf)*Math.PI*2,fr=rT*1.012;
          for(let p=0;p<5;p++){
            const pa=(p/5)*Math.PI*2;
            const pg=new T.SphereGeometry(0.032,6,6);pg.scale(1,0.48,1.65);
            const pm=new T.Mesh(pg,new T.MeshStandardMaterial({
              color:new T.Color(Math.min(1,rc2.r*1.35),rc2.g,Math.min(1,rc2.b*1.2)),roughness:0.44}));
            pm.position.set(Math.sin(a)*fr+Math.cos(pa)*0.055,bCY+bH/2+Math.sin(pa)*0.025,Math.cos(a)*fr+Math.sin(pa)*0.055);
            pm.rotation.y=a+pa;_3g.add(pm);
          }
          const cm=new T.Mesh(new T.SphereGeometry(0.022,6,6),
            new T.MeshStandardMaterial({color:0xFFF880,metalness:0.45,roughness:0.18}));
          cm.position.set(Math.sin(a)*fr,bCY+bH/2,Math.cos(a)*fr);_3g.add(cm);
        }
      }
      if(data.decoration==='feuilles'){
        const nl=Math.round(rB*26);
        for(let f=0;f<nl;f++){
          const a=(f/nl)*Math.PI*2;
          const lg=new T.SphereGeometry(0.052,7,5);lg.scale(1,0.27,1.95);
          const lm=new T.Mesh(lg,new T.MeshStandardMaterial({color:0x3A8828,roughness:0.58}));
          lm.position.set(Math.sin(a)*(rT*1.012),bCY+bH/2,Math.cos(a)*(rT*1.012));
          lm.rotation.y=a;lm.rotation.z=f%2===0?0.25:-0.25;_3g.add(lm);
        }
      }
      if(data.decoration==='etoiles'){
        const ns=Math.round(rB*18);
        for(let s=0;s<ns;s++){
          const a=(s/ns)*Math.PI*2;
          const sg=new T.OctahedronGeometry(0.05,0);sg.scale(1,0.34,1);
          const sm=new T.Mesh(sg,new T.MeshStandardMaterial({color:0xF8C820,metalness:0.84,roughness:0.08}));
          sm.position.set(Math.sin(a)*(rT*1.012),bCY+bH/2,Math.cos(a)*(rT*1.012));_3g.add(sm);
        }
      }
      if(data.decoration==='dentelle'){
        const nd=Math.round(rB*60);
        for(let d=0;d<nd;d++){
          const a=(d/nd)*Math.PI*2,wave=Math.sin(a*10)*0.014;
          const dm=new T.Mesh(new T.SphereGeometry(0.013,5,5),
            new T.MeshStandardMaterial({color:0xFFFAF2,roughness:0.38,transparent:true,opacity:0.82}));
          dm.position.set(Math.sin(a)*(rT*1.001),bCY+bH/2+wave,Math.cos(a)*(rT*1.001));_3g.add(dm);
        }
      }
      if(data.decoration==='ruban'){
        band.material.roughness=0.24;band.material.metalness=0.10;
        // Bow at front
        [[-1],[1]].forEach(([sx])=>{
          const bg=new T.SphereGeometry(0.08,9,7);bg.scale(0.7*sx,0.42,1.55);
          const bm=new T.Mesh(bg,new T.MeshStandardMaterial({color:RC,roughness:0.32}));
          bm.position.set(Math.sin(0.4)*rT*sx,bCY+bH/2,Math.cos(0)*rT+0.04*sx);_3g.add(bm);
        });
      }
    }

    // ── SPECIAL EFFECTS ───────────────────────────────────────────────────
    const effet=data.effet||'aucun';
    if(effet==='or'){
      // Gold leaf flecks scattered on tier surface
      const nGold=Math.round(rB*30);
      for(let g=0;g<nGold;g++){
        const a=(g/nGold)*Math.PI*2+(Math.random()-0.5)*0.3;
        const gh=curY+tH*(0.1+Math.random()*0.8);
        const gg=new T.PlaneGeometry(0.045+Math.random()*0.04,0.030+Math.random()*0.02);
        const gm=new T.Mesh(gg,new T.MeshStandardMaterial({
          color:0xFFD830,metalness:0.98,roughness:0.04,side:T.DoubleSide,transparent:true,opacity:0.82+Math.random()*0.18}));
        gm.position.set(Math.sin(a)*rT*0.99,gh,Math.cos(a)*rT*0.99);
        gm.rotation.y=a;gm.rotation.x=(Math.random()-0.5)*0.4;_3g.add(gm);
      }
    }
    if(effet==='ombre'){
      // Ombré: add darker band at bottom, lighter at top — via extra overlapping cylinders
      for(let s=0;s<4;s++){
        const sh=tH*0.25,sy=curY+s*(tH*0.25);
        const alpha=(1-s/4)*0.18;
        const og=isRound?new T.CylinderGeometry(rT,rB,sh,segs,1):new T.BoxGeometry(rB*1.90,sh,rB*1.90,1,1,1);
        const om=new T.Mesh(og,new T.MeshStandardMaterial({color:0x000000,transparent:true,opacity:alpha,depthWrite:false}));
        om.position.y=sy+sh/2;_3g.add(om);
      }
    }
    if(effet==='aquarelle'){
      // Watercolor: soft colored splotches
      const nW=Math.round(rB*16);
      for(let w=0;w<nW;w++){
        const a=(w/nW)*Math.PI*2;
        const wh=curY+tH*(0.2+Math.random()*0.6);
        const wc=new T.Color(
          Math.min(1,rgb.r+0.12*(Math.random()-0.5)),
          Math.min(1,rgb.g+0.15*(Math.random()-0.3)),
          Math.min(1,rgb.b+0.10*(Math.random()-0.5)));
        const wg=new T.SphereGeometry(0.06+Math.random()*0.08,7,6);wg.scale(1.8,0.5+Math.random()*0.5,1.2);
        const wm=new T.Mesh(wg,new T.MeshStandardMaterial({color:wc,transparent:true,opacity:0.35,depthWrite:false,roughness:0.9}));
        wm.position.set(Math.sin(a)*rT*0.96,wh,Math.cos(a)*rT*0.96);wm.rotation.y=a;_3g.add(wm);
      }
    }
    if(effet==='relief'){
      // Relief: small cream bumps in a pattern
      const nR=Math.round(rB*25);
      for(let r=0;r<nR;r++){
        const a=(r/nR)*Math.PI*2;
        const rh=curY+tH*0.35+Math.floor(r/6)*(tH*0.18);
        const rg=new T.SphereGeometry(0.038,6,6);rg.scale(1.4,0.55,1.4);
        const rm=new T.Mesh(rg,new T.MeshStandardMaterial({
          color:new T.Color(Math.min(1,rgb.r+0.18),Math.min(1,rgb.g+0.18),Math.min(1,rgb.b+0.18)),roughness:0.55}));
        rm.position.set(Math.sin(a)*(rT*0.94),rh,Math.cos(a)*(rT*0.94));_3g.add(rm);
      }
    }

    curY+=tH;
  }

  // ── TOPPER ────────────────────────────────────────────────────────────────
  if(data.topper&&data.topper!=='aucun'){
    const stkM=new T.MeshStandardMaterial({color:0xC8B888,metalness:0.62,roughness:0.28});
    const stk=new T.Mesh(new T.CylinderGeometry(0.016,0.016,0.52,8),stkM);
    stk.position.y=curY+0.26;_3g.add(stk);
    const tY=curY+0.52;

    if(data.topper==='coeur'){
      const hM=new T.MeshStandardMaterial({color:0xE02050,roughness:0.22,metalness:0.06});
      [[-0.13,0],[0.13,0]].forEach(([ox])=>{
        const sm=new T.Mesh(new T.SphereGeometry(0.16,16,16),hM);sm.position.set(ox,tY+0.09,0);_3g.add(sm);
      });
      const co=new T.Mesh(new T.ConeGeometry(0.22,0.28,4),hM);co.rotation.z=Math.PI;co.position.y=tY-0.04;_3g.add(co);
      const sh=new T.Mesh(new T.SphereGeometry(0.05,8,8),new T.MeshStandardMaterial({color:0xffffff,transparent:true,opacity:0.45}));
      sh.position.set(-0.06,tY+0.18,0.11);_3g.add(sh);
    } else if(data.topper==='initiales'||data.topper==='chiffres'){
      const disc=new T.Mesh(new T.CylinderGeometry(0.28,0.28,0.038,32),new T.MeshStandardMaterial({color:0xE8C040,metalness:0.93,roughness:0.08}));
      disc.position.y=tY;_3g.add(disc);
      const rng=new T.Mesh(new T.TorusGeometry(0.30,0.022,8,32),new T.MeshStandardMaterial({color:0xFFE860,metalness:0.96,roughness:0.05}));
      rng.rotation.x=Math.PI/2;rng.position.y=tY;_3g.add(rng);
    } else if(data.topper==='fleurs'){
      const pC=[0xFFB0C8,0xD4607A,0xFFC0E0,0xFFE8A0,0xFF90B8];
      for(let f=0;f<3;f++){
        const fy=tY+(f===1?0.16:0.02),fx=(f-1)*0.22;
        for(let p=0;p<6;p++){
          const a=(p/6)*Math.PI*2;
          const pg=new T.SphereGeometry(0.078,8,8);pg.scale(1,0.42,1.78);
          const pm=new T.Mesh(pg,new T.MeshStandardMaterial({color:pC[p%pC.length],roughness:0.48}));
          pm.position.set(fx+Math.cos(a)*0.11,fy,Math.sin(a)*0.11);pm.rotation.y=a;_3g.add(pm);
        }
        const cm=new T.Mesh(new T.SphereGeometry(0.05,8,8),new T.MeshStandardMaterial({color:0xFFFCC0,metalness:0.32,roughness:0.28}));
        cm.position.set(fx,fy+0.01,0);_3g.add(cm);
      }
    } else if(data.topper==='silhouettes'){
      const silM=new T.MeshStandardMaterial({color:0x100408,roughness:0.92});
      [[-0.17,-1],[0.17,1]].forEach(([x,j])=>{
        const hm=new T.Mesh(new T.SphereGeometry(0.11,12,12),silM);hm.position.set(x,tY+0.30,0);_3g.add(hm);
        if(j<0){const b=new T.Mesh(new T.ConeGeometry(0.135,0.31,4),silM);b.rotation.y=Math.PI/4;b.position.set(x,tY+0.08,0);_3g.add(b);}
        else{const b=new T.Mesh(new T.CylinderGeometry(0.078,0.096,0.31,8),silM);b.position.set(x,tY+0.08,0);_3g.add(b);}
      });
    } else if(data.topper==='etoiles'){
      [[0,0.22,0.15],[-0.24,0.04,0.12],[0.24,0.04,0.12]].forEach(([x,y,r])=>{
        const sm=new T.Mesh(new T.OctahedronGeometry(r,0),new T.MeshStandardMaterial({color:0xFFD030,metalness:0.84,roughness:0.10}));
        sm.position.set(x,tY+y,0);sm.rotation.y=Math.PI/4;_3g.add(sm);
      });
    }
  }

  // ── PLACED DECORATIONS ────────────────────────────────────────────────────
  const DECO_INFO={
    rose:{col:0xD4607A,col2:0xFF90A8},pivoine:{col:0xF490B8,col2:0xFFB8D0},
    orchidee:{col:0xC060C0,col2:0xE090E0},lily:{col:0xE0A0C0,col2:0xFFD0E8},
    feuille:{col:0x50A040,col2:0x80D060},eucalyptus:{col:0x5AA050,col2:0x90D080},
    fraise:{col:0xE03040,col2:0xFF8090},framboise:{col:0xC02060,col2:0xFF60A0},
    figue:{col:0x804060,col2:0xC080A0},agrume:{col:0xF0C020,col2:0xFFE080},
    macaron:{col:0xD4A0C0,col2:0xFFD0E8},coeur:{col:0xE02050,col2:0xFF6080},
    etoile:{col:0xF0C020,col2:0xFFE870},perle:{col:0xF8F0E0,col2:0xFFFFFF},
    ruban:{col:0xD4607A,col2:0xFFB0C0},papillon:{col:0xF08020,col2:0xFFD080},
    diamant:{col:0x80D0FF,col2:0xE0FAFF},baie:{col:0x4040C0,col2:0x8080FF}
  };

  (data.decos||[]).forEach(d=>{
    const ti=Math.min((data.etages||2)-1,Math.max(0,d.tier||0));
    const tH=HEIGHTS[ti]||0.55,sY=_3tierY[ti]||0.260;
    const decoY=sY+tH*(0.25+(d.height||0.5)*0.5);
    const r=(_3tierR[ti]||0.8)*1.025;
    const ang=((d.angle||0)/360)*Math.PI*2;
    const pX=Math.sin(ang)*r,pZ=Math.cos(ang)*r;
    const info=DECO_INFO[d.id]||DECO_INFO.rose;
    const dg=new T.Group();
    const mMat=new T.MeshStandardMaterial({color:info.col,roughness:0.34,metalness:0.04});

    if(d.id==='coeur'){
      [[-0.08,0],[0.08,0]].forEach(([ox])=>{const sm=new T.Mesh(new T.SphereGeometry(0.085,10,10),mMat.clone());sm.position.set(ox,0.04,0);dg.add(sm);});
      dg.add(Object.assign(new T.Mesh(new T.ConeGeometry(0.12,0.16,4),mMat.clone()),{position:{x:0,y:-0.04,z:0},rotation:{z:Math.PI}}));
    } else if(d.id==='etoile'){
      const sg=new T.OctahedronGeometry(0.10,0);sg.scale(1,0.44,1);
      dg.add(new T.Mesh(sg,new T.MeshStandardMaterial({color:0xF0C020,metalness:0.78,roughness:0.10})));
    } else if(d.id==='perle'){
      dg.add(new T.Mesh(new T.SphereGeometry(0.09,14,14),new T.MeshStandardMaterial({color:0xFFFBF0,metalness:0.14,roughness:0.03})));
    } else if(d.id==='diamant'){
      dg.add(new T.Mesh(new T.OctahedronGeometry(0.10,0),new T.MeshStandardMaterial({color:0xA8E8FF,metalness:0.05,roughness:0.02,transparent:true,opacity:0.88})));
    } else if(d.id==='feuille'||d.id==='eucalyptus'){
      const lg=new T.SphereGeometry(0.10,8,6);lg.scale(1,0.27,2.1);
      dg.add(new T.Mesh(lg,new T.MeshStandardMaterial({color:d.id==='eucalyptus'?0x4A9040:0x3A8828,roughness:0.58})));
    } else if(d.id==='fraise'){
      dg.add(new T.Mesh(new T.SphereGeometry(0.09,10,10),new T.MeshStandardMaterial({color:0xE03040,roughness:0.55})));
      const tp=new T.Mesh(new T.SphereGeometry(0.04,6,6),new T.MeshStandardMaterial({color:0x3A8820}));tp.position.y=0.09;dg.add(tp);
    } else if(d.id==='macaron'){
      [[-0.02],[0.02]].forEach(([oy])=>{
        const mg=new T.CylinderGeometry(0.09,0.09,0.035,20);
        const mm=new T.Mesh(mg,new T.MeshStandardMaterial({color:info.col,roughness:0.35}));
        mm.position.y=oy;dg.add(mm);
      });
      const cg=new T.CylinderGeometry(0.086,0.086,0.015,20);
      dg.add(new T.Mesh(cg,new T.MeshStandardMaterial({color:0xFFF8F0,roughness:0.8})));
    } else {
      // Generic flower for roses, pivoines, orchidées, etc.
      for(let p=0;p<5;p++){
        const a=(p/5)*Math.PI*2;
        const pg=new T.SphereGeometry(0.062,7,7);pg.scale(1,0.46,1.68);
        const pm=new T.Mesh(pg,new T.MeshStandardMaterial({color:info.col,roughness:0.44}));
        pm.position.set(Math.cos(a)*0.078,0,Math.sin(a)*0.078);pm.rotation.y=a;dg.add(pm);
      }
      dg.add(new T.Mesh(new T.SphereGeometry(0.040,7,7),new T.MeshStandardMaterial({color:info.col2,metalness:0.32,roughness:0.18})));
    }
    dg.position.set(pX,decoY,pZ);
    dg.rotation.y=ang;
    _3g.add(dg);
  });

  // Centre the cake vertically in the scene
  _3g.position.y=-(curY/2+0.13);
}

function startRenderLoop(){
  const T=window.THREE;
  let frame=0;
  function animate(){
    _3id=requestAnimationFrame(animate);
    if(!_3r||!_3s||!_3c)return;
    if(_3auto&&!_3drag) _3ry+=0.005;
    if(_3g){_3g.rotation.y=_3ry;_3g.rotation.x=_3rx;}
    // Resize check
    const el=_3r.domElement;
    const W=el.clientWidth,H=el.clientHeight;
    if(el.width!==Math.round(W*window.devicePixelRatio)||el.height!==Math.round(H*window.devicePixelRatio)){
      _3r.setSize(W,H,false);_3c.aspect=W/H;_3c.updateProjectionMatrix();
    }

function attachOrbit(canvas){
  canvas.addEventListener('mousedown',e=>{_3drag=true;_3auto=false;_3lx=e.clientX;_3ly=e.clientY;});
  canvas.addEventListener('mousemove',e=>{if(!_3drag)return;_3ry+=(e.clientX-_3lx)*0.008;_3rx+=(e.clientY-_3ly)*0.006;_3rx=Math.max(-0.55,Math.min(0.75,_3rx));_3lx=e.clientX;_3ly=e.clientY;});
  canvas.addEventListener('mouseup',()=>_3drag=false);
  canvas.addEventListener('mouseleave',()=>_3drag=false);
  canvas.addEventListener('touchstart',e=>{
    if(e.touches.length===1){_3drag=true;_3auto=false;_3lx=e.touches[0].clientX;_3ly=e.touches[0].clientY;}
    if(e.touches.length===2)_3pinch=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
  },{passive:true});
  canvas.addEventListener('touchmove',e=>{
    if(e.touches.length===1&&_3drag){_3ry+=(e.touches[0].clientX-_3lx)*0.012;_3rx+=(e.touches[0].clientY-_3ly)*0.009;_3rx=Math.max(-0.55,Math.min(0.75,_3rx));_3lx=e.touches[0].clientX;_3ly=e.touches[0].clientY;}
    if(e.touches.length===2&&_3pinch){const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);if(_3c)_3c.position.z=Math.max(3.5,Math.min(12,_3c.position.z*(1+(_3pinch-d)*0.01)));_3pinch=d;}
  },{passive:true});
  canvas.addEventListener('touchend',()=>{_3drag=false;_3pinch=null;},{passive:true});
  canvas.addEventListener('wheel',e=>{if(_3c)_3c.position.z=Math.max(3.5,Math.min(12,_3c.position.z+e.deltaY*0.005));},{passive:true});
}

function setup3DScene(data){
  const tryInit=()=>{
    const canvas=document.getElementById('cake-canvas');
    if(!canvas)return;
    const W=canvas.getBoundingClientRect().width;
    if(W<10){requestAnimationFrame(tryInit);return;}
    destroyThree();
    try{
      initThree(canvas);
      buildCake3D(data);
      attachOrbit(canvas);
      startRenderLoop();
    }catch(err){
      console.error('Three.js error:',err);
      const msg=document.createElement('div');
      msg.style.cssText='color:#c9a84c;text-align:center;padding:20px;font-size:13px;font-family:Lora,serif;';
      msg.innerHTML='⚠️ Erreur 3D: '+err.message;
      if(canvas.parentNode)canvas.parentNode.insertBefore(msg,canvas.nextSibling);
    }
  };
  requestAnimationFrame(tryInit);
}

      '<div style="margin-bottom:8px;"><label class="lbl">Date du mariage</label><input class="inp" type="date" id="order-date" value="'+(data.orderDate||'')+'" oninput="updateCakeProp(\'orderDate\',this.value)"></div>'+
      '<div style="margin-bottom:12px;"><label class="lbl">Lieu de réception</label><input class="inp" type="text" id="order-lieu" value="'+(data.orderLieu||'')+'" placeholder="Château de Fontainebleau" oninput="updateCakeProp(\'orderLieu\',this.value)"></div>'+
      '<button onclick="sendCakeOrder()" style="background:linear-gradient(135deg,#d4607a,#b04060);color:#fff;border:none;border-radius:14px;padding:14px;font-size:14px;font-weight:700;font-family:Playfair Display,serif;cursor:pointer;width:100%;box-shadow:0 4px 15px rgba(180,60,100,0.3);">💌 Envoyer au pâtissier</button>'+
      '<div style="text-align:center;margin-top:10px;">'+
      '<button onclick="shareCake(\'whatsapp\')" style="background:#25D366;color:#fff;border:none;border-radius:10px;padding:8px 16px;font-size:12px;cursor:pointer;margin:0 4px;font-family:Lora,serif;">📱 WhatsApp</button>'+
      '<button onclick="shareCake(\'email\')" style="background:#4A90D9;color:#fff;border:none;border-radius:10px;padding:8px 16px;font-size:12px;cursor:pointer;margin:0 4px;font-family:Lora,serif;">📧 Email</button>'+
      '</div>'+
    '</div>';

  // ── INIT THREE.JS ────────────────────────────────────────────────────────────
  // Load Three.js with CDN fallbacks, then init
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    if(window.THREE){setup3DScene(getCakeData());return;}
    function tryLoad(urls,i){
      if(i>=urls.length){
        const c=document.getElementById('cake-canvas');
        if(c)c.insertAdjacentHTML('afterend','<div style="color:#c9a84c;text-align:center;padding:20px;font-size:13px;font-family:Lora,serif;">⚠️ Three.js ne peut pas se charger en local.<br>Héberge le fichier sur <strong>GitHub Pages</strong> ou <strong>Netlify</strong>.</div>');
        return;
      }
      const s=document.createElement('script');
      s.src=urls[i];
      s.onload=()=>{if(window.THREE)setup3DScene(getCakeData());else tryLoad(urls,i+1);};
      s.onerror=()=>tryLoad(urls,i+1);
      document.head.appendChild(s);
    }
    tryLoad([
      'https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js',
      'https://unpkg.com/three@0.128.0/build/three.min.js',
      'https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js'
    ],0);
  }));
}





function addDecoCake(id){
  const d=getCakeData();if(!d.decos)d.decos=[];
  const etages=d.etages||2;
  d.decos.push({id,angle:Math.round(Math.random()*360),tier:0,height:0.5});
  saveCakeData(d);renderCake3D();
}
function removeDecoCake(idx){
  const d=getCakeData();if(d.decos)d.decos.splice(idx,1);
  saveCakeData(d);renderCake3D();
}
function clearDecosCake(){
  const d=getCakeData();d.decos=[];saveCakeData(d);renderCake3D();
}
function updateDecoProp(idx,key,val){
  const d=getCakeData();
  if(d.decos&&d.decos[idx]){d.decos[idx][key]=Number(val);saveCakeData(d);buildCake3D(d);}
}

function exportCakePNG(){
  const canvas=document.getElementById('cake-canvas');
  if(!canvas){alert('Le canvas 3D n\'est pas disponible.');return;}
  try{
    const url=canvas.toDataURL('image/png');
    const a=document.createElement('a');
    a.download='mon-gateau-mariage.png';
    a.href=url;a.click();
  }catch(e){alert('Export PNG non disponible en local. H\u00e9berge le fichier sur GitHub Pages.');}
}

function sendCakeOrder(){
  const data=getCakeData();
  const name=data.orderName||'Non renseigné';
  const date=data.orderDate||'Non renseignée';
  const lieu=data.orderLieu||'Non renseigné';
  const tiers=data.layers.slice(0,data.etages).map((l,i)=>`Étage ${i+1}: ${l.parfum||'Vanille'} - ${l.garniture||'Ganache'}`+(l.regime&&l.regime!=='Aucun'?' ('+l.regime+')':'')).join('%0A');
  const body=`Bonjour,%0A%0AJe souhaite commander mon gâteau de mariage :%0A%0A👤 Nom : ${encodeURIComponent(name)}%0A📅 Date : ${date}%0A📍 Lieu : ${encodeURIComponent(lieu)}%0A%0A🎂 ${data.etages} étage${data.etages>1?'s':''} - Forme : ${data.forme||'Rond'}%0A${tiers}%0AFinition : ${data.texture||'Lisse'}%0AInvités : ${data.invites||80}%0A%0ACordialement,`;
  window.location.href=`mailto:?subject=${encodeURIComponent('Commande gâteau mariage - '+name)}&body=${body}`;
}

function shareCake(via){
  const data=getCakeData();
  const txt=`🎂 Mon gâteau de mariage : ${data.etages} étage${data.etages>1?'s':''} ${data.forme||'rond'}, ${(data.layers[0]||{}).parfum||'Vanille'} - créé avec Wedding Dream ✨`;
  if(via==='whatsapp'){window.open('https://wa.me/?text='+encodeURIComponent(txt),'_blank');}
  else if(via==='email'){window.location.href='mailto:?subject='+encodeURIComponent('Mon gâteau de mariage')+'&body='+encodeURIComponent(txt);}
}
