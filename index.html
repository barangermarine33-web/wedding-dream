<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#fff9fb;font-family:'Nunito',sans-serif;color:#3e1828;min-height:100vh;}
input,select,button,textarea{font-family:'Nunito',sans-serif;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:#f0a8b8;border-radius:2px;}
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.gold-text{
  background:linear-gradient(135deg,#a8872e,#c9a84c 45%,#96711a);
  background-size:200% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:shimmer 4s linear infinite;
  display:inline-block;
}
.btn{background:linear-gradient(135deg,#d4607a,#b84060);color:#fff;border:none;border-radius:11px;padding:10px 18px;cursor:pointer;font-size:13px;font-weight:700;font-family:'Nunito',sans-serif;transition:all .2s;}
.btn:active{transform:scale(.97);}
.btn:disabled{opacity:.5;}
.btn-sec{background:#fff;color:#d4607a;border:1.5px solid #f5d5e0;border-radius:11px;padding:10px 14px;cursor:pointer;font-size:13px;font-weight:700;font-family:'Nunito',sans-serif;}
.inp{border:1.5px solid #f5d5e0;border-radius:10px;padding:9px 12px;font-size:13px;outline:none;background:#fffafc;color:#3e1828;width:100%;}
.inp:focus{border-color:#d4607a;}
.card{background:#fff;border:1.5px solid #f5d5e0;border-radius:14px;}
.lbl{font-size:10px;color:#b07a90;letter-spacing:1.5px;text-transform:uppercase;display:block;margin-bottom:4px;font-weight:700;}
.tab-btn{background:#fff;border:1.5px solid #e8d48a;border-radius:20px;padding:6px 14px;cursor:pointer;font-size:12px;font-weight:700;white-space:nowrap;font-family:'Nunito',sans-serif;flex-shrink:0;color:#b8922a;}
.tab-btn.active{background:#c9a84c;color:#fff;border-color:#c9a84c;}
.page{display:none;padding:14px 12px 60px;}
.page.active{display:block;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(62,24,40,.5);z-index:500;align-items:center;justify-content:center;padding:16px;}
.modal-overlay.open{display:flex;}
input[type=checkbox]{accent-color:#d4607a;width:17px;height:17px;cursor:pointer;flex-shrink:0;}
</style>

      <div id="power-wrap" style="position:absolute;top:2px;right:0;">
        <button onclick="toggleMenu()" style="background:#ffffff;border:1.5px solid #f5d5e0;border-radius:10px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#7a3a52" stroke-width="2.5" stroke-linecap="round"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/></svg>
        </button>
        <div id="power-menu" style="display:none;position:absolute;top:42px;right:0;background:#fff;border:1.5px solid #f5d5e0;border-radius:12px;box-shadow:0 8px 28px rgba(62,24,40,.12);overflow:hidden;min-width:185px;z-index:300;">
          <button onclick="openSettings()" style="width:100%;background:none;border:none;padding:12px 16px;cursor:pointer;font-size:13px;color:#3e1828;font-weight:600;text-align:left;font-family:'Nunito',sans-serif;">Paramètres du compte</button>
          <div style="height:1px;background:#f5d5e0;"></div>
          <button onclick="doLogout()" style="width:100%;background:none;border:none;padding:12px 16px;cursor:pointer;font-size:13px;color:#c43a3a;font-weight:600;text-align:left;font-family:'Nunito',sans-serif;">Déconnecter</button>
        </div>
      </div>

async function doLogin(){
  const email=document.getElementById('a-email-l').value.trim();
  const pass=document.getElementById('a-pass-l').value;
  const err=document.getElementById('err-login');
  const btn=document.querySelector('#form-login .btn');
  err.style.display='none';
  if(!email||!pass){err.textContent='Veuillez remplir tous les champs.';err.style.display='block';return;}

  let u=ld('u_'+email,null);

  if((!u||u.pass!==pass) && window.firebaseDB){
    if(btn){btn.textContent='Connexion...';btn.disabled=true;}
    try{
      const {doc,getDoc}=window.firebaseLib;
      const albumId=btoa(email).replace(/[^a-zA-Z0-9]/g,'').substring(0,20);
      const snap=await getDoc(doc(window.firebaseDB,'mariages',albumId));
      if(snap.exists()){
        const data=snap.data();
        if(data.pass===pass){
          u={email,pass,p1:data.p1,p2:data.p2,wDate:data.wDate};
          sv('u_'+email,u);
        }
      }
    }catch(e){console.warn('Firebase login error:',e);}
    if(btn){btn.textContent='Se connecter';btn.disabled=false;}
  }

  if(!u||u.pass!==pass){err.textContent='Email ou mot de passe incorrect.';err.style.display='block';return;}
  sv('rem_e',email);sv('rem_p',pass);
  sv('sess',email);
  syncUserToFirebase(u);
  startApp(u);
}

function doRegister(){
  const email=document.getElementById('a-email-r').value.trim();
  const pass=document.getElementById('a-pass-r').value;
  const p1=document.getElementById('a-p1').value.trim();
  const p2=document.getElementById('a-p2').value.trim();
  const wDate=document.getElementById('a-date').value;
  const err=document.getElementById('err-register');
  err.style.display='none';
  if(!email||!pass){err.textContent='Veuillez remplir email et mot de passe.';err.style.display='block';return;}
  if(!p1||!p2||!wDate){err.textContent='Veuillez remplir tous les champs du mariage.';err.style.display='block';return;}
  if(ld('u_'+email,null)){err.textContent='Un compte existe déjà avec cet email.';err.style.display='block';return;}
  const albumCode = Math.random().toString(36).substring(2,8).toUpperCase();
  const u={email,pass,p1,p2,wDate,albumCode};
  sv('u_'+email,u);
  sv('rem_e',email);sv('rem_p',pass);
  sv('sess',email);
  // Sauvegarder dans Firebase
  if(window.firebaseDB && window.firebaseLib){
    const {doc,setDoc,serverTimestamp}=window.firebaseLib;
    setDoc(doc(window.firebaseDB,'mariages',email),{
      p1,p2,wDate,albumCode,createdAt:serverTimestamp()
    }).catch(e=>console.log('Firebase sync:',e));
  }
  startApp(u);
}

function deleteAccount(){
  if(!confirm('Êtes-vous sûr de vouloir supprimer votre compte ? Toutes vos données locales seront effacées.')) return;
  if(!USER) return;
  // Remove all localStorage keys for this user
  const email = USER.email;
  const keysToRemove = [];
  for(let i=0; i<localStorage.length; i++){
    const key = localStorage.key(i);
    if(key && (key.includes(email) || key === 'sess' || key === 'rem_e' || key === 'rem_p')) {
      keysToRemove.push(key);
    }
  }
  keysToRemove.forEach(k => localStorage.removeItem(k));
  // Also delete from Firebase if available
  if(window.firebaseDB && window.firebaseLib){
    try{
      const {doc, deleteDoc} = window.firebaseLib;
      const albumId = btoa(email).replace(/[^a-zA-Z0-9]/g,'').substring(0,20);
      deleteDoc(doc(window.firebaseDB,'mariages',albumId)).catch(e=>console.warn(e));
    }catch(e){console.warn(e);}
  }
  alert('Compte supprimé. Vous allez être redirigé.');
  location.reload();
}


// ── FIREBASE SYNC ─────────────────────────────────────────────────────────────
async function syncUserToFirebase(u) {
  if(!window.firebaseDB) return;
  try {
    const {doc, setDoc} = window.firebaseLib;
    const albumId = btoa(u.email).replace(/[^a-zA-Z0-9]/g,'').substring(0,20);
    sv('album_id_'+u.email, albumId);
    await setDoc(doc(window.firebaseDB, 'mariages', albumId), {
      email: u.email,
      pass: u.pass,
      p1: u.p1, p2: u.p2,
      wDate: u.wDate,
      albumId: albumId,
      createdAt: new Date().toISOString()
    }, {merge: true});
    console.log('Utilisateur synchronisé Firebase ✓', albumId);
  } catch(e) { console.warn('Firebase sync error:', e); }
}

async function uploadToCloudinary(file) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = async (e) => {
      try {
        const base64 = e.target.result.split(',')[1];
        const fd = new FormData();
        fd.append('key', '3f05b1a037eee587fcf6ca459b39f8ff');
        fd.append('image', base64);
        const res = await fetch('https://api.imgbb.com/1/upload', {method:'POST', body:fd});
        const data = await res.json();
        if(data.success && data.data && data.data.url) {
          resolve(data.data.url);
        } else {
          console.warn('ImgBB error:', JSON.stringify(data));
          resolve(null);
        }
      } catch(e) {
        console.warn('ImgBB upload error:', e);
        resolve(null);
      }
    };
    reader.onerror = () => resolve(null);
    reader.readAsDataURL(file);
  });
}

async function uploadPhotoToFirebase(file, userEmail) {
  try {
    const url = await uploadToCloudinary(file);
    if(!url) return null;
    if(window.firebaseDB && window.firebaseLib) {
      const {collection, addDoc} = window.firebaseLib;
      const albumId = btoa(userEmail).replace(/[^a-zA-Z0-9]/g,'').substring(0,20);
      await addDoc(collection(window.firebaseDB,'albums',albumId,'photos'),{
        url, name: file.name, uploadedBy: 'organisateur', createdAt: new Date().toISOString()
      });
    }
    return url;
  } catch(e) { console.warn('Upload error:', e); return null; }
}

function listenFirebasePhotos(userEmail, callback) {
  if(!window.firebaseDB) return;
  try {
    const {collection, onSnapshot} = window.firebaseLib;
    const albumId = ld('album_id_'+userEmail, null);
    if(!albumId) return;
    onSnapshot(collection(window.firebaseDB, 'mariages', albumId, 'photos'), (snap) => {
      const photos = [];
      snap.forEach(d => photos.push({id: d.id, ...d.data()}));
      callback(photos);
    });
  } catch(e) { console.warn('Firebase listen error:', e); }
}

function waitForFirebase(callback, attempts) {
  attempts = attempts || 0;
  if(window.firebaseDB && window.firebaseLib) {
    callback();
  } else if(attempts < 20) {
    setTimeout(function(){ waitForFirebase(callback, attempts+1); }, 300);
  } else {
    console.warn('Firebase not available after 6 seconds');
  }
}

function doGuestUpload(albumId) {
  const name = (document.getElementById('guest-name') ? document.getElementById('guest-name').value : '').trim() || 'Invité';
  const filesEl = document.getElementById('guest-files');
  const files = filesEl ? filesEl.files : null;
  const btn = document.getElementById('guest-upload-btn');
  const status = document.getElementById('guest-status');
  if(!files || files.length === 0) {
    if(status){status.style.display='block';status.style.color='#c43a3a';status.textContent='Veuillez sélectionner une photo.';}
    return;
  }
  if(btn){btn.disabled=true;btn.textContent='Envoi en cours...';}
  if(status){status.style.display='block';status.style.color='#b07a90';status.textContent='Envoi en cours...';}
  
  let ok=0;
  const uploaded=[];
  let i=0;
  
  function processNext() {
    if(i >= files.length) {
      if(btn){btn.disabled=false;}
      if(ok > 0) {
        if(btn) btn.textContent='Envoyer autres photos 💌';
        if(status){status.style.color='#5a8a6a';status.textContent='✓ '+ok+' photo(s) partagée(s) !';}
        const grid = document.getElementById('shared-photos');
        if(grid){
          uploaded.forEach(function(p){
            grid.innerHTML += '<div style="position:relative;aspect-ratio:1;overflow:hidden;"><img src="'+p.url+'" style="width:100%;height:100%;object-fit:cover;" loading="lazy"><div style="position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,0.4);color:#fff;font-size:9px;padding:3px 5px;">'+p.uploadedBy+'</div></div>';
          });
          const empty = grid.querySelector('p');
          if(empty) empty.remove();
        }
        if(window.firebaseDB && window.firebaseLib) {
          var addDocFn = window.firebaseLib.addDoc;
          var collFn = window.firebaseLib.collection;
          waitForFirebase(function(){
            if(status) status.textContent += ' | Saving...';
            var addDocFn2 = window.firebaseLib.addDoc;
            var collFn2 = window.firebaseLib.collection;
            var promises = uploaded.map(function(p){
              return addDocFn2(collFn2(window.firebaseDB,'albums',albumId,'photos'),{
                url: p.url,
                uploadedBy: p.uploadedBy,
                createdAt: new Date().toISOString()
              }).then(function(){ if(status) status.textContent += ' ✓'; })
                .catch(function(e){ if(status) status.textContent += ' ERR:'+e.message; });
            });
            Promise.all(promises).catch(function(e){ if(status) status.textContent += ' ERR2:'+e.message; });
          });
        }
      } else {
        if(btn) btn.textContent='Envoyer mes photos 💌';
        if(status){status.style.color='#c43a3a';status.textContent='Erreur envoi. Vérifiez connexion.';}
      }
      return;
    }
    var file = files[i];
    i++;
    if(status) status.textContent='Envoi photo '+i+'/'+files.length+'...';
    var reader = new FileReader();
    reader.onload = function(e) {
      var base64 = e.target.result.split(',')[1];
      var fd = new FormData();
      fd.append('key', '3f05b1a037eee587fcf6ca459b39f8ff');
      fd.append('image', base64);
      fetch('https://api.imgbb.com/1/upload', {method:'POST', body:fd})
        .then(function(res){ return res.json(); })
        .then(function(data){
          if(data.success && data.data && data.data.url) {
            ok++;
            uploaded.push({url: data.data.url, uploadedBy: name});
          } else {
            if(status){status.textContent='ImgBB err: '+(data.error?data.error.message:JSON.stringify(data).substring(0,60));}
          }
          processNext();
        })
        .catch(function(e){
          if(status){status.textContent='Net err: '+e.message;}
          processNext();
        });
    };
    reader.readAsDataURL(file);
  }
  processNext();
}

function exportGuests(){

  GUESTS.forEach(g=>{csv+=`"${g.nom}","${g.email||''}","${g.cote==='p1'?USER.p1:USER.p2}","${g.role||''}","${g.regime||''}","${g.vinHonneur?'Oui':'Non'}","${g.invitation}","${g.presence}"\n`;});

function importGuests(e){
  const file=e.target.files?.[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const text=ev.target.result;
      const lines=text.split(/\r?\n/).filter(l=>l.trim());
      if(lines.length<2){showImportMsg('⚠️ Fichier vide ou sans données.','err');return;}
      const header=lines[0].split(',').map(c=>c.replace(/"/g,'').trim().toLowerCase());
      const findCol=patterns=>header.findIndex(c=>patterns.some(p=>c.includes(p)));
      const iNom=findCol(['nom complet','nom']);
      const iPre=findCol(['prénom','prenom']);
      const imported=[];
      for(let i=1;i<lines.length;i++){
        const cols=lines[i].match(/(".*?"|[^,]+)/g)||[];
        const get=idx=>idx>=0?(cols[idx]||'').replace(/"/g,'').trim():'';
        const nom=iNom>=0&&header[iNom].includes('complet')?get(iNom):(iPre>=0&&iNom>=0?get(iPre)+' '+get(iNom):get(iNom>=0?iNom:iPre));
        if(!nom.trim())continue;
        imported.push({id:Date.now()+i,nom:nom.trim(),email:'',cote:'p1',invitation:'non envoyée',presence:'en attente',role:'Invité·e',regime:'Aucun',vinHonneur:false,seatTableId:null,seatIdx:null});
      }
      GUESTS=[...GUESTS,...imported];saveGuests();renderGuests();
      showImportMsg(`✓ ${imported.length} invité(s) importé(s) !`,'ok');
    }catch{showImportMsg('❌ Erreur lors de l\'import.','err');}
  };
  reader.readAsText(file,'UTF-8');e.target.value='';
}
function showImportMsg(msg,type){
  const m=el('import-msg');if(!m)return;
  m.textContent=msg;m.style.display='block';
  m.style.background=type==='ok'?'#f0f8f0':'#fff0f0';
  m.style.border=`1px solid ${type==='ok'?gn:rd}`;
  m.style.color=type==='ok'?gn:rd;
  setTimeout(()=>{if(m)m.style.display='none';},4000);
}

let tpDrag=null;
// Zoom/pan state
let tpScale=1,tpPanX=0,tpPanY=0,tpPanning=false,tpPanStart=null,tpPinchDist=0,tpPanMode=false;
window.tpSelectedShape='round';
function setTpShape(s){
  window.tpSelectedShape=s;
  ['round','rect','square'].forEach(v=>{
    const b=el('tp-shape-'+v);if(!b)return;
    const on=v===s;
    b.style.background=on?'#d4607a':'#fff';
    b.style.color=on?'#fff':'#b07a90';
    b.style.borderColor=on?'#d4607a':'#f5d5e0';
  });
}
function tpTogglePan(){
  tpPanMode=!tpPanMode;
  const btn=el('tp-pan-btn');const canvas=el('tp-canvas');
  if(btn){btn.style.background=tpPanMode?'#c9a84c':'#fff';btn.style.color=tpPanMode?'#fff':'#c47a2a';btn.title=tpPanMode?'Mode navigation actif':'Activer navigation';}
  if(canvas)canvas.style.cursor=tpPanMode?'grab':'';
}
function tpApplyTransform(){
  const inner=el('tp-inner');
  if(inner)inner.style.transform=`translate(${tpPanX}px,${tpPanY}px) scale(${tpScale})`;
}
function renderTablePlan(){
  tpScale=1;tpPanX=0;tpPanY=0;tpPanMode=false;window.tpSelectedShape='round';
  el('page-3').innerHTML=`
  <div class="card" style="padding:12px;margin-bottom:12px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;">
    <div style="display:flex;gap:6px;">
      <button id="tp-shape-round" onclick="setTpShape(\'round\')" style="background:#d4607a;color:#fff;border:1.5px solid #d4607a;border-radius:9px;padding:6px 12px;cursor:pointer;font-size:12px;font-weight:700;font-family:\'Nunito\',sans-serif;">⬤ Ronde</button>
      <button id="tp-shape-rect" onclick="setTpShape(\'rect\')" style="background:#fff;color:#b07a90;border:1.5px solid #f5d5e0;border-radius:9px;padding:6px 12px;cursor:pointer;font-size:12px;font-weight:700;font-family:\'Nunito\',sans-serif;">▬ Rect.</button>
      <button id="tp-shape-square" onclick="setTpShape(\'square\')" style="background:#fff;color:#b07a90;border:1.5px solid #f5d5e0;border-radius:9px;padding:6px 12px;cursor:pointer;font-size:12px;font-weight:700;font-family:\'Nunito\',sans-serif;">■ Carrée</button>
    </div>
    <button class="btn" onclick="addTable()">+ Table</button>
    <div style="display:flex;gap:6px;margin-left:auto;">
      <button onclick="tpZoom(0.2)" style="background:#fff;border:1.5px solid ${br};border-radius:8px;width:34px;height:34px;cursor:pointer;font-size:18px;font-weight:700;color:${pk};">+</button>
      <button onclick="tpZoom(-0.2)" style="background:#fff;border:1.5px solid ${br};border-radius:8px;width:34px;height:34px;cursor:pointer;font-size:18px;font-weight:700;color:${pk};">−</button>
      <button onclick="tpReset()" style="background:#fff;border:1.5px solid ${br};border-radius:8px;padding:0 10px;height:34px;cursor:pointer;font-size:11px;font-weight:700;color:${tl};">↺</button>
      <button id="tp-pan-btn" onclick="tpTogglePan()" title="Activer navigation" style="background:#fff;border:1.5px solid #e8d48a;border-radius:8px;width:34px;height:34px;cursor:pointer;font-size:16px;color:#c47a2a;" title="Mode navigation (2 doigts=zoom, 1 doigt=déplacer)">✋</button>
    </div>
  </div>
  <div id="tp-canvas" style="position:relative;background:radial-gradient(circle,#fff8fa,#fdf0f5);border:2px dashed ${br};border-radius:16px;height:500px;overflow:hidden;touch-action:none;user-select:none;">
    <svg style="position:absolute;inset:0;width:100%;height:100%;opacity:.05;pointer-events:none;"><defs><pattern id="pg" width="28" height="28" patternUnits="userSpaceOnUse"><path d="M28 0L0 0 0 28" fill="none" stroke="${pk}" stroke-width="0.5"/></pattern></defs><rect width="100%" height="100%" fill="url(#pg)"/></svg>
    <div id="tp-inner" style="position:absolute;inset:0;transform-origin:0 0;will-change:transform;"></div>
  </div>
  <div id="tp-legend" style="display:flex;gap:12px;justify-content:center;margin-top:12px;flex-wrap:wrap;"></div>`;
  renderTPLegend();
  TABLES.forEach(t=>addTableEl(t));
  // Canvas pan/zoom events
  const canvas=el('tp-canvas');
  // Mouse wheel zoom
  canvas.addEventListener('wheel',e=>{
    e.preventDefault();
    const delta=e.deltaY>0?-0.1:0.1;
    tpScale=Math.min(3,Math.max(0.3,tpScale+delta));
    tpApplyTransform();
  },{passive:false});
  // Touch: pinch zoom with 2 fingers always; pan with 1 finger only in pan mode
  canvas.addEventListener('touchstart',e=>{
    if(e.touches.length===2){
      tpPanning=false;
      tpPinchDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    } else if(e.touches.length===1&&tpPanMode){
      tpPanning=true;
      tpPanStart={x:e.touches[0].clientX-tpPanX,y:e.touches[0].clientY-tpPanY};
    }
  },{passive:true});
  canvas.addEventListener('touchmove',e=>{
    if(e.touches.length===2){
      e.preventDefault();
      const dist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      const delta=(dist-tpPinchDist)*0.005;
      tpScale=Math.min(3,Math.max(0.3,tpScale+delta));
      tpPinchDist=dist;
      tpApplyTransform();
    } else if(e.touches.length===1&&tpPanning){
      tpPanX=e.touches[0].clientX-tpPanStart.x;
      tpPanY=e.touches[0].clientY-tpPanStart.y;
      tpApplyTransform();
    }
  },{passive:false});
  canvas.addEventListener('touchend',()=>{tpPanning=false;});
  // Mouse: pan only in pan mode
  canvas.addEventListener('mousedown',e=>{
    if(tpPanMode&&(e.target===canvas||e.target===el('tp-inner')||e.target.tagName==='svg'||e.target.tagName==='rect')){
      tpPanning=true;
      tpPanStart={x:e.clientX-tpPanX,y:e.clientY-tpPanY};
      canvas.style.cursor='grabbing';
    }
  });
  document.addEventListener('mousemove',e=>{
    if(!tpPanning)return;
    tpPanX=e.clientX-tpPanStart.x;

}

function addTableEl(table){
  const canvas=el('tp-canvas');const inner=el('tp-inner')||canvas;if(!canvas)return;
  const isR=table.shape==='round';const isSq=table.shape==='square';const R=52,TW=90,TH=46,SQ=80;
  const W=isR?R*2+24:isSq?SQ+34:TW+34,H=isR?R*2+24:isSq?SQ+34:TH+50,cx=W/2,cy=H/2;

  // Double-tap (mobile)

  });
  div.appendChild(lbl);

  // Delete
  const del=document.createElement('div');
  del.style.cssText=`position:absolute;top:-8px;right:-8px;width:18px;height:18px;border-radius:50%;background:#fff;border:1px solid ${br};display:flex;align-items:center;justify-content:center;font-size:11px;cursor:pointer;color:${rd};z-index:10;`;
  del.textContent='×';del.onclick=e=>{e.stopPropagation();TABLES=TABLES.filter(t=>t.id!==table.id);div.remove();saveTables();};
  div.appendChild(del);

  // Surface
  const surf=document.createElement('div');
  if(isR){surf.style.cssText=`position:absolute;left:${cx-30}px;top:${cy-30}px;width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,${sf},#fff);border:2px solid ${pm};box-shadow:0 2px 10px rgba(212,96,122,.1);z-index:1;`;}
  else if(isSq){surf.style.cssText=`position:absolute;left:${cx-SQ/2}px;top:${cy-SQ/2}px;width:${SQ}px;height:${SQ}px;border-radius:6px;background:linear-gradient(135deg,${sf},#fff);border:2px solid ${pm};box-shadow:0 2px 10px rgba(212,96,122,.1);z-index:1;`;}
  else{surf.style.cssText=`position:absolute;left:${cx-TW/2}px;top:${cy-TH/2}px;width:${TW}px;height:${TH}px;border-radius:10px;background:linear-gradient(135deg,${sf},#fff);border:2px solid ${pm};box-shadow:0 2px 10px rgba(212,96,122,.1);z-index:1;`;}
  div.appendChild(surf);

  // Seats
  const n=Math.min(table.seats,12);
  for(let i=0;i<n;i++){
    let sx,sy;
    if(isR){const a=(i/n)*2*Math.PI-Math.PI/2;sx=cx+(R-1)*Math.cos(a)-13;sy=cy+(R-1)*Math.sin(a)-13;}
    else if(isSq){const side=Math.floor(i/(n/4));const idx=i%(Math.ceil(n/4));const sp=SQ/Math.ceil(n/4);if(side===0){sx=(cx-SQ/2)+idx*sp+sp/2-13;sy=cy-SQ/2-16;}else if(side===1){sx=cx+SQ/2+2;sy=(cy-SQ/2)+idx*sp+sp/2-13;}else if(side===2){sx=(cx-SQ/2)+idx*sp+sp/2-13;sy=cy+SQ/2+2;}else{sx=cx-SQ/2-16;sy=(cy-SQ/2)+idx*sp+sp/2-13;}}
    else{const half=Math.ceil(n/2);const isTop=i<half;const idx=isTop?i:i-half;const sp=TW/half;sx=(cx-TW/2)+idx*sp+sp/2-13;sy=isTop?cy-TH/2-16:cy+TH/2+2;}
    const seat=document.createElement('div');
    const hidden=(table.hiddenSeats||[]).includes(i);
    const g=GUESTS.find(g=>g.seatTableId===table.id&&g.seatIdx===i);
    seat.style.cssText=`position:absolute;left:${sx}px;top:${sy}px;width:26px;height:26px;border-radius:50%;border:${hidden?`2px dashed ${br}`:'2.5px solid #fff'};background:${hidden?'rgba(255,255,255,.35)':g?(g.cote==='p1'?'#e8a0b0':'#a0b0e8'):'#f5e0e8'};display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:bold;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,.13);z-index:3;color:${hidden?br:'#fff'};user-select:none;`;
    seat.textContent=hidden?'·':(g?g.nom.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase():'+');
    seat.title=g?g.nom:'Libre';
    seat.onclick=e=>{e.stopPropagation();openSeatModal(table.id,i);};
    div.appendChild(seat);
  }

  // Drag — account for scale/pan transform
  div.addEventListener('pointerdown',e=>{
    if(tpPanMode||e.target===lbl||e.target===del||e.target.tagName==='INPUT')return;
    div.setPointerCapture(e.pointerId);
    const rect=canvas.getBoundingClientRect();
    const t=TABLES.find(t=>t.id===table.id);
    // Convert screen coords to inner (scaled) coords
    tpDrag={id:table.id,ox:(e.clientX-rect.left-tpPanX)/tpScale-t.x,oy:(e.clientY-rect.top-tpPanY)/tpScale-t.y};
  });
  div.addEventListener('pointermove',e=>{

    const nx=Math.max(0,(e.clientX-rect.left-tpPanX)/tpScale-tpDrag.ox);
    const ny=Math.max(0,(e.clientY-rect.top-tpPanY)/tpScale-tpDrag.oy);

  });
  div.addEventListener('pointerup',()=>{if(tpDrag&&tpDrag.id===table.id){saveTables();tpDrag=null;}});
  div.addEventListener('pointercancel',()=>{tpDrag=null;});
  inner.appendChild(div);
}

function geoSearch(){
  if(!navigator.geolocation){alert('Géolocalisation non disponible.');return;}
  const btn=el('vnd-geo-btn');btn.textContent='📍 Localisation...';btn.disabled=true;
  navigator.geolocation.getCurrentPosition(
    pos=>{
      window._userLat=pos.coords.latitude;
      window._userLng=pos.coords.longitude;
      btn.textContent='📍 Autour de moi';btn.disabled=false;
      const query=el('vnd-loc')?.value.trim()||'prestataire mariage';
      searchVendorsWithLocation(query,pos.coords.latitude,pos.coords.longitude);
    },
    err=>{btn.textContent='📍 Autour de moi';btn.disabled=false;alert('Impossible d\'obtenir votre position. Vérifiez les permissions.');}
  );
}


async function searchVendors(){
  const query=el('vnd-loc')?.value.trim();if(!query)return;
  const lat=window._userLat||null;const lng=window._userLng||null;
  if(!lat){
    // Ask for geolocation first
    if(navigator.geolocation){
      navigator.geolocation.getCurrentPosition(
        pos=>{window._userLat=pos.coords.latitude;window._userLng=pos.coords.longitude;searchVendorsWithLocation(query,pos.coords.latitude,pos.coords.longitude);},
        ()=>searchVendorsWithLocation(query,null,null)
      );
    } else { searchVendorsWithLocation(query,null,null); }
  } else { searchVendorsWithLocation(query,lat,lng); }
}

      ${v.distance?`<span style="font-size:11px;color:${gn};font-weight:600;">📍 ${v.distance} km</span>`:''}
    </div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
      <span style="font-size:11px;color:${tl};font-weight:600;flex-shrink:0;">💰 Prix négocié :</span>
      <input type="text" value="${v.prix_perso||''}" placeholder="Indiquer le prix..." onchange="updVndPrice(${v.id},'${zone}',this.value)" style="flex:1;border:1px solid ${br};border-radius:7px;padding:5px 9px;font-size:12px;outline:none;background:#fffafc;">
    </div>
    ${zone==='fav'?
      `<button onclick="movToChosen(${v.id})" style="width:100%;background:#f0f8f0;color:${gn};border:1px solid ${gn}30;border-radius:8px;padding:7px;cursor:pointer;font-size:12px;font-weight:700;font-family:'Nunito',sans-serif;">→ Déplacer vers Choisis</button>`:
      `<button onclick="movToFav(${v.id})" style="width:100%;background:${sf};color:${tl};border:1px solid ${br};border-radius:8px;padding:7px;cursor:pointer;font-size:12px;font-weight:700;font-family:'Nunito',sans-serif;">← Remettre en Favoris</button>`}
  </div>`;
}
function updVndPrice(id,zone,val){
  if(zone==='fav')VENDORS_FAV=VENDORS_FAV.map(v=>v.id===id?{...v,prix_perso:val}:v);
  else VENDORS_CHO=VENDORS_CHO.map(v=>v.id===id?{...v,prix_perso:val}:v);
  sv(`vfav_${USER.email}`,VENDORS_FAV);sv(`vcho_${USER.email}`,VENDORS_CHO);
}
let dragVndId=null,dragVndZone=null;
function dragVnd(e,id,zone){dragVndId=id;dragVndZone=zone;e.dataTransfer.effectAllowed='move';}
function dropToFav(e){e.preventDefault();if(!dragVndId)return;if(dragVndZone==='cho'){movToFav(dragVndId);}dragVndId=null;}
function dropToChosen(e){e.preventDefault();if(!dragVndId)return;if(dragVndZone==='fav'){movToChosen(dragVndId);}dragVndId=null;}
function movToFav(id){const v=VENDORS_CHO.find(c=>c.id===id);if(!v)return;VENDORS_CHO=VENDORS_CHO.filter(c=>c.id!==id);if(!VENDORS_FAV.find(f=>f.id===id))VENDORS_FAV.push(v);sv(`vfav_${USER.email}`,VENDORS_FAV);sv(`vcho_${USER.email}`,VENDORS_CHO);renderFavs();renderChosen();}
function renderFavs(){
  const d=el('vnd-favs');if(!d)return;
  d.innerHTML=VENDORS_FAV.length===0
    ?`<div style="background:${sf};border:2px dashed ${br};border-radius:12px;padding:16px;text-align:center;color:${tl};font-size:13px;font-style:italic;">Ajoutez des prestataires depuis la recherche</div>`
    :vSort(VENDORS_FAV,sortFav).map(v=>vndMiniCard(v,'fav')).join('');
  const cnt=el('fav-cnt');if(cnt)cnt.textContent=VENDORS_FAV.length;
}
function renderChosen(){
  const d=el('vnd-chosen');if(!d)return;
  d.innerHTML=VENDORS_CHO.length===0
    ?`<div style="background:${sf};border:2px dashed ${br};border-radius:12px;padding:16px;text-align:center;color:${tl};font-size:13px;font-style:italic;">Glissez vos favoris ici ou cliquez sur "Déplacer"</div>`
    :vSort(VENDORS_CHO,sortCho).map(v=>vndMiniCard(v,'cho')).join('');
  const cnt=el('cho-cnt');if(cnt)cnt.textContent=VENDORS_CHO.length;
}

// ── MENU ──────────────────────────────────────────────────────────────────────
function saveMenu(){sv(`menu_${USER.email}`,MENU);}
let menuCalcResult=null;
function renderMenu(){
  const conf=GUESTS.filter(g=>g.presence==='confirmée');
  const noAlc=conf.filter(g=>g.regime==='Sans alcool').length;
  const spec=conf.filter(g=>g.regime&&g.regime!=='Aucun'&&g.regime!=='Sans alcool').length;
  const enfants=conf.filter(g=>g.age==='Enfant').length;
  const mq=ld(`menuqty_${USER.email}`,{honneur:'',repas:''});
  el('page-5').innerHTML=`
  <div class="card" style="padding:16px;margin-bottom:14px;background:linear-gradient(135deg,${sf},#fff);">
    <div style="font-family:'Playfair Display',serif;font-size:16px;color:${tx};margin-bottom:12px;">Paramètres de la réception</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;align-items:start;">
      <div style="display:flex;flex-direction:column;">
        <label class="lbl" style="min-height:28px;display:flex;align-items:flex-end;">Vin d'honneur uniquement</label>
        <input class="inp" type="number" min="0" id="mnu-h" value="${mq.honneur}" placeholder="Ex: 20" onchange="saveMenuQty()">
        <div style="font-size:11px;color:${tl};margin-top:3px;">Repartent après le cocktail</div>
      </div>
      <div style="display:flex;flex-direction:column;">
        <label class="lbl" style="min-height:28px;display:flex;align-items:flex-end;">Présents pour toute la réception</label>
        <input class="inp" type="number" min="0" id="mnu-r" value="${mq.repas}" placeholder="Ex: 80" onchange="saveMenuQty()">
        <div style="font-size:11px;color:${tl};margin-top:3px;">Présents tout le repas</div>
      </div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;">
      ${[{l:'Invités confirmés',v:conf.length,c:gn},{l:'Sans alcool',v:noAlc,c:am},{l:'Régimes spéciaux',v:spec,c:pk},{l:'Enfants',v:enfants,c:'#4a7ab0'}].map(x=>`<div style="background:#fff;border:1.5px solid ${br};border-radius:10px;padding:8px 12px;text-align:center;flex:1;min-width:80px;"><div style="font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:${x.c}">${x.v}</div><div style="font-size:9px;color:${tl};letter-spacing:1px;text-transform:uppercase;">${x.l}</div></div>`).join('')}
    </div>
    <button class="btn" onclick="doMenuCalc()" style="width:100%;font-size:14px;padding:12px;">Calculer les estimations</button>
  </div>
  <div id="mnu-calc-result" style="display:${menuCalcResult?'block':'none'};">${menuCalcResult||''}</div>
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
    <div style="font-family:'Playfair Display',serif;font-size:17px;color:${tx};">Menu</div>
    <button class="btn" onclick="addMenuSection()" style="padding:7px 14px;font-size:12px;">+ Section</button>
  </div>
  <div id="mnu-sections">${MENU.map((s,si)=>menuSectionHtml(s,si)).join('')}</div>
  <p style="font-size:11px;color:${tl};font-style:italic;text-align:center;margin-top:8px;">Touchez un titre ou un plat pour le modifier</p>`;
}
function saveMenuQty(){sv(`menuqty_${USER.email}`,{honneur:el('mnu-h')?.value||'',repas:el('mnu-r')?.value||''});}
function doMenuCalc(){
  const hC=Math.max(0,Number(el('mnu-h')?.value)||0),rC=Math.max(0,Number(el('mnu-r')?.value)||0),tot=hC+rC;
  const conf=GUESTS.filter(g=>g.presence==='confirmée');
  const noAlc=conf.filter(g=>g.regime==='Sans alcool').length;
  const ratio=conf.length>0?(conf.length-noAlc)/conf.length:0.85;
  const hA=Math.round(hC*ratio),rA=Math.round(rC*ratio);
  const items=[
    {l:'Champagne (cocktail)',v:Math.ceil(hA/6)+' bout.',sub:`≈ ${hA} buveurs × 1 flûte`,c:'#c9a84c'},
    {l:'Vin blanc',v:Math.ceil(hA/6+rA*3/6)+' bout.',sub:'Cocktail + repas',c:'#e0c860'},
    {l:'Vin rosé',v:Math.ceil(rA*4.5/6)+' bout.',sub:'Repas',c:'#f0a8b8'},
    {l:'Vin rouge',v:Math.ceil(rA*9/6)+' bout.',sub:'Repas',c:'#a04860'},
    {l:'Eau plate 1,5L',v:Math.ceil(tot*1.5/1.5)+' bout.',sub:'Tout le repas',c:'#5a8aaa'},
    {l:'Eau gazeuse 1,5L',v:Math.ceil(tot*0.5/1.5)+' bout.',sub:'Tout le repas',c:'#7aaaca'},
    {l:'Softs & jus',v:Math.ceil(tot*0.3+(hC-hA+rC-rA)*2)+' unités',sub:'Incl. sans alcool',c:'#6aaa6a'},
  ];
  const spec=conf.filter(g=>g.regime&&g.regime!=='Aucun'&&g.regime!=='Sans alcool');
  menuCalcResult=`
  <div style="font-family:'Playfair Display',serif;font-size:17px;color:${tx};margin-bottom:8px;">Estimation des boissons</div>
  <div style="font-size:12px;color:${tl};margin-bottom:12px;font-style:italic;">Base : ${hC} vin d'honneur + ${rC} repas = ${tot} invités</div>
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-bottom:18px;">
    ${items.map(x=>`<div style="background:#fff;border:2px solid ${x.c}30;border-radius:13px;padding:12px;border-left:4px solid ${x.c};"><div style="font-size:10px;color:${tl};margin-bottom:3px;font-weight:600;">${x.l}</div><div style="font-family:'Playfair Display',serif;font-size:19px;font-weight:700;color:${x.c};margin-bottom:2px;">${x.v}</div><div style="font-size:10px;color:${tl};font-style:italic;">${x.sub}</div></div>`).join('')}
  </div>
  ${spec.length?`<div class="card" style="padding:14px;margin-bottom:18px;border-left:4px solid ${am};"><div style="font-family:'Playfair Display',serif;font-size:15px;color:${tx};margin-bottom:10px;">Régimes alimentaires particuliers</div>${spec.map(g=>`<div style="display:flex;align-items:center;gap:10px;font-size:13px;margin-bottom:5px;"><div style="width:7px;height:7px;border-radius:50%;background:${am};flex-shrink:0;"></div><span style="font-weight:700;">${g.nom}</span><span style="color:${am};font-weight:700;font-size:11px;background:#fff8f0;border-radius:20px;padding:2px 8px;">${g.regime}</span></div>`).join('')}</div>`:''}`;
  const d=el('mnu-calc-result');if(d){d.innerHTML=menuCalcResult;d.style.display='block';}
}
function menuSectionHtml(s,si){
  return `<div class="card" style="margin-bottom:12px;overflow:hidden;">
    <div style="background:linear-gradient(135deg,${sf},#fff);padding:11px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid ${br};">
      <span onclick="renameMenuSection(${s.id})" style="font-family:'Playfair Display',serif;font-size:14px;color:${tx};font-weight:700;cursor:text;border-bottom:1px dashed ${br};padding-bottom:1px;">${si+1}. ${h(s.section)}</span>
      <div style="display:flex;gap:6px;">
        <button onclick="addMenuItem(${s.id})" style="background:none;border:1px solid ${br};border-radius:6px;padding:3px 9px;cursor:pointer;font-size:11px;color:${tm};font-weight:700;font-family:'Nunito',sans-serif;">+ Plat</button>
        <button onclick="removeMenuSection(${s.id})" style="background:none;border:none;cursor:pointer;color:${br};font-size:16px;">×</button>
      </div>
    </div>
    <div style="padding:10px 14px;">
      ${s.items.map(item=>`<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
        <div style="width:5px;height:5px;border-radius:50%;background:${pm};flex-shrink:0;"></div>
        <span onclick="renameMenuItem(${s.id},${item.id})" style="flex:1;font-size:13px;color:${tx};cursor:text;">${h(item.text)}</span>
        <button onclick="removeMenuItem(${s.id},${item.id})" style="background:none;border:none;cursor:pointer;color:${br};font-size:13px;flex-shrink:0;">×</button>
      </div>`).join('')}
    </div>
  </div>`;
}
function addMenuSection(){MENU.push({id:Date.now(),section:'Nouvelle section',items:[{id:Date.now()+1,text:'Nouveau plat'}]});saveMenu();renderMenu();}
function addMenuItem(sid){MENU=MENU.map(s=>s.id===sid?{...s,items:[...s.items,{id:Date.now(),text:'Nouveau plat'}]}:s);saveMenu();renderMenu();}
function removeMenuSection(sid){MENU=MENU.filter(s=>s.id!==sid);saveMenu();renderMenu();}
function removeMenuItem(sid,iid){MENU=MENU.map(s=>s.id===sid?{...s,items:s.items.filter(i=>i.id!==iid)}:s);saveMenu();renderMenu();}
function renameMenuSection(sid){const s=MENU.find(s=>s.id===sid);const v=prompt('Renommer la section :',s.section);if(v!==null&&v.trim()){MENU=MENU.map(s=>s.id===sid?{...s,section:v.trim()}:s);saveMenu();renderMenu();}}
function renameMenuItem(sid,iid){const s=MENU.find(s=>s.id===sid);const item=s.items.find(i=>i.id===iid);const v=prompt('Modifier le plat :',item.text);if(v!==null&&v.trim()){MENU=MENU.map(s=>s.id===sid?{...s,items:s.items.map(i=>i.id===iid?{...i,text:v.trim()}:i)}:s);saveMenu();renderMenu();}}

// ── ALBUM ─────────────────────────────────────────────────────────────────────
function renderAlbum(){
  // Always compute albumId deterministically from email
  const albumId = btoa(USER.email).replace(/[^a-zA-Z0-9]/g,'').substring(0,20);
  sv('album_id_'+USER.email, albumId);
  const shareUrl = window.location.href.split('?')[0] + '?album=' + albumId;
  const qrUrl=`https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(shareUrl)}&color=d4607a&bgcolor=fff9fb&margin=6`;

  el('page-6').innerHTML=`
  <div class="card" style="padding:16px;margin-bottom:16px;background:linear-gradient(135deg,${sf},#fff);">
    <div style="font-family:'Playfair Display',serif;font-size:18px;color:${tx};margin-bottom:12px;">📸 Album partagé</div>
    <p style="font-size:13px;color:${tl};margin-bottom:14px;">Partagez ce lien ou QR code avec vos invités pour qu'ils puissent ajouter leurs photos !</p>
    <div style="display:flex;flex-direction:column;align-items:center;gap:12px;margin-bottom:16px;">
      <img src="${qrUrl}" style="border-radius:12px;box-shadow:0 2px 12px rgba(180,100,130,0.2);" alt="QR Code Album">
      <button class="btn" onclick="shareAlbumLink('${shareUrl}')" style="width:100%;">📤 Partager le lien</button>
      <button class="btn-sec" onclick="copyAlbumLink('${shareUrl}')" style="width:100%;font-size:12px;">📋 Copier le lien</button>
    </div>
  </div>

  <div class="card" style="padding:16px;margin-bottom:16px;">
    <div style="font-family:'Playfair Display',serif;font-size:16px;color:${tx};margin-bottom:12px;">Ajouter vos photos</div>
    <label style="display:flex;align-items:center;justify-content:center;gap:8px;background:linear-gradient(135deg,${pk},#b84060);color:#fff;border-radius:11px;padding:12px;cursor:pointer;font-weight:700;font-size:14px;font-family:'Nunito',sans-serif;">
      📷 Choisir des photos
      <input type="file" accept="image/*" multiple onchange="uploadPhotosAlbum(this.files)" style="display:none;">
    </label>
    <div id="upload-progress" style="display:none;margin-top:10px;text-align:center;color:${tl};font-size:13px;"></div>
  </div>

  <div class="card" style="padding:16px;">
    <div style="font-family:'Playfair Display',serif;font-size:16px;color:${tx};margin-bottom:12px;">Photos de l'album <span id="photo-count" style="background:${sf};color:${pk};font-size:11px;border-radius:20px;padding:2px 9px;font-weight:700;">0</span></div>
    <div id="album-grid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;">
      <div style="text-align:center;color:${tl};font-size:13px;font-style:italic;grid-column:1/-1;padding:20px;">Chargement des photos...</div>
    </div>
  </div>
  `;

  loadAlbumPhotos(albumId);
}

function shareAlbumLink(url){
  if(navigator.share){navigator.share({title:'Album Wedding Dream',text:'Ajoutez vos photos !',url:url});}
  else{copyAlbumLink(url);}
}

function copyAlbumLink(url){
  navigator.clipboard.writeText(url).then(()=>{alert('Lien copié !');}).catch(()=>{prompt('Copiez ce lien :',url);});
}

async function uploadPhotosAlbum(files){
  if(!files||files.length===0) return;
  const progress=document.getElementById('upload-progress');
  if(progress){progress.style.display='block';progress.textContent='Envoi en cours... 0/'+files.length;}
  let ok=0;
  for(let i=0;i<files.length;i++){
    const url=await uploadPhotoToFirebase(files[i],USER.email);
    if(url){ok++;ALBUM.push({id:Date.now(),url,name:files[i].name});}
    if(progress)progress.textContent='Envoi en cours... '+(i+1)+'/'+files.length;
  }
  if(progress){
    if(ok>0){progress.textContent='✓ '+ok+' photo(s) ajoutée(s) !';progress.style.color='#5a8a6a';}
    else{progress.textContent='Erreur lors de l\'envoi.';progress.style.color='#c43a3a';}
  }
}

function loadAlbumPhotos(albumId){
  if(!window.firebaseDB){
    renderAlbumGrid(ALBUM.map(p=>({url:p.url,uploadedBy:'organisateur'})));
    return;
  }
  try{
    const {collection, onSnapshot} = window.firebaseLib;
    onSnapshot(collection(window.firebaseDB,'albums',albumId,'photos'),(snap)=>{
      const photos=[];
      snap.forEach(d=>photos.push({id:d.id,...d.data()}));
      renderAlbumGrid(photos);
    });
  }catch(e){console.warn('loadAlbumPhotos error:',e);renderAlbumGrid([]);}
}

function renderAlbumGrid(photos){
  const grid=document.getElementById('album-grid');
  const cnt=document.getElementById('photo-count');
  if(!grid) return;
  if(cnt) cnt.textContent=photos.length;
  if(photos.length===0){
    grid.innerHTML=`<div style="text-align:center;color:${tl};font-size:13px;font-style:italic;grid-column:1/-1;padding:20px;">Aucune photo pour l'instant</div>`;
    return;
  }
  grid.innerHTML=photos.map((p,i)=>`
    <div onclick="openLightbox(${i})" style="position:relative;aspect-ratio:1;overflow:hidden;cursor:pointer;border-radius:6px;">
      <img src="${p.url}" style="width:100%;height:100%;object-fit:cover;" loading="lazy">
      ${p.uploadedBy&&p.uploadedBy!=='organisateur'?`<div style="position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,0.45);color:#fff;font-size:9px;padding:2px 5px;font-family:'Nunito',sans-serif;">${h(p.uploadedBy)}</div>`:''}
    </div>`).join('');
  window._albumPhotos=photos;
}

function openLightbox(i){
  const p=window._albumPhotos?.[i];if(!p)return;
  const lb=document.createElement('div');
  lb.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:9999;display:flex;align-items:center;justify-content:center;';
  lb.innerHTML=`<img src="${p.url}" style="max-width:95vw;max-height:90vh;object-fit:contain;border-radius:8px;">
    <button onclick="this.parentElement.remove()" style="position:absolute;top:16px;right:16px;background:rgba(255,255,255,0.2);color:#fff;border:none;border-radius:50%;width:40px;height:40px;font-size:20px;cursor:pointer;">×</button>`;
  document.body.appendChild(lb);
}


// ── NOTES ─────────────────────────────────────────────────────────────────────
function renderNotes(){
  const lines=Math.max(30,NOTES.split('\n').length+5);
  let linesHtml='';for(let i=0;i<lines;i++)linesHtml+=`<div style="position:absolute;left:48px;right:12px;top:${50+i*28}px;height:1px;border-top:1px dashed ${br};opacity:.7;"></div>`;
  el('page-7').innerHTML=`
  <div style="position:relative;border:2px solid ${bg2};border-radius:16px;overflow:hidden;box-shadow:0 4px 24px rgba(201,168,76,.1);background:#fffdf8;">
    <div style="position:absolute;inset:0;pointer-events:none;z-index:0;">${linesHtml}<div style="position:absolute;left:42px;top:0;bottom:0;width:1px;background:${pm};opacity:.25;"></div></div>
    ${[{top:'0',left:'0',r:'0deg'},{top:'0',right:'0',r:'90deg'},{bottom:'0',right:'0',r:'180deg'},{bottom:'0',left:'0',r:'270deg'}].map(s=>`<div style="position:absolute;${Object.entries(s).filter(([k])=>k!=='r').map(([k,v])=>k+':'+v).join(';')};width:32px;height:32px;pointer-events:none;z-index:3;"><svg viewBox="0 0 32 32" style="transform:rotate(${s.r})"><path d="M2 2L14 2L14 6L6 6L6 14L2 14Z" fill="${gl}" opacity="0.7"/></svg></div>`).join('')}
    <div style="position:absolute;top:13px;left:0;right:0;text-align:center;z-index:2;pointer-events:none;"><span style="font-family:'Playfair Display',serif;font-family:'Playfair Display',serif;font-size:17px;color:${tm};font-style:italic;font-weight:600;letter-spacing:1px;">MES NOTES</span></div>
    <textarea oninput="NOTES=this.value;sv('notes_${USER.email}',NOTES);" placeholder="Écrivez librement vos idées, remarques, informations importantes..." style="position:relative;z-index:1;width:100%;min-height:${lines*28+60}px;background:transparent;border:none;outline:none;resize:none;padding:46px 16px 20px 52px;font-size:14px;line-height:28px;color:${tx};font-family:'Nunito',sans-serif;">${h(NOTES)}</textarea>
  </div>
  <div style="text-align:right;margin-top:5px;font-size:11px;color:${tl};">Sauvegardé automatiquement</div>`;
}

// ── INIT ──────────────────────────────────────────────────────────────────────
window.onload=()=>{
  if(checkGuestAlbumMode()) return;
  const remE=ld('rem_e',''),remP=ld('rem_p','');
  if(remE){const el1=document.getElementById('a-email-l');if(el1)el1.value=remE;const el2=document.getElementById('a-email-r');if(el2)el2.value=remE;}
  if(remP){const el3=document.getElementById('a-pass-l');if(el3)el3.value=remP;}
  const sess=ld('sess',null);
  if(sess){const u=ld(`u_${sess}`,null);if(u)startApp(u);}
};
</script>
