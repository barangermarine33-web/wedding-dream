// ── THREE.JS 3D CAKE ENGINE — Professional PBR Renderer ────────────────────
let _3r=null,_3s=null,_3c=null,_3g=null,_3id=null;
let _3ry=0.25,_3rx=0.20,_3auto=true,_3drag=false,_3lx=0,_3ly=0,_3pinch=null;
let _3panX=0,_3panY=0,_3handMode=false; // mode "main" pour pan
let _3tierR=[],_3tierY=[];

// Safely convert hex → THREE.Color
function _col(hex){
  try{const r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255;
  return new window.THREE.Color(r,g,b);}
  catch{return new window.THREE.Color(1,0.9,0.85);}
}
function _hex2rgb(hex){
  try{return{r:parseInt(hex.slice(1,3),16)/255,g:parseInt(hex.slice(3,5),16)/255,b:parseInt(hex.slice(5,7),16)/255};}
  catch{return{r:1,g:0.9,b:0.85};}
}

function destroyThree(){
  if(_3id){cancelAnimationFrame(_3id);_3id=null;}
  if(_3r){try{_3r.dispose();}catch(e){}_3r=null;}
  _3s=null;_3c=null;_3g=null;
}

function initThree(canvas){
  const T=window.THREE;
  const W=canvas.clientWidth,H=canvas.clientHeight;

  _3r=new T.WebGLRenderer({canvas,antialias:true,alpha:false,powerPreference:'high-performance',preserveDrawingBuffer:true});
  _3r.setPixelRatio(Math.min(window.devicePixelRatio,3));
  _3r.setSize(W,H,false);
  _3r.shadowMap.enabled=true;
  _3r.shadowMap.type=T.PCFSoftShadowMap;
  _3r.toneMapping=T.ACESFilmicToneMapping;
  _3r.toneMappingExposure=1.25;
  _3r.physicallyCorrectLights=true;

  _3s=new T.Scene();
  _3s.background=new T.Color(0xffffff);
  _3s.fog=new T.Fog(0xf8f4f0,16,26);

  // ── STUDIO LIGHTING SETUP ──
  // Soft ambient
  _3s.add(new T.AmbientLight(0xfff0e8,0.7));
  // Hemisphere sky/ground
  _3s.add(new T.HemisphereLight(0xfff5e0,0xf0e8e0,0.6));

  // Key light — main shadow caster, upper left
  const key=new T.DirectionalLight(0xfff8f0,2.2);
  key.position.set(-4,10,6);
  key.castShadow=true;
  key.shadow.mapSize.set(2048,2048);
  key.shadow.camera.near=1;key.shadow.camera.far=35;
  key.shadow.camera.left=-3.5;key.shadow.camera.right=3.5;
  key.shadow.camera.top=7;key.shadow.camera.bottom=-2;
  key.shadow.bias=-0.0003;key.shadow.normalBias=0.02;
  _3s.add(key);

  // Fill light — soft right
  const fill=new T.DirectionalLight(0xd8e8ff,0.9);
  fill.position.set(6,4,-2);_3s.add(fill);

  // Rim light — warm backlight for silhouette
  const rim=new T.DirectionalLight(0xffd890,1.2);
  rim.position.set(0,6,-7);_3s.add(rim);

  // Top light — overhead for top surfaces
  const top=new T.DirectionalLight(0xffffff,0.5);
  top.position.set(0,12,0);_3s.add(top);

  // Warm candle-like point light at front-low
  const candle=new T.PointLight(0xff9050,1.5,12,2);
  candle.position.set(1.5,1.5,5);_3s.add(candle);

  // Camera
  _3c=new T.PerspectiveCamera(34,W/H,0.1,50);
  _3c.position.set(0,2.4,8.0);
  _3c.lookAt(0,0.6,0);
}

// Make a physically accurate material
function _mat(col,texId,isChoc){
  const T=window.THREE;
  const tex=TEXTURES_CAKE.find(t=>t.id===texId)||TEXTURES_CAKE[0];
  const m=new T.MeshStandardMaterial({
    color:col,
    roughness:isChoc?0.62:tex.roughness,
    metalness:isChoc?0.0:tex.metalness,
    envMapIntensity:0.8,
  });
  // Ombré / gradient effect: handled via vertex colors below if needed
  return m;
}

// Create a cream rosette ring
function _creamRing(T,cx,cy,radius,isRound,segs,baseCol){
  const g=new T.Group();
  const c=_hex2rgb(baseCol);
  const cream=new T.Color(Math.min(1,c.r+0.22),Math.min(1,c.g+0.22),Math.min(1,c.b+0.22));
  const mat=new T.MeshStandardMaterial({color:cream,roughness:0.55,metalness:0.0});
  const n=isRound?Math.round(radius*32):4;
  for(let i=0;i<n;i++){
    const a=isRound?(i/n)*Math.PI*2:((i+0.5)/4)*Math.PI*2;
    const geo=new T.SphereGeometry(0.048,8,6);
    const m=new T.Mesh(geo,mat.clone());
    m.scale.set(1,0.62,1);
    m.position.set(Math.sin(a)*radius*0.96,cy,Math.cos(a)*radius*0.96);
    m.castShadow=true;
    g.add(m);
  }
  return g;
}

function buildCake3D(data){
  const T=window.THREE;
  if(!T||!_3s)return;
  if(_3g){_3s.remove(_3g);_3g=null;}
  _3g=new T.Group();_3s.add(_3g);
  _3tierR=[];_3tierY=[];

  const etages=Math.min(5,data.etages||2);
  const layers=data.layers||[];
  const isRound=data.forme!=='carre'&&data.forme!=='hexagonal'&&data.forme!=='asymetrique';
  const isHex=data.forme==='hexagonal';
  const segs=isHex?6:isRound?80:4;
  const texId=data.texture||'lisse';
  const hauteur=data.hauteur||'standard';
  const hFactor=hauteur==='haut'?1.40:hauteur==='mini'?0.65:1.0;

  // Tier proportions (realistic wedding cake)
  const RADII=[1.08,0.78,0.57,0.42,0.31];
  const BASE_H=[0.84,0.76,0.66,0.58,0.50];
  const HEIGHTS=BASE_H.map(h=>h*hFactor);

  // ── GOLD PEDESTAL ──────────────────────────────────────────────────────────
  const goldM=new T.MeshStandardMaterial({color:0xC9A020,metalness:0.90,roughness:0.10});
  const pedM=new T.Mesh(new T.CylinderGeometry(0.13,0.22,0.22,32),goldM);
  pedM.position.y=0.11;pedM.castShadow=true;pedM.receiveShadow=true;_3g.add(pedM);

  // Plate
  const pR=RADII[0]+0.22;
  const plateM=new T.Mesh(new T.CylinderGeometry(pR,pR*0.95,0.055,64),goldM.clone());
  plateM.position.y=0.233;plateM.castShadow=true;plateM.receiveShadow=true;_3g.add(plateM);
  // Plate rims
  [pR+0.02,pR-0.07,pR-0.15].forEach(r=>{
    const rm=new T.Mesh(new T.TorusGeometry(r,0.010,8,64),
      new T.MeshStandardMaterial({color:0xFFE860,metalness:0.95,roughness:0.06}));
    rm.rotation.x=Math.PI/2;rm.position.y=0.262;_3g.add(rm);
  });

  let curY=0.260;

  for(let i=0;i<etages;i++){
    const layer=layers[i]||{parfum:'Vanille',glacage:'#F3E5AB'};
    const gl=layer.glacage||'#F3E5AB';
    const rgb=_hex2rgb(gl);
    const isChoc=gl==='#5A3A2E'||gl==='#6F4E37';
    const rB=RADII[i]||0.32;
    const rT=isRound?rB*0.968:rB;
    const tH=HEIGHTS[i]||0.55;

    _3tierR.push(rB);_3tierY.push(curY);

    const tMat=_mat(_col(gl),texId,isChoc);

    // ── TIER BODY ──────────────────────────────────────────────────────────
    let tGeo;
    if(isHex){
      tGeo=new T.CylinderGeometry(rT,rB,tH,6,1);
    } else if(isRound){
      tGeo=new T.CylinderGeometry(rT,rB,tH,segs,1);
    } else {
      tGeo=new T.BoxGeometry(rB*1.90,tH,rB*1.90,1,1,1);
    }
    const tier=new T.Mesh(tGeo,tMat);
    tier.position.y=curY+tH/2;
    tier.castShadow=true;tier.receiveShadow=true;
    _3g.add(tier);

    // ── TEXTURES GÉOMÉTRIQUES (vraies géométries 3D, pas de canvas) ────────

    if(texId==='strie'){
      // Stries horizontales : empile des anneaux fins de différents diamètres
      // Crée un vrai effet de relief, pas de canvas qui se déforme sur le cylindre
      const nRings=Math.max(20,Math.round(tH*60));
      for(let r=0;r<nRings;r++){
        const tFrac=r/nRings;
        const ry=curY+tFrac*tH;
        const isBump=r%2===0;
        const radAtY=rB+(rT-rB)*tFrac;
        const ringR=isBump?radAtY*1.013:radAtY*1.003;
        const ringH=tH/nRings*0.92;
        const rGeo=isRound?new T.CylinderGeometry(ringR,ringR,ringH,segs,1):
                   isHex?new T.CylinderGeometry(ringR,ringR,ringH,6,1):
                         new T.BoxGeometry(rB*1.92,ringH,rB*1.92,1,1,1);
        const rMat=tMat.clone();
        rMat.roughness=isBump?0.55:0.78;
        const rm=new T.Mesh(rGeo,rMat);
        rm.position.y=ry+ringH/2;
        rm.castShadow=true;
        _3g.add(rm);
      }
    }

    if(texId==='spatule'){
      // Coups de spatule horizontaux RÉGULIERS - inspiré photo Mlles Gâteaux
      // Style "lissé à la spatule rotative" : cernes très fins, très nombreux, réguliers
      // Pas d'alternance marquée, juste un relief uniforme avec de subtiles variations
      const stripHeight = 0.011;  // stries beaucoup plus FINES (~1.1cm)
      const nStrips = Math.max(12, Math.round(tH / stripHeight));
      const actualStripH = tH / nStrips;
      for(let w = 0; w < nStrips; w++){
        const wy = curY + w * actualStripH;
        const tFrac = w / nStrips;
        const radAtY = rB + (rT - rB) * tFrac;
        // Très léger relief constant (pas d'alternance) : chaque strie ressort de la même façon
        const outerR = radAtY * 1.003;
        // Variation de teinte TRÈS subtile pour effet "tourné à la spatule"
        // (juste un peu plus clair que la couleur de base, uniforme)
        const v = 0.97 + Math.sin(w * 0.7) * 0.025;
        const sCol = new T.Color(rgb.r * v, rgb.g * v, rgb.b * v);
        const sMat = new T.MeshStandardMaterial({
          color: sCol, roughness: 0.78, metalness: 0.0
        });
        const segCount = segs || 40;
        const wGeo = isRound ? new T.CylinderGeometry(outerR, outerR, actualStripH, segCount, 1) :
                     isHex ? new T.CylinderGeometry(outerR, outerR, actualStripH, 6, 1) :
                             new T.BoxGeometry(rB * 1.94, actualStripH, rB * 1.94, 1, 1, 1);
        const wm = new T.Mesh(wGeo, sMat);
        wm.position.y = wy + actualStripH / 2;
        wm.castShadow = true;
        _3g.add(wm);
        // Petite ligne d'ombre TRÈS fine entre les stries (l'aspect "creux" entre cernes)
        if(w > 0 && isRound){
          const shadowRing = new T.Mesh(
            new T.TorusGeometry(radAtY * 1.001, 0.0015, 3, segCount),
            new T.MeshStandardMaterial({
              color: new T.Color(rgb.r * 0.80, rgb.g * 0.80, rgb.b * 0.80),
              roughness: 0.90
            })
          );
          shadowRing.rotation.x = Math.PI / 2;
          shadowRing.position.y = wy;
          _3g.add(shadowRing);
        }
      }
    }

    if(texId==='rustique'){
      // Naked cake : gâteau aux couches visibles
      // Approche : remplacer la couleur du tier par un mélange génoise+crème en bandes 3D

      // 1. Recolorer le tier en génoise dorée (au lieu de la couleur de glaçage)
      const spongeCol=new T.Color(0.78,0.55,0.32); // génoise dorée chaude
      tier.material.color=spongeCol;
      tier.material.roughness=0.92;
      tier.material.metalness=0.0;

      // 2. Bandes de crème horizontales 3D — entre 3 et 5 couches selon hauteur du tier
      const creamCol=new T.Color(rgb.r*0.92+0.06,rgb.g*0.92+0.06,rgb.b*0.92+0.06);
      const creamMat=new T.MeshStandardMaterial({
        color:creamCol,roughness:0.65,metalness:0.0});
      const nCream=Math.max(3,Math.min(5,Math.round(tH*5)));
      for(let l=0;l<nCream;l++){
        const frac=(l+1)/(nCream+1);
        const ly=curY+frac*tH;
        const radAtY=rB+(rT-rB)*frac;
        const bandH=tH*0.06+Math.random()*tH*0.02;
        // Bande de crème légèrement plus large que le cylindre, irrégulière en hauteur
        const bandR=radAtY*1.018;
        const bGeo=isRound?new T.CylinderGeometry(bandR,bandR*1.005,bandH,segs,1):
                   isHex?new T.CylinderGeometry(bandR,bandR*1.005,bandH,6,1):
                         new T.BoxGeometry(rB*1.95,bandH,rB*1.95,1,1,1);
        const bm=new T.Mesh(bGeo,creamMat.clone());
        bm.position.y=ly;
        bm.castShadow=true;
        _3g.add(bm);
      }

      // 3. Couche de crème sur le dessus (plus épaisse)
      const topCreamGeo=isRound?new T.CylinderGeometry(rT*1.005,rT*1.005,tH*0.10,segs,1):
                       isHex?new T.CylinderGeometry(rT*1.005,rT*1.005,tH*0.10,6,1):
                             new T.BoxGeometry(rB*1.93,tH*0.10,rB*1.93,1,1,1);
      const topCream=new T.Mesh(topCreamGeo,creamMat.clone());
      topCream.position.y=curY+tH*0.95;
      _3g.add(topCream);

      // (les traînées verticales ont été supprimées pour un rendu plus propre)
    }

    // ── FROSTED TOP CAP (avec texture matchée au tier) ───────────────────
    // Pour rustique : génoise dorée. Pour les autres : couleur du glaçage.
    let capCol;
    let capRoughness=0.40;
    if(texId==='rustique'){
      capCol=new T.Color(0.78,0.55,0.32);
      capRoughness=0.92;
    } else {
      const capRgb=_hex2rgb(gl);
      capCol=new T.Color(Math.min(1,capRgb.r+0.04),Math.min(1,capRgb.g+0.04),Math.min(1,capRgb.b+0.04));
      capRoughness=_mat(capCol,texId,isChoc).roughness*0.75;
    }
    // Cap plus fin pour éviter le double-trait avec le drip
    const capH=0.018;
    const capGeo=isHex?new T.CylinderGeometry(rT,rT,capH,6,1):
                 isRound?new T.CylinderGeometry(rT,rT,capH,segs,1):
                 new T.BoxGeometry(rB*1.90,capH,rB*1.90,1,1,1);
    const capMat=new T.MeshStandardMaterial({
      color:capCol,roughness:capRoughness,metalness:0.01});
    const cap=new T.Mesh(capGeo,capMat);
    cap.position.y=curY+tH+capH/2;cap.castShadow=true;_3g.add(cap);

    // Reproduire les textures sur le dessus du cap
    if(texId==='strie'){
      // Stries concentriques sur le dessus
      const nRings=8;
      for(let r=0;r<nRings;r++){
        const rad=rT*(0.85-r*0.10);
        if(rad<0.05)break;
        const ringGeo=new T.TorusGeometry(rad,0.008,4,segs);
        const rMat=capMat.clone();rMat.roughness=r%2===0?0.55:0.78;
        const rm=new T.Mesh(ringGeo,rMat);
        rm.rotation.x=Math.PI/2;
        rm.position.y=curY+tH+capH+0.004;
        _3g.add(rm);
      }
    }
    if(texId==='spatule'){
      // Vagues concentriques sur le dessus (cercles ondulés)
      const nWaves=5;
      for(let w=0;w<nWaves;w++){
        const rad=rT*(0.80-w*0.15);
        if(rad<0.05)break;
        const torGeo=new T.TorusGeometry(rad,0.007,4,Math.max(20,segs));
        const v=0.88+Math.sin(w*1.7)*0.10;
        const sMat=new T.MeshStandardMaterial({
          color:new T.Color(capCol.r*v,capCol.g*v,capCol.b*v),
          roughness:0.65,metalness:0.0});
        const tm=new T.Mesh(torGeo,sMat);
        tm.rotation.x=Math.PI/2;
        tm.position.y=curY+tH+capH+0.003;
        _3g.add(tm);
      }
    }
    if(texId==='rustique'){
      // Sur le dessus : crème étalée irrégulièrement
      const creamCol=new T.Color(rgb.r*0.92+0.06,rgb.g*0.92+0.06,rgb.b*0.92+0.06);
      const creamCapGeo=isHex?new T.CylinderGeometry(rT*0.92,rT*0.92,0.022,6,1):
                       isRound?new T.CylinderGeometry(rT*0.92,rT*0.92,0.022,segs,1):
                       new T.BoxGeometry(rB*1.78,0.022,rB*1.78,1,1,1);
      const creamCap=new T.Mesh(creamCapGeo,new T.MeshStandardMaterial({
        color:creamCol,roughness:0.65,metalness:0.0}));
      creamCap.position.y=curY+tH+capH+0.011;
      _3g.add(creamCap);
    }

    // (rosettes de crème supprimées — gâteau lisse par défaut)

    // ── DRIP CAKE (coulures qui descendent du sommet) ────────────────────
    const dripInfo=DRIP_COLS.find(d=>d.id===(data.drip||'aucun'));
    if(dripInfo&&dripInfo.col){
      const dripHex=(dripInfo.id==='colore')?(data.dripColore||'#E03080'):dripInfo.col;
      const dc=_hex2rgb(dripHex);
      const dripCol=new T.Color(dc.r,dc.g,dc.b);
      const dripMat=new T.MeshStandardMaterial({
        color:dripCol,roughness:0.18,metalness:0.10});

      // Anneau de drip : épaisseur PROPORTIONNELLE au rayon du tier (cohérence visuelle)
      // Bord supérieur arrondi avec un torus pour effet "coulant"
      const ringH=0.055;
      const ringGeo=isRound?new T.CylinderGeometry(rT*1.020,rT*1.020,ringH,segs,1):
                    isHex?new T.CylinderGeometry(rT*1.020,rT*1.020,ringH,6,1):
                          new T.BoxGeometry(rB*1.95,ringH,rB*1.95,1,1,1);
      const ring=new T.Mesh(ringGeo,dripMat.clone());
      ring.position.y=curY+tH-ringH*0.35;
      _3g.add(ring);

      // Bord supérieur arrondi (torus) pour effet coulant naturel
      if(isRound){
        const topTorus=new T.Mesh(
          new T.TorusGeometry(rT*1.020,ringH*0.42,8,segs),
          dripMat.clone()
        );
        topTorus.rotation.x=Math.PI/2;
        topTorus.position.y=curY+tH-ringH*0.10;
        _3g.add(topTorus);
      }
      // Bord inférieur arrondi
      if(isRound){
        const botTorus=new T.Mesh(
          new T.TorusGeometry(rT*1.020,ringH*0.32,8,segs),
          dripMat.clone()
        );
        botTorus.rotation.x=Math.PI/2;
        botTorus.position.y=curY+tH-ringH*0.62;
        _3g.add(botTorus);
      }

      // Coulures individuelles qui descendent depuis cet anneau
      const nDrips=Math.max(10,Math.round(rB*36));
      for(let d=0;d<nDrips;d++){
        const da=(d/nDrips)*Math.PI*2+(Math.random()-0.5)*0.05;
        const len=0.04+Math.random()*0.18;
        const dripWidth=0.016+Math.random()*0.012;
        const drGeo=new T.CylinderGeometry(dripWidth*0.5,dripWidth,len,6,1);
        const dm=new T.Mesh(drGeo,dripMat.clone());
        const radDrip=rT*1.022;
        dm.position.set(
          Math.sin(da)*radDrip,
          curY+tH-ringH*0.62-len/2,
          Math.cos(da)*radDrip
        );
        _3g.add(dm);
        const drop=new T.Mesh(
          new T.SphereGeometry(dripWidth*1.05,8,8),
          dripMat.clone());
        drop.position.set(
          Math.sin(da)*radDrip,
          curY+tH-ringH*0.62-len,
          Math.cos(da)*radDrip
        );
        _3g.add(drop);
      }
    }


    // ── EFFETS ARTISTIQUES ────────────────────────────────────────────────
    // Si la texture désactive les effets (ex. rustique), on ignore
    const texInfo=TEXTURES_CAKE.find(t=>t.id===texId);
    const effet=(texInfo&&texInfo.disableEffets)?'aucun':(data.effet||'aucun');
    const effetColRGB=_hex2rgb(data.couleurEffet||'#7E3FAA');
    const eR=Math.round(effetColRGB.r*255);
    const eG=Math.round(effetColRGB.g*255);
    const eB=Math.round(effetColRGB.b*255);

    // MARBRE & AQUARELLE : uniquement sur texture LISSE (pas de géométries au-dessus)
    // → on génère une texture canvas qu'on applique au tier
    if((effet==='marbre'||effet==='aquarelle')&&texId==='lisse'){
      const baseR=Math.round(rgb.r*255),baseG=Math.round(rgb.g*255),baseB=Math.round(rgb.b*255);
      const fxCanvas=document.createElement('canvas');
      fxCanvas.width=1024;fxCanvas.height=1024;
      const fxCtx=fxCanvas.getContext('2d');
      // Fond uni couleur du glaçage
      fxCtx.fillStyle='rgb('+baseR+','+baseG+','+baseB+')';
      fxCtx.fillRect(0,0,1024,1024);

      if(effet==='marbre'){
        // Marbré : la couleur du glaçage ne change PAS, seules les veines sont colorées
        // (Le fond du canvas est déjà la couleur du glaçage, on dessine seulement les veines en couleur effet)
        function drawSeamless(drawFn){
          drawFn(0);
          drawFn(1024);
          drawFn(-1024);
        }
        // 1) Veines principales colorées (en couleur d'effet) — courbes Bézier
        for(let v=0;v<14;v++){
          const startX=Math.random()*1024,startY=Math.random()*1024;
          const lineW=3+Math.random()*5;
          const colA=0.55+Math.random()*0.35;
          const pts=[];
          let x=startX,y=startY;
          pts.push([x,y]);
          for(let s=0;s<12;s++){
            x+=(Math.random()-0.4)*150;y+=(Math.random()-0.4)*120;
            pts.push([x,y]);
          }
          drawSeamless(function(off){
            fxCtx.beginPath();
            fxCtx.moveTo(pts[0][0]+off,pts[0][1]);
            for(let i=1;i<pts.length;i++){
              fxCtx.lineTo(pts[i][0]+off,pts[i][1]);
            }
            fxCtx.lineWidth=lineW;
            fxCtx.strokeStyle='rgba('+eR+','+eG+','+eB+','+colA+')';
            fxCtx.stroke();
          });
        }
        // 2) Veines secondaires plus fines (moitié couleur effet, moitié couleur effet sombre)
        const eR2=Math.round(eR*0.55),eG2=Math.round(eG*0.55),eB2=Math.round(eB*0.55);
        for(let v=0;v<22;v++){
          const startX=Math.random()*1024,startY=Math.random()*1024;
          const lineW=1.5+Math.random()*2;
          const colA=0.40+Math.random()*0.30;
          const pts=[[startX,startY]];
          let x=startX,y=startY;
          for(let s=0;s<8;s++){
            x+=(Math.random()-0.4)*100;y+=(Math.random()-0.4)*80;
            pts.push([x,y]);
          }
          drawSeamless(function(off){
            fxCtx.beginPath();
            fxCtx.moveTo(pts[0][0]+off,pts[0][1]);
            for(let i=1;i<pts.length;i++){
              fxCtx.lineTo(pts[i][0]+off,pts[i][1]);
            }
            fxCtx.lineWidth=lineW;
            fxCtx.strokeStyle='rgba('+eR2+','+eG2+','+eB2+','+colA+')';
            fxCtx.stroke();
          });
        }
        // 3) Veines fines blanches (highlights brillants du marbre)
        for(let v=0;v<28;v++){
          const startX=Math.random()*1024,startY=Math.random()*1024;
          const lineW=0.6+Math.random()*1.0;
          const colA=0.20+Math.random()*0.25;
          const pts=[[startX,startY]];
          let x=startX,y=startY;
          for(let s=0;s<5;s++){
            x+=(Math.random()-0.4)*80;y+=(Math.random()-0.4)*70;
            pts.push([x,y]);
          }
          drawSeamless(function(off){
            fxCtx.beginPath();
            fxCtx.moveTo(pts[0][0]+off,pts[0][1]);
            for(let i=1;i<pts.length;i++){
              fxCtx.lineTo(pts[i][0]+off,pts[i][1]);
            }
            fxCtx.lineWidth=lineW;
            fxCtx.strokeStyle='rgba(255,255,255,'+colA+')';
            fxCtx.stroke();
          });
        }
      }

      if(effet==='aquarelle'){
        // AQUARELLE inspirée photo Skazka : coups de pinceau diagonaux qui descendent,
        // 3 teintes (claire / moyenne / foncée), fond blanc qui transparaît.
        // Le pigment se concentre VERS LE BAS, le haut reste presque blanc.

        function drawSeamlessAq(drawFn){
          drawFn(0);drawFn(1024);drawFn(-1024);
        }

        // 3 teintes de la couleur d'effet
        const eR_dark=Math.round(eR*0.45), eG_dark=Math.round(eG*0.40), eB_dark=Math.round(eB*0.55);
        const eR_med=eR, eG_med=eG, eB_med=eB;
        const eR_light=Math.min(255,Math.round(eR+(255-eR)*0.35)),
              eG_light=Math.min(255,Math.round(eG+(255-eG)*0.35)),
              eB_light=Math.min(255,Math.round(eB+(255-eB)*0.30));

        // ─── 0) VOILE GÉNÉRAL TRÈS LÉGER : très diffus sur l'ensemble pour
        // évoquer un fond aquarellé pâle (comme la photo Skazka où le blanc
        // n'est jamais 100% pur)
        const baseWash = fxCtx.createLinearGradient(0, 0, 0, 1024);
        baseWash.addColorStop(0, 'rgba('+eR_light+','+eG_light+','+eB_light+',0.05)');
        baseWash.addColorStop(0.5, 'rgba('+eR_light+','+eG_light+','+eB_light+',0.12)');
        baseWash.addColorStop(1, 'rgba('+eR_light+','+eG_light+','+eB_light+',0.20)');
        fxCtx.fillStyle = baseWash;
        fxCtx.fillRect(0, 0, 1024, 1024);

        // ─── Helper : tracer un VRAI coup de pinceau (trait long courbe) ──
        // Approche : trait composé de plusieurs cercles successifs le long d'une
        // courbe légère, avec opacité gaussienne (max au milieu, 0 aux bouts)
        function paintStroke(startX, startY, ang, length, width, r, g, b, opacity){
          drawSeamlessAq(function(off){
            fxCtx.save();
            fxCtx.translate(startX + off, startY);
            fxCtx.rotate(ang);

            // Dessiner le trait via un grand nombre de petits disques avec opacité variable
            const nSteps = 40;
            for(let k=0; k<nSteps; k++){
              const t = k / (nSteps - 1);  // 0 → 1
              // Profil d'opacité gaussien : 0 → max → 0
              let opFactor;
              if(t < 0.15){
                opFactor = (t / 0.15) * 0.6;
              } else if(t < 0.50){
                opFactor = 0.6 + ((t - 0.15) / 0.35) * 0.4;
              } else if(t < 0.85){
                opFactor = 1.0 - ((t - 0.50) / 0.35) * 0.4;
              } else {
                opFactor = 0.6 - ((t - 0.85) / 0.15) * 0.6;
              }
              const posAlong = (t - 0.5) * length;
              // Légère courbure du trait
              const curveOffset = Math.sin(t * Math.PI) * 8;
              // Largeur variable (effet pinceau qui s'affine aux bouts)
              const segW = width * 0.45 * (0.55 + 0.45 * Math.sin(t * Math.PI));
              const al = opacity * opFactor;
              if(al > 0.01){
                fxCtx.fillStyle = 'rgba('+r+','+g+','+b+','+al+')';
                fxCtx.beginPath();
                fxCtx.arc(posAlong, curveOffset, segW, 0, Math.PI*2);
                fxCtx.fill();
              }
            }
            fxCtx.restore();
          });
        }

        // ─── 1) COUCHE DE BASE : grands coups diagonaux ────────────────
        // Direction principale : -55° (du haut-droite vers le bas-gauche)
        // 18 grands coups
        for(let s=0; s<18; s++){
          const sx = Math.random() * 1024;
          const sy = 300 + Math.random() * 650;
          const ang = (-55 + (Math.random()*20 - 10)) * Math.PI / 180;
          const len = 280 + Math.random() * 220;
          const wid = 60 + Math.random() * 40;
          const choice = Math.random();
          let r, g, b;
          if(choice < 0.50){ r=eR_med; g=eG_med; b=eB_med; }
          else if(choice < 0.85){ r=eR_dark; g=eG_dark; b=eB_dark; }
          else { r=eR_light; g=eG_light; b=eB_light; }
          const op = 0.40 + Math.random()*0.25;
          paintStroke(sx, sy, ang, len, wid, r, g, b, op);
        }

        // ─── 2) DEUXIÈME COUCHE : coups plus courts plus opaques ────────
        for(let s=0; s<12; s++){
          const sx = Math.random() * 1024;
          const sy = 450 + Math.random() * 500;
          const ang = (-55 + (Math.random()*16 - 8)) * Math.PI / 180;
          const len = 150 + Math.random() * 120;
          const wid = 35 + Math.random() * 25;
          const choice = Math.random();
          let r, g, b;
          if(choice < 0.55){ r=eR_dark; g=eG_dark; b=eB_dark; }
          else { r=eR_med; g=eG_med; b=eB_med; }
          const op = 0.50 + Math.random()*0.25;
          paintStroke(sx, sy, ang, len, wid, r, g, b, op);
        }

        // ─── 3) ACCENTS FONCÉS DANS LA ZONE BASSE ───────────────────────
        for(let s=0; s<10; s++){
          const sx = Math.random() * 1024;
          const sy = 700 + Math.random() * 280;
          const ang = (-50 + (Math.random()*20 - 10)) * Math.PI / 180;
          const len = 200 + Math.random() * 150;
          const wid = 65 + Math.random() * 35;
          const op = 0.55 + Math.random()*0.20;
          paintStroke(sx, sy, ang, len, wid, eR_dark, eG_dark, eB_dark, op);
        }

        // ─── 4) FINS TRAITS DE TEXTURE ──────────────────────────────────
        for(let s=0; s<25; s++){
          const sx = Math.random() * 1024;
          const sy = 250 + Math.random() * 750;
          const ang = (-55 + (Math.random()*30 - 15)) * Math.PI / 180;
          const len = 60 + Math.random() * 80;
          const wid = 6 + Math.random() * 8;
          const choice = Math.random();
          let r, g, b;
          if(choice < 0.50){ r=eR_dark; g=eG_dark; b=eB_dark; }
          else { r=eR_med; g=eG_med; b=eB_med; }
          const op = 0.35 + Math.random()*0.25;
          paintStroke(sx, sy, ang, len, wid, r, g, b, op);
        }

        // ─── 5) VOILE BLANC EN HAUT (haut reste presque blanc) ──────────
        const wash = fxCtx.createLinearGradient(0, 0, 0, 1024);
        wash.addColorStop(0, 'rgba(255,255,255,0.75)');
        wash.addColorStop(0.20, 'rgba(255,255,255,0.40)');
        wash.addColorStop(0.40, 'rgba(255,255,255,0.10)');
        wash.addColorStop(0.65, 'rgba(255,255,255,0)');
        wash.addColorStop(1, 'rgba(255,255,255,0)');
        fxCtx.fillStyle = wash;
        fxCtx.fillRect(0, 0, 1024, 1024);

        // ─── 6) Petites éclaboussures de pigment ────────────────────────
        for(let s=0; s<45; s++){
          const sx = Math.random() * 1024;
          const sy = 400 + Math.random() * 600;
          const r2 = 1.5 + Math.random() * 3;
          fxCtx.fillStyle = 'rgba('+eR_dark+','+eG_dark+','+eB_dark+','+(0.25+Math.random()*0.30)+')';
          fxCtx.beginPath();
          fxCtx.arc(sx, sy, r2, 0, Math.PI*2);
          fxCtx.fill();
        }
      }

      const fxTex=new T.CanvasTexture(fxCanvas);
      fxTex.wrapS=T.RepeatWrapping;
      fxTex.wrapT=T.ClampToEdgeWrapping;
      fxTex.colorSpace=T.SRGBColorSpace||T.sRGBEncoding;
      tier.material.map=fxTex;
      tier.material.needsUpdate=true;

      // === Appliquer la MÊME texture sur le dessus (top cap) ===
      // Pour le dessus, on crée une nouvelle texture indépendante (le wrapping
      // est différent : planaire au lieu de cylindrique)
      const fxTexTop=new T.CanvasTexture(fxCanvas);
      fxTexTop.wrapS=T.ClampToEdgeWrapping;
      fxTexTop.wrapT=T.ClampToEdgeWrapping;
      fxTexTop.colorSpace=T.SRGBColorSpace||T.sRGBEncoding;
      cap.material.map=fxTexTop;
      cap.material.color=new T.Color(0xFFFFFF);  // blanc pour ne pas teinter la texture
      cap.material.needsUpdate=true;
    }

    // DÉGRADÉ : gradient continu sans superposer plusieurs cylindres
    // Approche : un seul cylindre semi-transparent, avec une CanvasTexture en bande
    // verticale (du haut transparent vers bas saturé)
    if(effet==='degrade'){
      const dCanvas=document.createElement('canvas');
      dCanvas.width=64;dCanvas.height=512;
      const dCtx=dCanvas.getContext('2d');
      const grad=dCtx.createLinearGradient(0,0,0,512);
      grad.addColorStop(0,'rgba('+eR+','+eG+','+eB+',0)');
      grad.addColorStop(0.40,'rgba('+eR+','+eG+','+eB+',0.18)');
      grad.addColorStop(0.70,'rgba('+eR+','+eG+','+eB+',0.55)');
      grad.addColorStop(1,'rgba('+eR+','+eG+','+eB+',0.92)');
      dCtx.fillStyle=grad;
      dCtx.fillRect(0,0,64,512);
      const dTex=new T.CanvasTexture(dCanvas);
      dTex.wrapS=T.RepeatWrapping;dTex.wrapT=T.ClampToEdgeWrapping;
      dTex.colorSpace=T.SRGBColorSpace||T.sRGBEncoding;
      // Cylindre fin qui couvre toute la hauteur du tier
      const dGeo=isRound?new T.CylinderGeometry(rT*1.022,rB*1.022,tH,segs,1,true):
                 isHex?new T.CylinderGeometry(rT*1.022,rB*1.022,tH,6,1,true):
                       new T.BoxGeometry(rB*1.96,tH,rB*1.96,1,1,1);
      const dMat=new T.MeshStandardMaterial({
        map:dTex,transparent:true,depthWrite:false,
        side:T.DoubleSide,roughness:0.55,
        opacity:1.0});
      const dCyl=new T.Mesh(dGeo,dMat);
      dCyl.position.y=curY+tH/2;
      _3g.add(dCyl);

      // === Dégradé sur le dessus : disque semi-transparent au-dessus du cap ===
      // On utilise la couleur saturée (vers la base du gradient = plus de couleur)
      const dTopMat=new T.MeshStandardMaterial({
        color:new T.Color(eR/255, eG/255, eB/255),
        transparent:true, opacity:0.55,
        roughness:0.55, side:T.DoubleSide
      });
      const dTopGeo=isHex?new T.CylinderGeometry(rT*0.99,rT*0.99,0.002,6,1):
                    isRound?new T.CylinderGeometry(rT*0.99,rT*0.99,0.002,segs,1):
                    new T.BoxGeometry(rB*1.88,0.002,rB*1.88,1,1,1);
      const dTop=new T.Mesh(dTopGeo,dTopMat);
      dTop.position.y=curY+tH+capH+0.001;
      _3g.add(dTop);
    }

    curY+=tH;
  }

  // ── TOPPER ────────────────────────────────────────────────────────────────
  if(data.topper&&data.topper!=='aucun'){
    const stkM=new T.MeshStandardMaterial({color:0xC8B888,metalness:0.62,roughness:0.28});
    const stk=new T.Mesh(new T.CylinderGeometry(0.016,0.016,0.52,8),stkM);
    stk.position.y=curY+0.26;_3g.add(stk);
    const tY=curY+0.52;

    if(data.topper==='initiales'||data.topper==='chiffres'){
      // Disque doré + texte affiché dessus
      const disc=new T.Mesh(new T.CylinderGeometry(0.32,0.32,0.038,40),new T.MeshStandardMaterial({color:0xE8C040,metalness:0.93,roughness:0.08}));
      disc.position.y=tY;disc.rotation.x=Math.PI/2;_3g.add(disc);
      const rng=new T.Mesh(new T.TorusGeometry(0.34,0.024,10,40),new T.MeshStandardMaterial({color:0xFFE860,metalness:0.96,roughness:0.05}));
      rng.position.y=tY;_3g.add(rng);
      // Plaque texte dessus du disque (canvas texture pour lire le texte)
      const txt=(data.topperText||(data.topper==='initiales'?'M & J':'2027')).slice(0,20);
      const c=document.createElement('canvas');c.width=512;c.height=512;
      const cx=c.getContext('2d');
      cx.clearRect(0,0,512,512);
      cx.fillStyle='#3A1F0A';
      cx.font='bold 110px Georgia, serif';
      cx.textAlign='center';cx.textBaseline='middle';
      cx.fillText(txt,256,256);
      const tx=new T.CanvasTexture(c);tx.colorSpace=T.SRGBColorSpace||T.sRGBEncoding;
      const txMat=new T.MeshBasicMaterial({map:tx,transparent:true,depthWrite:false,side:T.DoubleSide});
      const txPl=new T.Mesh(new T.PlaneGeometry(0.56,0.56),txMat);
      txPl.position.set(0,tY+0.001,0);
      _3g.add(txPl);
    } else if(data.topper==='silhouettes'){
      const silM=new T.MeshStandardMaterial({color:0x100408,roughness:0.92});
      [[-0.17,-1],[0.17,1]].forEach(([x,j])=>{
        const hm=new T.Mesh(new T.SphereGeometry(0.11,12,12),silM);hm.position.set(x,tY+0.30,0);_3g.add(hm);
        if(j<0){const b=new T.Mesh(new T.ConeGeometry(0.135,0.31,4),silM);b.rotation.y=Math.PI/4;b.position.set(x,tY+0.08,0);_3g.add(b);}
        else{const b=new T.Mesh(new T.CylinderGeometry(0.078,0.096,0.31,8),silM);b.position.set(x,tY+0.08,0);_3g.add(b);}
      });
    }
  }

  // ── PLACED DECORATIONS ────────────────────────────────────────────────────
  const DECO_INFO={
    rose:{col:0xD4607A,col2:0xFF90A8},pivoine:{col:0xF490B8,col2:0xFFB8D0},
    orchidee:{col:0xC060C0,col2:0xE090E0},lily:{col:0xE0A0C0,col2:0xFFD0E8},
    feuille:{col:0x50A040,col2:0x80D060},eucalyptus:{col:0x5AA050,col2:0x90D080},
    fraise:{col:0xE03040,col2:0xFF8090},framboise:{col:0xC02060,col2:0xFF60A0},
    figue:{col:0x804060,col2:0xC080A0},agrume:{col:0xF0C020,col2:0xFFE080},
    macaron:{col:0xD4A0C0,col2:0xFFD0E8},coeur:{col:0xE02050,col2:0xFF6080},
    etoile:{col:0xF0C020,col2:0xFFE870},perle:{col:0xF8F0E0,col2:0xFFFFFF},
    ruban:{col:0xD4607A,col2:0xFFB0C0},papillon:{col:0xF08020,col2:0xFFD080},
    diamant:{col:0x80D0FF,col2:0xE0FAFF},baie:{col:0x4040C0,col2:0x8080FF}
  };

  // ── PLACED DECORATIONS ─────────────────────────────────────────────────────
  // Each deco group is built in local space where:
  //   +Y = upward along cake surface
  //   +Z = outward from cake center  
  //   Origin = point of contact with cake surface
  // Then we position and orient the group correctly on the cylinder.

  // ── REALISTIC 3D DECORATIONS ─────────────────────────────────────────────────
  // All decos built UPRIGHT: spread in XY plane, depth on +Z axis
  // So when rotation.y=ang, they face outward from cylinder ✓

  function _petal(T,col,scaleX,scaleY,scaleZ,px,py,pz,rx,ry,rz){
    // px/py/pz = position, rx/ry/rz = local rotation
    const g=new T.SphereGeometry(0.055,8,7);
    g.scale(scaleX,scaleY,scaleZ);
    const m=new T.Mesh(g,new T.MeshStandardMaterial({color:col,roughness:0.42,side:T.DoubleSide}));
    m.position.set(px,py,pz);
    if(rx||ry||rz)m.rotation.set(rx||0,ry||0,rz||0);
    return m;

  function _makeRose(T,col,col2){
    const g=new T.Group();
    // 3 layers of petals spread in XY, each petal is a scaled sphere
    for(let layer=0;layer<3;layer++){
      const n=5+layer*2, r=0.055+layer*0.038;
      for(let p=0;p<n;p++){
        const a=(p/n)*Math.PI*2+(layer*0.45);
        const c=new T.Color().setHex(col); c.offsetHSL(0,0,layer*0.06);
        const pm=new T.Mesh(
          Object.assign(new T.SphereGeometry(0.055,8,7),{}).scale(0.9,1.55+layer*0.25,0.32+layer*0.08),
          new T.MeshStandardMaterial({color:c,roughness:0.42,side:T.DoubleSide}));
        // Remap: petals spread in XY plane
        pm.position.set(Math.cos(a)*r, Math.sin(a)*r, layer*0.018);
        pm.rotation.z = a;
        pm.rotation.x = 0.28+layer*0.1;
        g.add(pm);

    }
    // Inner bud
    for(let b=0;b<5;b++){
      const bg=new T.SphereGeometry(0.026,6,6);bg.scale(0.7,1.3,0.7);
      const bm=new T.Mesh(bg,new T.MeshStandardMaterial({color:new T.Color().setHex(col2),roughness:0.38}));
      bm.position.set(Math.cos(b*1.26)*0.022,Math.sin(b*1.26)*0.022,0.02+b*0.01);
      g.add(bm);
    }
    // Leaves - spread left-right in X
    for(let l=0;l<3;l++){
      const la=(l/3)*Math.PI*2;
      g.add(_leaf(T,0x3A7828,0.9,2.0,0.2,Math.cos(la)*0.12,Math.sin(la)*0.12,-0.01,la));
    }
    return g;

  // Decorate _3g.decoMeshes to allow raycasting selection
  _3g.decoMeshes=_3g.decoMeshes||[];
  _3g.decoMeshes=[];

  (data.decos||[]).forEach((d,decoIdx)=>{
    const ti=Math.min((data.etages||2)-1,Math.max(0,d.tier||0));
    const tH=HEIGHTS[ti]||0.55;
    const sY=_3tierY[ti]||0.260;
    const heightFrac=Math.max(0,Math.min(1,d.height||0.5));

    // Calcul du rayon à la hauteur exacte (tier conique : rB en bas → rT en haut)
    const rBot=_3tierR[ti]||0.8;
    const rTop=rBot*0.94;
    const tFracInTier=0.08+heightFrac*0.84;
    const rAtH=rBot+(rTop-rBot)*tFracInTier;

    const ang=((d.angle||0)/360)*Math.PI*2;

    // ─── PLACEMENT : côté (side) OU dessus (top) ───
    // face === 'top' → posé à plat sur la face supérieure de l'étage (à l'horizontale)
    // face === 'side' (par défaut) → collé sur le côté du cylindre (à la verticale)
    const face = d.face || 'side';

    // Position du point de placement sur le gâteau
    let pX, pY, pZ;
    // Offset pour éviter l'incrustation
    // Avec baseScale=2.5, une déco fait ~0.10-0.15 unités → offset moitié de l'épaisseur
    const userScaleForOffset = d.scale||1.0;
    const surfaceOffset = 0.04 + userScaleForOffset * 0.025;

    if(face === 'top'){
      const topR = rTop;
      const rOnTop = Math.max(0, Math.min(1, d.height||0.0)) * topR * 0.85;
      pX = Math.sin(ang) * rOnTop;
      pZ = Math.cos(ang) * rOnTop;
      pY = sY + tH + surfaceOffset;
    } else {
      const decoY = sY + tH*(0.08 + heightFrac*0.84);
      const finalR = rAtH + surfaceOffset;
      pX = Math.sin(ang) * finalR;
      pZ = Math.cos(ang) * finalR;
      pY = decoY;
    }

    // Build deco — TOUTES les décorations passent par _makeDeco3D
    let dg = _makeDeco3D(T, d.id, d);

    // ─── ÉCHELLE : décos beaucoup plus grandes qu'avant (proportion au gâteau) ───
    // Scale : taille proportionnée au gâteau (gâteau ~2 unités de diamètre, décos ~0.2 unités)
    const userScale = Math.max(0.4, Math.min(2.5, d.scale||1.0));
    const baseScaleFactor = 2.5;  // ratio ~1:9 par rapport au gâteau (décos discrètes mais visibles)
    const finalScale = baseScaleFactor * userScale;

    const tilt=((d.tilt||0)/180)*Math.PI;
    const spin=((d.spin||0)/180)*Math.PI;

    // ─── ROTATION AUTO selon la face ───
    if(face === 'top'){
      // Sur le dessus : déco posée à plat (rotation -90° sur X pour coucher)
      // + rotation Y selon angle pour orienter autour de l'axe vertical
      dg.rotation.set(-Math.PI/2 + tilt, ang + spin, 0);
    } else {
      // Sur le côté : déco verticale, face vers l'extérieur
      dg.rotation.set(tilt, ang, spin);
    }
    dg.scale.setScalar(finalScale);

    dg.position.set(pX, pY, pZ);

    dg.userData.decoIdx = decoIdx;
    dg.userData.baseScale = finalScale;  // mémorisé pour _highlightDeco
    dg.traverse(obj=>{
      if(obj.isMesh){
        obj.castShadow=true;
        obj.userData.decoIdx=decoIdx;
      }
    });

    _3g.add(dg);
    _3g.decoMeshes.push(dg);
  });
  // Centre the cake vertically in the scene + apply pan
  _3g.userData.baseY=-(curY/2+0.13);
  _3g.position.y=_3g.userData.baseY+_3panY;
  _3g.position.x=_3panX;
}

function startRenderLoop(){
  const T=window.THREE;
  let frame=0;
  function animate(){
    _3id=requestAnimationFrame(animate);
    if(!_3r||!_3s||!_3c)return;
    if(_3auto&&!_3drag) _3ry+=0.005;
    if(_3g){
      _3g.rotation.y=_3ry;_3g.rotation.x=_3rx;
      _3g.position.x=_3panX;
      // y position is set in buildCake3D, but we add pan here too
      const baseY=_3g.userData.baseY;
      if(baseY!==undefined)_3g.position.y=baseY+_3panY;
    }
    // Resize check
    const el=_3r.domElement;
    const W=el.clientWidth,H=el.clientHeight;
    if(el.width!==Math.round(W*window.devicePixelRatio)||el.height!==Math.round(H*window.devicePixelRatio)){
      _3r.setSize(W,H,false);_3c.aspect=W/H;_3c.updateProjectionMatrix();
    }
    _3r.render(_3s,_3c);
  }
  animate();
}

function attachOrbit(canvas){
  // Skip orbit if a deco is being placed
  canvas.addEventListener('mousedown',e=>{
    if(_3dragDecoIdx!==null)return; // deco placement takes priority
    _3drag=true;_3auto=false;_3lx=e.clientX;_3ly=e.clientY;
  });
  canvas.addEventListener('mousemove',e=>{
    if(_3dragDecoIdx!==null)return;
    if(!_3drag)return;
    const dx=e.clientX-_3lx,dy=e.clientY-_3ly;
    if(_3handMode){
      // Mode main : déplace le gâteau
      _3panX+=dx*0.012;_3panY-=dy*0.012;
    } else {
      // Mode rotation : tourne le gâteau
      _3ry+=dx*0.008;_3rx+=dy*0.006;
      _3rx=Math.max(-0.55,Math.min(0.75,_3rx));
    }
    _3lx=e.clientX;_3ly=e.clientY;
  });
  canvas.addEventListener('mouseup',()=>{if(_3dragDecoIdx===null)_3drag=false;});
  canvas.addEventListener('mouseleave',()=>{_3drag=false;});
  canvas.addEventListener('touchstart',e=>{
    if(_3dragDecoIdx!==null)return;
    if(e.touches.length===1){_3drag=true;_3auto=false;_3lx=e.touches[0].clientX;_3ly=e.touches[0].clientY;}
    if(e.touches.length===2){
      e.preventDefault();
      _3pinch=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    }
  },{passive:false});
  canvas.addEventListener('touchmove',e=>{
    if(_3dragDecoIdx!==null)return;
    if(e.touches.length===1&&_3drag){
      e.preventDefault();
      const dx=e.touches[0].clientX-_3lx,dy=e.touches[0].clientY-_3ly;
      if(_3handMode){
        _3panX+=dx*0.012;_3panY-=dy*0.012;
      } else {
        _3ry+=dx*0.010;_3rx+=dy*0.007;
        _3rx=Math.max(-0.55,Math.min(0.75,_3rx));
      }
      _3lx=e.touches[0].clientX;_3ly=e.touches[0].clientY;
    }
    if(e.touches.length===2&&_3pinch!==null){
      e.preventDefault();
      const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      const ratio=_3pinch/d;
      if(_3c)_3c.position.z=Math.max(3.5,Math.min(12,_3c.position.z*ratio));
      _3pinch=d;
    }
  },{passive:false});
  canvas.addEventListener('touchend',e=>{
    if(_3dragDecoIdx===null){
      if(e.touches.length===0){_3drag=false;_3pinch=null;}
      else if(e.touches.length===1){_3pinch=null;}
    }
  },{passive:true});
  canvas.addEventListener('wheel',e=>{if(_3c)_3c.position.z=Math.max(3.5,Math.min(12,_3c.position.z+e.deltaY*0.005));},{passive:true});
}

};

function _getDecoTexture(T,svgId){
  if(_decoTextureCache[svgId])return _decoTextureCache[svgId];
  const canvas=document.createElement('canvas');
  canvas.width=1024;canvas.height=1024;
  const ctx=canvas.getContext('2d');
  // CLEAR FULL TRANSPARENCY (important — sinon canvas pas vraiment transparent)
  ctx.clearRect(0,0,1024,1024);
  const emoji=DECO_EMOJI[svgId];
  if(emoji){
    // Pas de shadow blur dispersé qui fait paraître un fond
    ctx.shadowColor='rgba(0,0,0,0.30)';
    ctx.shadowBlur=22;
    ctx.shadowOffsetX=0;ctx.shadowOffsetY=10;
    ctx.font='820px Apple Color Emoji,Segoe UI Emoji,Noto Color Emoji,EmojiOne Color,Twemoji Mozilla,sans-serif';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(emoji,512,560);
  } else {
    const svgStr=DECO_SVG[svgId];
    if(svgStr){
      const img=new Image();
      const blob=new Blob([svgStr],{type:'image/svg+xml;charset=utf-8'});
      const url=URL.createObjectURL(blob);
      img.onload=function(){
        ctx.drawImage(img,0,0,1024,1024);
        if(_decoTextureCache[svgId])_decoTextureCache[svgId].needsUpdate=true;
        URL.revokeObjectURL(url);
      };
      img.src=url;
    }
  }
  const tex=new T.Texture(canvas);
  tex.colorSpace=T.SRGBColorSpace||T.sRGBEncoding;
  tex.anisotropy=8;
  tex.premultiplyAlpha=false;
  tex.needsUpdate=true;
  _decoTextureCache[svgId]=tex;
  return tex;
}

// Helper : crée un pétale courbé (sphère écrasée allongée)
function _petal(T,col,len,wid,curve){
  const g=new T.SphereGeometry(0.5,8,6);
  g.scale(wid,curve||0.15,len);
  const m=new T.Mesh(g,new T.MeshStandardMaterial({
    color:col,roughness:0.55,metalness:0.0,side:T.DoubleSide}));
  return m;
}

// DÉCORATIONS 3D — FIDÈLES AUX PHOTOS DE RÉFÉRENCE
// Chaque modèle utilise des paramètres uniques pour être visuellement
// distinct des autres (stade d'épanouissement, morphologie, etc.)
// ════════════════════════════════════════════════════════════════════════

// ─── HELPERS ─────────────────────────────────────────────────────────────

function _lighten(col, amt){
  const T = window.THREE;
  return new T.Color(
    Math.min(1, col.r + amt),
    Math.min(1, col.g + amt),
    Math.min(1, col.b + amt)
  );
}
function _darken(col, amt){
  const T = window.THREE;
  return new T.Color(
    Math.max(0, col.r - amt),
    Math.max(0, col.g - amt),
    Math.max(0, col.b - amt)
  );
}

// Pétale paramétrable avec différentes formes selon la fleur
function _buildPetal(T, color, len, wid, curl, shapeType, thickness){
  thickness = thickness !== undefined ? thickness : 0.008;
  const shape = new T.Shape();
  const w = wid / 2;
  shape.moveTo(0, 0);
  
  if(shapeType === 'wide'){
    shape.bezierCurveTo(-w*1.1, len*0.10, -w*1.2, len*0.55, -w*0.7, len*0.95);
    shape.bezierCurveTo(-w*0.25, len*1.08, w*0.25, len*1.08, w*0.7, len*0.95);
    shape.bezierCurveTo(w*1.2, len*0.55, w*1.1, len*0.10, 0, 0);
  } else if(shapeType === 'narrow'){
    shape.bezierCurveTo(-w*0.7, len*0.15, -w*0.85, len*0.55, -w*0.5, len*0.92);
    shape.bezierCurveTo(-w*0.2, len*1.02, w*0.2, len*1.02, w*0.5, len*0.92);
    shape.bezierCurveTo(w*0.85, len*0.55, w*0.7, len*0.15, 0, 0);
  } else if(shapeType === 'pointy'){
    shape.bezierCurveTo(-w*0.85, len*0.15, -w*0.95, len*0.55, -w*0.45, len*0.88);
    shape.bezierCurveTo(-w*0.18, len*1.0, w*0.18, len*1.0, w*0.45, len*0.88);
    shape.bezierCurveTo(w*0.95, len*0.55, w*0.85, len*0.15, 0, 0);
  } else if(shapeType === 'round'){
    shape.bezierCurveTo(-w*1.25, len*0.20, -w*1.35, len*0.55, -w*0.7, len*0.92);
    shape.bezierCurveTo(-w*0.2, len*1.05, w*0.2, len*1.05, w*0.7, len*0.92);
    shape.bezierCurveTo(w*1.35, len*0.55, w*1.25, len*0.20, 0, 0);
  } else if(shapeType === 'spike'){
    shape.bezierCurveTo(-w*0.5, len*0.20, -w*0.7, len*0.60, -w*0.3, len*0.95);
    shape.lineTo(0, len);
    shape.lineTo(w*0.3, len*0.95);
    shape.bezierCurveTo(w*0.7, len*0.60, w*0.5, len*0.20, 0, 0);
  } else {
    shape.bezierCurveTo(-w*0.85, len*0.15, -w, len*0.55, -w*0.55, len*0.90);
    shape.bezierCurveTo(-w*0.3, len*1.0, w*0.3, len*1.0, w*0.55, len*0.90);
    shape.bezierCurveTo(w, len*0.55, w*0.85, len*0.15, 0, 0);
  }
  
  const extrudeSettings = {
    depth: thickness, bevelEnabled: true,
    bevelSegments: 2, bevelSize: thickness*0.45, bevelThickness: thickness*0.25,
    curveSegments: 10
  };
  const geo = new T.ExtrudeGeometry(shape, extrudeSettings);
  
  const pos = geo.attributes.position;
  for(let i=0; i<pos.count; i++){
    const x = pos.getX(i), y = pos.getY(i), z = pos.getZ(i);
    const yFrac = Math.max(0, y / len);
    const newZ = z - Math.sin(yFrac * Math.PI * 0.65) * curl * len;
    if(shapeType !== 'spike'){
      const xFrac = x / w;
      const ondulation = Math.sin(xFrac * Math.PI * 1.2) * 0.002 * yFrac;
      pos.setZ(i, newZ + ondulation);
    } else {
      pos.setZ(i, newZ);
    }
  }
  geo.computeVertexNormals();
  
  return new T.Mesh(geo, new T.MeshStandardMaterial({
    color: color, roughness: 0.48, metalness: 0.02, side: T.DoubleSide
  }));
}

    p.rotation.z = (Math.random()-0.5)*0.15;

    p.position.set(Math.cos(a)*0.008, 0.012, Math.sin(a)*0.008);

// PIVOINE — boule chiffonnée chaotique
// ═══════════════════════════════════════════════════════════════════════
function _decoPivoine(T, data){
  const g = new T.Group();
  const baseHex = (data && data.coul_pivoine) || '#F490B0';
  const baseCol = new T.Color(baseHex);
  
  function pivoinePetal(col, len, wid){
    const shape = new T.Shape();
    const w = wid/2;
    shape.moveTo(0, 0);
    shape.bezierCurveTo(-w*1.15, len*0.08, -w*1.30, len*0.42, -w*0.95, len*0.70);
    shape.bezierCurveTo(-w*0.7, len*0.85, -w*0.3, len*1.12, 0, len*1.08);
    shape.bezierCurveTo(w*0.3, len*1.12, w*0.7, len*0.85, w*0.95, len*0.70);
    shape.bezierCurveTo(w*1.30, len*0.42, w*1.15, len*0.08, 0, 0);
    
    const geo = new T.ExtrudeGeometry(shape, {
      depth: 0.008, bevelEnabled: true,
      bevelSegments: 2, bevelSize: 0.003, bevelThickness: 0.002, curveSegments: 10
    });
    const pos = geo.attributes.position;
    for(let i=0; i<pos.count; i++){
      const x = pos.getX(i), y = pos.getY(i), z = pos.getZ(i);
      const yFrac = Math.max(0, y/len);
      let cz = z - Math.sin(yFrac * Math.PI * 0.55) * 0.45 * len;
      const xFrac = x / w;
      cz += Math.sin(xFrac * Math.PI * 3.5) * 0.008 * yFrac;
      cz += Math.sin(yFrac * Math.PI * 2.2) * 0.005;
      pos.setZ(i, cz);
    }
    geo.computeVertexNormals();
    return new T.Mesh(geo, new T.MeshStandardMaterial({
      color: col, roughness: 0.55, side: T.DoubleSide
    }));
  }
  
  const layers = [
    {R: 0.040, Y: -0.030, n: 11, lMin: 0.080, lMax: 0.095, wMin: 0.080, wMax: 0.095, tiltMin: -0.30, tiltMax: -0.50, shift: 0.10},
    {R: 0.032, Y: -0.015, n: 10, lMin: 0.070, lMax: 0.085, wMin: 0.075, wMax: 0.090, tiltMin: -0.55, tiltMax: -0.80, shift: 0.05},
    {R: 0.025, Y: 0.000,  n: 9,  lMin: 0.060, lMax: 0.075, wMin: 0.068, wMax: 0.082, tiltMin: -0.80, tiltMax: -1.05, shift: 0},
    {R: 0.018, Y: 0.012,  n: 9,  lMin: 0.050, lMax: 0.065, wMin: 0.058, wMax: 0.072, tiltMin: -1.05, tiltMax: -1.30, shift: -0.03},
    {R: 0.012, Y: 0.020,  n: 8,  lMin: 0.040, lMax: 0.055, wMin: 0.048, wMax: 0.062, tiltMin: -1.30, tiltMax: -1.55, shift: -0.06},
    {R: 0.008, Y: 0.028,  n: 7,  lMin: 0.030, lMax: 0.045, wMin: 0.038, wMax: 0.050, tiltMin: -1.50, tiltMax: -1.70, shift: -0.08}
  ];
  
  layers.forEach((L, li) => {
    let col;
    if(L.shift > 0) col = _lighten(baseCol, L.shift);
    else if(L.shift < 0) col = _darken(baseCol, -L.shift);
    else col = baseCol;
    
    for(let i=0; i<L.n; i++){
      const aBase = (i/L.n) * Math.PI*2 + li*0.20;
      const a = aBase + (Math.random()-0.5) * 0.25;
      const len = L.lMin + Math.random()*(L.lMax - L.lMin);
      const wid = L.wMin + Math.random()*(L.wMax - L.wMin);
      const tilt = L.tiltMin + Math.random()*(L.tiltMax - L.tiltMin);
      
      const p = pivoinePetal(col, len, wid);
      p.position.set(
        Math.cos(a)*L.R + (Math.random()-0.5)*0.005,
        L.Y + (Math.random()-0.5)*0.008,
        Math.sin(a)*L.R + (Math.random()-0.5)*0.005
      );
      p.rotation.y = a + Math.PI;
      p.rotation.x = tilt;
      p.rotation.z = (Math.random()-0.5) * 0.4;
      p.scale.setScalar(0.9 + Math.random()*0.2);
      g.add(p);
    }
  });
  
  for(let i=0; i<18; i++){
    const a = Math.random() * Math.PI*2;
    const r = Math.random() * 0.008;
    const p = pivoinePetal(_darken(baseCol, 0.12), 0.022 + Math.random()*0.012, 0.022 + Math.random()*0.010);
    p.position.set(
      Math.cos(a)*r,
      0.034 + Math.random()*0.010,
      Math.sin(a)*r
    );
    p.rotation.y = a + Math.PI + (Math.random()-0.5)*0.5;
    p.rotation.x = -1.55 + (Math.random()-0.5)*0.3;
    p.rotation.z = (Math.random()-0.5) * 0.6;
    p.scale.setScalar(0.7 + Math.random()*0.4);
    g.add(p);
  }
  
  return g;
}

// ═══════════════════════════════════════════════════════════════════════
// DAHLIA — pétales rayonnants pointus comme aiguilles
// ═══════════════════════════════════════════════════════════════════════
function _decoDahlia(T, data){
  const g = new T.Group();
  const baseHex = (data && data.coul_dahlia) || '#F2A8B8';
  const baseCol = new T.Color(baseHex);
  const innerCol = _lighten(baseCol, 0.10);
  const heartCol = _darken(baseCol, 0.15);
  
  const layers = [
    {n: 14, R: 0.005, len: 0.060, wid: 0.014, tilt: -0.10, Y: 0.000, col: baseCol},
    {n: 12, R: 0.004, len: 0.052, wid: 0.013, tilt: -0.25, Y: 0.005, col: baseCol},
    {n: 10, R: 0.003, len: 0.044, wid: 0.012, tilt: -0.45, Y: 0.010, col: baseCol},
    {n: 9,  R: 0.003, len: 0.036, wid: 0.011, tilt: -0.65, Y: 0.014, col: innerCol},
    {n: 8,  R: 0.002, len: 0.028, wid: 0.010, tilt: -0.90, Y: 0.018, col: innerCol},
    {n: 6,  R: 0.002, len: 0.020, wid: 0.009, tilt: -1.15, Y: 0.022, col: heartCol}
  ];
  
  layers.forEach((L, li) => {
    for(let i=0; i<L.n; i++){
      const a = (i/L.n) * Math.PI*2 + li*0.25;
      const p = _buildPetal(T, L.col, L.len, L.wid, 0.12, 'spike');
      p.position.set(Math.cos(a)*L.R, L.Y, Math.sin(a)*L.R);
      p.rotation.y = a + Math.PI;
      p.rotation.x = L.tilt;
      g.add(p);
    }
  });
  
  for(let i=0; i<8; i++){
    const a = (i/8) * Math.PI*2;
    const p = _buildPetal(T, heartCol, 0.012, 0.007, 0.30, 'spike');
    p.position.set(Math.cos(a)*0.002, 0.025, Math.sin(a)*0.002);
    p.rotation.y = a + Math.PI;
    p.rotation.x = -1.45;
    g.add(p);
  }
  
  const center = new T.Mesh(
    new T.SphereGeometry(0.006, 8, 6),
    new T.MeshStandardMaterial({color: heartCol, roughness: 0.55})
  );
  center.position.y = 0.030;
  g.add(center);
  return g;
}

// ═══════════════════════════════════════════════════════════════════════
// EUCALYPTUS — branche flexible avec feuilles RONDES gris-vert
// ═══════════════════════════════════════════════════════════════════════
function _decoEucalyptus(T, data){
  const g = new T.Group();
  const leafCol = new T.Color(0x96A88E);
  const stemCol = new T.Color(0x7A8568);
  
  // Tige principale TRÈS courbe (style cascade)
  const stemCurve = new T.CatmullRomCurve3([
    new T.Vector3(0, -0.110, 0),
    new T.Vector3(0.015, -0.060, 0.005),
    new T.Vector3(-0.008, -0.010, 0),
    new T.Vector3(0.010, 0.050, -0.005),
    new T.Vector3(-0.005, 0.110, 0)
  ]);
  const stemGeo = new T.TubeGeometry(stemCurve, 28, 0.0035, 6, false);
  g.add(new T.Mesh(stemGeo, new T.MeshStandardMaterial({
    color: stemCol, roughness: 0.7
  })));
  
  // Feuille RONDE eucalyptus (presque circulaire, plate, vert-gris)
  function roundLeaf(scale, vary){
    // Cercle légèrement aplati horizontalement
    const shape = new T.Shape();
    shape.absellipse(0, 0, 0.024, 0.022, 0, Math.PI*2, false, 0);
    const geo = new T.ExtrudeGeometry(shape, {
      depth: 0.003, bevelEnabled: true,
      bevelSegments: 1, bevelSize: 0.0015, bevelThickness: 0.0008
    });
    // Légère courbure (la feuille n'est pas totalement plate)
    const pos = geo.attributes.position;
    for(let i=0; i<pos.count; i++){
      const x = pos.getX(i);
      pos.setZ(i, pos.getZ(i) + Math.abs(x/0.024) * 0.003);
    }
    geo.computeVertexNormals();
    const v = 0.85 + Math.random()*0.30;
    const col = new T.Color(leafCol.r*v, leafCol.g*v, leafCol.b*v);
    const m = new T.Mesh(geo, new T.MeshStandardMaterial({
      color: col, roughness: 0.55, metalness: 0.20, side: T.DoubleSide
    }));
    m.scale.setScalar(scale);
    return m;
  }
  
  // 14 feuilles par paires opposées + alternance
  const nPairs = 7;
  for(let i=0; i<nPairs; i++){
    const t = 0.05 + (i / nPairs) * 0.90;
    const pt = stemCurve.getPoint(t);
    
    [-1, 1].forEach(side => {
      const leaf = roundLeaf(0.85 + Math.random()*0.40);
      const offset = 0.022 + Math.random()*0.005;
      leaf.position.set(
        pt.x + side * offset,
        pt.y + (Math.random()-0.5)*0.008,
        pt.z + (Math.random()-0.5)*0.008
      );
      // Feuille orientée perpendiculaire à la tige (vers extérieur)
      leaf.rotation.z = side * (Math.PI/2 + (Math.random()-0.5)*0.4);
      leaf.rotation.y = (Math.random()-0.5) * 0.5;
      leaf.rotation.x = (Math.random()-0.5) * 0.3;
      g.add(leaf);
    });
  }
  
  // Sommet : touffe de petites feuilles
  for(let i=0; i<3; i++){
    const a = (i-1) * 0.7;
    const leaf = roundLeaf(0.70);
    leaf.position.set(
      Math.sin(a) * 0.018 + (Math.random()-0.5)*0.005,
      0.118 + (Math.random()-0.5)*0.005,
      Math.cos(a) * 0.012
    );
    leaf.rotation.z = a + Math.PI/2;
    leaf.rotation.x = -0.3;
    g.add(leaf);
  }
  
  return g;
}

// ═══════════════════════════════════════════════════════════════════════
// LAGURUS — épi ovoïde duveteux, long, blanc cassé
// ═══════════════════════════════════════════════════════════════════════
function _decoLagurus(T, data){
  const g = new T.Group();
  const fluffCol = new T.Color(0xF4EFE0);
  const stemCol = new T.Color(0xC8B888);
  
  // 3 épis groupés
  for(let e=0; e<3; e++){
    const cx = (e-1) * 0.022;
    const tilt = (e-1) * 0.08;
    
    const ePOS = new T.Group();
    ePOS.position.x = cx;
    ePOS.rotation.z = tilt;
    
    // Tige
    const stemH = 0.090;
    const stem = new T.Mesh(
      new T.CylinderGeometry(0.0025, 0.0035, stemH, 6),
      new T.MeshStandardMaterial({color: stemCol, roughness: 0.75})
    );
    stem.position.y = -0.040;
    ePOS.add(stem);
    
    // Corps ovoïde allongé (lagurus = forme oeuf très allongée)
    const bodyGeo = new T.SphereGeometry(0.5, 14, 12);
    const bp = bodyGeo.attributes.position;
    for(let i=0; i<bp.count; i++){
      bp.setX(i, bp.getX(i) * 0.018);
      bp.setY(i, bp.getY(i) * 0.045); // beaucoup plus allongé
      bp.setZ(i, bp.getZ(i) * 0.018);
    }
    bodyGeo.computeVertexNormals();
    const body = new T.Mesh(bodyGeo, new T.MeshStandardMaterial({
      color: fluffCol, roughness: 0.95
    }));
    body.position.y = 0.040;
    ePOS.add(body);
    
    // BEAUCOUP plus de poils duveteux courts (effet vraiment cotonneux)
    const nHairs = 90;
    for(let h=0; h<nHairs; h++){
      const phi = Math.random() * Math.PI;
      const theta = Math.random() * Math.PI * 2;
      const ex = Math.sin(phi) * Math.cos(theta);
      const ey = Math.cos(phi);
      const ez = Math.sin(phi) * Math.sin(theta);
      const surfX = ex * 0.018;
      const surfY = ey * 0.045 + 0.040;
      const surfZ = ez * 0.018;
      
      const hairLen = 0.004 + Math.random()*0.005; // poils courts
      const hair = new T.Mesh(
        new T.ConeGeometry(0.0008, hairLen, 4),
        new T.MeshStandardMaterial({
          color: fluffCol, roughness: 0.95
        })
      );
      const nx = ex/0.018, ny = ey/0.045, nz = ez/0.018;
      const nlen = Math.sqrt(nx*nx + ny*ny + nz*nz);
      const dx = nx/nlen, dy = ny/nlen, dz = nz/nlen;
      
      hair.position.set(
        surfX + dx * hairLen*0.45,
        surfY + dy * hairLen*0.45,
        surfZ + dz * hairLen*0.45
      );
      const up = new T.Vector3(0, 1, 0);
      const dir = new T.Vector3(dx, dy, dz);
      hair.quaternion.setFromUnitVectors(up, dir);
      ePOS.add(hair);
    }
    
    g.add(ePOS);
  }
  return g;
}

// ═══════════════════════════════════════════════════════════════════════
// HORTENSIA — dôme APLATI (pas sphère) avec grandes feuilles ovales
// ═══════════════════════════════════════════════════════════════════════
function _decoHortensia(T, data){
  const g = new T.Group();
  const baseHex = (data && data.coul_hortensia) || '#9080B8';
  const baseCol = new T.Color(baseHex);
  
  // Mini-fleur 4 pétales (caractéristique hortensia)
  function smallFlower(col){
    const sub = new T.Group();
    // 4 pétales en croix, plus arrondis et plats
    for(let p=0; p<4; p++){
      const ang = (p/4) * Math.PI * 2;
      const shape = new T.Shape();
      const w = 0.008;
      shape.moveTo(0, 0);
      shape.bezierCurveTo(-w*1.2, 0.004, -w*1.0, 0.014, 0, 0.018);
      shape.bezierCurveTo(w*1.0, 0.014, w*1.2, 0.004, 0, 0);
      const pg = new T.ExtrudeGeometry(shape, {
        depth: 0.002, bevelEnabled: true,
        bevelSegments: 1, bevelSize: 0.0008, bevelThickness: 0.0004
      });
      const pm = new T.Mesh(pg, new T.MeshStandardMaterial({
        color: col, roughness: 0.45, metalness: 0.05, side: T.DoubleSide
      }));
      pm.rotation.y = ang;
      sub.add(pm);
    }
    // Centre clair
    const ctr = new T.Mesh(
      new T.SphereGeometry(0.003, 5, 4),
      new T.MeshStandardMaterial({color: _lighten(col, 0.2), roughness: 0.4})
    );
    ctr.position.y = 0.002;
    sub.add(ctr);
    return sub;
  }
  
  // DÔME APLATI : 35 fleurs réparties sur un cap aplati (Y < 0.020)
  // Distribution dense mais limitée en hauteur
  const nFlowers = 35;
  const clusterR = 0.050;
  for(let i=0; i<nFlowers; i++){
    // Distribution sur un dôme aplati (cap demi-ellipsoïde aplati)
    const t = i / nFlowers;
    const phi = Math.acos(1 - t * 0.45); // limité à 0.45 = dôme TRÈS aplati
    const theta = Math.PI * (1 + Math.sqrt(5)) * i;
    const cx = Math.sin(phi) * Math.cos(theta) * clusterR;
    const cy = Math.cos(phi) * clusterR * 0.35; // aplati verticalement
    const cz = Math.sin(phi) * Math.sin(theta) * clusterR;
    
    // Variation de couleur (mélange bleu/violet/rose comme dans la vraie photo)
    const r = Math.random();
    let flCol;
    if(r < 0.35) flCol = _lighten(baseCol, 0.10);
    else if(r < 0.65) flCol = baseCol;
    else if(r < 0.85) flCol = _darken(baseCol, 0.05);
    else {
      // Touche rose dans le mélange
      flCol = new T.Color(0xC080A0);
    }
    
    const flower = smallFlower(flCol);
    flower.position.set(cx, cy, cz);
    // Orienter vers le haut (le dôme regarde vers le ciel)
    flower.lookAt(cx*1.5, cy + 0.05, cz*1.5);
    flower.scale.setScalar(0.85 + Math.random()*0.30);
    g.add(flower);
  }
  
  // GRANDES feuilles vertes ovales dentelées en dessous
  function bigLeaf(){
    const shape = new T.Shape();
    // Forme de feuille ovale pointue
    shape.moveTo(0, 0);
    shape.bezierCurveTo(-0.018, 0.005, -0.026, 0.020, -0.022, 0.040);
    shape.bezierCurveTo(-0.018, 0.055, -0.008, 0.062, 0, 0.066);
    shape.bezierCurveTo(0.008, 0.062, 0.018, 0.055, 0.022, 0.040);
    shape.bezierCurveTo(0.026, 0.020, 0.018, 0.005, 0, 0);
    const geo = new T.ExtrudeGeometry(shape, {
      depth: 0.003, bevelEnabled: true,
      bevelSegments: 1, bevelSize: 0.001, bevelThickness: 0.0005
    });
    // Légère courbure de la feuille
    const pos = geo.attributes.position;
    for(let i=0; i<pos.count; i++){
      const y = pos.getY(i), z = pos.getZ(i);
      const yFrac = y / 0.066;
      pos.setZ(i, z - Math.sin(yFrac * Math.PI) * 0.005);
    }
    geo.computeVertexNormals();
    return new T.Mesh(geo, new T.MeshStandardMaterial({
      color: 0x3E7838, roughness: 0.65, side: T.DoubleSide
    }));
  }
  
  // 4 feuilles disposées sous la grappe
  for(let i=0; i<4; i++){
    const a = (i/4) * Math.PI*2 + Math.PI/4;
    const leaf = bigLeaf();
    leaf.position.set(
      Math.cos(a) * 0.030,
      -0.028 + Math.sin(i)*0.005,
      Math.sin(a) * 0.030
    );
    leaf.rotation.y = a;
    leaf.rotation.x = -0.5; // feuilles légèrement vers le bas
    g.add(leaf);
  }
  
  return g;
}

// ═══════════════════════════════════════════════════════════════════════
// ORCHIDÉE — 5 pétales PLATS + lèvre jaune
// ═══════════════════════════════════════════════════════════════════════
function _decoOrchidee(T, data){
  const g = new T.Group();
  const baseHex = (data && data.coul_orchidee) || '#FCFCF6';
  const petalCol = new T.Color(baseHex);
  const lipCol = new T.Color(0xC880A0);
  const heartCol = new T.Color(0xF8CC40);
  
  // Pétale ULTRA plat et rond (phalaenopsis)
  function orchidPetal(len, wid){
    const p = _buildPetal(T, petalCol, len, wid, 0.08, 'round', 0.006);
    return p;
  }
  
  // STRUCTURE PHALAENOPSIS : 5 pétales en forme d'étoile aplatie
  // 2 grands pétales latéraux (gauche et droite)
  [-1, 1].forEach(side => {
    const p = orchidPetal(0.055, 0.080);
    p.position.set(side * 0.030, 0, -0.005);
    // Orientation horizontale plate
    p.rotation.z = side * Math.PI/2;
    p.rotation.x = -0.1; // presque plat
    g.add(p);
  });
  
  // 2 sépales supérieurs (plus petits) en haut gauche et droite
  [-1, 1].forEach(side => {
    const p = orchidPetal(0.050, 0.040);
    const angle = Math.PI/2 + side * 0.6;
    p.position.set(Math.cos(angle)*0.020, Math.sin(angle)*0.020, -0.005);
    p.rotation.z = angle - Math.PI/2;
    p.rotation.x = -0.1;
    g.add(p);
  });
  
  // 1 sépale inférieur (au milieu en bas, plus petit)
  const lowerSepal = orchidPetal(0.045, 0.045);
  lowerSepal.position.set(0, -0.030, -0.005);
  lowerSepal.rotation.z = Math.PI;
  lowerSepal.rotation.x = -0.1;
  g.add(lowerSepal);
  
  // LÈVRE jaune centrale (caractéristique phalaenopsis)
  // En forme de bouche ou de petite tulipe
  const lipGroup = new T.Group();
  
  // Corps principal de la lèvre (légèrement bombé)
  const lipBody = new T.Mesh(
    new T.SphereGeometry(0.012, 10, 8),
    new T.MeshStandardMaterial({color: lipCol, roughness: 0.40})
  );
  lipBody.scale.set(1.0, 0.65, 0.8);
  lipGroup.add(lipBody);
  
  // 2 petits lobes latéraux qui sortent
  [-1, 1].forEach(side => {
    const lobe = new T.Mesh(
      new T.SphereGeometry(0.008, 8, 6),
      new T.MeshStandardMaterial({color: lipCol, roughness: 0.40})
    );
    lobe.scale.set(0.8, 0.4, 1.0);
    lobe.position.set(side*0.010, 0.002, 0.003);
    lipGroup.add(lobe);
  });
  
  // Cœur jaune vif au centre (caractéristique très visible)
  const heart = new T.Mesh(
    new T.CylinderGeometry(0.005, 0.007, 0.014, 8),
    new T.MeshStandardMaterial({color: heartCol, roughness: 0.35})
  );
  heart.rotation.x = Math.PI/2 - 0.3;
  heart.position.set(0, 0.000, 0.008);
  lipGroup.add(heart);
  
  // Petits points marron sur le cœur (typique phalaenopsis)
  for(let i=0; i<4; i++){
    const dot = new T.Mesh(
      new T.SphereGeometry(0.0015, 4, 3),
      new T.MeshStandardMaterial({color: 0x6B4020, roughness: 0.5})
    );
    dot.position.set((Math.random()-0.5)*0.006, 0.003, 0.006 + i*0.002);
    lipGroup.add(dot);
  }
  
  lipGroup.position.set(0, 0, 0.008);
  g.add(lipGroup);
  
  return g;
}

// ═══════════════════════════════════════════════════════════════════════
// GYPSOPHILE — branche ramifiée avec pompons de mini-fleurs blanches
// Structure : tige droite courte → fourche → 4 branches en éventail
// zigzagantes avec sous-ramifications → grappes de mini-fleurs aux nœuds
// ═══════════════════════════════════════════════════════════════════════
function _decoGypsophile(T, data){
  const g = new T.Group();
  const whiteCol = new T.Color(0xFCFCF6);
  const whiteShadow = new T.Color(0xE8E8E2);
  const stemCol = new T.Color(0x6E8662);
  const stemDarkCol = new T.Color(0x5A6E50);

  const stemMat = new T.MeshStandardMaterial({color: stemCol, roughness: 0.78});
  const stemDarkMat = new T.MeshStandardMaterial({color: stemDarkCol, roughness: 0.80});
  const flowerMat = new T.MeshStandardMaterial({
    color: whiteCol, roughness: 0.55, side: T.DoubleSide
  });
  const flowerShadowMat = new T.MeshStandardMaterial({
    color: whiteShadow, roughness: 0.60, side: T.DoubleSide
  });

  // ─── Helper : mini-fleur 5 pétales (très petite) ───
  function microFlower(s){
    const sub = new T.Group();
    const size = 0.0030 * s;
    for(let p=0; p<5; p++){
      const ang = (p/5) * Math.PI * 2;
      const pg = new T.SphereGeometry(1, 5, 4);
      const pp = pg.attributes.position;
      for(let i=0; i<pp.count; i++){
        pp.setX(i, pp.getX(i) * size);
        pp.setY(i, pp.getY(i) * size*0.35);
        pp.setZ(i, pp.getZ(i) * size*1.3);
      }
      pg.computeVertexNormals();
      const pm = new T.Mesh(pg, flowerMat);
      pm.position.set(Math.cos(ang)*size*0.55, 0, Math.sin(ang)*size*0.55);
      pm.rotation.y = ang;
      sub.add(pm);
    }
    // disque central blanc
    const ctr = new T.Mesh(
      new T.SphereGeometry(size*0.55, 6, 4),
      flowerMat
    );
    ctr.scale.y = 0.4;
    sub.add(ctr);
    return sub;
  }

  // ─── Helper : pompon = grappe dense de 8-14 mini-fleurs ───
  function pompon(scale){
    const cluster = new T.Group();
    const n = 8 + Math.floor(Math.random()*7);
    const R = 0.010 * scale;       // rayon du pompon
    // halo de fond (sphère blanche translucide-ish, donne le volume)
    const halo = new T.Mesh(
      new T.SphereGeometry(R*0.85, 10, 8),
      new T.MeshStandardMaterial({
        color: whiteShadow, roughness: 0.85, transparent: true, opacity: 0.35
      })
    );
    cluster.add(halo);
    for(let i=0; i<n; i++){
      // distribution sphérique gaussienne
      const u = Math.random()*2-1;
      const phi = Math.random()*Math.PI*2;
      const r = R * (0.25 + Math.random()*0.75);
      const sq = Math.sqrt(1-u*u);
      const fx = r * sq * Math.cos(phi);
      const fy = r * u;
      const fz = r * sq * Math.sin(phi);
      const f = microFlower(0.85 + Math.random()*0.35);
      f.position.set(fx, fy, fz);
      // orientation aléatoire pour ne pas que toutes regardent dans le même sens
      f.rotation.x = Math.random()*Math.PI*2;
      f.rotation.y = Math.random()*Math.PI*2;
      f.rotation.z = Math.random()*Math.PI*2;
      cluster.add(f);
    }
    return cluster;
  }

  // ─── 1) Tige principale verticale courte ───
  const mainStemH = 0.022;
  const mainStem = new T.Mesh(
    new T.CylinderGeometry(0.0011, 0.0014, mainStemH, 5),
    stemDarkMat
  );
  mainStem.position.y = -0.028;
  g.add(mainStem);
  // petits nœuds (renflements) le long de la tige
  for(let k=0; k<3; k++){
    const node = new T.Mesh(
      new T.SphereGeometry(0.0016, 5, 4),
      stemDarkMat
    );
    node.position.y = -0.038 + k*0.008;
    node.scale.y = 0.5;
    g.add(node);
  }
  // point de fourche (sommet de la tige principale)
  const forkY = mainStem.position.y + mainStemH/2;

  // ─── 2) Helper : dessine une branche zigzag récursive avec pompons ───
  // Renvoie un tableau de points où poser des pompons (pour pouvoir les
  // ajouter à la fin, sans interférer avec la géométrie)
  function drawZigzagBranch(startV, dirV, length, depth, thickness){
    const nSegs = 3 + Math.floor(Math.random()*3);
    const segLen = length / nSegs;
    let cur = startV.clone();
    let dir = dirV.clone().normalize();
    // axe orthogonal stable pour faire zigzaguer (perpendiculaire à dir et up)
    const up = new T.Vector3(0, 1, 0);
    let perp = new T.Vector3().crossVectors(dir, up);
    if(perp.lengthSq() < 1e-4) perp.set(1, 0, 0);
    perp.normalize();

    for(let s=0; s<nSegs; s++){
      const zig = (s % 2 === 0) ? 1 : -1;
      // rotation autour de perp pour créer le zigzag dans un plan
      const ang = zig * (0.20 + Math.random()*0.22);
      // appliquer une rotation à dir autour de perp
      const q = new T.Quaternion().setFromAxisAngle(perp, ang);
      dir.applyQuaternion(q);
      // léger twist 3D pour éviter qu'une branche reste plate
      const twistAxis = dir.clone();
      const twistQ = new T.Quaternion().setFromAxisAngle(twistAxis, (Math.random()-0.5)*0.4);
      perp.applyQuaternion(twistQ);

      const next = cur.clone().addScaledVector(dir, segLen);

      // tube courbe entre cur et next (point de contrôle au milieu décalé)
      const mid = cur.clone().lerp(next, 0.5)
                  .addScaledVector(perp, segLen * 0.10 * zig);
      const curve = new T.CatmullRomCurve3([cur.clone(), mid, next.clone()]);
      const tubeGeo = new T.TubeGeometry(
        curve, 5, Math.max(0.00035, thickness), 4, false
      );
      g.add(new T.Mesh(tubeGeo, stemMat));

      // sous-ramification à mi-branche (sauf au dernier segment qui aura le pompon final)
      if(depth < 2 && s < nSegs-1 && Math.random() < 0.55){
        const subDir = dir.clone();
        const sideAng = (Math.random() < 0.5 ? -1 : 1) * (0.6 + Math.random()*0.5);
        const subQ = new T.Quaternion().setFromAxisAngle(perp, sideAng);
        subDir.applyQuaternion(subQ);
        const subLen = segLen * (1.2 + Math.random()*0.9);
        drawZigzagBranch(
          next.clone(), subDir, subLen,
          depth+1, Math.max(0.00030, thickness*0.72)
        );
      }

      // pompon intermédiaire occasionnel
      if(s === nSegs-2 && Math.random() < 0.45){
        const p = pompon(0.70 + Math.random()*0.25);
        p.position.copy(next);
        g.add(p);
      }

      cur = next;
    }

    // pompon final à l'extrémité de la branche
    const pEnd = pompon(0.90 + Math.random()*0.35);
    pEnd.position.copy(cur);
    g.add(pEnd);
  }

  // ─── 3) Création des 4 branches majeures partant de la fourche ───
  // Les directions sont volontairement réparties en 3D, pas dans un plan.
  // Composantes : (cap autour de Y, élévation, longueur)
  const majorBranches = [
    {yaw: -1.5, pitch: 0.95, len: 0.062},   // gauche-avant, haute
    {yaw: -0.4, pitch: 1.20, len: 0.072},   // centre-avant, la + haute
    {yaw:  0.6, pitch: 1.05, len: 0.066},   // droite-arrière
    {yaw:  1.9, pitch: 0.90, len: 0.056},   // arrière, plus basse
  ];

  majorBranches.forEach(b => {
    const cy = Math.cos(b.pitch);
    const sy = Math.sin(b.pitch);
    // direction initiale (y vers le haut, étalement horizontal selon yaw)
    const dir = new T.Vector3(
      cy * Math.sin(b.yaw),
      sy,
      cy * Math.cos(b.yaw)
    );
    // petit jitter pour éviter symétrie parfaite
    dir.x += (Math.random()-0.5)*0.10;
    dir.z += (Math.random()-0.5)*0.10;
    dir.normalize();

    const start = new T.Vector3(
      (Math.random()-0.5)*0.0015,
      forkY,
      (Math.random()-0.5)*0.0015
    );
    drawZigzagBranch(start, dir, b.len, 0, 0.00075);
  });

  return g;
}

// ═══════════════════════════════════════════════════════════════════════
// RENONCULE — boule sphérique compacte, pétales très ronds et serrés
// ═══════════════════════════════════════════════════════════════════════
function _decoRenoncule(T, data){
  const g = new T.Group();
  const baseHex = (data && data.coul_renoncule) || '#E04580';
  const baseCol = new T.Color(baseHex);
  
  // Pétale renoncule : TRÈS rond presque circulaire
  function renonculePetal(col, len, wid){
    const shape = new T.Shape();
    const w = wid/2;
    shape.moveTo(0, 0);
    // Pétale très arrondi, presque circulaire
    shape.bezierCurveTo(-w*1.1, len*0.10, -w*1.2, len*0.50, -w*0.85, len*0.85);
    shape.bezierCurveTo(-w*0.45, len*1.05, w*0.45, len*1.05, w*0.85, len*0.85);
    shape.bezierCurveTo(w*1.2, len*0.50, w*1.1, len*0.10, 0, 0);
    
    const geo = new T.ExtrudeGeometry(shape, {
      depth: 0.005, bevelEnabled: true,
      bevelSegments: 2, bevelSize: 0.002, bevelThickness: 0.001, curveSegments: 8
    });
    // Courbure plus forte (les pétales s'enroulent vers le centre)
    const pos = geo.attributes.position;
    for(let i=0; i<pos.count; i++){
      const y = pos.getY(i), z = pos.getZ(i);
      const yFrac = Math.max(0, y/len);
      pos.setZ(i, z - Math.sin(yFrac*Math.PI*0.55) * 0.018);
    }
    geo.computeVertexNormals();
    return new T.Mesh(geo, new T.MeshStandardMaterial({
      color: col, roughness: 0.50, side: T.DoubleSide
    }));
  }
  
  // FORME SPHÉRIQUE : pétales très enroulés vers l'intérieur sur toutes
  // les couches. 7 couches avec beaucoup de pétales par couche.
  const layers = [
    {n: 12, R: 0.038, Y: -0.022, len: 0.050, wid: 0.050, tilt: -0.40, shift: 0},
    {n: 11, R: 0.032, Y: -0.012, len: 0.045, wid: 0.046, tilt: -0.60, shift: 0},
    {n: 10, R: 0.026, Y: -0.002, len: 0.040, wid: 0.042, tilt: -0.80, shift: 0.02},
    {n: 9,  R: 0.020, Y: 0.008,  len: 0.035, wid: 0.038, tilt: -1.00, shift: 0.05},
    {n: 8,  R: 0.014, Y: 0.018,  len: 0.030, wid: 0.034, tilt: -1.20, shift: 0.08},
    {n: 7,  R: 0.009, Y: 0.026,  len: 0.025, wid: 0.028, tilt: -1.35, shift: 0.12},
    {n: 6,  R: 0.005, Y: 0.032,  len: 0.020, wid: 0.022, tilt: -1.50, shift: 0.18}
  ];
  
  layers.forEach((L, li) => {
    const col = L.shift > 0 ? _darken(baseCol, L.shift) : baseCol;
    for(let i=0; i<L.n; i++){
      const a = (i/L.n) * Math.PI*2 + li*0.30;
      const p = renonculePetal(col, L.len, L.wid);
      p.position.set(Math.cos(a)*L.R, L.Y, Math.sin(a)*L.R);
      p.rotation.y = a + Math.PI;
      p.rotation.x = L.tilt;
      p.rotation.z = (Math.random()-0.5) * 0.10;
      g.add(p);
    }
  });
  
  // Centre foncé visible (caractéristique renoncule)
  const center = new T.Mesh(
    new T.SphereGeometry(0.008, 8, 6),
    new T.MeshStandardMaterial({color: _darken(baseCol, 0.30), roughness: 0.55})
  );
  center.position.y = 0.038;
  g.add(center);
  
  return g;
}

// ═══════════════════════════════════════════════════════════════════════
// CAMÉLIA — pétales plats en couches concentriques régulières
// ═══════════════════════════════════════════════════════════════════════
function _decoCamelia(T, data){
  const g = new T.Group();
  const baseHex = (data && data.coul_camelia) || '#C82850';
  const baseCol = new T.Color(baseHex);
  const edgeCol = _lighten(baseCol, 0.10);
  
  // Pétale camélia : large, presque rond, PLAT (peu de courbure)
  function cameliaPetal(col, len, wid){
    const p = _buildPetal(T, col, len, wid, 0.18, 'pointy', 0.006);
    return p;
  }
  
  // 6 couches très régulières, chaque couche est un cercle parfait
  // Caractéristique : pétales plats étalés en éventail
  const layers = [
    {n: 9, R: 0.038, Y: -0.014, len: 0.055, wid: 0.048, tilt: -0.30},
    {n: 8, R: 0.030, Y: -0.005, len: 0.048, wid: 0.042, tilt: -0.50},
    {n: 7, R: 0.022, Y: 0.005,  len: 0.040, wid: 0.036, tilt: -0.75},
    {n: 6, R: 0.016, Y: 0.014,  len: 0.032, wid: 0.030, tilt: -1.00},
    {n: 5, R: 0.010, Y: 0.022,  len: 0.026, wid: 0.024, tilt: -1.20},
    {n: 4, R: 0.005, Y: 0.030,  len: 0.020, wid: 0.018, tilt: -1.40}
  ];
  
  layers.forEach((L, li) => {
    const col = li === 0 ? edgeCol : baseCol; // couche externe plus claire
    for(let i=0; i<L.n; i++){
      const a = (i/L.n) * Math.PI*2 + li*0.40; // décalage important pour effet écailles
      const p = cameliaPetal(col, L.len, L.wid);
      p.position.set(Math.cos(a)*L.R, L.Y, Math.sin(a)*L.R);
      p.rotation.y = a + Math.PI;
      p.rotation.x = L.tilt;
      g.add(p);
    }
  });
  
  // Bouton central très fermé (cône foncé)
  const bud = new T.Mesh(
    new T.SphereGeometry(0.008, 8, 6),
    new T.MeshStandardMaterial({color: _darken(baseCol, 0.20), roughness: 0.45})
  );
  bud.position.y = 0.035;
  g.add(bud);
  
  return g;
}
