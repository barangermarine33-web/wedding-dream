// Lancée au clic sur un bouton catégorie : recherche par TAG OSM uniquement
// (pas par nom). C'est ce qui fait que "Salle" trouve toutes les salles de
// réception, pas seulement les établissements appelés "Salle".
async function searchByCategory(catKey, catLabel){
  const cat = VND_CATEGORIES[catKey];
  if(!cat){console.warn('Catégorie inconnue:',catKey);return;}

  // Récupérer la valeur du slider rayon (défaut 20 km)
  const radiusKm = parseInt(el('vnd-radius')?.value || '20', 10);

  const wrap = el('vnd-results-wrap');
  if(wrap) wrap.innerHTML = `<p style="text-align:center;padding:14px;font-size:12px;color:${tl};">🔍 Recherche des ${catLabel.toLowerCase()}s dans un rayon de ${radiusKm} km...</p>`;

  // Géoloc nécessaire : sans position, on ne peut pas filtrer par rayon
  let lat = window._userLat, lng = window._userLng;
  if(!lat || !lng){
    if(!navigator.geolocation){
      if(wrap) wrap.innerHTML = `<p style="text-align:center;padding:14px;font-size:13px;color:${rd};">Géolocalisation non disponible.</p>`;
      return;
    }
    if(wrap) wrap.innerHTML = `<p style="text-align:center;padding:14px;font-size:12px;color:${tl};">📍 Demande de localisation...</p>`;
    try {
      const pos = await new Promise((resolve,reject)=>{
        navigator.geolocation.getCurrentPosition(resolve, reject, {timeout:10000, maximumAge:300000});
      });
      window._userLat = lat = pos.coords.latitude;
      window._userLng = lng = pos.coords.longitude;
    } catch(geoErr){
      if(wrap) wrap.innerHTML = `<p style="text-align:center;padding:14px;font-size:13px;color:${rd};">Géolocalisation refusée ou indisponible.<br><span style="font-size:11px;font-style:italic;">Autorise la localisation dans les paramètres du navigateur.</span></p>`;
      return;
    }
  }

  await runCategorySearch(cat.tags, catLabel, lat, lng, radiusKm * 1000);
}

// Recherche par TAG OSM dans un rayon donné, sans recherche par nom
// → résultats cohérents : tous les fleuristes, tous les traiteurs, etc.
async function runCategorySearch(tags, catLabel, lat, lng, radiusMeters){
  const wrap = el('vnd-results-wrap');

  async function fetchWithTimeout(url, opts={}, timeoutMs=12000){
    const ctrl = new AbortController();
    const tid = setTimeout(()=>ctrl.abort(), timeoutMs);
    try { return await fetch(url, {...opts, signal: ctrl.signal}); }
    finally { clearTimeout(tid); }
  }
  function haversine(la1,lo1,la2,lo2){
    const R=6371,toRad=x=>x*Math.PI/180;
    const dLa=toRad(la2-la1),dLo=toRad(lo2-lo1);
    const a=Math.sin(dLa/2)**2+Math.cos(toRad(la1))*Math.cos(toRad(la2))*Math.sin(dLo/2)**2;
    return Math.round(R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))*10)/10;
  }

  // Construit la requête Overpass : pour chaque tag, on cherche nodes+ways+relations
  const filterParts = tags.map(t=>{
    const [k,v]=t.split('=');
    return `node["${k}"="${v}"](around:${radiusMeters},${lat},${lng});`+
           `way["${k}"="${v}"](around:${radiusMeters},${lat},${lng});`+
           `relation["${k}"="${v}"](around:${radiusMeters},${lat},${lng});`;
  }).join('');
  const overpassQ = `[out:json][timeout:15];(${filterParts});out center 100;`;
  const url = 'https://overpass-api.de/api/interpreter?data=' + encodeURIComponent(overpassQ);

  let results = [];
  const seenNames = new Set();

  try {
    const res = await fetchWithTimeout(url, {}, 14000);
    if(!res.ok) throw new Error('Overpass HTTP ' + res.status);
    const data = await res.json();
    const named = (data.elements || []).filter(e=>(e.tags||{}).name);

    for(const e of named){
      const tagsE = e.tags || {};
      const elat = e.lat || (e.center && e.center.lat);
      const elon = e.lon || (e.center && e.center.lon);
      if(!elat || !elon) continue;
      const nom = tagsE.name;
      const key = nom.toLowerCase().trim();
      if(seenNames.has(key)) continue;
      seenNames.add(key);
      const dist = haversine(lat, lng, elat, elon);
      const addr = [tagsE['addr:housenumber'], tagsE['addr:street'], tagsE['addr:postcode'], tagsE['addr:city']]
        .filter(Boolean).join(' ');
      results.push({
        id: results.length,
        nom: nom,
        categorie: catLabel,
        description: addr || tagsE['addr:city'] || 'Adresse non renseignée',
        tel: tagsE.phone || tagsE['contact:phone'] || '',
        site: (tagsE.website || tagsE['contact:website'] || '').replace(/^https?:\/\//,''),
        distance: dist,
        adresse: addr,
        lat: elat,
        lng: elon
      });
    }
  } catch(err){
    console.warn('[search] Overpass error:', err.message);
    if(wrap) wrap.innerHTML = `
      <div style="text-align:center;padding:16px;font-size:13px;color:${tl};">
        <div style="margin-bottom:8px;">Le serveur OpenStreetMap est temporairement indisponible.</div>
        <a href="https://www.google.com/search?q=${encodeURIComponent(catLabel + " mariage")}" target="_blank" rel="noopener" style="display:inline-block;padding:10px 18px;background:linear-gradient(135deg,#fff8ec,#fef5e0);border:1.5px solid ${gd}50;border-radius:12px;text-decoration:none;color:${tx};font-size:13px;font-weight:700;font-family:Lora,serif;">
          🔎 Chercher ${catLabel.toLowerCase()} sur Google
        </a>
      </div>`;
    return;
  }

  results = results.sort((a,b)=>a.distance - b.distance).slice(0, 30);

  if(!results.length){
    if(wrap) wrap.innerHTML = `
      <div style="text-align:center;padding:16px;font-size:13px;color:${tl};">
        <div style="margin-bottom:8px;">Aucun ${catLabel.toLowerCase()} trouvé dans un rayon de ${Math.round(radiusMeters/1000)} km.</div>
        <div style="font-size:11px;font-style:italic;margin-bottom:14px;">Essaie d'augmenter le rayon avec le slider, ou consulte Google Maps.</div>
        <a href="https://www.google.com/search?q=${encodeURIComponent(catLabel + " mariage")}" target="_blank" rel="noopener" style="display:inline-block;padding:10px 18px;background:linear-gradient(135deg,#fff8ec,#fef5e0);border:1.5px solid ${gd}50;border-radius:12px;text-decoration:none;color:${tx};font-size:13px;font-weight:700;font-family:Lora,serif;">
          🔎 Chercher sur Google
        </a>
      </div>`;
    return;
  }

  window._vndResults = results;
  renderVndResults(catLabel);
}

async function searchVendorsWithLocation(query,lat,lng){
  const btn=el('vnd-btn');btn.textContent='Recherche...';btn.disabled=true;
  const wrap=el('vnd-results-wrap');
  if(wrap)wrap.innerHTML=`<p style="text-align:center;padding:14px;font-size:12px;color:${tl};">🔍 Recherche en cours...</p>`;

  // ─── RECHERCHE RÉELLE VIA OPENSTREETMAP ───
  // Si on a une position : Overpass API (rayon autour du point)
  // Sinon : Nominatim (recherche par texte en France)

  // Mappe le terme cherché vers une catégorie OSM (tag amenity/shop/craft)
  // et un type de business pour l'affichage.
  // Couvre les 18 catégories de l'onglet Budget avec des tags précis.
  const q=query.toLowerCase();
  function osmFilters(){
    // ─── Lieu de réception / Salle ───
    if(q.includes('lieu de réception')||q.includes('lieu de reception')||q.includes('salle')||
       q.includes('domaine')||q.includes('château')||q.includes('chateau')||q.includes('réception')||
       q.includes('reception')||q.includes('venue')||q.includes('mariage'))
      return {f:['amenity=events_venue','amenity=conference_centre','amenity=community_centre',
                 'tourism=hotel','historic=castle','building=castle','leisure=resort'],cat:'Lieu/Salle'};

    // ─── Traiteur (PAS restaurant) ───
    if(q.includes('traiteur')||q.includes('catering'))
      return {f:['shop=caterer','craft=caterer','craft=catering','amenity=catering'],cat:'Traiteur'};

    // ─── Photographe ───
    if(q.includes('photographe')||q.includes('photograph'))
      return {f:['shop=photo','craft=photographer','office=photographer'],cat:'Photographe'};

    // ─── Vidéaste ───
    if(q.includes('vidéaste')||q.includes('videaste')||q.includes('vidéo')||q.includes('video')||
       q.includes('cameraman')||q.includes('filmaker')||q.includes('film'))
      return {f:['craft=videographer','office=videographer','shop=video'],cat:'Vidéaste'};

    // ─── DJ / Musique ───
    if(q.includes('dj')||q.includes('musique')||q.includes('musicien')||q.includes('orchestre')||
       q.includes('groupe de musique')||q.includes('groupe musical')||q.includes('animation musicale'))
      return {f:['craft=musical_instrument','shop=musical_instrument','office=dj','shop=music'],cat:'DJ/Musique'};

    // ─── Officiant ───
    if(q.includes('officiant')||q.includes('céremon')||q.includes('ceremon')||q.includes('curé')||
       q.includes('cure')||q.includes('prêtre')||q.includes('pretre')||q.includes('rabbin')||q.includes('imam'))
      return {f:['amenity=place_of_worship','office=religion'],cat:'Officiant'};

    // ─── Fleuriste ───
    if(q.includes('fleuriste')||q.includes('fleur')||q.includes('bouquet'))
      return {f:['shop=florist'],cat:'Fleuriste'};

    // ─── Robe de mariée ───
    if(q.includes('robe de mariée')||q.includes('robe de mariee')||q.includes('robe')||
       q.includes('mariée')||q.includes('mariee')||q.includes('bridal'))
      return {f:['shop=wedding_contract','shop=bridal'],cat:'Robe mariée'};

    // ─── Costumier / Tailleur ───
    if(q.includes('costumier')||q.includes('tailleur')||q.includes('costume')||q.includes('smoking')||
       q.includes('marié homme')||q.includes('marie homme'))
      return {f:['craft=tailor','shop=tailor','shop=clothes'],cat:'Costume/Tailleur'};

    // ─── Coiffeur ───
    if(q.includes('coiff'))
      return {f:['shop=hairdresser','shop=hairdresser_supply'],cat:'Coiffeur'};

    // ─── Maquilleur / Esthéticien ───
    if(q.includes('maquill')||q.includes('estheti')||q.includes('esthéti')||q.includes('beaut')||
       q.includes('makeup')||q.includes('institut'))
      return {f:['shop=beauty','shop=cosmetics','leisure=spa'],cat:'Maquillage/Beauté'};

    // ─── Accessoiriste / Bijouterie ───
    if(q.includes('accessoir')||q.includes('bijou')||q.includes('alliance')||q.includes('bague'))
      return {f:['shop=jewelry','shop=accessories'],cat:'Bijoutier/Accessoires'};

    // ─── Location de matériel ───
    if(q.includes('location de matériel')||q.includes('location de materiel')||
       q.includes('matériel')||q.includes('materiel')||q.includes('location événement')||
       q.includes('location event'))
      return {f:['shop=rental','amenity=rental'],cat:'Location matériel'};

    // ─── Animateur / DJ events ───
    if(q.includes('animateur')||q.includes('magicien')||q.includes('artiste')||q.includes('spectacle')||
       q.includes('animation'))
      return {f:['office=event_management','shop=art','craft=artist'],cat:'Animation'};

    // ─── Imprimeur / Faire-parts ───
    if(q.includes('imprimeur')||q.includes('imprimerie')||q.includes('faire-part')||q.includes('faire part')||
       q.includes('papeterie')||q.includes('print'))
      return {f:['shop=stationery','shop=copyshop','craft=printer','shop=print'],cat:'Imprimeur'};

    // ─── Location de véhicule / Voiture ───
    if(q.includes('voiture')||q.includes('limousine')||q.includes('location auto')||
       q.includes('location de véhicule')||q.includes('location de vehicule')||q.includes('véhicule')||
       q.includes('vehicule')||q.includes('chauffeur'))
      return {f:['amenity=car_rental','shop=car','office=taxi'],cat:'Véhicule'};

    // ─── Navettes / Transport ───
    if(q.includes('navette')||q.includes('transport')||q.includes('bus')||q.includes('autocar')||
       q.includes('minibus'))
      return {f:['office=travel_agent','amenity=bus_station','amenity=taxi'],cat:'Transport'};

    // ─── Hébergement / Hôtel ───
    if(q.includes('hébergement')||q.includes('hebergement')||q.includes('hôtel')||q.includes('hotel')||
       q.includes('gîte')||q.includes('gite')||q.includes('chambres d\'hôtes')||q.includes('logement'))
      return {f:['tourism=hotel','tourism=guest_house','tourism=apartment','tourism=hostel','tourism=motel'],cat:'Hébergement'};

    // ─── Pâtisserie / Wedding cake ───
    if(q.includes('boulang')||q.includes('patiss')||q.includes('pâtiss')||q.includes('gateau')||
       q.includes('gâteau')||q.includes('wedding cake')||q.includes('cake')||q.includes('pièce montée')||
       q.includes('piece montee'))
      return {f:['shop=bakery','shop=pastry','shop=confectionery','craft=confectioner'],cat:'Pâtisserie/Cake'};

    // ─── Décoration ───
    if(q.includes('décor')||q.includes('decor')||q.includes('event design')||q.includes('wedding planner')||
       q.includes('organisateur'))
      return {f:['shop=interior_decoration','craft=upholsterer','office=event_management'],cat:'Décoration/Planner'};

    // ─── Défaut : pas de filtre type, recherche par nom ───
    return {f:null,cat:'Prestataire'};
  }
  const {f:filters,cat}=osmFilters();

  // Distance Haversine (m → km arrondi 1 décimale)
  function haversine(la1,lo1,la2,lo2){
    const R=6371,toRad=x=>x*Math.PI/180;
    const dLa=toRad(la2-la1),dLo=toRad(lo2-lo1);
    const a=Math.sin(dLa/2)**2+Math.cos(toRad(la1))*Math.cos(toRad(la2))*Math.sin(dLo/2)**2;
    return Math.round(R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))*10)/10;
  }

  // Helper fetch avec timeout dur (sinon une API lente bloque l'UI indéfiniment)
  async function fetchWithTimeout(url, opts={}, timeoutMs=10000){
    const ctrl = new AbortController();
    const tid = setTimeout(()=>ctrl.abort(), timeoutMs);
    try {
      const r = await fetch(url, {...opts, signal: ctrl.signal});
      return r;
    } finally {
      clearTimeout(tid);
    }
  }

  let results=[];
  const seenNames=new Set();

  // try/finally pour GARANTIR la réactivation du bouton même si une exception survient
  try{
    if(lat&&lng&&filters){
      // ─── ÉTAPE 1 : OVERPASS API (peut échouer ou timeout, on tolère) ───
      try {
        // Un seul rayon (40 km) pour aller vite et éviter les timeouts.
        // Si Overpass est rapide on récupère assez de résultats sans retry.
        const radius = 40000;
        const filterParts = filters.map(f=>{
          const [k,v]=f.split('=');
          return `node["${k}"="${v}"](around:${radius},${lat},${lng});`+
                 `way["${k}"="${v}"](around:${radius},${lat},${lng});`;
        }).join('');

        // Recherche par nom : si le nom contient le terme cherché
        const mainWord = q.split(/\s+/).find(w=>w.length>=4 && !['mariage','wedding'].includes(w));
        let nameSearch = '';
        if(mainWord){
          const safeWord = mainWord.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
          nameSearch = `node["name"~"${safeWord}",i](around:${radius},${lat},${lng});`+
                       `way["name"~"${safeWord}",i](around:${radius},${lat},${lng});`;
        }

        // timeout Overpass interne court (8s), pour éviter d'attendre 25s
        const overpassQ = `[out:json][timeout:8];(${filterParts}${nameSearch});out center 60;`;
        const url = 'https://overpass-api.de/api/interpreter?data='+encodeURIComponent(overpassQ);
        const res = await fetchWithTimeout(url, {}, 10000);
        if(res.ok){
          const data = await res.json();
          const named = (data.elements||[]).filter(e=>(e.tags||{}).name);
          for(const e of named){
            const tags = e.tags||{};
            const elat = e.lat || (e.center&&e.center.lat);
            const elon = e.lon || (e.center&&e.center.lon);
            if(!elat||!elon) continue;
            const nom = tags.name;
            const key = nom.toLowerCase().trim();
            if(seenNames.has(key)) continue;
            seenNames.add(key);
            const dist = haversine(lat,lng,elat,elon);
            const addr = [tags['addr:housenumber'],tags['addr:street'],tags['addr:postcode'],tags['addr:city']]
              .filter(Boolean).join(' ');
            results.push({
              id: results.length,
              nom: nom,
              categorie: cat,
              description: addr||tags['addr:city']||'Adresse non renseignée',
              tel: tags.phone||tags['contact:phone']||'',
              site: (tags.website||tags['contact:website']||'').replace(/^https?:\/\//,''),
              distance: dist,
              adresse: addr,
              lat: elat,
              lng: elon
            });
          }
        }
      } catch(overpassErr){
        // Overpass timeout ou réseau → on bascule sur Nominatim, sans bloquer
        console.warn('[search] Overpass failed:', overpassErr.message);
      }

      // ─── ÉTAPE 2 : NOMINATIM (toujours essayé, même si Overpass a marché) ───
      // Nominatim trouve souvent des établissements moins bien taggés.
      try {
        const dLat = 0.45, dLng = 0.65;
        const viewbox = `${lng-dLng},${lat+dLat},${lng+dLng},${lat-dLat}`;
        const nurl = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&addressdetails=1&limit=30&viewbox=${viewbox}&bounded=1&countrycodes=fr,be,ch,lu`;
        const nres = await fetchWithTimeout(nurl, {headers:{'Accept-Language':'fr'}}, 8000);
        if(nres.ok){
          const ndata = await nres.json();
          ndata.forEach((e,idx)=>{
            const nom = (e.display_name||'').split(',')[0].trim();
            if(!nom) return;
            const key = nom.toLowerCase();
            if(seenNames.has(key)) return;
            seenNames.add(key);
            const elat = parseFloat(e.lat), elon = parseFloat(e.lon);
            if(isNaN(elat)||isNaN(elon)) return;
            const dist = haversine(lat,lng,elat,elon);
            const a = e.address||{};
            const adresse = [a.house_number,a.road,a.postcode,a.city||a.town||a.village]
              .filter(Boolean).join(' ');
            results.push({
              id: 10000 + idx,
              nom: nom,
              categorie: cat,
              description: adresse||e.display_name,
              tel: '',
              site: '',
              distance: dist,
              adresse: adresse,
              lat: elat,
              lng: elon
            });
          });
        }
      } catch(nomErr){
        console.warn('[search] Nominatim geo failed:', nomErr.message);
      }

      results = results.sort((a,b)=>a.distance-b.distance).slice(0,25);

    } else {
      // ─── PAS DE GÉOLOC : Nominatim sur la France entière ───
      try {
        const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query+' France')}&format=json&addressdetails=1&limit=15`;
        const res = await fetchWithTimeout(url, {headers:{'Accept-Language':'fr'}}, 8000);
        if(res.ok){
          const data = await res.json();
          results = (data||[]).map((e,idx)=>{
            const addr = e.address||{};
            const adresse = [addr.house_number,addr.road,addr.postcode,addr.city||addr.town||addr.village]
              .filter(Boolean).join(' ');
            return {
              id: idx,
              nom: e.display_name.split(',')[0],
              categorie: cat,
              description: adresse||e.display_name,
              tel: '',
              site: '',
              distance: null,
              adresse: adresse,
              lat: parseFloat(e.lat),
              lng: parseFloat(e.lon)
            };
          });
        }
      } catch(nomErr){
        console.warn('[search] Nominatim text failed:', nomErr.message);
      }
    }
  } finally {
    // GARANTIT que le bouton se réactive, quoi qu'il arrive
    btn.textContent='Rechercher'; btn.disabled=false;
  }

  // Rendu des résultats (ou message si vide)
  if(!results.length){
    // Aucun résultat OSM : on propose directement Google Maps
    const lat0=lat, lng0=lng;
    const googleUrl = (lat0&&lng0)
      ? `https://www.google.com/search?q=${encodeURIComponent(query + " mariage")}`
      : `https://www.google.com/search?q=${encodeURIComponent(query + " mariage")}`;
    if(wrap)wrap.innerHTML=`
      <div style="text-align:center;padding:16px;font-size:13px;color:${tl};">
        <div style="margin-bottom:8px;">Aucun résultat trouvé pour "${h(query)}" sur OpenStreetMap.</div>
        <div style="font-size:11px;font-style:italic;margin-bottom:14px;">OpenStreetMap est une base collaborative ; certains prestataires n'y sont pas répertoriés.</div>
        <a href="${googleUrl}" target="_blank" rel="noopener" style="display:inline-block;padding:10px 18px;background:linear-gradient(135deg,#fff8ec,#fef5e0);border:1.5px solid ${gd}50;border-radius:12px;text-decoration:none;color:${tx};font-size:13px;font-weight:700;font-family:Lora,serif;">
          🔎 Chercher sur Google
        </a>
      </div>`;
    return;
  }

  window._vndResults = results;
  renderVndResults(query);
}

function renderVndResults(query){
  const r=window._vndResults||[];const wrap=el('vnd-results-wrap');if(!wrap||!r.length)return;
  // Construction d'une URL Google Maps de fallback pour la query complète
  // (utile si OSM n'a pas tout — l'utilisateur peut compléter via Google)
  const lat=window._userLat, lng=window._userLng;
  const googleSearchUrl = (lat&&lng)
    ? `https://www.google.com/search?q=${encodeURIComponent(query + " mariage")}`
    : `https://www.google.com/search?q=${encodeURIComponent(query + " mariage")}`;

  const fewResults = r.length < 8;

  wrap.innerHTML=`<div style="font-family:Playfair Display,serif;font-size:15px;color:${tx};margin-bottom:6px;">${r.length} résultat${r.length>1?'s':''} pour "${h(query)}"</div>`+
  `<div style="font-size:11px;color:${tl};margin-bottom:10px;font-style:italic;">📍 Données OpenStreetMap — triées par distance${fewResults?' · OSM est incomplet, voir Google Maps en bas pour plus de résultats':''}</div>`+
  r.map((v,i)=>{
    const c=VCOLS[v.categorie]||pk;
    const mapsUrl=v.lat&&v.lng?`https://www.google.com/maps/search/?api=1&query=${v.lat},${v.lng}`:'';
    return`<div class="card" style="margin-bottom:8px;overflow:hidden;">
      <div onclick="toggleVndResult(${i})" style="padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;background:linear-gradient(135deg,${sf},#fff);">
        <span style="background:${c}20;color:${c};font-size:10px;border-radius:20px;padding:3px 10px;font-weight:700;flex-shrink:0;">${h(v.categorie)}</span>
        <span style="font-family:Playfair Display,serif;font-size:14px;font-weight:700;color:${tx};flex:1;">${h(v.nom)}</span>
        ${v.distance!=null?`<span style="background:#f0f8f0;color:${gn};border-radius:8px;padding:3px 8px;font-size:11px;font-weight:700;flex-shrink:0;">📍 ${v.distance} km</span>`:''}
        <span style="font-size:13px;color:${tl};">▼</span>
      </div>
      <div id="vnd-detail-${i}" style="display:none;padding:12px 14px;border-top:1px solid ${br};">
        ${v.adresse?`<div style="font-size:12px;color:${tl};margin-bottom:8px;line-height:1.5;">📍 ${h(v.adresse)}</div>`:''}
        <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;">
          ${v.tel?`<a href="tel:${v.tel}" style="background:${sf};color:${pk};border-radius:8px;padding:6px 10px;font-size:11px;text-decoration:none;font-weight:700;">📞 ${h(v.tel)}</a>`:''}
          ${v.site
            ? `<a href="https://${v.site.replace(/^https?:\/\//,'')}" target="_blank" rel="noopener" style="background:${sf};color:${pk};border-radius:8px;padding:6px 10px;font-size:11px;text-decoration:none;font-weight:700;">🌐 Site web</a>`
            : `<a href="https://www.google.com/search?q=${encodeURIComponent(v.nom+' '+(v.categorie||'')+' '+(v.adresse||''))}" target="_blank" rel="noopener" style="background:${sf};color:${pk};border-radius:8px;padding:6px 10px;font-size:11px;text-decoration:none;font-weight:700;">🌐 Trouver le site</a>`}
          ${mapsUrl?`<a href="${mapsUrl}" target="_blank" rel="noopener" style="background:#f0f8f0;color:${gn};border-radius:8px;padding:6px 10px;font-size:11px;text-decoration:none;font-weight:700;">🗺️ Itinéraire</a>`:''}
        </div>
        <button onclick="addToFav(${i})" style="width:100%;background:${VENDORS_FAV.find(f=>f.nom===v.nom)?'#f0f8f0':'linear-gradient(135deg,'+pk+',#b84060)'};color:${VENDORS_FAV.find(f=>f.nom===v.nom)?gn:'#fff'};border:none;border-radius:9px;padding:9px;cursor:pointer;font-size:13px;font-weight:700;font-family:Lora,serif;">
          ${VENDORS_FAV.find(f=>f.nom===v.nom)?'✓ Déjà dans les favoris':'+ Ajouter aux favoris'}
        </button>
      </div>
    </div>`;
  }).join('')+
  // Lien Google Maps en bas pour compléter (OSM est incomplet sur certains commerces)
  `<a href="${googleSearchUrl}" target="_blank" rel="noopener" style="display:block;margin-top:14px;padding:12px;background:linear-gradient(135deg,#fff8ec,#fef5e0);border:1.5px solid ${gd}50;border-radius:12px;text-align:center;text-decoration:none;color:${tx};font-size:13px;font-weight:700;font-family:Lora,serif;">
    🔎 Voir plus de résultats sur Google
    <div style="font-size:10px;color:${tl};font-weight:400;margin-top:3px;font-style:italic;">Google a souvent plus de prestataires qu'OpenStreetMap</div>

function toggleVndResult(i){
  const d=el('vnd-detail-'+i);if(d)d.style.display=d.style.display==='none'?'block':'none';

function vndMiniCard(v,zone){

      ${v.site?`<a href="https://${v.site.replace(/^https?:\/\//,'')}" target="_blank" rel="noopener" style="font-size:11px;color:${pk};font-weight:700;text-decoration:none;">🌐 Site</a>`:''}

    </div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
      <span style="font-size:11px;color:${tl};font-weight:600;flex-shrink:0;">💰 Prix négocié :</span>
      <input type="text" value="${v.prix_perso||''}" placeholder="Indiquer le prix..." onchange="updVndPrice(${v.id},'${zone}',this.value)" style="flex:1;border:1px solid ${br};border-radius:7px;padding:5px 9px;font-size:12px;outline:none;background:#fffafc;">
    </div>
    ${zone==='fav'?
      `<button onclick="movToChosen(${v.id})" style="width:100%;background:#f0f8f0;color:${gn};border:1px solid ${gn}30;border-radius:8px;padding:7px;cursor:pointer;font-size:12px;font-weight:700;font-family:Lora,serif;">→ Déplacer vers Choisis</button>`:
      `<button onclick="movToFav(${v.id})" style="width:100%;background:${sf};color:${tl};border:1px solid ${br};border-radius:8px;padding:7px;cursor:pointer;font-size:12px;font-weight:700;font-family:Lora,serif;">← Remettre en Favoris</button>`}
  </div>`;
}
function updVndPrice(id,zone,val){
  if(zone==='fav')VENDORS_FAV=VENDORS_FAV.map(v=>v.id===id?{...v,prix_perso:val}:v);
  else VENDORS_CHO=VENDORS_CHO.map(v=>v.id===id?{...v,prix_perso:val}:v);
  sv(`vfav_${USER.email}`,VENDORS_FAV);sv(`vcho_${USER.email}`,VENDORS_CHO);
}
let dragVndId=null,dragVndZone=null;
function dragVnd(e,id,zone){dragVndId=id;dragVndZone=zone;e.dataTransfer.effectAllowed='move';}
function dropToFav(e){e.preventDefault();if(!dragVndId)return;if(dragVndZone==='cho'){movToFav(dragVndId);}dragVndId=null;}
function dropToChosen(e){e.preventDefault();if(!dragVndId)return;if(dragVndZone==='fav'){movToChosen(dragVndId);}dragVndId=null;}
function movToFav(id){const v=VENDORS_CHO.find(c=>c.id===id);if(!v)return;VENDORS_CHO=VENDORS_CHO.filter(c=>c.id!==id);if(!VENDORS_FAV.find(f=>f.id===id))VENDORS_FAV.push(v);sv(`vfav_${USER.email}`,VENDORS_FAV);sv(`vcho_${USER.email}`,VENDORS_CHO);renderFavs();renderChosen();}
function renderFavs(){
  const d=el('vnd-favs');if(!d)return;
  d.innerHTML=VENDORS_FAV.length===0
    ?`<div style="background:${sf};border:2px dashed ${br};border-radius:12px;padding:16px;text-align:center;color:${tl};font-size:13px;font-style:italic;">Ajoutez des prestataires depuis la recherche</div>`
    :vSort(VENDORS_FAV,sortFav).map(v=>vndMiniCard(v,'fav')).join('');

}
function renderChosen(){

    ?`<div style="background:${sf};border:2px dashed ${br};border-radius:12px;padding:16px;text-align:center;color:${tl};font-size:13px;font-style:italic;">Glissez vos favoris ici ou cliquez sur "Déplacer"</div>`
    :vSort(VENDORS_CHO,sortCho).map(v=>vndMiniCard(v,'cho')).join('');
  const cnt=el('cho-cnt');if(cnt)cnt.textContent=VENDORS_CHO.length;
}

function toggleMenuItem(si,ii,checked){
  MENU[si].items[ii].done=checked;
  saveMenu();renderMenu();
}
function removeMenuItem(si,ii){
  MENU[si].items.splice(ii,1);
  saveMenu();renderMenu();
}
function addMenuItem(si){
  const inp=document.getElementById('menu-add-'+si);
  if(!inp||!inp.value.trim())return;
  MENU[si].items.push({id:Date.now(),text:inp.value.trim(),done:false});
  saveMenu();renderMenu();
}
function saveMenu(){sv('menu_'+USER.email,MENU);}
async function resetMenu(){
  if(await appConfirm('Réinitialiser le menu par défaut ? Vos modifications seront perdues.')){
    MENU = DEF_MENU.map(s=>({...s, items:s.items.map(i=>({...i}))}));
    saveMenu(); renderMenu();
  }
}
function addMenuCategory(){
  const inp=document.getElementById('menu-new-cat');
  if(!inp||!inp.value.trim())return;
  MENU.push({id:Date.now(),section:inp.value.trim(),items:[]});
  inp.value='';saveMenu();renderMenu();
}
async function removeMenuCategory(si){
  if(MENU[si].items.length>0 && !await appConfirm('Supprimer cette catégorie et tous ses plats ?'))return;
  MENU.splice(si,1);saveMenu();renderMenu();
}
function renameMenuCategory(si){
  const span=document.querySelector('[data-menu-cat="'+si+'"]');
  if(!span)return;
  const old=MENU[si].section;
  const inp=document.createElement('input');
  inp.value=old;
  inp.style.cssText='flex:1;font-size:13px;font-weight:700;color:#d4607a;border:none;border-bottom:2px solid #d4607a;outline:none;background:transparent;text-transform:uppercase;letter-spacing:1px;width:100%;';
  span.replaceWith(inp);inp.focus();inp.select();
  function save(){if(inp.value.trim())MENU[si].section=inp.value.trim();saveMenu();renderMenu();}
  inp.addEventListener('blur',save);
  inp.addEventListener('keydown',function(e){if(e.key==='Enter')inp.blur();if(e.key==='Escape'){MENU[si].section=old;renderMenu();}});
}
function renameMenuItem(si,ii){
  const span=document.querySelector('[data-menu="'+si+'-'+ii+'"]');
  if(!span)return;
  const old=MENU[si].items[ii].text;
  const inp=document.createElement('input');
  inp.value=old;
  inp.style.cssText='flex:1;font-size:13px;border:1.5px solid #d4607a;border-radius:6px;padding:2px 6px;outline:none;font-family:Lora,serif;';
  span.replaceWith(inp);
  inp.focus();inp.select();
  function save(){

function getDecoData(){
  const custom = ld('deco_custom_'+USER.email, {});
  const result = {};
  for(const [cat, items] of Object.entries(DECO_ITEMS)){
    result[cat] = custom[cat] !== undefined ? custom[cat] : [...items];
  }
  for(const [cat, items] of Object.entries(custom)){
    if(!(cat in DECO_ITEMS)) result[cat] = items;
  }
  return result;
}

function saveDecoData(data){ sv('deco_custom_'+USER.email, data); }
async function resetDecorations(){
  if(await appConfirm('Réinitialiser les décorations par défaut ? Vos modifications seront perdues.')){
    sv('deco_custom_'+USER.email, {});
    sv('deco_'+USER.email, {});
    renderDecorations();
  }
}
function addDecoCategory(){
  const inp=document.getElementById('deco-new-cat');
  if(!inp||!inp.value.trim())return;
  const data=getDecoData();
  data[inp.value.trim()]=[];
  saveDecoData(data);inp.value='';renderDecorations();
}
async function removeDecoCategory(cat){
  const data=getDecoData();
  const count=(data[cat]||[]).length;
  if(count>0&&!await appConfirm('Supprimer cette catégorie et ses '+count+' éléments ?'))return;
  delete data[cat];saveDecoData(data);renderDecorations();
}
function renameDecoCategory(cat,catIdx){
  const el=document.querySelector('[data-deco-cat="'+cat+'"]');
  if(!el)return;
  const data=getDecoData();
  const items=data[cat]||[];
  const inp=document.createElement('input');
  inp.value=cat;
  inp.style.cssText='font-family:Playfair Display,serif;font-size:15px;font-weight:700;color:#3e1828;border:none;border-bottom:2px solid #d4607a;outline:none;background:transparent;width:100%;';
  el.replaceWith(inp);inp.focus();inp.select();
  function save(){
    const newName=inp.value.trim();
    if(newName&&newName!==cat){
      delete data[cat];data[newName]=items;saveDecoData(data);
    }
    renderDecorations();
  }
  inp.addEventListener('blur',save);
  inp.addEventListener('keydown',function(e){if(e.key==='Enter')inp.blur();if(e.key==='Escape'){renderDecorations();}});
}

function toggleDecoSection(idx){
  const sec = document.getElementById('deco-section-'+idx);
  const arr = document.getElementById('deco-arrow-'+idx);
  if(!sec) return;
  const open = sec.style.display !== 'none';
  sec.style.display = open ? 'none' : 'block';
  if(arr) arr.style.transform = open ? 'rotate(0deg)' : 'rotate(180deg)';
}

function toggleDecoItem(cat, i, checked){
  const saved = ld('deco_'+USER.email, {});
  saved[cat+i] = checked;
  sv('deco_'+USER.email, saved);
  renderDecorations();
}

function addDecoItem(cat, catIdx){
  const inp = document.getElementById('deco-add-'+catIdx);
  if(!inp || !inp.value.trim()) return;
  const data = getDecoData();
  if(!data[cat]) data[cat] = [];
  data[cat].push(inp.value.trim());
  saveDecoData(data);
  renderDecorations();
}

function removeDecoItem(cat, i){
  const data = getDecoData();
  if(!data[cat]) return;
  data[cat].splice(i, 1);
  saveDecoData(data);
  renderDecorations();
}

function renameDecoItem(cat, i){
  const span=document.querySelector('[data-deco="'+CSS.escape(cat)+'-'+i+'"]');
  if(!span){
    const data=getDecoData();
    if(!data[cat])return;
    return;
  }
  const data=getDecoData();
  const old=data[cat][i];
  const inp=document.createElement('input');
  inp.value=old;
  inp.style.cssText='flex:1;font-size:13px;border:1.5px solid #d4607a;border-radius:6px;padding:2px 6px;outline:none;font-family:Lora,serif;';
  span.replaceWith(inp);
  inp.focus();inp.select();
  function save(){
    if(inp.value.trim())data[cat][i]=inp.value.trim();
    saveDecoData(data);renderDecorations();
  }
  inp.addEventListener('blur',save);
  inp.addEventListener('keydown',function(e){if(e.key==='Enter')inp.blur();if(e.key==='Escape'){data[cat][i]=old;renderDecorations();}});
}

async function saveDriveUrl(){
  const url = document.getElementById('drive-url-input')?.value.trim();
  if(!url){await appAlert('Veuillez entrer un lien.');return;}
  sv('drive_url_'+USER.email, url);
  if(window.firebaseDB && window.firebaseLib){
    const {doc, setDoc} = window.firebaseLib;
    const albumId = btoa(USER.email).replace(/[^a-zA-Z0-9]/g,'').substring(0,20);
    setDoc(doc(window.firebaseDB,'mariages',albumId),{driveUrl:url},{merge:true}).catch(e=>console.warn(e));
  }
  renderAlbum();
}

function getCurrentDriveUrl(){ return ld('drive_url_'+USER.email, ''); }

async function shareCurrentDriveUrl(){
  const url = getCurrentDriveUrl();
  if(!url){await appAlert('Aucun lien enregistré.');return;}
  if(navigator.share){navigator.share({title:'Album photo de notre mariage',text:'Ajoutez vos photos !',url});}
  else{copyCurrentDriveUrl();}
}

async function copyCurrentDriveUrl(){
  const url = getCurrentDriveUrl();
  if(!url){await appAlert('Aucun lien enregistré.');return;}
  try{
    const ta=document.createElement('textarea');ta.value=url;ta.style.cssText='position:fixed;opacity:0;';
    document.body.appendChild(ta);ta.focus();ta.select();document.execCommand('copy');document.body.removeChild(ta);
    await appAlert('Lien copié !');
  }catch(e){await appPrompt('Copiez ce lien :',url);}
}

  // ─── HELPERS ──────────────────────────────────────────────────────────
  function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
  function shuffle(arr){ const a=arr.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

  // Un plat est-il compatible avec style/saison/budget ?
  function compatible(dish, style, saison, budgetLvl){
    if(dish.b > budgetLvl) return false;            // trop cher pour le budget
    if(dish.st && !dish.st.includes(style)) return false;
    if(dish.sa && !dish.sa.includes(saison)) return false;
    return true;
  }

  // Un plat respecte-t-il les restrictions ? (aucun flag interdit)
  function passesRestrictions(dish, forbiddenFlags){
    return !dish.f.some(flag => forbiddenFlags.has(flag));
  }

  // Convertit les restrictions cochées en flags interdits
  function buildForbiddenFlags(restrictions){
    const forbidden = new Set();
    if(restrictions.includes('vegetarien')){ ['viande','porc','poisson','fruitsmer'].forEach(f=>forbidden.add(f)); }
    if(restrictions.includes('vegan')){ ['viande','porc','poisson','fruitsmer','lactose','oeuf'].forEach(f=>forbidden.add(f)); }
    if(restrictions.includes('sansgluten')) forbidden.add('gluten');
    if(restrictions.includes('sanslactose')) forbidden.add('lactose');
    if(restrictions.includes('halal')){ forbidden.add('porc'); forbidden.add('alcool'); }
    if(restrictions.includes('casher')){ forbidden.add('porc'); forbidden.add('fruitsmer'); }
    if(restrictions.includes('allergie-noix')) forbidden.add('noix');
    return forbidden;
  }

  // Sélectionne 1 plat d'une catégorie compatible + respectant restrictions.
  // Stratégie de repli intelligente : si rien ne respecte tout, on relâche
  // d'abord la saison, puis le style, mais JAMAIS les restrictions.
  function selectDish(category, style, saison, budgetLvl, forbidden, excludeNames){
    excludeNames = excludeNames || new Set();
    const pool = C[category];
    // Niveau 1 : tout respecté
    let cands = pool.filter(d => compatible(d,style,saison,budgetLvl) && passesRestrictions(d,forbidden) && !excludeNames.has(d.nom));
    if(cands.length) return pick(cands);
    // Niveau 2 : relâcher la saison
    cands = pool.filter(d => (!d.st||d.st.includes(style)) && d.b<=budgetLvl && passesRestrictions(d,forbidden) && !excludeNames.has(d.nom));
    if(cands.length) return pick(cands);
    // Niveau 3 : relâcher le style (garder budget + restrictions)
    cands = pool.filter(d => d.b<=budgetLvl && passesRestrictions(d,forbidden) && !excludeNames.has(d.nom));
    if(cands.length) return pick(cands);
    // Niveau 4 : relâcher le budget (garder restrictions — essentiel)
    cands = pool.filter(d => passesRestrictions(d,forbidden) && !excludeNames.has(d.nom));
    if(cands.length) return pick(cands);
    // Niveau 5 : on autorise les déjà-utilisés (dernier recours absolu)
    cands = pool.filter(d => passesRestrictions(d,forbidden) && !excludeNames.has(d.nom));
    if(cands.length) return pick(cands);
    return null; // aucune option restante distincte : la section aura moins d'items
  }

  // Sélectionne N plats distincts d'une catégorie (jamais de doublon)
  function selectMany(category, count, style, saison, budgetLvl, forbidden){
    const used = new Set();
    const out = [];
    for(let i=0;i<count;i++){
      const d = selectDish(category, style, saison, budgetLvl, forbidden, used);
      if(d && !used.has(d.nom)){ out.push(d.nom); used.add(d.nom); }
    }
    // Si on n'a pas atteint le count (pool trop petit après restrictions),
    // on renvoie ce qu'on a, sans répéter. Mieux vaut 3 vrais plats que 6 avec doublons.
    return out;
  }

  // ─── GÉNÉRATEUR PRINCIPAL ───────────────────────────────────────────────
  // params: {style, saison, budget(eco/standard/luxe), format, boissons, restrictions[], invites}
  function generate(params){
    const style = params.style || 'romantique';
    const saison = params.saison || 'printemps';
    const budgetKey = params.budget || 'standard';
    const budgetLvl = BUDGET_LEVEL[budgetKey] || 2;
    const format = params.format || 'assiette';
    const boissonsKey = params.boissons || 'classiques';
    const restrictions = params.restrictions || [];
    const invites = params.invites || 80;
    const forbidden = buildForbiddenFlags(restrictions);

    const out = { style, saison, budgetKey, format, sections: [] };

    // ─── VIN D'HONNEUR (nourriture) — présent dans TOUS les formats sauf le
    //     cocktail dînatoire (où les bouchées constituent déjà tout le repas). ───
    const nbBouchees = budgetLvl === 1 ? 5 : budgetLvl === 2 ? 7 : 9;
    if(format !== 'cocktail'){
      const vh = selectMany('vinhonneur', nbBouchees, style, saison, budgetLvl, forbidden);
      out.sections.push({titre:'Vin d\'honneur · '+nbBouchees+' bouchées/pers conseillées', items:vh});
    }

    // Structure selon le FORMAT
    if(format === 'assiette'){
      const entree = selectDish('entrees', style, saison, budgetLvl, forbidden);
      const plat = selectDish('plats', style, saison, budgetLvl, forbidden);
      const dessert = selectDish('desserts', style, saison, budgetLvl, forbidden);
      out.sections.push({titre:'Entrée', items:[entree?entree.nom:'À composer avec le traiteur']});
      out.sections.push({titre:'Plat principal', items:[plat?plat.nom:'À composer avec le traiteur']});
      if(budgetLvl>=2){ const fromage=selectDish('fromages',style,saison,budgetLvl,forbidden); if(fromage) out.sections.push({titre:'Fromage', items:[fromage.nom]}); }
      out.sections.push({titre:'Dessert', items:[dessert?dessert.nom:'À composer avec le traiteur']});
    }
    else if(format === 'buffet'){
      out.sections.push({titre:'Salades & entrées', items:selectMany('salades',3,style,saison,budgetLvl,forbidden).concat(selectMany('entrees',2,style,saison,budgetLvl,forbidden))});
      out.sections.push({titre:'Plats chauds', items:selectMany('plats',3,style,saison,budgetLvl,forbidden)});
      out.sections.push({titre:'Accompagnements', items:selectMany('accompagnements',3,style,saison,budgetLvl,forbidden)});
      const from = selectMany('fromages',2,style,saison,budgetLvl,forbidden); if(from.length) out.sections.push({titre:'Fromages', items:from});
      out.sections.push({titre:'Desserts', items:selectMany('desserts',4,style,saison,budgetLvl,forbidden)});
    }
    else if(format === 'cocktail'){
      // Le cocktail dînatoire EST le repas : plus de bouchées, pas de vin d'honneur séparé
      out.sections.push({titre:'Pièces froides', items:selectMany('bouchees_froides',7,style,saison,budgetLvl,forbidden)});
      out.sections.push({titre:'Pièces chaudes', items:selectMany('bouchees_chaudes',7,style,saison,budgetLvl,forbidden)});
      out.sections.push({titre:'Mini-desserts', items:selectMany('mini_desserts',5,style,saison,budgetLvl,forbidden)});
    }
    else if(format === 'foodtruck'){
      out.sections.push({titre:'Stands food-truck', items:selectMany('foodtruck',4,style,saison,budgetLvl,forbidden)});
      out.sections.push({titre:'À grignoter', items:selectMany('bouchees_froides',3,style,saison,budgetLvl,forbidden)});
      out.sections.push({titre:'Desserts nomades', items:selectMany('mini_desserts',3,style,saison,budgetLvl,forbidden)});
    }
    else if(format === 'garden'){
      out.sections.push({titre:'Buffet de salades raffinées', items:selectMany('salades',4,style,saison,budgetLvl,forbidden)});
      out.sections.push({titre:'Plats à partager', items:selectMany('plats',2,style,saison,budgetLvl,forbidden).concat(selectMany('accompagnements',2,style,saison,budgetLvl,forbidden))});
      const from = selectMany('fromages',2,style,saison,budgetLvl,forbidden); if(from.length) out.sections.push({titre:'Fromages', items:from});
      out.sections.push({titre:'Desserts de jardin', items:selectMany('mini_desserts',3,style,saison,budgetLvl,forbidden).concat(selectMany('desserts',1,style,saison,budgetLvl,forbidden))});
    }

    // Boissons
    out.boissons = C.boissons[boissonsKey] || C.boissons.classiques;

    return out;
  }

  return { generate, _catalogue: C };
})();

  // ─── 5. TIMELINE JOUR J ─────────────────────────────────────────────────
  timeline: {
    // Générée dynamiquement en fonction de l'heure de la cérémonie
    generate: (heureCer, lieuCer, lieuRecep) => {
      // heureCer ex: "15:00"
      const [h, m] = heureCer.split(':').map(n=>parseInt(n,10));
      const minMatin = (h * 60 + m) - 60*5; // début 5h avant la cérémonie
      function tt(min){
        const hh = Math.floor(min/60), mm = min%60;
        return String(hh).padStart(2,'0')+':'+String(mm).padStart(2,'0');
      }
      const cer = h*60+m;
      return [
        {time:tt(cer-300), action:'Réveil tranquille avec un petit déjeuner copieux. Hydratez-vous.'},
        {time:tt(cer-240), action:'Douche, soins et début de la coiffure de la mariée.'},
        {time:tt(cer-180), action:'Maquillage de la mariée. Marié(e) commence à se préparer en parallèle.'},
        {time:tt(cer-150), action:'Photos des préparatifs avec photographe (robe, accessoires, ambiance).'},
        {time:tt(cer-90), action:'Habillage de la mariée. Témoins et famille proche présents.'},
        {time:tt(cer-60), action:'First look (si prévu) — moment intime entre les futurs mariés avant la cérémonie.'},
        {time:tt(cer-30), action:'Départ vers le lieu de cérémonie ('+lieuCer+'). Prévoir 15 min de marge.'},
        {time:tt(cer-15), action:'Arrivée sur place. Cocktail de bienvenue pour les invités.'},
        {time:tt(cer), action:'🎵 CÉRÉMONIE — entrée de la mariée, échange des vœux, alliances.'},
        {time:tt(cer+45), action:'Photos de groupe sur le parvis. Lancer de pétales / riz.'},
        {time:tt(cer+75), action:'Départ vers '+lieuRecep+' pour le vin d\'honneur.'},
        {time:tt(cer+90), action:'🥂 Vin d\'honneur (1h30 environ). Animation, photos, échanges.'},
        {time:tt(cer+180), action:'Entrée en salle. Annonce des mariés. Verre de bienvenue.'},
        {time:tt(cer+210), action:'🍽️ Dîner — entrée. Discours du papa de la mariée traditionnellement.'},
        {time:tt(cer+270), action:'Plat principal. Discours des témoins (10-15 min total max).'},
        {time:tt(cer+330), action:'Fromages et animations (jeux, surprises, vidéos).'},
        {time:tt(cer+390), action:'Découpe du wedding cake. Première danse des mariés.'},
        {time:tt(cer+420), action:'🎶 Ouverture du bal. Ambiance dansante.'},
        {time:tt(cer+480), action:'Service du brunch / nuit blanche / cocktails de fin.'},
        {time:tt(cer+600), action:'🌙 Fin officielle. Photos avec les derniers invités.'}
      ];
    }
  },

  const cont = el('assist-content');
  if(!cont) return;
  // Scroller en douceur jusqu'au contenu après le clic

function assistGenerateMenu(){

  const saison = el('menu-saison').value;
  const budget = el('menu-budget').value;
  const format = el('menu-format').value;
  const boissons = el('menu-boissons').value;
  const invites = parseInt(el('menu-invites').value,10) || 80;
  const restrictions = Array.from(document.querySelectorAll('.menu-restric-cb:checked')).map(c=>c.value);
  sv('assist_menu_style',style); sv('assist_menu_saison',saison); sv('assist_menu_budget',budget);
  sv('assist_menu_format',format); sv('assist_menu_boissons',boissons); sv('assist_menu_invites',invites);
  sv('assist_menu_restric',restrictions);

  const menu = MENU_ENGINE.generate({style,saison,budget,format,boissons,restrictions,invites});

  const FORMAT_LABELS = {assiette:'Service à l\'assiette',buffet:'Buffet',cocktail:'Cocktail dînatoire',foodtruck:'Food truck',garden:'Garden party'};
  const BUDGET_LABELS = {eco:'Économique',standard:'Standard',luxe:'Luxe'};
  const RESTRIC_LABELS = {vegetarien:'Végétarien',vegan:'Vegan',sansgluten:'Sans gluten',sanslactose:'Sans lactose',halal:'Halal',casher:'Casher','allergie-noix':'Allergie fruits à coque'};

async function assistCopyMenu(){
  const data = window._lastMenu;
  if(!data) return;
  const m = data.menu;
  let text = `Menu mariage — ${data.format} · ${data.budget} · ${data.invites} invités\n`;
  if(data.restrictions.length) text += `Restrictions : ${data.restrictions.join(', ')}\n`;
  text += '\n';
  m.sections.forEach(sec=>{
    text += sec.titre.toUpperCase() + '\n';
    sec.items.forEach(it=> text += '  - ' + it + '\n');
    text += '\n';
  });
  const b = m.boissons;
  text += `BOISSONS\n  - Vin d'honneur : ${b.vinHonneur.join(', ')}\n  - Repas : ${b.repas}\n  - Sans alcool : ${b.soft}\n  - Digestif : ${b.digestif}\n`;
  try { await navigator.clipboard.writeText(text); appAlert('Menu copié dans le presse-papier !', 'Copié'); }
  catch{ appAlert(text, 'Menu (copie manuelle)'); }
}

// ── INIT ──────────────────────────────────────────────────────────────────────
window.addEventListener('load', async function(){
  // Check active session
  const sess = ld('sess', null);
  if(sess){
    const u = ld('u_'+sess, null);
    if(u){
      // Charger les données Firestore avant de démarrer (sync entre appareils)
      try { await loadUserDataFromFirestore(sess); } catch(_){}
      startApp(u);
      return;
    }
  }
  const remE = ld('rem_e', '');
  const remP = ld('rem_p', '');
  if(remE){ const el1=document.getElementById('a-email-l'); if(el1) el1.value=remE; }
  if(remP){ const el2=document.getElementById('a-pass-l'); if(el2) el2.value=remP; }
  if(remE&&remP){ const cb=document.getElementById('remember-me'); if(cb) cb.checked=true; }

  // ── PULL TO REFRESH ──────────────────────────────────────────────────────
  let ptrStart=0,ptrActive=false;
  const ptrIndicator=document.getElementById('ptr-indicator');
  const ptrSpinner=document.getElementById('ptr-spinner');
  const PTR_THRESHOLD=72;

  document.addEventListener('touchstart',e=>{
    if(window.scrollY===0)ptrStart=e.touches[0].clientY;
  },{passive:true});

  document.addEventListener('touchmove',e=>{
    if(!ptrStart)return;
    const dy=e.touches[0].clientY-ptrStart;
    if(dy>0&&window.scrollY===0){
      ptrActive=true;
      const ratio=Math.min(dy/PTR_THRESHOLD,1);
      if(ptrSpinner)ptrSpinner.style.transform=`translateX(-50%) translateY(${Math.min(dy*0.5,PTR_THRESHOLD*0.5)}px)`;
      if(ptrIndicator)ptrIndicator.style.transform=`scaleX(${ratio})`;
      if(dy>PTR_THRESHOLD&&ptrSpinner)ptrSpinner.classList.add('spinning');
    }
  },{passive:true});

  document.addEventListener('touchend',()=>{
    if(!ptrActive){ptrStart=0;return;}
    const wasAboveThreshold=ptrSpinner&&ptrSpinner.classList.contains('spinning');
    ptrStart=0;ptrActive=false;
    if(ptrSpinner){ptrSpinner.style.transform='translateX(-50%) translateY(-60px)';ptrSpinner.classList.remove('spinning');}
    if(ptrIndicator)ptrIndicator.style.transform='scaleX(0)';
    if(wasAboveThreshold){
      // Reload current tab
      setTimeout(()=>renderTab(currentTab??0),150);
    }
  },{passive:true});

  // ── SYSTEM BACK BUTTON (Android) ─────────────────────────────────────────
  window.addEventListener('popstate',()=>{
    if(window._settingsOpen){closeSettings();return;}
    if(currentTab>0){showTab(currentTab-1);}
  });
  // Push initial state
  history.pushState({tab:0},'',location.href);
});

// ── ACCOUNT DELETION ─────────────────────────────────────────────────────────
async function confirmDeleteAccount(){
  if(!await appConfirm('Êtes-vous sûr de vouloir supprimer définitivement votre compte et toutes vos données ? Cette action est irréversible.'))return;
  const confirmText=await appPrompt('Tapez SUPPRIMER pour confirmer :');
  if(confirmText!=='SUPPRIMER')return;
  // Delete all user data from localStorage
  if(USER&&USER.email){
    const keys=Object.keys(localStorage).filter(k=>k.includes(USER.email));
    keys.forEach(k=>localStorage.removeItem(k));
    localStorage.removeItem('sess');
    localStorage.removeItem('u_'+ld('sess',''));
  }
  await appAlert('Compte supprimé. À bientôt.');
  location.reload();
}

function updateCakeTopperText(val){
  const d=getCakeData();
  d.topperText=val;
  saveCakeData(d);
  // Re-build only the 3D scene, NOT the UI (preserves input focus)
  const data=getCakeData();
  buildCake3D(data);
}
function updateCakeProp(key,val){
  const d=getCakeData();
  d[key]=val;
  // Si la texture change vers autre que "lisse", désactiver les effets qui nécessitent "lisse"
  if(key==='texture'&&val!=='lisse'){
    const e=EFFETS_CAKE.find(x=>x.id===d.effet);
    if(e&&e.requireLisse)d.effet='aucun';
  }
  saveCakeData(d);renderCake3D();
}
function updateCakeLayer(i,key,val){
  const d=getCakeData();
  if(!d.layers[i])d.layers[i]={parfum:'Vanille',glacage:'#F3E5AB',garniture:'Ganache chocolat',regime:'Aucun'};
  d.layers[i][key]=val;saveCakeData(d);renderCake3D();
}
function updateCakeEtages(n){
  const d=getCakeData();
  d.etages=parseInt(n)||2;
  // Ensure layers array is padded
  while(d.layers.length<d.etages){
    d.layers.push({parfum:'Vanille',glacage:'#F3E5AB',garniture:'Ganache chocolat',regime:'Aucun'});
  }
  saveCakeData(d);renderCake3D();
}
