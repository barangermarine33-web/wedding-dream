// ── THREE.JS 3D CAKE ENGINE — Professional PBR Renderer ────────────────────
let _3r=null,_3s=null,_3c=null,_3g=null,_3id=null;
let _3ry=0.25,_3rx=0.20,_3auto=true,_3drag=false,_3lx=0,_3ly=0,_3pinch=null;
let _3panX=0,_3panY=0,_3handMode=false; // mode "main" pour pan
let _3tierR=[],_3tierY=[];

// Safely convert hex → THREE.Color
function _col(hex){
  try{const r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255;
  return new window.THREE.Color(r,g,b);}
  catch{return new window.THREE.Color(1,0.9,0.85);}
}
function _hex2rgb(hex){
  try{return{r:parseInt(hex.slice(1,3),16)/255,g:parseInt(hex.slice(3,5),16)/255,b:parseInt(hex.slice(5,7),16)/255};}
  catch{return{r:1,g:0.9,b:0.85};}
}

function destroyThree(){
  if(_3id){cancelAnimationFrame(_3id);_3id=null;}
  if(_3r){try{_3r.dispose();}catch(e){}_3r=null;}
  _3s=null;_3c=null;_3g=null;
}

function initThree(canvas){
  const T=window.THREE;
  const W=canvas.clientWidth,H=canvas.clientHeight;

  _3r=new T.WebGLRenderer({canvas,antialias:true,alpha:false,powerPreference:'high-performance',preserveDrawingBuffer:true});
  _3r.setPixelRatio(Math.min(window.devicePixelRatio,3));
  _3r.setSize(W,H,false);
  _3r.shadowMap.enabled=true;
  _3r.shadowMap.type=T.PCFSoftShadowMap;
  _3r.toneMapping=T.ACESFilmicToneMapping;
  _3r.toneMappingExposure=1.25;
  _3r.physicallyCorrectLights=true;

  _3s=new T.Scene();
  _3s.background=new T.Color(0xffffff);
  _3s.fog=new T.Fog(0xf8f4f0,16,26);

  // ── STUDIO LIGHTING SETUP ──
  // Soft ambient
  _3s.add(new T.AmbientLight(0xfff0e8,0.7));
  // Hemisphere sky/ground
  _3s.add(new T.HemisphereLight(0xfff5e0,0xf0e8e0,0.6));

  // Key light — main shadow caster, upper left
  const key=new T.DirectionalLight(0xfff8f0,2.2);
  key.position.set(-4,10,6);
  key.castShadow=true;
  key.shadow.mapSize.set(2048,2048);
  key.shadow.camera.near=1;key.shadow.camera.far=35;
  key.shadow.camera.left=-3.5;key.shadow.camera.right=3.5;
  key.shadow.camera.top=7;key.shadow.camera.bottom=-2;
  key.shadow.bias=-0.0003;key.shadow.normalBias=0.02;
  _3s.add(key);

  // Fill light — soft right
  const fill=new T.DirectionalLight(0xd8e8ff,0.9);
  fill.position.set(6,4,-2);_3s.add(fill);

  // Rim light — warm backlight for silhouette
  const rim=new T.DirectionalLight(0xffd890,1.2);
  rim.position.set(0,6,-7);_3s.add(rim);

  // Top light — overhead for top surfaces
  const top=new T.DirectionalLight(0xffffff,0.5);
  top.position.set(0,12,0);_3s.add(top);

  // Warm candle-like point light at front-low
  const candle=new T.PointLight(0xff9050,1.5,12,2);
  candle.position.set(1.5,1.5,5);_3s.add(candle);

  // Camera
  _3c=new T.PerspectiveCamera(34,W/H,0.1,50);
  _3c.position.set(0,2.4,8.0);
  _3c.lookAt(0,0.6,0);
}

// Make a physically accurate material
function _mat(col,texId,isChoc){
  const T=window.THREE;
  const tex=TEXTURES_CAKE.find(t=>t.id===texId)||TEXTURES_CAKE[0];
  const m=new T.MeshStandardMaterial({
    color:col,
    roughness:isChoc?0.62:tex.roughness,
    metalness:isChoc?0.0:tex.metalness,
    envMapIntensity:0.8,
  });
  // Ombré / gradient effect: handled via vertex colors below if needed
  return m;
}

// Create a cream rosette ring
function _creamRing(T,cx,cy,radius,isRound,segs,baseCol){
  const g=new T.Group();
  const c=_hex2rgb(baseCol);
  const cream=new T.Color(Math.min(1,c.r+0.22),Math.min(1,c.g+0.22),Math.min(1,c.b+0.22));
  const mat=new T.MeshStandardMaterial({color:cream,roughness:0.55,metalness:0.0});
  const n=isRound?Math.round(radius*32):4;
  for(let i=0;i<n;i++){
    const a=isRound?(i/n)*Math.PI*2:((i+0.5)/4)*Math.PI*2;
    const geo=new T.SphereGeometry(0.048,8,6);
    const m=new T.Mesh(geo,mat.clone());
    m.scale.set(1,0.62,1);
    m.position.set(Math.sin(a)*radius*0.96,cy,Math.cos(a)*radius*0.96);
    m.castShadow=true;
    g.add(m);
  }
  return g;
}

function buildCake3D(data){
  const T=window.THREE;
  if(!T||!_3s)return;
  if(_3g){_3s.remove(_3g);_3g=null;}
  _3g=new T.Group();_3s.add(_3g);
  _3tierR=[];_3tierY=[];

  const etages=Math.min(5,data.etages||2);
  const layers=data.layers||[];
  const isRound=data.forme!=='carre'&&data.forme!=='hexagonal'&&data.forme!=='asymetrique';
  const isHex=data.forme==='hexagonal';
  const segs=isHex?6:isRound?80:4;
  const texId=data.texture||'lisse';
  const hauteur=data.hauteur||'standard';
  const hFactor=hauteur==='haut'?1.40:hauteur==='mini'?0.65:1.0;

  // Tier proportions (realistic wedding cake)
  const RADII=[1.08,0.78,0.57,0.42,0.31];
  const BASE_H=[0.84,0.76,0.66,0.58,0.50];
  const HEIGHTS=BASE_H.map(h=>h*hFactor);

  // ── GOLD PEDESTAL ──────────────────────────────────────────────────────────
  const goldM=new T.MeshStandardMaterial({color:0xC9A020,metalness:0.90,roughness:0.10});
  const pedM=new T.Mesh(new T.CylinderGeometry(0.13,0.22,0.22,32),goldM);
  pedM.position.y=0.11;pedM.castShadow=true;pedM.receiveShadow=true;_3g.add(pedM);

  // Plate
  const pR=RADII[0]+0.22;
  const plateM=new T.Mesh(new T.CylinderGeometry(pR,pR*0.95,0.055,64),goldM.clone());
  plateM.position.y=0.233;plateM.castShadow=true;plateM.receiveShadow=true;_3g.add(plateM);
  // Plate rims
  [pR+0.02,pR-0.07,pR-0.15].forEach(r=>{
    const rm=new T.Mesh(new T.TorusGeometry(r,0.010,8,64),
      new T.MeshStandardMaterial({color:0xFFE860,metalness:0.95,roughness:0.06}));
    rm.rotation.x=Math.PI/2;rm.position.y=0.262;_3g.add(rm);
  });

  let curY=0.260;

  for(let i=0;i<etages;i++){
    const layer=layers[i]||{parfum:'Vanille',glacage:'#F3E5AB'};
    const gl=layer.glacage||'#F3E5AB';
    const rgb=_hex2rgb(gl);
    const isChoc=gl==='#5A3A2E'||gl==='#6F4E37';
    const rB=RADII[i]||0.32;
    const rT=isRound?rB*0.968:rB;
    const tH=HEIGHTS[i]||0.55;

    _3tierR.push(rB);_3tierY.push(curY);

    const tMat=_mat(_col(gl),texId,isChoc);

    // ── TIER BODY ──────────────────────────────────────────────────────────
    // Si texture spatule : facettes planes avec jitter pour effet "coups de palette"
    const isSpatule = (texId === 'spatule');
    let tGeo;
    if(isHex){
      tGeo=new T.CylinderGeometry(rT,rB,tH, 6, isSpatule?12:1);
    } else if(isRound){
      // Cylindre haute résolution pour la spatule (vertices nombreux = relief lisse)
      tGeo=new T.CylinderGeometry(rT,rB,tH, isSpatule?48:segs, isSpatule?16:1);
    } else {
      tGeo=new T.BoxGeometry(rB*1.90,tH,rB*1.90, isSpatule?8:1, isSpatule?8:1, isSpatule?8:1);
    }

    // ─── TEXTURE SPATULE : bruit lisse sur la surface ───
    // Approche simple qui marche : on déplace chaque vertex radialement selon un bruit
    // 2D (angle, hauteur) avec plusieurs octaves. Pas de quantification, pas de
    // flatShading → surface continue avec relief organique.
    if(isSpatule){
      const pos = tGeo.attributes.position;
      for(let i=0; i<pos.count; i++){
        const x = pos.getX(i), y = pos.getY(i), z = pos.getZ(i);
        const r = Math.sqrt(x*x + z*z);
        if(r < 0.001) continue;
        const ang = Math.atan2(z, x);
        const yN = (y + tH*0.5) / tH; // 0..1 sur la hauteur

        // Bruit multi-octave : grosse échelle + petite échelle
        // Octave 1 : grosses bosses (traits de spatule larges)
        const n1 = Math.sin(ang * 4.0 + yN * 8.0) * Math.cos(ang * 2.5 - yN * 3.0);
        // Octave 2 : détails fins
        const n2 = Math.sin(ang * 11.0 - yN * 5.0) * Math.cos(ang * 7.0 + yN * 9.0);
        // Octave 3 : grain très fin
        const n3 = Math.sin(ang * 22.0 + yN * 17.0) * 0.5;

        // Combinaison : amplitude principale + détail + grain
        const noise = n1 * 0.020 + n2 * 0.008 + n3 * 0.003;
        // Toujours positif (pousse vers l'extérieur, pas de creux)
        const push = Math.max(0, noise + 0.012);
        const nr = r + push;
        pos.setX(i, Math.cos(ang) * nr);
        pos.setZ(i, Math.sin(ang) * nr);
      }
      tGeo.computeVertexNormals();
    }

    const tMatSpatule = isSpatule ? _mat(_col(gl), texId, isChoc) : null;
    const tMatToUse = tMatSpatule || tMat;
    if(isSpatule){
      // Rugosité élevée pour aspect mat de buttercream
      // PAS de flatShading : on veut une surface lisse avec bosses continues
      tMatToUse.roughness = 0.78;
      tMatToUse.metalness = 0.0;
      tMatToUse.flatShading = false;
      tMatToUse.needsUpdate = true;
    }
    const tier=new T.Mesh(tGeo, tMatToUse);
    tier.position.y=curY+tH/2;
    tier.castShadow=true;tier.receiveShadow=true;
    _3g.add(tier);

    // ── TEXTURES GÉOMÉTRIQUES (vraies géométries 3D, pas de canvas) ────────

    if(texId==='strie'){
      // Stries horizontales : empile des anneaux fins de différents diamètres
      // Crée un vrai effet de relief, pas de canvas qui se déforme sur le cylindre
      const nRings=Math.max(20,Math.round(tH*60));
      for(let r=0;r<nRings;r++){
        const tFrac=r/nRings;
        const ry=curY+tFrac*tH;
        const isBump=r%2===0;
        const radAtY=rB+(rT-rB)*tFrac;
        const ringR=isBump?radAtY*1.013:radAtY*1.003;
        const ringH=tH/nRings*0.92;
        const rGeo=isRound?new T.CylinderGeometry(ringR,ringR,ringH,segs,1):
                   isHex?new T.CylinderGeometry(ringR,ringR,ringH,6,1):
                         new T.BoxGeometry(rB*1.92,ringH,rB*1.92,1,1,1);
        const rMat=tMat.clone();
        rMat.roughness=isBump?0.55:0.78;
        const rm=new T.Mesh(rGeo,rMat);
        rm.position.y=ry+ringH/2;
        rm.castShadow=true;
        _3g.add(rm);
      }
    }

    if(false && texId==='spatule'){
      // Ancien code patchs — désactivé, on déforme maintenant les vertices du cylindre directement.
      // ════════════════════════════════════════════════════════════════════
      // TEXTURE SPATULE v3 — Patchs larges qui se chevauchent pour reproduire
      // la photo de référence (gâteau Etsy palette-knife buttercream blanc).
      // Pas de petits grains : des plaques de glaçage étalé qui se recouvrent
      // partiellement, avec relief central marqué et bords arrondis.
      // ════════════════════════════════════════════════════════════════════
      const circumference = 2 * Math.PI * ((rB + rT) / 2);
      const surfaceArea = circumference * tH;
      // Densité élevée pour assurer le chevauchement (~50% de la surface couverte par patch moyen)
      const patchDensity = 75;
      const nPatches = Math.max(50, Math.min(110, Math.round(surfaceArea * patchDensity)));

      // ─── Helper : construit un patch de spatule (plaque arrondie irrégulière) ───
      function _buildSpatulaStroke(sizeW, sizeH, thick, colorTint){
        // Forme : ellipse "écrasée" avec contour irrégulier mais sans coins
        // (28 points avec petite perturbation = bords doux mais pas parfaitement ronds)
        const shape = new T.Shape();
        const halfW = sizeW/2, halfH = sizeH/2;
        const nSamples = 28;
        // Variations cohérentes par patch : un peu écrasé d'un côté ou de l'autre
        const skewA = Math.random()*Math.PI*2;
        const skewAmt = 0.10 + Math.random()*0.12;
        for(let k=0; k<=nSamples; k++){
          const a = (k/nSamples) * Math.PI*2;
          // Bruit doux le long du contour (basse fréquence + haute fréquence)
          const noise = 1.0 + Math.sin(a*2 + skewA)*skewAmt + (Math.random()-0.5)*0.06;
          const x = Math.cos(a) * halfW * noise;
          const y = Math.sin(a) * halfH * noise;
          if(k===0) shape.moveTo(x, y);
          else shape.lineTo(x, y);
        }
        const extrudeSettings = {
          depth: thick,
          bevelEnabled: true,
          bevelSegments: 4,
          bevelSize: thick*0.95,       // bevel TRÈS large → bord qui "fond" totalement dans la pâte
          bevelThickness: thick*0.70,
          curveSegments: 22            // contour parfaitement lisse
        };
        const geo = new T.ExtrudeGeometry(shape, extrudeSettings);

        // Déformation : crête centrale en cuvette inversée (rappel du raclage)
        const pos = geo.attributes.position;
        for(let i=0; i<pos.count; i++){
          const x = pos.getX(i), y = pos.getY(i), z = pos.getZ(i);
          if(z > thick*0.20){
            const xFrac = x / halfW;
            const yFrac = y / halfH;
            // Distance normalisée au centre du patch
            const distC = Math.sqrt(xFrac*xFrac + yFrac*yFrac);
            // Profil : haut au centre, qui s'estompe vers les bords
            const dome = Math.max(0, Math.cos(distC * Math.PI*0.5));
            // Vague qui suit l'axe long pour effet "raclé"
            const wave = Math.sin(yFrac * 2.4 + xFrac * 0.8) * 0.18;
            pos.setZ(i, z + dome*thick*0.85 + wave*thick*0.25);
          }
        }
        geo.computeVertexNormals();
        const mat = new T.MeshStandardMaterial({
          color: colorTint,
          roughness: 0.78,
          metalness: 0.0,
          flatShading: false
        });
        return new T.Mesh(geo, mat);
      }

      // ─── Génération des patchs : grille semi-aléatoire pour assurer la couverture ───
      // Au lieu de positions purement aléatoires (qui laissent des zones vides),
      // on échantillonne sur une grille avec jitter, ce qui couvre uniformément.
      const colsPerCircle = 8;   // 8 colonnes autour du gâteau
      const rowsPerTier = 4;     // 4 rangées sur la hauteur
      const positions = [];
      for(let ci=0; ci<colsPerCircle; ci++){
        for(let ri=0; ri<rowsPerTier; ri++){
          positions.push({
            ang: (ci/colsPerCircle)*Math.PI*2 + (Math.random()-0.5)*0.45,
            hF: (ri+0.5)/rowsPerTier + (Math.random()-0.5)*0.22
          });
        }
      }
      // Ajouter des patches purement aléatoires (par dessus) pour casser la grille
      const nExtra = Math.max(20, nPatches - positions.length);
      for(let p=0; p<nExtra; p++){
        positions.push({
          ang: Math.random()*Math.PI*2,
          hF: Math.random()
        });
      }

      const patchOuterPush = 0.002;
      positions.forEach(({ang: angRand, hF: hFrac})=>{
        const yPos = curY + Math.max(0.02, Math.min(0.98, hFrac)) * tH;
        const radAtY = rB + (rT - rB) * hFrac;
        // Taille des patchs : LARGES (8 à 14 cm visuels)
        const sizeW = 0.075 + Math.random()*0.055;
        // Ratio H/W : modérément allongé (1.0 à 1.6×)
        const sizeH = sizeW * (1.0 + Math.random()*0.6);
        // Épaisseur : visible mais pas excessive
        const thick = 0.012 + Math.random()*0.012;
        const vBright = 0.96 + Math.random()*0.08;
        const tint = new T.Color(
          Math.min(1, rgb.r * vBright),
          Math.min(1, rgb.g * vBright),
          Math.min(1, rgb.b * vBright)
        );
        const stroke = _buildSpatulaStroke(sizeW, sizeH, thick, tint);
        if(isRound){
          stroke.position.set(
            Math.sin(angRand) * (radAtY + patchOuterPush),
            yPos,
            Math.cos(angRand) * (radAtY + patchOuterPush)
          );
          stroke.rotation.y = angRand;
          stroke.rotation.z = Math.random() * Math.PI * 2;
          stroke.rotation.x = (Math.random()-0.5) * 0.10;
        } else if(isHex){
          const faceIdx = Math.floor(angRand / (Math.PI/3));
          const faceAng = faceIdx * (Math.PI/3) + Math.PI/6;
          stroke.position.set(
            Math.sin(faceAng) * (radAtY*0.866 + patchOuterPush),
            yPos,
            Math.cos(faceAng) * (radAtY*0.866 + patchOuterPush)
          );
          stroke.rotation.y = faceAng;
          stroke.rotation.z = Math.random() * Math.PI * 2;
          stroke.rotation.x = (Math.random()-0.5) * 0.10;
        } else {
          const side = Math.floor(Math.random()*4);
          const faceAng = side * Math.PI / 2;
          const offsetR = rB * 0.96 + patchOuterPush;
          stroke.position.set(
            Math.sin(faceAng) * offsetR + (side%2===0?(Math.random()-0.5)*rB*1.5:0),
            yPos,
            Math.cos(faceAng) * offsetR + (side%2===1?(Math.random()-0.5)*rB*1.5:0)
          );
          stroke.rotation.y = faceAng;
          stroke.rotation.z = Math.random() * Math.PI * 2;
          stroke.rotation.x = (Math.random()-0.5) * 0.10;
        }
        stroke.castShadow = true;
        stroke.receiveShadow = true;
        _3g.add(stroke);
      });

      // ─── Rendre le cylindre de base plus rugueux et même couleur que les patchs ───
      if(tier && tier.material){
        tier.material.roughness = 0.85;
        tier.material.metalness = 0.0;
      }
    }

    if(texId==='rustique'){
      // Naked cake : gâteau aux couches visibles
      // Approche : remplacer la couleur du tier par un mélange génoise+crème en bandes 3D

      // 1. Recolorer le tier en génoise dorée (au lieu de la couleur de glaçage)
      const spongeCol=new T.Color(0.78,0.55,0.32); // génoise dorée chaude
      tier.material.color=spongeCol;
      tier.material.roughness=0.92;
      tier.material.metalness=0.0;

      // 2. Bandes de crème horizontales 3D — entre 3 et 5 couches selon hauteur du tier
      const creamCol=new T.Color(rgb.r*0.92+0.06,rgb.g*0.92+0.06,rgb.b*0.92+0.06);
      const creamMat=new T.MeshStandardMaterial({
        color:creamCol,roughness:0.65,metalness:0.0});
      const nCream=Math.max(3,Math.min(5,Math.round(tH*5)));
      for(let l=0;l<nCream;l++){
        const frac=(l+1)/(nCream+1);
        const ly=curY+frac*tH;
        const radAtY=rB+(rT-rB)*frac;
        const bandH=tH*0.06+Math.random()*tH*0.02;
        // Bande de crème légèrement plus large que le cylindre, irrégulière en hauteur
        const bandR=radAtY*1.018;
        const bGeo=isRound?new T.CylinderGeometry(bandR,bandR*1.005,bandH,segs,1):
                   isHex?new T.CylinderGeometry(bandR,bandR*1.005,bandH,6,1):
                         new T.BoxGeometry(rB*1.95,bandH,rB*1.95,1,1,1);
        const bm=new T.Mesh(bGeo,creamMat.clone());
        bm.position.y=ly;
        bm.castShadow=true;
        _3g.add(bm);
      }

      // 3. Couche de crème sur le dessus (plus épaisse)
      const topCreamGeo=isRound?new T.CylinderGeometry(rT*1.005,rT*1.005,tH*0.10,segs,1):
                       isHex?new T.CylinderGeometry(rT*1.005,rT*1.005,tH*0.10,6,1):
                             new T.BoxGeometry(rB*1.93,tH*0.10,rB*1.93,1,1,1);
      const topCream=new T.Mesh(topCreamGeo,creamMat.clone());
      topCream.position.y=curY+tH*0.95;
      _3g.add(topCream);

      // (les traînées verticales ont été supprimées pour un rendu plus propre)
    }

    // ── FROSTED TOP CAP (avec texture matchée au tier) ───────────────────
    // Pour rustique : génoise dorée. Pour les autres : couleur du glaçage.
    let capCol;
    let capRoughness=0.40;
    if(texId==='rustique'){
      capCol=new T.Color(0.78,0.55,0.32);
      capRoughness=0.92;
    } else {
      const capRgb=_hex2rgb(gl);
      capCol=new T.Color(Math.min(1,capRgb.r+0.04),Math.min(1,capRgb.g+0.04),Math.min(1,capRgb.b+0.04));
      capRoughness=_mat(capCol,texId,isChoc).roughness*0.75;
    }
    // Cap plus fin pour éviter le double-trait avec le drip
    const capH=0.018;
    const capGeo=isHex?new T.CylinderGeometry(rT,rT,capH,6, isSpatule?6:1):
                 isRound?new T.CylinderGeometry(rT,rT,capH, isSpatule?48:segs, isSpatule?6:1):
                 new T.BoxGeometry(rB*1.90,capH,rB*1.90, isSpatule?8:1, isSpatule?4:1, isSpatule?8:1);
    const capMat=new T.MeshStandardMaterial({
      color:capCol,roughness:capRoughness,metalness:0.01});

    // ─── DÉFORMATION SPATULE DU CAP : bruit lisse cohérent avec le tier ───
    if(isSpatule){
      const cpos = capGeo.attributes.position;
      for(let i=0; i<cpos.count; i++){
        const x = cpos.getX(i), y = cpos.getY(i), z = cpos.getZ(i);
        // Sur le dessus du cap (y > 0)
        if(y > 0.001){
          const r = Math.sqrt(x*x + z*z);
          if(r < 0.001) continue;
          const ang = Math.atan2(z, x);
          const rN = r / Math.max(0.001, rT); // 0..1
          // Bruit multi-octave
          const n1 = Math.sin(ang * 5.0 + rN * 9.0) * Math.cos(ang * 2.5 - rN * 4.0);
          const n2 = Math.sin(ang * 11.0 - rN * 6.0) * 0.6;
          const lift = Math.max(0, n1 * 0.015 + n2 * 0.006 + 0.008);
          cpos.setY(i, y + lift);
        }
        // Côté du cap : même bruit que le tier
        else if(Math.abs(y) < capH*0.49){
          const r = Math.sqrt(x*x + z*z);
          if(r > 0.001){
            const ang = Math.atan2(z, x);
            const yN = (y + capH*0.5) / capH;
            const n1 = Math.sin(ang * 4.0 + yN * 8.0) * Math.cos(ang * 2.5 - yN * 3.0);
            const n2 = Math.sin(ang * 11.0 - yN * 5.0) * 0.6;
            const push = Math.max(0, n1 * 0.018 + n2 * 0.008 + 0.010);
            const nr = r + push;
            cpos.setX(i, Math.cos(ang) * nr);
            cpos.setZ(i, Math.sin(ang) * nr);
          }
        }
      }
      capGeo.computeVertexNormals();
      capMat.roughness = 0.78;
      capMat.flatShading = false;
      capMat.needsUpdate = true;
    }

    const cap=new T.Mesh(capGeo,capMat);
    cap.position.y=curY+tH+capH/2;cap.castShadow=true;_3g.add(cap);

    // Reproduire les textures sur le dessus du cap
    if(texId==='strie'){
      // Stries concentriques sur le dessus
      const nRings=8;
      for(let r=0;r<nRings;r++){
        const rad=rT*(0.85-r*0.10);
        if(rad<0.05)break;
        const ringGeo=new T.TorusGeometry(rad,0.008,4,segs);
        const rMat=capMat.clone();rMat.roughness=r%2===0?0.55:0.78;
        const rm=new T.Mesh(ringGeo,rMat);
        rm.rotation.x=Math.PI/2;
        rm.position.y=curY+tH+capH+0.004;
        _3g.add(rm);
      }
    }
    if(false && texId==='spatule'){
      // Ancien code top cap spatule — désactivé, le cap est maintenant déformé directement.
      const nTopPatches = 10 + Math.floor(Math.random()*5); // 10..14
      for(let w=0; w<nTopPatches; w++){
        const aT = Math.random()*Math.PI*2;
        const rT2 = Math.random()*rT*0.72;
        // Patchs gros (comme sur les côtés)
        const sw = 0.075 + Math.random()*0.050;
        const sh = sw * (1.0 + Math.random()*0.5);
        const thick = 0.012 + Math.random()*0.010;
        // Forme arrondie irrégulière
        const shape = new T.Shape();
        const halfW = sw/2, halfH = sh/2;
        const nSamples = 28;
        const skewA = Math.random()*Math.PI*2;
        const skewAmt = 0.10 + Math.random()*0.12;
        for(let k=0; k<=nSamples; k++){
          const a = (k/nSamples) * Math.PI*2;
          const noise = 1.0 + Math.sin(a*2 + skewA)*skewAmt + (Math.random()-0.5)*0.06;
          const x = Math.cos(a) * halfW * noise;
          const y = Math.sin(a) * halfH * noise;
          if(k===0) shape.moveTo(x, y);
          else shape.lineTo(x, y);
        }
        const tg = new T.ExtrudeGeometry(shape, {
          depth: thick,
          bevelEnabled: true,
          bevelSegments: 4,
          bevelSize: thick*0.95,
          bevelThickness: thick*0.70,
          curveSegments: 22
        });
        const tpos = tg.attributes.position;
        for(let i=0; i<tpos.count; i++){
          const x = tpos.getX(i), y = tpos.getY(i), z = tpos.getZ(i);
          if(z > thick*0.20){
            const xFrac = x / halfW;
            const yFrac = y / halfH;
            const distC = Math.sqrt(xFrac*xFrac + yFrac*yFrac);
            const dome = Math.max(0, Math.cos(distC * Math.PI*0.5));
            const wave = Math.sin(yFrac * 2.4 + xFrac * 0.8) * 0.18;
            tpos.setZ(i, z + dome*thick*0.85 + wave*thick*0.25);
          }
        }
        tg.computeVertexNormals();
        const v = 0.96 + Math.random()*0.08;
        const tm = new T.Mesh(tg, new T.MeshStandardMaterial({
          color: new T.Color(capCol.r*v, capCol.g*v, capCol.b*v),
          roughness: 0.78, metalness: 0.0
        }));
        tm.rotation.x = -Math.PI/2;
        tm.rotation.z = Math.random()*Math.PI*2;
        tm.position.set(Math.cos(aT)*rT2, curY+tH+capH+0.001, Math.sin(aT)*rT2);
        tm.castShadow = true;
        _3g.add(tm);
      }
    }
    if(texId==='rustique'){
      // Sur le dessus : crème étalée irrégulièrement
      const creamCol=new T.Color(rgb.r*0.92+0.06,rgb.g*0.92+0.06,rgb.b*0.92+0.06);
      const creamCapGeo=isHex?new T.CylinderGeometry(rT*0.92,rT*0.92,0.022,6,1):
                       isRound?new T.CylinderGeometry(rT*0.92,rT*0.92,0.022,segs,1):
                       new T.BoxGeometry(rB*1.78,0.022,rB*1.78,1,1,1);
      const creamCap=new T.Mesh(creamCapGeo,new T.MeshStandardMaterial({
        color:creamCol,roughness:0.65,metalness:0.0}));
      creamCap.position.y=curY+tH+capH+0.011;
      _3g.add(creamCap);
    }

    // (rosettes de crème supprimées — gâteau lisse par défaut)

    // ── DRIP CAKE (coulures qui descendent du sommet) ────────────────────
    const dripInfo=DRIP_COLS.find(d=>d.id===(data.drip||'aucun'));
    if(dripInfo&&dripInfo.col){
      const dripHex=(dripInfo.id==='colore')?(data.dripColore||'#E03080'):dripInfo.col;
      const dc=_hex2rgb(dripHex);
      const dripCol=new T.Color(dc.r,dc.g,dc.b);
      const dripMat=new T.MeshStandardMaterial({
        color:dripCol,roughness:0.18,metalness:0.10});

      // Anneau de drip : épaisseur PROPORTIONNELLE au rayon du tier (cohérence visuelle)
      // Bord supérieur arrondi avec un torus pour effet "coulant"
      const ringH=0.055;
      const ringGeo=isRound?new T.CylinderGeometry(rT*1.020,rT*1.020,ringH,segs,1):
                    isHex?new T.CylinderGeometry(rT*1.020,rT*1.020,ringH,6,1):
                          new T.BoxGeometry(rB*1.95,ringH,rB*1.95,1,1,1);
      const ring=new T.Mesh(ringGeo,dripMat.clone());
      ring.position.y=curY+tH-ringH*0.35;
      _3g.add(ring);

      // Bord supérieur arrondi (torus) pour effet coulant naturel
      if(isRound){
        const topTorus=new T.Mesh(
          new T.TorusGeometry(rT*1.020,ringH*0.42,8,segs),
          dripMat.clone()
        );
        topTorus.rotation.x=Math.PI/2;
        topTorus.position.y=curY+tH-ringH*0.10;
        _3g.add(topTorus);
      }
      // Bord inférieur arrondi
      if(isRound){
        const botTorus=new T.Mesh(
          new T.TorusGeometry(rT*1.020,ringH*0.32,8,segs),
          dripMat.clone()
        );
        botTorus.rotation.x=Math.PI/2;
        botTorus.position.y=curY+tH-ringH*0.62;
        _3g.add(botTorus);
      }

      // Coulures individuelles qui descendent depuis cet anneau
      const nDrips=Math.max(10,Math.round(rB*36));
      for(let d=0;d<nDrips;d++){
        const da=(d/nDrips)*Math.PI*2+(Math.random()-0.5)*0.05;
        const len=0.04+Math.random()*0.18;
        const dripWidth=0.016+Math.random()*0.012;
        const drGeo=new T.CylinderGeometry(dripWidth*0.5,dripWidth,len,6,1);
        const dm=new T.Mesh(drGeo,dripMat.clone());
        const radDrip=rT*1.022;
        dm.position.set(
          Math.sin(da)*radDrip,
          curY+tH-ringH*0.62-len/2,
          Math.cos(da)*radDrip
        );
        _3g.add(dm);
        const drop=new T.Mesh(
          new T.SphereGeometry(dripWidth*1.05,8,8),
          dripMat.clone());
        drop.position.set(
          Math.sin(da)*radDrip,
          curY+tH-ringH*0.62-len,
          Math.cos(da)*radDrip
        );
        _3g.add(drop);
      }
    }


    // ── EFFETS ARTISTIQUES ────────────────────────────────────────────────
    // Si la texture désactive les effets (ex. rustique), on ignore
    const texInfo=TEXTURES_CAKE.find(t=>t.id===texId);
    const effet=(texInfo&&texInfo.disableEffets)?'aucun':(data.effet||'aucun');
    const effetColRGB=_hex2rgb(data.couleurEffet||'#7E3FAA');
    const eR=Math.round(effetColRGB.r*255);
    const eG=Math.round(effetColRGB.g*255);
    const eB=Math.round(effetColRGB.b*255);

    // MARBRE & AQUARELLE : uniquement sur texture LISSE (pas de géométries au-dessus)
    // → on génère une texture canvas qu'on applique au tier
    if((effet==='marbre'||effet==='aquarelle')&&texId==='lisse'){
      const baseR=Math.round(rgb.r*255),baseG=Math.round(rgb.g*255),baseB=Math.round(rgb.b*255);
      const fxCanvas=document.createElement('canvas');
      fxCanvas.width=1024;fxCanvas.height=1024;
      const fxCtx=fxCanvas.getContext('2d');
      // Fond uni couleur du glaçage
      fxCtx.fillStyle='rgb('+baseR+','+baseG+','+baseB+')';
      fxCtx.fillRect(0,0,1024,1024);

      if(effet==='marbre'){
        // Marbré : la couleur du glaçage ne change PAS, seules les veines sont colorées
        // (Le fond du canvas est déjà la couleur du glaçage, on dessine seulement les veines en couleur effet)
        function drawSeamless(drawFn){
          drawFn(0);
          drawFn(1024);
          drawFn(-1024);
        }
        // 1) Veines principales colorées (en couleur d'effet) — courbes Bézier
        for(let v=0;v<14;v++){
          const startX=Math.random()*1024,startY=Math.random()*1024;
          const lineW=3+Math.random()*5;
          const colA=0.55+Math.random()*0.35;
          const pts=[];
          let x=startX,y=startY;
          pts.push([x,y]);
          for(let s=0;s<12;s++){
            x+=(Math.random()-0.4)*150;y+=(Math.random()-0.4)*120;
            pts.push([x,y]);
          }
          drawSeamless(function(off){
            fxCtx.beginPath();
            fxCtx.moveTo(pts[0][0]+off,pts[0][1]);
            for(let i=1;i<pts.length;i++){
              fxCtx.lineTo(pts[i][0]+off,pts[i][1]);
            }
            fxCtx.lineWidth=lineW;
            fxCtx.strokeStyle='rgba('+eR+','+eG+','+eB+','+colA+')';
            fxCtx.stroke();
          });
        }
        // 2) Veines secondaires plus fines (moitié couleur effet, moitié couleur effet sombre)
        const eR2=Math.round(eR*0.55),eG2=Math.round(eG*0.55),eB2=Math.round(eB*0.55);
        for(let v=0;v<22;v++){
          const startX=Math.random()*1024,startY=Math.random()*1024;
          const lineW=1.5+Math.random()*2;
          const colA=0.40+Math.random()*0.30;
          const pts=[[startX,startY]];
          let x=startX,y=startY;
          for(let s=0;s<8;s++){
            x+=(Math.random()-0.4)*100;y+=(Math.random()-0.4)*80;
            pts.push([x,y]);
          }
          drawSeamless(function(off){
            fxCtx.beginPath();
            fxCtx.moveTo(pts[0][0]+off,pts[0][1]);
            for(let i=1;i<pts.length;i++){
              fxCtx.lineTo(pts[i][0]+off,pts[i][1]);
            }
            fxCtx.lineWidth=lineW;
            fxCtx.strokeStyle='rgba('+eR2+','+eG2+','+eB2+','+colA+')';
            fxCtx.stroke();
          });
        }
        // 3) Veines fines blanches (highlights brillants du marbre)
        for(let v=0;v<28;v++){
          const startX=Math.random()*1024,startY=Math.random()*1024;
          const lineW=0.6+Math.random()*1.0;
          const colA=0.20+Math.random()*0.25;
          const pts=[[startX,startY]];
          let x=startX,y=startY;
          for(let s=0;s<5;s++){
            x+=(Math.random()-0.4)*80;y+=(Math.random()-0.4)*70;
            pts.push([x,y]);
          }
          drawSeamless(function(off){
            fxCtx.beginPath();
            fxCtx.moveTo(pts[0][0]+off,pts[0][1]);
            for(let i=1;i<pts.length;i++){
              fxCtx.lineTo(pts[i][0]+off,pts[i][1]);
            }
            fxCtx.lineWidth=lineW;
            fxCtx.strokeStyle='rgba(255,255,255,'+colA+')';
            fxCtx.stroke();
          });
        }
      }

      if(effet==='aquarelle'){
        // AQUARELLE inspirée photo Skazka : coups de pinceau diagonaux qui descendent,
        // 3 teintes (claire / moyenne / foncée), fond blanc qui transparaît.
        // Le pigment se concentre VERS LE BAS, le haut reste presque blanc.

        function drawSeamlessAq(drawFn){
          drawFn(0);drawFn(1024);drawFn(-1024);
        }

        // 3 teintes de la couleur d'effet
        const eR_dark=Math.round(eR*0.45), eG_dark=Math.round(eG*0.40), eB_dark=Math.round(eB*0.55);
        const eR_med=eR, eG_med=eG, eB_med=eB;
        const eR_light=Math.min(255,Math.round(eR+(255-eR)*0.35)),
              eG_light=Math.min(255,Math.round(eG+(255-eG)*0.35)),
              eB_light=Math.min(255,Math.round(eB+(255-eB)*0.30));

        // ─── 0) VOILE GÉNÉRAL TRÈS LÉGER : très diffus sur l'ensemble pour
        // évoquer un fond aquarellé pâle (comme la photo Skazka où le blanc
        // n'est jamais 100% pur)
        const baseWash = fxCtx.createLinearGradient(0, 0, 0, 1024);
        baseWash.addColorStop(0, 'rgba('+eR_light+','+eG_light+','+eB_light+',0.05)');
        baseWash.addColorStop(0.5, 'rgba('+eR_light+','+eG_light+','+eB_light+',0.12)');
        baseWash.addColorStop(1, 'rgba('+eR_light+','+eG_light+','+eB_light+',0.20)');
        fxCtx.fillStyle = baseWash;
        fxCtx.fillRect(0, 0, 1024, 1024);

        // ─── Helper : tracer un VRAI coup de pinceau (trait long courbe) ──
        // Approche : trait composé de plusieurs cercles successifs le long d'une
        // courbe légère, avec opacité gaussienne (max au milieu, 0 aux bouts)
        function paintStroke(startX, startY, ang, length, width, r, g, b, opacity){
          drawSeamlessAq(function(off){
            fxCtx.save();
            fxCtx.translate(startX + off, startY);
            fxCtx.rotate(ang);

            // Dessiner le trait via un grand nombre de petits disques avec opacité variable
            const nSteps = 40;
            for(let k=0; k<nSteps; k++){
              const t = k / (nSteps - 1);  // 0 → 1
              // Profil d'opacité gaussien : 0 → max → 0
              let opFactor;
              if(t < 0.15){
                opFactor = (t / 0.15) * 0.6;
              } else if(t < 0.50){
                opFactor = 0.6 + ((t - 0.15) / 0.35) * 0.4;
              } else if(t < 0.85){
                opFactor = 1.0 - ((t - 0.50) / 0.35) * 0.4;
              } else {
                opFactor = 0.6 - ((t - 0.85) / 0.15) * 0.6;
              }
              const posAlong = (t - 0.5) * length;
              // Légère courbure du trait
              const curveOffset = Math.sin(t * Math.PI) * 8;
              // Largeur variable (effet pinceau qui s'affine aux bouts)
              const segW = width * 0.45 * (0.55 + 0.45 * Math.sin(t * Math.PI));
              const al = opacity * opFactor;
              if(al > 0.01){
                fxCtx.fillStyle = 'rgba('+r+','+g+','+b+','+al+')';
                fxCtx.beginPath();
                fxCtx.arc(posAlong, curveOffset, segW, 0, Math.PI*2);
                fxCtx.fill();
              }
            }
            fxCtx.restore();
          });
        }

        // ─── 1) COUCHE DE BASE : grands coups diagonaux ────────────────
        // Direction principale : -55° (du haut-droite vers le bas-gauche)
        // 18 grands coups
        for(let s=0; s<18; s++){
          const sx = Math.random() * 1024;
          const sy = 300 + Math.random() * 650;
          const ang = (-55 + (Math.random()*20 - 10)) * Math.PI / 180;
          const len = 280 + Math.random() * 220;
          const wid = 60 + Math.random() * 40;
          const choice = Math.random();
          let r, g, b;
          if(choice < 0.50){ r=eR_med; g=eG_med; b=eB_med; }
          else if(choice < 0.85){ r=eR_dark; g=eG_dark; b=eB_dark; }
          else { r=eR_light; g=eG_light; b=eB_light; }
          const op = 0.40 + Math.random()*0.25;
          paintStroke(sx, sy, ang, len, wid, r, g, b, op);
        }

        // ─── 2) DEUXIÈME COUCHE : coups plus courts plus opaques ────────
        for(let s=0; s<12; s++){
          const sx = Math.random() * 1024;
          const sy = 450 + Math.random() * 500;
          const ang = (-55 + (Math.random()*16 - 8)) * Math.PI / 180;
          const len = 150 + Math.random() * 120;
          const wid = 35 + Math.random() * 25;
          const choice = Math.random();
          let r, g, b;
          if(choice < 0.55){ r=eR_dark; g=eG_dark; b=eB_dark; }
          else { r=eR_med; g=eG_med; b=eB_med; }
          const op = 0.50 + Math.random()*0.25;
          paintStroke(sx, sy, ang, len, wid, r, g, b, op);
        }

        // ─── 3) ACCENTS FONCÉS DANS LA ZONE BASSE ───────────────────────
        for(let s=0; s<10; s++){
          const sx = Math.random() * 1024;
          const sy = 700 + Math.random() * 280;
          const ang = (-50 + (Math.random()*20 - 10)) * Math.PI / 180;
          const len = 200 + Math.random() * 150;
          const wid = 65 + Math.random() * 35;
          const op = 0.55 + Math.random()*0.20;
          paintStroke(sx, sy, ang, len, wid, eR_dark, eG_dark, eB_dark, op);
        }

        // ─── 4) FINS TRAITS DE TEXTURE ──────────────────────────────────
        for(let s=0; s<25; s++){
          const sx = Math.random() * 1024;
          const sy = 250 + Math.random() * 750;
          const ang = (-55 + (Math.random()*30 - 15)) * Math.PI / 180;
          const len = 60 + Math.random() * 80;
          const wid = 6 + Math.random() * 8;
          const choice = Math.random();
          let r, g, b;
          if(choice < 0.50){ r=eR_dark; g=eG_dark; b=eB_dark; }
          else { r=eR_med; g=eG_med; b=eB_med; }
          const op = 0.35 + Math.random()*0.25;
          paintStroke(sx, sy, ang, len, wid, r, g, b, op);
        }

        // ─── 5) VOILE BLANC EN HAUT (haut reste presque blanc) ──────────
        const wash = fxCtx.createLinearGradient(0, 0, 0, 1024);
        wash.addColorStop(0, 'rgba(255,255,255,0.75)');
        wash.addColorStop(0.20, 'rgba(255,255,255,0.40)');
        wash.addColorStop(0.40, 'rgba(255,255,255,0.10)');
        wash.addColorStop(0.65, 'rgba(255,255,255,0)');
        wash.addColorStop(1, 'rgba(255,255,255,0)');
        fxCtx.fillStyle = wash;
        fxCtx.fillRect(0, 0, 1024, 1024);

        // ─── 6) Petites éclaboussures de pigment ────────────────────────
        for(let s=0; s<45; s++){
          const sx = Math.random() * 1024;
          const sy = 400 + Math.random() * 600;
          const r2 = 1.5 + Math.random() * 3;
          fxCtx.fillStyle = 'rgba('+eR_dark+','+eG_dark+','+eB_dark+','+(0.25+Math.random()*0.30)+')';
          fxCtx.beginPath();
          fxCtx.arc(sx, sy, r2, 0, Math.PI*2);
          fxCtx.fill();
        }
      }

      const fxTex=new T.CanvasTexture(fxCanvas);
      fxTex.wrapS=T.RepeatWrapping;
      fxTex.wrapT=T.ClampToEdgeWrapping;
      fxTex.colorSpace=T.SRGBColorSpace||T.sRGBEncoding;
      tier.material.map=fxTex;
      tier.material.needsUpdate=true;

      // === Appliquer la MÊME texture sur le dessus (top cap) ===
      // Pour le dessus, on crée une nouvelle texture indépendante (le wrapping
      // est différent : planaire au lieu de cylindrique)
      const fxTexTop=new T.CanvasTexture(fxCanvas);
      fxTexTop.wrapS=T.ClampToEdgeWrapping;
      fxTexTop.wrapT=T.ClampToEdgeWrapping;
      fxTexTop.colorSpace=T.SRGBColorSpace||T.sRGBEncoding;
      cap.material.map=fxTexTop;
      cap.material.color=new T.Color(0xFFFFFF);  // blanc pour ne pas teinter la texture
      cap.material.needsUpdate=true;
    }

    // DÉGRADÉ : gradient continu sans superposer plusieurs cylindres
    // Approche : un seul cylindre semi-transparent, avec une CanvasTexture en bande
    // verticale (du haut transparent vers bas saturé)
    if(effet==='degrade'){
      const dCanvas=document.createElement('canvas');
      dCanvas.width=64;dCanvas.height=512;
      const dCtx=dCanvas.getContext('2d');
      const grad=dCtx.createLinearGradient(0,0,0,512);
      grad.addColorStop(0,'rgba('+eR+','+eG+','+eB+',0)');
      grad.addColorStop(0.40,'rgba('+eR+','+eG+','+eB+',0.18)');
      grad.addColorStop(0.70,'rgba('+eR+','+eG+','+eB+',0.55)');
      grad.addColorStop(1,'rgba('+eR+','+eG+','+eB+',0.92)');
      dCtx.fillStyle=grad;
      dCtx.fillRect(0,0,64,512);
      const dTex=new T.CanvasTexture(dCanvas);
      dTex.wrapS=T.RepeatWrapping;dTex.wrapT=T.ClampToEdgeWrapping;
      dTex.colorSpace=T.SRGBColorSpace||T.sRGBEncoding;
      // Cylindre fin qui couvre toute la hauteur du tier
      const dGeo=isRound?new T.CylinderGeometry(rT*1.022,rB*1.022,tH,segs,1,true):
                 isHex?new T.CylinderGeometry(rT*1.022,rB*1.022,tH,6,1,true):
                       new T.BoxGeometry(rB*1.96,tH,rB*1.96,1,1,1);
      const dMat=new T.MeshStandardMaterial({
        map:dTex,transparent:true,depthWrite:false,
        side:T.DoubleSide,roughness:0.55,
        opacity:1.0});
      const dCyl=new T.Mesh(dGeo,dMat);
      dCyl.position.y=curY+tH/2;
      _3g.add(dCyl);

      // === Dégradé sur le dessus : disque semi-transparent au-dessus du cap ===
      // On utilise la couleur saturée (vers la base du gradient = plus de couleur)
      const dTopMat=new T.MeshStandardMaterial({
        color:new T.Color(eR/255, eG/255, eB/255),
        transparent:true, opacity:0.55,
        roughness:0.55, side:T.DoubleSide
      });
      const dTopGeo=isHex?new T.CylinderGeometry(rT*0.99,rT*0.99,0.002,6,1):
                    isRound?new T.CylinderGeometry(rT*0.99,rT*0.99,0.002,segs,1):
                    new T.BoxGeometry(rB*1.88,0.002,rB*1.88,1,1,1);
      const dTop=new T.Mesh(dTopGeo,dTopMat);
      dTop.position.y=curY+tH+capH+0.001;
      _3g.add(dTop);
    }

    curY+=tH;
  }

  // ── TOPPER ────────────────────────────────────────────────────────────────
  if(data.topper&&data.topper!=='aucun'){
    const stkM=new T.MeshStandardMaterial({color:0xC8B888,metalness:0.62,roughness:0.28});
    const stk=new T.Mesh(new T.CylinderGeometry(0.016,0.016,0.52,8),stkM);
    stk.position.y=curY+0.26;_3g.add(stk);
    const tY=curY+0.52;

    if(data.topper==='initiales'||data.topper==='chiffres'){
      // Disque doré + texte affiché dessus
      const disc=new T.Mesh(new T.CylinderGeometry(0.32,0.32,0.038,40),new T.MeshStandardMaterial({color:0xE8C040,metalness:0.93,roughness:0.08}));
      disc.position.y=tY;disc.rotation.x=Math.PI/2;_3g.add(disc);
      const rng=new T.Mesh(new T.TorusGeometry(0.34,0.024,10,40),new T.MeshStandardMaterial({color:0xFFE860,metalness:0.96,roughness:0.05}));
      rng.position.y=tY;_3g.add(rng);
      // Plaque texte dessus du disque (canvas texture pour lire le texte)
      const txt=(data.topperText||(data.topper==='initiales'?'M & J':'2027')).slice(0,20);
      const c=document.createElement('canvas');c.width=512;c.height=512;
      const cx=c.getContext('2d');
      cx.clearRect(0,0,512,512);
      cx.fillStyle='#3A1F0A';
      cx.font='bold 110px Georgia, serif';
      cx.textAlign='center';cx.textBaseline='middle';
      cx.fillText(txt,256,256);
      const tx=new T.CanvasTexture(c);tx.colorSpace=T.SRGBColorSpace||T.sRGBEncoding;
      const txMat=new T.MeshBasicMaterial({map:tx,transparent:true,depthWrite:false,side:T.DoubleSide});
      const txPl=new T.Mesh(new T.PlaneGeometry(0.56,0.56),txMat);
      txPl.position.set(0,tY+0.001,0);
      _3g.add(txPl);
    } else if(data.topper==='silhouettes'){
      const silM=new T.MeshStandardMaterial({color:0x100408,roughness:0.92});
      [[-0.17,-1],[0.17,1]].forEach(([x,j])=>{
        const hm=new T.Mesh(new T.SphereGeometry(0.11,12,12),silM);hm.position.set(x,tY+0.30,0);_3g.add(hm);
        if(j<0){const b=new T.Mesh(new T.ConeGeometry(0.135,0.31,4),silM);b.rotation.y=Math.PI/4;b.position.set(x,tY+0.08,0);_3g.add(b);}
        else{const b=new T.Mesh(new T.CylinderGeometry(0.078,0.096,0.31,8),silM);b.position.set(x,tY+0.08,0);_3g.add(b);}
      });
    }
  }

  // ── PLACED DECORATIONS ────────────────────────────────────────────────────
  const DECO_INFO={
    rose:{col:0xD4607A,col2:0xFF90A8},pivoine:{col:0xF490B8,col2:0xFFB8D0},
    orchidee:{col:0xC060C0,col2:0xE090E0},lily:{col:0xE0A0C0,col2:0xFFD0E8},
    feuille:{col:0x50A040,col2:0x80D060},eucalyptus:{col:0x5AA050,col2:0x90D080},
    fraise:{col:0xE03040,col2:0xFF8090},framboise:{col:0xC02060,col2:0xFF60A0},
    figue:{col:0x804060,col2:0xC080A0},agrume:{col:0xF0C020,col2:0xFFE080},
    macaron:{col:0xD4A0C0,col2:0xFFD0E8},coeur:{col:0xE02050,col2:0xFF6080},
    etoile:{col:0xF0C020,col2:0xFFE870},perle:{col:0xF8F0E0,col2:0xFFFFFF},
    ruban:{col:0xD4607A,col2:0xFFB0C0},papillon:{col:0xF08020,col2:0xFFD080},
    diamant:{col:0x80D0FF,col2:0xE0FAFF},baie:{col:0x4040C0,col2:0x8080FF}
  };

  // ── PLACED DECORATIONS ─────────────────────────────────────────────────────
  // Each deco group is built in local space where:
  //   +Y = upward along cake surface
  //   +Z = outward from cake center  
  //   Origin = point of contact with cake surface
  // Then we position and orient the group correctly on the cylinder.

  // ── REALISTIC 3D DECORATIONS ─────────────────────────────────────────────────
  // All decos built UPRIGHT: spread in XY plane, depth on +Z axis
  // So when rotation.y=ang, they face outward from cylinder ✓

  function _petal(T,col,scaleX,scaleY,scaleZ,px,py,pz,rx,ry,rz){
    // px/py/pz = position, rx/ry/rz = local rotation
    const g=new T.SphereGeometry(0.055,8,7);
    g.scale(scaleX,scaleY,scaleZ);
    const m=new T.Mesh(g,new T.MeshStandardMaterial({color:col,roughness:0.42,side:T.DoubleSide}));
    m.position.set(px,py,pz);
    if(rx||ry||rz)m.rotation.set(rx||0,ry||0,rz||0);
    return m;
  }

  function _leaf(T,col,scaleX,scaleY,scaleZ,px,py,pz,rz){
    const g=new T.SphereGeometry(0.05,7,6);g.scale(scaleX||0.9,scaleY||0.22,scaleZ||2.1);
    const m=new T.Mesh(g,new T.MeshStandardMaterial({color:col||0x3A8828,roughness:0.62,side:T.DoubleSide}));
    m.position.set(px||0,py||0,pz||0);if(rz)m.rotation.z=rz;
    return m;
  }

  function _makeRose(T,col,col2){
    const g=new T.Group();
    // 3 layers of petals spread in XY, each petal is a scaled sphere
    for(let layer=0;layer<3;layer++){
      const n=5+layer*2, r=0.055+layer*0.038;
      for(let p=0;p<n;p++){
        const a=(p/n)*Math.PI*2+(layer*0.45);
        const c=new T.Color().setHex(col); c.offsetHSL(0,0,layer*0.06);
        const pm=new T.Mesh(
          Object.assign(new T.SphereGeometry(0.055,8,7),{}).scale(0.9,1.55+layer*0.25,0.32+layer*0.08),
          new T.MeshStandardMaterial({color:c,roughness:0.42,side:T.DoubleSide}));
        // Remap: petals spread in XY plane
        pm.position.set(Math.cos(a)*r, Math.sin(a)*r, layer*0.018);
        pm.rotation.z = a;
        pm.rotation.x = 0.28+layer*0.1;
        g.add(pm);
      }
    }
    // Inner bud
    for(let b=0;b<5;b++){
      const bg=new T.SphereGeometry(0.026,6,6);bg.scale(0.7,1.3,0.7);
      const bm=new T.Mesh(bg,new T.MeshStandardMaterial({color:new T.Color().setHex(col2),roughness:0.38}));
      bm.position.set(Math.cos(b*1.26)*0.022,Math.sin(b*1.26)*0.022,0.02+b*0.01);
      g.add(bm);
    }
    // Leaves - spread left-right in X
    for(let l=0;l<3;l++){
      const la=(l/3)*Math.PI*2;
      g.add(_leaf(T,0x3A7828,0.9,2.0,0.2,Math.cos(la)*0.12,Math.sin(la)*0.12,-0.01,la));
    }
    return g;
  }

  function _makePivoine(T,col,col2){
    const g=new T.Group();
    for(let layer=0;layer<4;layer++){
      const n=7+layer*3, r=0.038+layer*0.048;
      for(let p=0;p<n;p++){
        const a=(p/n)*Math.PI*2+(layer*Math.PI/n);
        const c=new T.Color().setHex(col); c.offsetHSL(0,0,layer*0.05);
        const pm=new T.Mesh(
          Object.assign(new T.SphereGeometry(0.050,8,7),{}).scale(0.88,1.9+layer*0.18,0.26+layer*0.07),
          new T.MeshStandardMaterial({color:c,roughness:0.40,side:T.DoubleSide}));
        pm.position.set(Math.cos(a)*r,Math.sin(a)*r,layer*0.022);
        pm.rotation.z=a; pm.rotation.x=0.22;
        g.add(pm);
      }
    }
    // Stamens
    for(let s=0;s<8;s++){
      const sa=(s/8)*Math.PI*2;
      const sg=new T.CylinderGeometry(0.003,0.003,0.045,4);
      const sm=new T.Mesh(sg,new T.MeshStandardMaterial({color:0xFFE040,metalness:0.4}));
      sm.position.set(Math.cos(sa)*0.016,Math.sin(sa)*0.016,0.055);
      sm.rotation.x=Math.PI/2; g.add(sm);
      const sh=new T.Mesh(new T.SphereGeometry(0.007,5,5),new T.MeshStandardMaterial({color:0xFFD000,metalness:0.6}));
      sh.position.set(Math.cos(sa)*0.016,Math.sin(sa)*0.016,0.076); g.add(sh);
    }
    return g;
  }

  function _makeOrchidee(T,col,col2){
    const g=new T.Group();
    // 5 petals: 3 outer narrow, 2 inner wide  
    [[0,1],[1,0.5],[-1,0.5],[0.6,-0.4],[-0.6,-0.4]].forEach(([px,py],i)=>{
      const isInner=i>=3;
      const geo=new T.SphereGeometry(0.055,8,6);
      geo.scale(isInner?1.4:0.8, isInner?1.0:2.2, 0.28);
      const m=new T.Mesh(geo,new T.MeshStandardMaterial({
        color:new T.Color().setHex(i<3?col:col2),roughness:0.38,side:T.DoubleSide}));
      m.position.set(px*0.09,py*0.09,0.01*i);
      m.rotation.z=Math.atan2(py,px)+Math.PI/2;
      g.add(m);
    });
    // Lip/labellum center
    const lip=new T.SphereGeometry(0.04,8,6);lip.scale(1.2,0.8,0.5);
    g.add(new T.Mesh(lip,new T.MeshStandardMaterial({color:0xFFE0A0,roughness:0.3})));
    // Spots
    for(let s=0;s<6;s++){
      const sg=new T.CircleGeometry(0.009,6);
      const sm=new T.Mesh(sg,new T.MeshStandardMaterial({color:0x8020A0,transparent:true,opacity:0.6}));
      sm.position.set((Math.random()-0.5)*0.06,(Math.random()-0.5)*0.06,0.025);
      g.add(sm);
    }
    return g;
  }

  function _makeLeaf(T,col){
    const g=new T.Group();
    // Main blade - upright in XY
    const geo=new T.SphereGeometry(0.12,10,8);geo.scale(1,2.4,0.18);
    g.add(new T.Mesh(geo,new T.MeshStandardMaterial({color:col||0x3A8828,roughness:0.62,side:T.DoubleSide})));
    // Midrib vein
    const vg=new T.CylinderGeometry(0.006,0.003,0.24,4);
    g.add(new T.Mesh(vg,new T.MeshStandardMaterial({color:0x2A6018,roughness:0.7})));
    // Side veins
    for(let v=0;v<4;v++){
      const side=(v%2===0)?1:-1, vy=-0.08+(Math.floor(v/2))*0.10;
      const sg=new T.CylinderGeometry(0.003,0.002,0.07,3);
      const sm=new T.Mesh(sg,new T.MeshStandardMaterial({color:0x2A6018}));
      sm.rotation.z=side*0.5; sm.position.set(side*0.04,vy,0); g.add(sm);
    }
    return g;
  }

  function _makeEucalyptus(T){
    const g=new T.Group();
    // Stem - vertical
    g.add(new T.Mesh(new T.CylinderGeometry(0.008,0.005,0.22,5),
      new T.MeshStandardMaterial({color:0x6A9060,roughness:0.7})));
    // Paired leaves - spread in X at various heights on Y
    for(let i=0;i<5;i++){
      const y=-0.08+i*0.05;
      [-1,1].forEach(sx=>{
        const lg=new T.SphereGeometry(0.038,7,6);lg.scale(1.8,0.30,0.25);
        const lm=new T.Mesh(lg,new T.MeshStandardMaterial({color:0x5A9858,roughness:0.6,side:T.DoubleSide}));
        lm.position.set(sx*0.058,y,0); lm.rotation.z=sx*0.4; g.add(lm);
      });
    }
    return g;
  }

  function _makeFraise(T){
    const g=new T.Group();
    const bg=new T.SphereGeometry(0.09,12,10);bg.scale(0.88,1.1,0.88);
    g.add(new T.Mesh(bg,new T.MeshStandardMaterial({color:0xDD2030,roughness:0.6})));
    // Seeds
    for(let s=0;s<18;s++){
      const a=s*0.8, b=s*1.3;
      const sg=new T.SphereGeometry(0.008,4,4);
      const sm=new T.Mesh(sg,new T.MeshStandardMaterial({color:0xFFFF80,roughness:0.4}));
      sm.position.set(Math.sin(a)*Math.sin(b)*0.09, Math.cos(a)*0.095, Math.cos(b)*Math.sin(a)*0.09);
      g.add(sm);
    }
    // Calyx leaves upward
    for(let l=0;l<5;l++){
      const la=(l/5)*Math.PI*2;
      const lg=new T.SphereGeometry(0.03,5,4);lg.scale(0.8,2.5,0.22);
      const lm=new T.Mesh(lg,new T.MeshStandardMaterial({color:0x228820,roughness:0.6}));
      lm.position.set(Math.cos(la)*0.035,0.09,Math.sin(la)*0.035);
      lm.rotation.z=la; lm.rotation.x=0.4; g.add(lm);
    }
    return g;
  }

  function _makeFramboise(T){
    const g=new T.Group();
    const positions=[
      [0,0.05,0],[-0.04,0.02,0.03],[0.04,0.02,0.03],
      [-0.04,0.02,-0.03],[0.04,0.02,-0.03],[0,0,-0.05],
      [-0.02,-0.03,0.03],[0.02,-0.03,-0.03]
    ];
    const cols=[0xCC1A50,0xBB1040,0xDD2060,0xC01848,0xBB1540,0xD01050,0xCC1855,0xC81A4A];
    positions.forEach(([x,y,z],i)=>{
      const dm=new T.Mesh(new T.SphereGeometry(0.032,9,9),
        new T.MeshStandardMaterial({color:cols[i],roughness:0.52}));
      dm.position.set(x,y,z); g.add(dm);
      const hi=new T.Mesh(new T.SphereGeometry(0.009,5,5),
        new T.MeshStandardMaterial({color:0xFF80A0,transparent:true,opacity:0.45}));
      hi.position.set(x-0.01,y+0.018,z+0.018); g.add(hi);
    });
    for(let l=0;l<4;l++){
      const la=(l/4)*Math.PI*2;
      g.add(_leaf(T,0x228820,0.7,0.22,1.8,Math.cos(la)*0.05,-0.03,Math.sin(la)*0.05,la));
    }
    return g;
  }

  function _makeFigue(T){
    const g=new T.Group();
    const bg=new T.SphereGeometry(0.08,12,10);bg.scale(0.95,1.15,0.95);
    g.add(new T.Mesh(bg,new T.MeshStandardMaterial({color:0x6A3060,roughness:0.55})));
    // Stem at top (in +Y)
    g.add(new T.Mesh(new T.CylinderGeometry(0.007,0.005,0.04,6),
      new T.MeshStandardMaterial({color:0x3A5820})));
    // Crown leaves upward
    for(let l=0;l<4;l++){
      const la=(l/4)*Math.PI*2;
      const lg=new T.SphereGeometry(0.022,5,4);lg.scale(0.8,2.0,0.22);
      const lm=new T.Mesh(lg,new T.MeshStandardMaterial({color:0x3A6820,roughness:0.65}));
      lm.position.set(Math.cos(la)*0.028,0.092,Math.sin(la)*0.028);
      lm.rotation.z=la; lm.rotation.x=0.5; g.add(lm);
    }
    return g;
  }

  function _makeAgrume(T){
    const g=new T.Group();
    g.add(new T.Mesh(new T.SphereGeometry(0.088,14,12),
      new T.MeshStandardMaterial({color:0xF8B820,roughness:0.42})));
    // Leaf upright in +Y
    const lgo=new T.SphereGeometry(0.045,6,5);lgo.scale(1,2.2,0.20);
    const lmo=new T.Mesh(lgo,new T.MeshStandardMaterial({color:0x3A7820,roughness:0.60,side:T.DoubleSide}));

  function _makePapillon(T){

     [0.75,0.9,0.30, 0.07,0.3,0],[0.75,0.9,0.30,-0.07,Math.PI-0.3,0]].forEach(([sx,sy,sz,px,rz,ry],wi)=>{

    const bodyG=new T.SphereGeometry(0.022,8,8);bodyG.scale(1,2.8,1);

  function _makeBaie(T){
    const g=new T.Group();
    const positions=[
      [0,0.06,0],[-0.06,0.03,0.04],[0.06,0.03,0.04],
      [-0.06,0.03,-0.04],[0.06,0.03,-0.04],[0,-0.04,0.05],[0,-0.04,-0.05]
    ];
    const cols=[0x3838C0,0x2828B0,0x4848D0,0x1818A8,0x5050D8,0x3030B8,0x2828C0];
    positions.forEach(([x,y,z],i)=>{
      const bm=new T.Mesh(new T.SphereGeometry(0.038,10,10),
        new T.MeshStandardMaterial({color:cols[i],roughness:0.32,metalness:0.1}));
      bm.position.set(x,y,z); g.add(bm);
      const hi=new T.Mesh(new T.SphereGeometry(0.011,6,6),
        new T.MeshStandardMaterial({color:0x9090FF,transparent:true,opacity:0.5}));
      hi.position.set(x-0.012,y+0.02,z+0.018); g.add(hi);
    });
    // Leaves
    for(let l=0;l<3;l++){
      const la=(l/3)*Math.PI*2;
      g.add(_leaf(T,0x3A7828,0.8,2.0,0.20,Math.cos(la)*0.06,-0.07,Math.sin(la)*0.01,la));
    }
    return g;
  }

  // Decorate _3g.decoMeshes to allow raycasting selection
  _3g.decoMeshes=_3g.decoMeshes||[];
  _3g.decoMeshes=[];

  (data.decos||[]).forEach((d,decoIdx)=>{
    const ti=Math.min((data.etages||2)-1,Math.max(0,d.tier||0));
    const tH=HEIGHTS[ti]||0.55;
    const sY=_3tierY[ti]||0.260;
    const heightFrac=Math.max(0,Math.min(1,d.height||0.5));

    // Calcul du rayon à la hauteur exacte (tier conique : rB en bas → rT en haut)
    const rBot=_3tierR[ti]||0.8;
    const rTop=rBot*0.94;
    const tFracInTier=0.05+heightFrac*0.90;
    const rAtH=rBot+(rTop-rBot)*tFracInTier;

    const ang=((d.angle||0)/360)*Math.PI*2;

    // ─── PLACEMENT : côté (side) OU dessus (top) ───
    // face === 'top' → posé à plat sur la face supérieure de l'étage (à l'horizontale)
    // face === 'side' (par défaut) → collé sur le côté du cylindre (à la verticale)
    const face = d.face || 'side';

    // Build deco — TOUTES les décorations passent par _makeDeco3D
    let dg = _makeDeco3D(T, d.id, d);

    // ─── ÉCHELLE : décos beaucoup plus grandes qu'avant (proportion au gâteau) ───
    // Scale : taille proportionnée au gâteau (gâteau ~2 unités de diamètre, décos ~0.2 unités)
    const userScale = Math.max(0.4, Math.min(2.5, d.scale||1.0));
    const baseScaleFactor = 2.5;  // ratio ~1:9 par rapport au gâteau (décos discrètes mais visibles)
    const finalScale = baseScaleFactor * userScale;

    const tilt=((d.tilt||0)/180)*Math.PI;
    const spin=((d.spin||0)/180)*Math.PI;

    // ─── ROTATION AUTO selon la face ───
    if(face === 'top'){
      // Sur le dessus : déco posée à plat (rotation -90° sur X pour coucher)
      // + rotation Y selon angle pour orienter autour de l'axe vertical
      dg.rotation.set(-Math.PI/2 + tilt, ang + spin, 0);
    } else {
      // Sur le côté : déco verticale, face vers l'extérieur
      dg.rotation.set(tilt, ang, spin);
    }
    dg.scale.setScalar(finalScale);

    // ─── PLACEMENT À LA SURFACE (sans incrustation) ─────────────────────
    // 1) On place temporairement la déco au centre, on calcule sa bounding box
    //    APRÈS rotation+scale, pour connaître l'étendue réelle dans l'espace.
    // 2) On détermine la direction de "surface vers extérieur" (normale).
    // 3) On pousse la déco le long de cette normale d'un montant = -minProj
    //    où minProj = projection minimale de la bounding box sur la normale.
    //    Ainsi le DOS de la déco vient toucher la surface du gâteau.
    dg.position.set(0,0,0);
    dg.updateMatrixWorld(true);
    // Exclure la sphère de hit (invisible) du calcul de bbox
    const _bb = new T.Box3();
    let _hasMesh = false;
    dg.traverse(o=>{
      if(o.isMesh && !o.userData.isHitArea){
        o.updateMatrixWorld(true);
        const geoBB = new T.Box3().setFromObject(o);
        if(_hasMesh){ _bb.union(geoBB); } else { _bb.copy(geoBB); _hasMesh=true; }
      }
    });
    // Direction sortante (normale à la surface)
    const outVx = face==='top' ? 0 : Math.sin(ang);
    const outVy = face==='top' ? 1 : 0;
    const outVz = face==='top' ? 0 : Math.cos(ang);
    // Projection min/max des 8 coins de la bbox sur la normale
    let minProj = Infinity;
    if(_hasMesh){
      const cs = [
        [_bb.min.x,_bb.min.y,_bb.min.z],[_bb.max.x,_bb.min.y,_bb.min.z],
        [_bb.min.x,_bb.max.y,_bb.min.z],[_bb.max.x,_bb.max.y,_bb.min.z],
        [_bb.min.x,_bb.min.y,_bb.max.z],[_bb.max.x,_bb.min.y,_bb.max.z],
        [_bb.min.x,_bb.max.y,_bb.max.z],[_bb.max.x,_bb.max.y,_bb.max.z],
      ];
      for(let k=0;k<8;k++){
        const proj = cs[k][0]*outVx + cs[k][1]*outVy + cs[k][2]*outVz;
        if(proj<minProj) minProj=proj;
      }
    } else {
      minProj = 0;
    }
    // Combien la déco s'étend vers la surface (côté "intérieur")
    // minProj est le coin de la bbox le plus enfoncé dans le gâteau (négatif).
    // Si on pousse de -minProj, le coin arrière touche pile la surface, mais la
    // déco apparaît "flottante" car son centre de masse est loin de la surface.
    // On enfonce volontairement à 30% du minProj : le pétale/élément arrière est
    // légèrement dans le gâteau, ce qui donne l'impression que la déco "tient"
    // dessus naturellement, sans être ni en lévitation ni enterrée.
    // Le surfaceOffset minimal de 0.012 évite le z-fighting pour les très petites décos.
    const surfaceOffset = Math.max(0.012, (-minProj) * 0.70 + 0.005);

    // Position du point de surface "cible"
    let pX, pY, pZ;
    if(face === 'top'){
      const topR = rTop;
      const rOnTop = Math.max(0, Math.min(1, d.height||0.0)) * topR * 0.85;
      const surfX = Math.sin(ang) * rOnTop;
      const surfZ = Math.cos(ang) * rOnTop;
      const surfY = sY + tH;
      pX = surfX + outVx * surfaceOffset;
      pY = surfY + outVy * surfaceOffset;
      pZ = surfZ + outVz * surfaceOffset;
    } else {
      const decoY = sY + tH*(0.05 + heightFrac*0.90);
      const surfX = Math.sin(ang) * rAtH;
      const surfZ = Math.cos(ang) * rAtH;
      pX = surfX + outVx * surfaceOffset;
      pY = decoY + outVy * surfaceOffset;
      pZ = surfZ + outVz * surfaceOffset;
    }

    dg.position.set(pX, pY, pZ);

    dg.userData.decoIdx = decoIdx;
    dg.userData.baseScale = finalScale;  // mémorisé pour _highlightDeco
    dg.traverse(obj=>{
      if(obj.isMesh){
        obj.castShadow=true;
        obj.userData.decoIdx=decoIdx;
      }
    });

    _3g.add(dg);
    _3g.decoMeshes.push(dg);
  });
  // Centre the cake vertically in the scene + apply pan
  _3g.userData.baseY=-(curY/2+0.13);
  _3g.position.y=_3g.userData.baseY+_3panY;
  _3g.position.x=_3panX;
}

function startRenderLoop(){
  const T=window.THREE;
  let frame=0;
  function animate(){
    _3id=requestAnimationFrame(animate);
    if(!_3r||!_3s||!_3c)return;
    if(_3auto&&!_3drag) _3ry+=0.005;
    if(_3g){
      _3g.rotation.y=_3ry;_3g.rotation.x=_3rx;
      _3g.position.x=_3panX;
      // y position is set in buildCake3D, but we add pan here too
      const baseY=_3g.userData.baseY;
      if(baseY!==undefined)_3g.position.y=baseY+_3panY;
    }
    // Resize check
    const el=_3r.domElement;
    const W=el.clientWidth,H=el.clientHeight;
    if(el.width!==Math.round(W*window.devicePixelRatio)||el.height!==Math.round(H*window.devicePixelRatio)){
      _3r.setSize(W,H,false);_3c.aspect=W/H;_3c.updateProjectionMatrix();
    }
    _3r.render(_3s,_3c);
    // Mettre à jour la position du panneau inline (suit la déco sélectionnée)
    try{ _updateDecoInlinePanelPos(); }catch(_){}
  }
  animate();
}

function attachOrbit(canvas){
  // Skip orbit if a deco is being placed
  canvas.addEventListener('mousedown',e=>{
    if(_3dragDecoIdx!==null)return; // deco placement takes priority
    _3drag=true;_3auto=false;_3lx=e.clientX;_3ly=e.clientY;
  });
  canvas.addEventListener('mousemove',e=>{
    if(_3dragDecoIdx!==null)return;
    if(!_3drag)return;
    const dx=e.clientX-_3lx,dy=e.clientY-_3ly;
    if(_3handMode){
      // Mode main : déplace le gâteau
      _3panX+=dx*0.012;_3panY-=dy*0.012;
    } else {
      // Mode rotation : tourne le gâteau
      _3ry+=dx*0.008;_3rx+=dy*0.006;
      _3rx=Math.max(-0.55,Math.min(0.75,_3rx));
    }
    _3lx=e.clientX;_3ly=e.clientY;
  });
  canvas.addEventListener('mouseup',()=>{if(_3dragDecoIdx===null)_3drag=false;});
  canvas.addEventListener('mouseleave',()=>{_3drag=false;});
  canvas.addEventListener('touchstart',e=>{
    if(_3dragDecoIdx!==null)return;
    if(e.touches.length===1){_3drag=true;_3auto=false;_3lx=e.touches[0].clientX;_3ly=e.touches[0].clientY;}
    if(e.touches.length===2){
      e.preventDefault();
      _3pinch=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    }
  },{passive:false});
  canvas.addEventListener('touchmove',e=>{
    if(_3dragDecoIdx!==null)return;
    if(e.touches.length===1&&_3drag){
      e.preventDefault();
      const dx=e.touches[0].clientX-_3lx,dy=e.touches[0].clientY-_3ly;
      if(_3handMode){
        _3panX+=dx*0.012;_3panY-=dy*0.012;
      } else {
        _3ry+=dx*0.010;_3rx+=dy*0.007;
        _3rx=Math.max(-0.55,Math.min(0.75,_3rx));
      }
      _3lx=e.touches[0].clientX;_3ly=e.touches[0].clientY;
    }
    if(e.touches.length===2&&_3pinch!==null){
      e.preventDefault();
      const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      const ratio=_3pinch/d;
      if(_3c)_3c.position.z=Math.max(3.5,Math.min(12,_3c.position.z*ratio));
      _3pinch=d;
    }
  },{passive:false});
  canvas.addEventListener('touchend',e=>{
    if(_3dragDecoIdx===null){
      if(e.touches.length===0){_3drag=false;_3pinch=null;}
      else if(e.touches.length===1){_3pinch=null;}
    }
  },{passive:true});
  canvas.addEventListener('wheel',e=>{if(_3c)_3c.position.z=Math.max(3.5,Math.min(12,_3c.position.z+e.deltaY*0.005));},{passive:true});
}

function _getDecoTexture(T,svgId){
  if(_decoTextureCache[svgId])return _decoTextureCache[svgId];
  const canvas=document.createElement('canvas');
  canvas.width=1024;canvas.height=1024;
  const ctx=canvas.getContext('2d');
  // CLEAR FULL TRANSPARENCY (important — sinon canvas pas vraiment transparent)
  ctx.clearRect(0,0,1024,1024);
  const emoji=DECO_EMOJI[svgId];
  if(emoji){
    // Pas de shadow blur dispersé qui fait paraître un fond
    ctx.shadowColor='rgba(0,0,0,0.30)';
    ctx.shadowBlur=22;
    ctx.shadowOffsetX=0;ctx.shadowOffsetY=10;
    ctx.font='820px Apple Color Emoji,Segoe UI Emoji,Noto Color Emoji,EmojiOne Color,Twemoji Mozilla,sans-serif';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(emoji,512,560);
  } else {
    const svgStr=DECO_SVG[svgId];
    if(svgStr){
      const img=new Image();
      const blob=new Blob([svgStr],{type:'image/svg+xml;charset=utf-8'});
      const url=URL.createObjectURL(blob);
      img.onload=function(){
        ctx.drawImage(img,0,0,1024,1024);
        if(_decoTextureCache[svgId])_decoTextureCache[svgId].needsUpdate=true;
        URL.revokeObjectURL(url);
      };
      img.src=url;
    }
  }
  const tex=new T.Texture(canvas);
  tex.colorSpace=T.SRGBColorSpace||T.sRGBEncoding;
  tex.anisotropy=8;
  tex.premultiplyAlpha=false;
  tex.needsUpdate=true;
  _decoTextureCache[svgId]=tex;
  return tex;
}
