// ─── FRAISE — forme conique avec graines en relief ──────────────────────
// Référence : fraise rouge brillante, cone arrondi, calice vert avec
// folioles pointues, surface texturée avec petites graines jaunes
function _decoFraise(T, data){
  const g = new T.Group();
  const redCol = new T.Color(0xD42030);
  const redDark = new T.Color(0xB01828);
  const greenCol = new T.Color(0x5BA040);
  const greenDark = new T.Color(0x386828);
  const seedCol = new T.Color(0xF8E040);
  const fleshCol = new T.Color(0xFCEBDC);  // chair blanche-crème
  const fleshLine = new T.Color(0xF8D8C8); // stries chair

  // Helper : fraise ENTIÈRE (orientée vers +Y, calice en haut)
  function makeWhole(){
    const sub = new T.Group();
    // Corps : forme allongée (plus haute que large)
    const bodyGeo = new T.SphereGeometry(0.5, 22, 18);
    const pos = bodyGeo.attributes.position;
    const w_b = 0.026, h_b = 0.048;
    for(let i=0; i<pos.count; i++){
      const x = pos.getX(i), y = pos.getY(i), z = pos.getZ(i);
      // y∈[-0.5, 0.5] → t∈[0,1] : 0=base (pointe), 1=sommet (calice)
      const t = y + 0.5;
      // Profil allongé : large en haut, pointu en bas
      let rxNorm;
      if(t > 0.82){
        // épaules en haut (sous calice)
        rxNorm = 0.70 + (1 - (t - 0.82)/0.18) * 0.30;
      } else if(t > 0.60){
        rxNorm = 1.0;
      } else {
        const tt = (0.60 - t) / 0.60;
        rxNorm = Math.cos(tt * Math.PI/2);
      }
      const r_pt = Math.sqrt(x*x + z*z);
      const scale_xz = (r_pt > 1e-6) ? (rxNorm * w_b) / r_pt : 1;
      pos.setX(i, x * scale_xz);
      pos.setZ(i, z * scale_xz);
      pos.setY(i, y * h_b * 2);
    }
    bodyGeo.computeVertexNormals();
    const body = new T.Mesh(bodyGeo, new T.MeshStandardMaterial({
      color: redCol, roughness: 0.35, metalness: 0.10
    }));
    sub.add(body);

    // Graines jaunes en relief (~38)
    const nSeeds = 38;
    for(let i=0; i<nSeeds; i++){
      const t = (i + 0.5) / nSeeds * 0.85 + 0.05;
      const ang = i * 2.39996;  // angle d'or
      // Profil
      let rxNorm;
      if(t > 0.82){
        rxNorm = 0.70 + (1 - (t - 0.82)/0.18) * 0.30;
      } else if(t > 0.60){
        rxNorm = 1.0;
      } else {
        const tt = (0.60 - t) / 0.60;
        rxNorm = Math.cos(tt * Math.PI/2);
      }
      const rxAt = rxNorm * w_b * 0.95;
      const sx = Math.cos(ang) * rxAt;
      const sy = (t - 0.5) * h_b * 2;
      const sz = Math.sin(ang) * rxAt;
      const seedGeo = new T.SphereGeometry(0.5, 5, 4);
      const sp = seedGeo.attributes.position;
      for(let j=0; j<sp.count; j++){
        sp.setX(j, sp.getX(j) * 0.0028);
        sp.setY(j, sp.getY(j) * 0.0042);
        sp.setZ(j, sp.getZ(j) * 0.0018);
      }
      seedGeo.computeVertexNormals();
      const seed = new T.Mesh(seedGeo, new T.MeshStandardMaterial({
        color: seedCol, roughness: 0.45
      }));
      seed.position.set(sx, sy, sz);
      const nlen = Math.sqrt(sx*sx + sy*sy + sz*sz);
      if(nlen > 0){
        const up = new T.Vector3(0, 1, 0);
        const dir = new T.Vector3(sx/nlen, sy/nlen, sz/nlen);
        seed.quaternion.setFromUnitVectors(up, dir);
      }
      sub.add(seed);
    }

    // CALICE : 5 folioles vertes pointues qui retombent
    for(let i=0; i<5; i++){
      const a = (i/5) * Math.PI * 2;
      const fShape = new T.Shape();
      fShape.moveTo(0, 0);
      fShape.bezierCurveTo(-0.010, 0.008, -0.012, 0.022, -0.005, 0.032);
      fShape.lineTo(0, 0.038);
      fShape.lineTo(0.005, 0.032);
      fShape.bezierCurveTo(0.012, 0.022, 0.010, 0.008, 0, 0);
      const fGeo = new T.ExtrudeGeometry(fShape, {
        depth: 0.0035, bevelEnabled: true,
        bevelSegments: 1, bevelSize: 0.0015, bevelThickness: 0.0008
      });
      const fp = fGeo.attributes.position;
      for(let j=0; j<fp.count; j++){
        const y = fp.getY(j), z = fp.getZ(j);
        const yFrac = Math.max(0, y/0.038);
        fp.setZ(j, z + Math.sin(yFrac*Math.PI*0.4)*0.010);
      }
      fGeo.computeVertexNormals();
      const fol = new T.Mesh(fGeo, new T.MeshStandardMaterial({
        color: greenCol, roughness: 0.55, side: T.DoubleSide
      }));
      fol.position.set(0, h_b - 0.002, 0);
      fol.rotation.y = a;
      fol.rotation.x = -0.5;
      sub.add(fol);
    }

    // Pédoncule
    const stem = new T.Mesh(
      new T.CylinderGeometry(0.0028, 0.0035, 0.012, 6),
      new T.MeshStandardMaterial({color: greenCol, roughness: 0.6})
    );
    stem.position.y = h_b + 0.008;
    sub.add(stem);

    return sub;
  }

  // Helper : fraise COUPÉE en deux (vue de la chair, face plate vers +Z)
  function makeHalf(){
    const sub = new T.Group();
    const w_b = 0.024, h_b = 0.045;

    // Demi-corps : sphère coupée en deux selon le plan XY
    const bodyGeo = new T.SphereGeometry(0.5, 22, 18, 0, Math.PI*2, 0, Math.PI);
    const pos = bodyGeo.attributes.position;
    for(let i=0; i<pos.count; i++){
      const x = pos.getX(i), y = pos.getY(i), z = pos.getZ(i);
      const t = y + 0.5;
      let rxNorm;
      if(t > 0.82){
        rxNorm = 0.70 + (1 - (t - 0.82)/0.18) * 0.30;
      } else if(t > 0.60){
        rxNorm = 1.0;
      } else {
        const tt = (0.60 - t) / 0.60;
        rxNorm = Math.cos(tt * Math.PI/2);
      }
      const r_pt = Math.sqrt(x*x + z*z);
      const scale_xz = (r_pt > 1e-6) ? (rxNorm * w_b) / r_pt : 1;
      pos.setX(i, x * scale_xz);
      pos.setZ(i, z * scale_xz);
      pos.setY(i, y * h_b * 2);
      // aplatir la moitié arrière
      if(pos.getZ(i) < 0){
        pos.setZ(i, 0);
      }
    }
    bodyGeo.computeVertexNormals();
    const body = new T.Mesh(bodyGeo, new T.MeshStandardMaterial({
      color: redCol, roughness: 0.35
    }));
    sub.add(body);

    // Face plate de chair (ellipse claire montrant l'intérieur)
    const fleshShape = new T.Shape();
    const np = 40;
    for(let k=0; k<=np; k++){
      const t = k/np;  // 0 (base/pointe) → 1 (sommet/calice)
      let rxNorm;
      if(t > 0.82){
        rxNorm = 0.70 + (1 - (t - 0.82)/0.18) * 0.30;
      } else if(t > 0.60){
        rxNorm = 1.0;
      } else {
        const tt = (0.60 - t) / 0.60;
        rxNorm = Math.cos(tt * Math.PI/2);
      }
      const xx = rxNorm * w_b * 0.92;
      const yy = (t - 0.5) * h_b * 2;
      if(k === 0) fleshShape.moveTo(xx, yy);
      else fleshShape.lineTo(xx, yy);
    }
    for(let k=np; k>=0; k--){
      const t = k/np;
      let rxNorm;
      if(t > 0.82){
        rxNorm = 0.70 + (1 - (t - 0.82)/0.18) * 0.30;
      } else if(t > 0.60){
        rxNorm = 1.0;
      } else {
        const tt = (0.60 - t) / 0.60;
        rxNorm = Math.cos(tt * Math.PI/2);
      }
      const xx = -rxNorm * w_b * 0.92;
      const yy = (t - 0.5) * h_b * 2;
      fleshShape.lineTo(xx, yy);
    }
    const fleshGeo = new T.ShapeGeometry(fleshShape);
    const flesh = new T.Mesh(fleshGeo, new T.MeshStandardMaterial({
      color: fleshCol, roughness: 0.55, side: T.DoubleSide
    }));
    flesh.position.z = 0.0005;
    sub.add(flesh);

    // Cœur central blanc (zone fibreuse au milieu, plus claire)
    const coreShape = new T.Shape();
    const ncp = 30;
    for(let k=0; k<=ncp; k++){
      const t = k/ncp;
      const wCore = w_b * 0.18 * Math.pow(Math.sin(t * Math.PI), 0.7);
      const yy = (t - 0.5) * h_b * 2;
      if(k === 0) coreShape.moveTo(wCore, yy);
      else coreShape.lineTo(wCore, yy);
    }
    for(let k=ncp; k>=0; k--){
      const t = k/ncp;
      const wCore = w_b * 0.18 * Math.pow(Math.sin(t * Math.PI), 0.7);
      const yy = (t - 0.5) * h_b * 2;
      coreShape.lineTo(-wCore, yy);
    }
    const coreGeo = new T.ShapeGeometry(coreShape);
    const core = new T.Mesh(coreGeo, new T.MeshStandardMaterial({
      color: 0xFFF4E8, roughness: 0.55, side: T.DoubleSide
    }));
    core.position.z = 0.0008;
    sub.add(core);

    // Filaments radiaux blancs (stries de chair)
    for(let k=0; k<14; k++){
      const t = 0.1 + (k/14) * 0.80;
      let rxNorm;
      if(t > 0.82){
        rxNorm = 0.70 + (1 - (t - 0.82)/0.18) * 0.30;
      } else if(t > 0.60){
        rxNorm = 1.0;
      } else {
        const tt = (0.60 - t) / 0.60;
        rxNorm = Math.cos(tt * Math.PI/2);
      }
      for(const sign of [-1, 1]){
        const fil = new T.Mesh(
          new T.BoxGeometry(rxNorm * w_b * 0.80, 0.0008, 0.0005),
          new T.MeshStandardMaterial({color: fleshLine, roughness: 0.55})
        );
        fil.position.set(sign * rxNorm * w_b * 0.42,
                         (t - 0.5) * h_b * 2,
                         0.0010);
        sub.add(fil);
      }
    }

    // Graines visibles sur le bord interne de la peau (peu nombreuses : on voit la coupe)
    for(let i=0; i<14; i++){
      const t = (i + 0.5) / 14 * 0.85 + 0.05;
      let rxNorm;
      if(t > 0.82){
        rxNorm = 0.70 + (1 - (t - 0.82)/0.18) * 0.30;
      } else if(t > 0.60){
        rxNorm = 1.0;
      } else {
        const tt = (0.60 - t) / 0.60;
        rxNorm = Math.cos(tt * Math.PI/2);
      }
      for(const sign of [-1, 1]){
        const seed = new T.Mesh(
          new T.SphereGeometry(0.0014, 4, 3),
          new T.MeshStandardMaterial({color: 0xE0B040, roughness: 0.5})
        );
        seed.position.set(sign * rxNorm * w_b * 0.88,
                          (t - 0.5) * h_b * 2,
                          0.0012);
        seed.scale.set(1, 1, 0.5);
        sub.add(seed);
      }
    }

    // Calice (3 folioles visibles côté coupe)
    for(let k=-1; k<=1; k++){
      const a = k * 0.7;
      const fShape = new T.Shape();
      fShape.moveTo(0, 0);
      fShape.bezierCurveTo(-0.009, 0.007, -0.011, 0.020, -0.004, 0.028);
      fShape.lineTo(0, 0.034);
      fShape.lineTo(0.004, 0.028);
      fShape.bezierCurveTo(0.011, 0.020, 0.009, 0.007, 0, 0);
      const fGeo = new T.ExtrudeGeometry(fShape, {
        depth: 0.003, bevelEnabled: true,
        bevelSegments: 1, bevelSize: 0.0012, bevelThickness: 0.0006
      });
      const fol = new T.Mesh(fGeo, new T.MeshStandardMaterial({
        color: greenCol, roughness: 0.55, side: T.DoubleSide
      }));
      fol.position.set(0, h_b - 0.002, 0.001);
      fol.rotation.y = a;
      fol.rotation.x = -0.5;
      sub.add(fol);
    }

    // Pédoncule
    const stem = new T.Mesh(
      new T.CylinderGeometry(0.0024, 0.0030, 0.010, 6),
      new T.MeshStandardMaterial({color: greenCol, roughness: 0.6})
    );
    stem.position.y = h_b + 0.006;
    sub.add(stem);

    return sub;
  }

  // ─── Composition photo Rabbits World ─────────────────────────────
  // FRAISE ENTIÈRE : debout à droite, pointe en bas (orientation par défaut OK)
  const whole = makeWhole();
  whole.position.set(0.012, 0, 0);
  g.add(whole);

  // FRAISE COUPÉE : couchée à gauche, pointe à gauche, calice contre l'entière
  // → rotation -75° autour de Z (calice à droite-haut, pointe à gauche-bas)
  const half = makeHalf();
  half.position.set(-0.018, -0.015, 0.005);
  half.rotation.z = -Math.PI/180 * 75;
  g.add(half);

  return g;
}

// ─── FRUITS ROUGES — mix framboises, mûres, groseilles ─────────────────
// Référence : composition de 3-4 types de fruits rouges entiers
function _decoFruitsRouges(T, data){
  const g = new T.Group();
  
  // Helper : framboise (cluster de drupelets)
  function makeRaspberry(){
    const sub = new T.Group();
    const rasMat = new T.MeshStandardMaterial({
      color: 0xC02055, roughness: 0.40, metalness: 0.10
    });
    // ~14 drupelets en dôme
    const nDrups = 14;
    for(let i=0; i<nDrups; i++){
      const t = i / nDrups;
      const phi = Math.acos(1 - 2*t*0.65); // hémisphère sup
      const theta = Math.PI * (1 + Math.sqrt(5)) * i;
      const dr = 0.014;
      const dm = new T.Mesh(
        new T.SphereGeometry(0.005, 6, 5),
        rasMat.clone()
      );
      dm.material.color = new T.Color(0xC02055 + (Math.random()-0.5)*0x102020|0);
      dm.position.set(
        Math.sin(phi)*Math.cos(theta)*dr,
        Math.cos(phi)*dr * 0.7,
        Math.sin(phi)*Math.sin(theta)*dr
      );
      sub.add(dm);
    }
    // Mini bouton vert
    const stem = new T.Mesh(
      new T.SphereGeometry(0.0035, 5, 4),
      new T.MeshStandardMaterial({color: 0x4A8030, roughness: 0.6})
    );
    stem.position.y = 0.012;
    sub.add(stem);
    return sub;
  }
  
  // Helper : mûre (cluster sombre)
  function makeBlackberry(){
    const sub = new T.Group();
    const bbMat = new T.MeshStandardMaterial({
      color: 0x2A0F30, roughness: 0.30, metalness: 0.25
    });
    const nDrups = 16;
    for(let i=0; i<nDrups; i++){
      const t = i / nDrups;
      const phi = Math.acos(1 - 2*t*0.7);
      const theta = Math.PI * (1 + Math.sqrt(5)) * i;
      const dr = 0.015;
      const dm = new T.Mesh(
        new T.SphereGeometry(0.0055, 6, 5),
        bbMat.clone()
      );
      // Variations sombre
      const v = 0.85 + Math.random()*0.30;
      dm.material.color = new T.Color(0x2A0F30).multiplyScalar(v);
      dm.position.set(
        Math.sin(phi)*Math.cos(theta)*dr,
        Math.cos(phi)*dr*0.7,
        Math.sin(phi)*Math.sin(theta)*dr
      );
      sub.add(dm);
    }
    return sub;
  }
  
  // Helper : groseille (petite sphère rouge brillante)
  function makeCurrant(){
    return new T.Mesh(
      new T.SphereGeometry(0.008, 10, 8),
      new T.MeshStandardMaterial({
        color: 0xD8202A, roughness: 0.20, metalness: 0.25
      })
    );
  }
  
  // Helper : myrtille (sphère bleu-violet mate avec petit cratère)
  function makeBlueberry(){
    const bg = new T.SphereGeometry(0.009, 10, 8);
    const m = new T.Mesh(bg, new T.MeshStandardMaterial({
      color: 0x3A4878, roughness: 0.55
    }));
    return m;
  }
  
  // ─── FEUILLE verte DERRIÈRE (dessinée en premier, en z négatif) ───
  const lg = new T.SphereGeometry(0.5, 8, 6);
  const lp = lg.attributes.position;
  for(let j=0; j<lp.count; j++){
    lp.setX(j, lp.getX(j) * 0.030);
    lp.setY(j, lp.getY(j) * 0.003);
    lp.setZ(j, lp.getZ(j) * 0.045);
  }
  lg.computeVertexNormals();
  const leaf = new T.Mesh(lg, new T.MeshStandardMaterial({
    color: 0x5BA046, roughness: 0.55, side: T.DoubleSide
  }));
  // derrière les fruits : z négatif + un peu en hauteur
  leaf.position.set(0.018, 0.020, -0.022);
  leaf.rotation.set(-0.35, 0.5, 0.6);
  g.add(leaf);

  // ─── Composition photo Sicoly : 1 grosse mûre + 2 framboises + 2 myrtilles, FRUITS COLLÉS ───
  // Grosse mûre en haut-centre-gauche
  const bb1 = makeBlackberry();
  bb1.position.set(-0.012, 0.012, 0.008);
  bb1.scale.setScalar(1.20);  // grosse
  g.add(bb1);

  // 2 framboises (principale + secondaire, chevauchent la mûre)
  const ras1 = makeRaspberry();
  ras1.position.set(0.020, 0.005, 0.012);
  g.add(ras1);
  const ras2 = makeRaspberry();
  ras2.position.set(0.005, -0.018, 0.015);
  ras2.scale.setScalar(0.90);
  g.add(ras2);

  // 2 myrtilles (en bas-gauche, contre la mûre et sous les framboises)
  const blu1 = makeBlueberry();
  blu1.position.set(-0.022, -0.010, 0.012);
  blu1.scale.setScalar(1.05);
  g.add(blu1);
  const blu2 = makeBlueberry();
  blu2.position.set(-0.005, -0.022, 0.015);
  blu2.scale.setScalar(1.10);
  g.add(blu2);

  return g;
}

// ─── FIGUES — figue entière + figue coupée (intérieur rose) ────────────
// Référence : figue violette à l'extérieur, intérieur rose-rouge granuleux
// avec petites graines beige
function _decoFigues(T, data){
  const g = new T.Group();
  const skinCol = new T.Color(0x693755);
  const skinTop = new T.Color(0xB4A564);    // teinte vert-jaune au sommet
  const fleshCol = new T.Color(0xC3374B);   // rouge framboise vif
  const flesh2Col = new T.Color(0xD75A6E);  // centre plus clair
  const seedCol = new T.Color(0xFCE8B0);

  // FIGUE ENTIÈRE : forme ovale verticale avec sommet étiré
  // On crée le profil personnalisé en déformant une sphère
  const wholeFig = new T.Group();
  const wholeGeo = new T.SphereGeometry(0.5, 22, 18);
  const wpos = wholeGeo.attributes.position;
  // Hauteur effective h = 0.045, largeur effective w = 0.025 (ratio 0.55 → ovale vertical)
  const h_fig = 0.045;
  const w_fig = 0.026;
  for(let i=0; i<wpos.count; i++){
    const x = wpos.getX(i), y = wpos.getY(i), z = wpos.getZ(i);
    // y∈[-0.5, 0.5] → t∈[0,1] : 0=base, 1=col
    const t = 1 - (y + 0.5);   // inverser : 0=col en haut, 1=base
    // get_rx avec max à tt=0.62 (sommet étiré)
    let rxNorm;
    if(t < 0.06){
      rxNorm = 0.20 + (t/0.06) * 0.30;  // col fin
    } else {
      const tt = (t - 0.06) / 0.94;
      const tc = 0.62;
      let arc;
      if(tt < tc){
        const u = tt / tc;
        arc = Math.sqrt(Math.max(0, 1 - (1 - u)*(1 - u)));
      } else {
        const u = (tt - tc) / (1 - tc);
        arc = Math.sqrt(Math.max(0, 1 - u*u));
      }
      const offset = 0.50 * (1 - tt);
      rxNorm = Math.min(1.0, Math.max(arc, offset));
    }
    // appliquer le rayon (x, z scalés sur la sphère unité)
    const r_pt = Math.sqrt(x*x + z*z);
    const scale_xz = (r_pt > 1e-6) ? (rxNorm * w_fig) / r_pt : 1;
    wpos.setX(i, x * scale_xz);
    wpos.setZ(i, z * scale_xz);
    wpos.setY(i, y * h_fig * 2);  // h_fig est la demi-hauteur
  }
  wholeGeo.computeVertexNormals();
  const whole = new T.Mesh(wholeGeo, new T.MeshStandardMaterial({
    color: skinCol, roughness: 0.55
  }));
  wholeFig.add(whole);

  // Petite teinte vert-jaune au sommet (cap au-dessus du col)
  const topCap = new T.Mesh(
    new T.SphereGeometry(0.006, 10, 8),
    new T.MeshStandardMaterial({color: skinTop, roughness: 0.60})
  );
  topCap.position.y = h_fig - 0.002;
  topCap.scale.y = 0.5;
  wholeFig.add(topCap);

  // Petite tige verte courte au sommet
  const stem = new T.Mesh(
    new T.CylinderGeometry(0.0014, 0.002, 0.012, 6),
    new T.MeshStandardMaterial({color: 0x556E38, roughness: 0.7})
  );
  stem.position.y = h_fig + 0.005;
  wholeFig.add(stem);

  // Position : un peu vers le haut-arrière
  wholeFig.position.set(-0.010, 0.010, -0.005);
  g.add(wholeFig);

  // FIGUE COUPÉE : vue de face (disque plein avec chair rouge framboise)
  const cutFig = new T.Group();
  const cutR = 0.030;

  // Peau extérieure (anneau violet)
  const peelGeo = new T.CylinderGeometry(cutR, cutR, 0.020, 28, 1);
  const peelM = new T.Mesh(peelGeo, new T.MeshStandardMaterial({
    color: skinCol, roughness: 0.55
  }));
  cutFig.add(peelM);

  // Bordure blanc-crème (chair claire sous la peau)
  const borderGeo = new T.CylinderGeometry(cutR*0.92, cutR*0.92, 0.022, 24, 1);
  const borderM = new T.Mesh(borderGeo, new T.MeshStandardMaterial({
    color: 0xF5E6D2, roughness: 0.55
  }));
  borderM.position.y = 0.001;
  cutFig.add(borderM);

  // Chair rouge framboise (face visible)
  const fleshGeo = new T.CylinderGeometry(cutR*0.85, cutR*0.85, 0.024, 24, 1);
  const fleshM = new T.Mesh(fleshGeo, new T.MeshStandardMaterial({
    color: fleshCol, roughness: 0.45
  }));
  fleshM.position.y = 0.0015;
  cutFig.add(fleshM);

  // Centre rose vif plus clair (chair tendre)
  const innerGeo = new T.CylinderGeometry(cutR*0.55, cutR*0.55, 0.026, 20, 1);
  const innerM = new T.Mesh(innerGeo, new T.MeshStandardMaterial({
    color: flesh2Col, roughness: 0.45
  }));
  innerM.position.y = 0.002;
  cutFig.add(innerM);

  // Filaments radiaux denses (32 fins + 12 plus marqués)
  for(let i=0; i<32; i++){
    const a = (i/32) * Math.PI*2;
    const fil = new T.Mesh(
      new T.BoxGeometry(cutR*0.78, 0.001, 0.0005),
      new T.MeshStandardMaterial({color: 0xDC6E84, roughness: 0.5})
    );
    fil.position.set(Math.cos(a)*cutR*0.40, 0.0125, Math.sin(a)*cutR*0.40);
    fil.rotation.y = a;
    cutFig.add(fil);
  }
  for(let i=0; i<12; i++){
    const a = (i/12) * Math.PI*2 + 0.13;
    const fil = new T.Mesh(
      new T.BoxGeometry(cutR*0.76, 0.0015, 0.001),
      new T.MeshStandardMaterial({color: 0xB44660, roughness: 0.5})
    );
    fil.position.set(Math.cos(a)*cutR*0.38, 0.013, Math.sin(a)*cutR*0.38);
    fil.rotation.y = a;
    cutFig.add(fil);
  }

  // ~70 graines beige granuleuses
  for(let i=0; i<70; i++){
    const a = Math.random() * Math.PI*2;
    const r = Math.random() * cutR * 0.82;
    const seed = new T.Mesh(
      new T.SphereGeometry(0.0017, 4, 3),
      new T.MeshStandardMaterial({color: seedCol, roughness: 0.55})
    );
    seed.position.set(Math.cos(a)*r, 0.014, Math.sin(a)*r);
    seed.scale.set(1, 0.6, 1);
    cutFig.add(seed);
  }
  // 18 graines plus foncées pour variation
  for(let i=0; i<18; i++){
    const a = Math.random() * Math.PI*2;
    const r = Math.random() * cutR * 0.78;
    const seed = new T.Mesh(
      new T.SphereGeometry(0.0014, 4, 3),
      new T.MeshStandardMaterial({color: 0xC89060, roughness: 0.55})
    );
    seed.position.set(Math.cos(a)*r, 0.014, Math.sin(a)*r);
    seed.scale.set(1, 0.6, 1);
    cutFig.add(seed);
  }

  // Petite tige verte sur la coupée aussi
  const cutStem = new T.Mesh(
    new T.CylinderGeometry(0.0012, 0.0018, 0.009, 6),
    new T.MeshStandardMaterial({color: 0x556E38, roughness: 0.7})
  );
  cutStem.position.set(0, 0.018, 0);
  cutFig.add(cutStem);

  // Position : devant et en bas, légèrement à droite (collées verticalement)
  cutFig.position.set(0.012, -0.015, 0.005);
  // Légère inclinaison pour montrer la face
  cutFig.rotation.x = -0.15;
  g.add(cutFig);

  return g;
}

// ─── AGRUMES — tranche de citron + tranche d'orange + agrume entier ────
function _decoAgrumes(T, data){
  const g = new T.Group();

  const skinCol = new T.Color(0xF8D830);
  const fleshCol = new T.Color(0xFCF0A0);
  const segCol = new T.Color(0xFFF8C8);
  const zestCol = new T.Color(0xFCF8D8);

  // ─── FEUILLE verte DERRIÈRE (dessinée d'abord, positionnée en z=-) ───
  const lg = new T.SphereGeometry(0.5, 8, 6);
  const lpos = lg.attributes.position;
  for(let j=0; j<lpos.count; j++){
    lpos.setX(j, lpos.getX(j) * 0.025);
    lpos.setY(j, lpos.getY(j) * 0.003);
    lpos.setZ(j, lpos.getZ(j) * 0.042);
  }
  lg.computeVertexNormals();
  const leaf = new T.Mesh(lg, new T.MeshStandardMaterial({
    color: 0x5BA046, roughness: 0.55, side: T.DoubleSide
  }));
  // positionner derrière le citron entier (z négatif = vers l'arrière)
  leaf.position.set(0.028, 0.018, -0.020);
  leaf.rotation.set(-0.3, 0.5, 0.4);
  g.add(leaf);
  // 2e feuille pour le volume
  const leaf2 = leaf.clone();
  leaf2.position.set(0.040, 0.010, -0.018);
  leaf2.rotation.set(-0.2, 0.8, 0.6);
  leaf2.scale.setScalar(0.85);
  g.add(leaf2);

  // ─── CITRON ENTIER oblong jaune (à droite, plus grand) ───
  const wholeGeo = new T.SphereGeometry(0.5, 18, 14);
  const wp = wholeGeo.attributes.position;
  for(let i=0; i<wp.count; i++){
    wp.setX(i, wp.getX(i) * 0.050);      // demi-longueur
    wp.setY(i, wp.getY(i) * 0.035);      // demi-hauteur
    wp.setZ(i, wp.getZ(i) * 0.035);      // demi-profondeur
  }
  wholeGeo.computeVertexNormals();
  const whole = new T.Mesh(wholeGeo, new T.MeshStandardMaterial({
    color: skinCol, roughness: 0.55
  }));
  whole.position.set(0.020, 0, 0);
  g.add(whole);
  // Pointes oblongues aux extrémités (caractéristique du citron)
  for(const dir of [-1, 1]){
    const tip = new T.Mesh(
      new T.SphereGeometry(0.5, 10, 8),
      new T.MeshStandardMaterial({color: skinCol, roughness: 0.55})
    );
    tip.scale.set(0.012, 0.008, 0.008);
    tip.position.set(0.020 + dir*0.050, 0, 0);
    g.add(tip);
  }

  // ─── TRANCHE de citron (à gauche, plus petite, vue de face) ───
  // Petite par rapport au citron entier (rayon 0.030 vs longueur citron entier 0.124)
  const sliceR = 0.030;
  const sliceGroup = new T.Group();
  // Écorce extérieure
  const peel = new T.Mesh(
    new T.CylinderGeometry(sliceR, sliceR, 0.012, 24, 1),
    new T.MeshStandardMaterial({color: skinCol, roughness: 0.55})
  );
  sliceGroup.add(peel);
  // Zeste blanc juste sous l'écorce
  const zest = new T.Mesh(
    new T.CylinderGeometry(sliceR*0.92, sliceR*0.92, 0.014, 24, 1),
    new T.MeshStandardMaterial({color: zestCol, roughness: 0.55})
  );
  zest.position.y = 0.001;
  sliceGroup.add(zest);
  // Chair
  const flesh = new T.Mesh(
    new T.CylinderGeometry(sliceR*0.85, sliceR*0.85, 0.015, 24, 1),
    new T.MeshStandardMaterial({color: fleshCol, roughness: 0.45})
  );
  flesh.position.y = 0.0015;
  sliceGroup.add(flesh);
  // 8 quartiers triangulaires
  for(let s=0; s<8; s++){
    const a = (s/8) * Math.PI*2;
    const segShape = new T.Shape();
    segShape.moveTo(0, 0);
    segShape.lineTo(sliceR*0.80, -sliceR*0.30);
    segShape.lineTo(sliceR*0.80, sliceR*0.30);
    segShape.lineTo(0, 0);
    const segGeo = new T.ExtrudeGeometry(segShape, {
      depth: 0.010, bevelEnabled: true,
      bevelSegments: 1, bevelSize: 0.0015, bevelThickness: 0.0008
    });
    const seg = new T.Mesh(segGeo, new T.MeshStandardMaterial({
      color: segCol, roughness: 0.40, side: T.DoubleSide
    }));
    seg.rotation.x = Math.PI/2;
    seg.rotation.y = Math.PI/2;
    seg.rotation.z = a;
    seg.position.y = 0.003;
    seg.scale.setScalar(0.88);
    sliceGroup.add(seg);
  }
  // Membranes blanches radiales entre quartiers
  for(let s=0; s<8; s++){
    const a = (s/8) * Math.PI*2;
    const memb = new T.Mesh(
      new T.BoxGeometry(sliceR*0.80, 0.012, 0.0015),
      new T.MeshStandardMaterial({color: zestCol, roughness: 0.55})
    );
    memb.position.set(Math.cos(a)*sliceR*0.40, 0.002, Math.sin(a)*sliceR*0.40);
    memb.rotation.y = a;
    sliceGroup.add(memb);
  }
  // Centre blanc
  const sliceCtr = new T.Mesh(
    new T.CylinderGeometry(sliceR*0.10, sliceR*0.10, 0.016, 10),
    new T.MeshStandardMaterial({color: zestCol, roughness: 0.55})
  );
  sliceGroup.add(sliceCtr);

  sliceGroup.position.set(-0.030, 0, 0.015);
  // Légère inclinaison pour montrer la coupe de face
  sliceGroup.rotation.x = Math.PI/2 - 0.15;
  g.add(sliceGroup);

  return g;
}

// ─── MACARONS — 2 coques + garniture, collerette caractéristique ───────
// Référence : 2 coques aplaties + crème épaisse au milieu, "pieds"
// (collerette froissée) typique du macaron
function _decoMacarons(T, data){
  const g = new T.Group();
  const macHex = (data && data.coul_macarons) || '#E8458C';
  const macCol = new T.Color(macHex);
  const fillCol = new T.Color(0xFAEEDA);
  
  function makeMacaron(yOff, col, scaleVar){
    const sub = new T.Group();
    const sz = 0.045 * (scaleVar || 1);
    
    // Coque supérieure : dôme aplati
    const topGeo = new T.SphereGeometry(sz, 18, 10, 0, Math.PI*2, 0, Math.PI*0.45);
    const tp = topGeo.attributes.position;
    for(let i=0; i<tp.count; i++){
      tp.setY(i, tp.getY(i) * 0.55); // aplatir
    }
    topGeo.computeVertexNormals();
    const top = new T.Mesh(topGeo, new T.MeshStandardMaterial({
      color: col, roughness: 0.45, metalness: 0.02
    }));
    top.position.y = 0.012;
    sub.add(top);
    
    // COLLERETTE (pieds) du macaron : petits bumps craquelés sur la base de la coque
    // = petits cylindres irréguliers en couronne
    const nBumps = 16;
    for(let i=0; i<nBumps; i++){
      const a = (i/nBumps) * Math.PI*2;
      const bumpH = 0.004 + Math.random()*0.003;
      const bump = new T.Mesh(
        new T.SphereGeometry(0.5, 4, 3),
        new T.MeshStandardMaterial({color: col, roughness: 0.85})
      );
      bump.scale.set(0.005 + Math.random()*0.002, bumpH, 0.005 + Math.random()*0.002);
      bump.position.set(Math.cos(a)*sz*0.95, 0.005, Math.sin(a)*sz*0.95);
      sub.add(bump);
    }
    
    // GARNITURE : cylindre crème épais
    const fill = new T.Mesh(
      new T.CylinderGeometry(sz*0.95, sz*0.95, 0.014, 18),
      new T.MeshStandardMaterial({color: fillCol, roughness: 0.45})
    );
    fill.position.y = -0.005;
    sub.add(fill);
    
    // Petits débordements de crème sur le bord (effet naturel)
    for(let i=0; i<10; i++){
      const a = (i/10) * Math.PI*2 + Math.random()*0.2;
      const dr = new T.Mesh(
        new T.SphereGeometry(0.004, 5, 4),
        new T.MeshStandardMaterial({color: fillCol, roughness: 0.45})
      );
      dr.position.set(Math.cos(a)*sz*0.97, -0.005, Math.sin(a)*sz*0.97);
      sub.add(dr);
    }
    
    // Coque inférieure : symétrique au top
    const botGeo = new T.SphereGeometry(sz, 18, 10, 0, Math.PI*2, 0, Math.PI*0.45);
    const bp = botGeo.attributes.position;
    for(let i=0; i<bp.count; i++){
      bp.setY(i, bp.getY(i) * 0.55);
    }
    botGeo.computeVertexNormals();
    const bot = new T.Mesh(botGeo, new T.MeshStandardMaterial({
      color: col, roughness: 0.45, metalness: 0.02
    }));
    bot.position.y = -0.012;
    bot.rotation.x = Math.PI;
    sub.add(bot);
    
    // Collerette du bas
    for(let i=0; i<16; i++){
      const a = (i/16) * Math.PI*2;
      const bump = new T.Mesh(
        new T.SphereGeometry(0.5, 4, 3),
        new T.MeshStandardMaterial({color: col, roughness: 0.85})
      );
      bump.scale.set(0.005 + Math.random()*0.002, 0.004 + Math.random()*0.003, 0.005 + Math.random()*0.002);
      bump.position.set(Math.cos(a)*sz*0.95, -0.005, Math.sin(a)*sz*0.95);
      sub.add(bump);
    }
    
    sub.position.y = yOff;
    return sub;
  }
  
  // 1 SEUL macaron centré (changement v2 : plus de pyramide à 3)
  const m1 = makeMacaron(0, macCol, 1.2);
  g.add(m1);
  
  return g;
}

// ─── MERINGUES — pic torsadé en spirale ─────────────────────────────────
// Référence : meringue blanche en cône torsadé qui pointe vers le haut,
// formé par pochage en spirale
function _decoMeringues(T, data){
  const g = new T.Group();
  const whiteCol = new T.Color(0xFCFAF0);
  const whiteShadow = new T.Color(0xE8E2D0);
  const whiteHighlight = new T.Color(0xFFFCEC);

  function makeMeringue(x, h, scale){
    const sub = new T.Group();
    sub.position.x = x;
    sub.scale.setScalar(scale);

    // Profil "bulbe" généré comme un LatheGeometry (surface de révolution)
    // Points (rayon, hauteur) du profil de bas en haut
    const base_w = 0.022;
    const profile = [];
    const nSteps = 30;
    for(let k=0; k<=nSteps; k++){
      const t = k / nSteps;  // 0 = base au sol, 1 = pointe
      let rxNorm;
      if(t < 0.04){
        // PALIER PLAT au sol (base étroite)
        rxNorm = 0.78;
      } else if(t < 0.18){
        // joues arrondies qui bombent
        const tt = (t - 0.04) / 0.14;
        rxNorm = 0.78 + 0.22 * Math.sin(tt * Math.PI/2);
      } else if(t < 0.40){
        // ventre max bombé
        const tt = (t - 0.18) / 0.22;
        rxNorm = 1.0 - 0.03 * tt*tt;
      } else if(t < 0.70){
        // rétrécissement
        const tt = (t - 0.40) / 0.30;
        rxNorm = 0.97 - Math.pow(tt, 1.3) * 0.50;
      } else if(t < 0.90){
        // rétrécissement final
        const tt = (t - 0.70) / 0.20;
        rxNorm = 0.47 - tt*0.32;
      } else {
        // pointe
        const tt = (t - 0.90) / 0.10;
        rxNorm = 0.15 * (1 - tt);
      }
      profile.push(new T.Vector2(Math.max(rxNorm * base_w, 0.0005), t * h));
    }
    const latheGeo = new T.LatheGeometry(profile, 24);
    const body = new T.Mesh(latheGeo, new T.MeshStandardMaterial({
      color: whiteCol, roughness: 0.55, metalness: 0.02
    }));
    sub.add(body);

    // Stries cannelées (8 bandes verticales en relief)
    // = 8 fines bandes longues le long de la surface
    const nStries = 8;
    for(let s=0; s<nStries; s++){
      const ang = (s/nStries) * Math.PI * 2;
      const stripPoints = [];
      for(let k=2; k<=nSteps-2; k++){
        const t = k / nSteps;
        let rxNorm;
        if(t < 0.04){
          rxNorm = 0.78;
        } else if(t < 0.18){
          const tt = (t - 0.04) / 0.14;
          rxNorm = 0.78 + 0.22 * Math.sin(tt * Math.PI/2);
        } else if(t < 0.40){
          const tt = (t - 0.18) / 0.22;
          rxNorm = 1.0 - 0.03 * tt*tt;
        } else if(t < 0.70){
          const tt = (t - 0.40) / 0.30;
          rxNorm = 0.97 - Math.pow(tt, 1.3) * 0.50;
        } else if(t < 0.90){
          const tt = (t - 0.70) / 0.20;
          rxNorm = 0.47 - tt*0.32;
        } else {
          const tt = (t - 0.90) / 0.10;
          rxNorm = 0.15 * (1 - tt);
        }
        // strie un peu en relief par rapport à la surface
        const r = rxNorm * base_w * 1.02;
        stripPoints.push(new T.Vector3(
          Math.cos(ang) * r, t * h, Math.sin(ang) * r
        ));
      }
      // crée un tube fin le long de ce trajet
      const curve = new T.CatmullRomCurve3(stripPoints);
      const stripGeo = new T.TubeGeometry(curve, 16, 0.0008, 5, false);
      const strip = new T.Mesh(stripGeo, new T.MeshStandardMaterial({
        color: whiteShadow, roughness: 0.60
      }));
      sub.add(strip);
    }

    // SPIRALE au sommet (effet "torsade finale" : 3 petits anneaux empilés rétrécissants)
    for(let loop=0; loop<3; loop++){
      const radius = base_w * 0.18 * (1 - loop*0.30);
      const loopY = h * 0.85 + loop * 0.005;
      const ring = new T.Mesh(
        new T.TorusGeometry(radius, 0.0010, 4, 14),
        new T.MeshStandardMaterial({color: whiteCol, roughness: 0.55})
      );
      ring.rotation.x = Math.PI/2;
      ring.position.y = loopY;
      sub.add(ring);
    }

    return sub;
  }

  // 3 meringues sur la même ligne au sol
  g.add(makeMeringue(-0.040, 0.045, 0.85));
  g.add(makeMeringue(0,      0.055, 1.0));
  g.add(makeMeringue(0.040,  0.040, 0.80));

  return g;
}

// ─── PERLES — pluie éparpillée de sphères nacrées (3 tailles) ───────────
function _decoPerles(T, data){
  const g = new T.Group();
  const pearlMat = new T.MeshStandardMaterial({
    color: 0xFFF6E8, roughness: 0.15, metalness: 0.45
  });

  // Distribution uniforme dans une zone ellipsoïdale (3D)
  // Zone : ±0.045 en x/z, ±0.035 en y
  const zoneX = 0.045, zoneY = 0.035, zoneZ = 0.045;
  // helper : position aléatoire dans l'ellipsoïde
  function randInZone(scale){
    while(true){
      const dx = (Math.random()*2-1) * zoneX * scale;
      const dy = (Math.random()*2-1) * zoneY * scale;
      const dz = (Math.random()*2-1) * zoneZ * scale;
      if((dx/zoneX)**2 + (dy/zoneY)**2 + (dz/zoneZ)**2 <= 1){
        return [dx, dy, dz];
      }
    }
  }

  // 35 petites perles (rayon 0.003-0.0055)
  for(let i=0; i<35; i++){
    const r = 0.003 + Math.random()*0.0025;
    const [dx, dy, dz] = randInZone(1.0);
    const sphere = new T.Mesh(
      new T.SphereGeometry(r, 10, 8),
      pearlMat
    );
    sphere.position.set(dx, dy, dz);
    g.add(sphere);
  }

  // 13 perles moyennes (rayon 0.0065-0.010)
  for(let i=0; i<13; i++){
    const r = 0.0065 + Math.random()*0.0035;
    const [dx, dy, dz] = randInZone(0.85);
    const sphere = new T.Mesh(
      new T.SphereGeometry(r, 12, 10),
      pearlMat
    );
    sphere.position.set(dx, dy, dz);
    g.add(sphere);
  }

  // 4 grosses perles (rayon 0.013-0.016)
  for(let i=0; i<4; i++){
    const r = 0.013 + Math.random()*0.003;
    const [dx, dy, dz] = randInZone(0.55);
    const sphere = new T.Mesh(
      new T.SphereGeometry(r, 14, 12),
      pearlMat
    );
    sphere.position.set(dx, dy, dz);
    g.add(sphere);
  }

  return g;
}

// ─── RUBAN — nœud satiné avec boucles brillantes et queues qui pendent ─
function _decoRuban(T, data){
  const g = new T.Group();
  const ribbonHex = (data && data.coul_ruban) || '#E890B8';
  const ribCol = new T.Color(ribbonHex);
  const ribMat = new T.MeshStandardMaterial({
    color: ribCol, roughness: 0.20, metalness: 0.30, side: T.DoubleSide
  });
  
  // 2 BOUCLES latérales (gauche et droite) : forme en pétale plat
  [-1, 1].forEach(side => {
    // Boucle = forme allongée qui revient au centre
    const loopShape = new T.Shape();
    loopShape.moveTo(0, 0);
    loopShape.bezierCurveTo(0.020*side, 0.015, 0.080*side, 0.025, 0.085*side, 0);
    loopShape.bezierCurveTo(0.080*side, -0.025, 0.020*side, -0.015, 0, 0);
    const loopGeo = new T.ExtrudeGeometry(loopShape, {
      depth: 0.008, bevelEnabled: true,
      bevelSegments: 2, bevelSize: 0.002, bevelThickness: 0.001, curveSegments: 10
    });
    // Léger pli au milieu de la boucle (réalisme du tissu)
    const lp = loopGeo.attributes.position;
    for(let i=0; i<lp.count; i++){
      const x = lp.getX(i), y = lp.getY(i), z = lp.getZ(i);
      const xFrac = x / (0.085*side);
      // Le milieu de la boucle est légèrement enfoncé
      const dip = Math.sin(Math.abs(xFrac) * Math.PI) * 0.005;
      lp.setZ(i, z + dip);
    }
    loopGeo.computeVertexNormals();
    const loop = new T.Mesh(loopGeo, ribMat.clone());
    g.add(loop);
  });
  
  // 2 QUEUES qui pendent en dessous, légèrement ondulées
  [-1, 1].forEach(side => {
    const tailShape = new T.Shape();
    const w = 0.014;
    tailShape.moveTo(-w/2, 0);
    tailShape.lineTo(w/2, 0);
    tailShape.lineTo(w/2 + 0.005, -0.090);
    // Découpe en V à la fin du ruban
    tailShape.lineTo(0, -0.080);
    tailShape.lineTo(-w/2 - 0.005, -0.090);
    tailShape.lineTo(-w/2, 0);
    const tailGeo = new T.ExtrudeGeometry(tailShape, {
      depth: 0.005, bevelEnabled: true,
      bevelSegments: 1, bevelSize: 0.0015, bevelThickness: 0.001
    });
    // Ondulation de la queue (effet tissu qui retombe)
    const tp = tailGeo.attributes.position;
    for(let i=0; i<tp.count; i++){
      const y = tp.getY(i);
      const yFrac = Math.abs(y) / 0.090;
      tp.setZ(i, tp.getZ(i) + Math.sin(yFrac * Math.PI * 1.5) * 0.008);
    }
    tailGeo.computeVertexNormals();
    const tail = new T.Mesh(tailGeo, ribMat.clone());
    tail.position.set(side * 0.008, -0.005, -0.002);
    tail.rotation.z = side * 0.15;
    g.add(tail);
  });
  
  // NŒUD central : bande qui enroule le centre
  const knotGeo = new T.BoxGeometry(0.025, 0.025, 0.018);
  const knot = new T.Mesh(knotGeo, ribMat.clone());
  knot.scale.x = 1.0;
  g.add(knot);

  // Petits plis verticaux sur le nœud central (réalisme tissu)
  for(let i=0; i<3; i++){
    const pli = new T.Mesh(
      new T.BoxGeometry(0.001, 0.022, 0.001),
      new T.MeshStandardMaterial({
        color: new T.Color(ribbonHex).multiplyScalar(0.75),
        roughness: 0.25
      })
    );
    pli.position.set(-0.008 + i*0.008, 0, 0.010);
    g.add(pli);
  }

  return g;
}

// ─── DENTELLE — bande festonnée avec motifs (texture canvas sur plan) ──
// Référence : bande blanche perforée avec motifs floraux ajourés
function _decoDentelle(T, data){
  const g = new T.Group();
  const laceHex = (data && data.coul_dentelle) || '#FAFAF4';
  const laceCol = new T.Color(laceHex);
  
  // On utilise un canvas pour générer un motif de dentelle avec transparence
  const canvas = document.createElement('canvas');
  canvas.width = 512;
  canvas.height = 128;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, 512, 128);
  
  // Hex de couleur pour canvas
  const hex = '#' + Math.round(laceCol.r*255).toString(16).padStart(2,'0') +
                    Math.round(laceCol.g*255).toString(16).padStart(2,'0') +
                    Math.round(laceCol.b*255).toString(16).padStart(2,'0');

  // Bande principale (centrale) légèrement plus haute pour laisser les festons
  ctx.fillStyle = hex;
  ctx.fillRect(0, 28, 512, 72);

  // FESTONS À 2 NIVEAUX : gros festons principaux + petits festons dans les creux
  // 6 gros festons espacés (au lieu de 10) + 7 petits festons dans les creux
  const nBig = 6;
  const bigW = 512 / nBig;
  ctx.fillStyle = hex;
  // Gros festons (haut + bas)
  for(let i=0; i<nBig; i++){
    const cx = bigW/2 + i * bigW;
    ctx.beginPath();
    ctx.arc(cx, 28, bigW*0.48, Math.PI, 0);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(cx, 100, bigW*0.48, 0, Math.PI);
    ctx.fill();
  }
  // Petits festons dans les creux (entre les gros)
  for(let i=0; i<=nBig; i++){
    const cx = i * bigW;
    ctx.beginPath();
    ctx.arc(cx, 28, bigW*0.18, Math.PI, 0);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(cx, 100, bigW*0.18, 0, Math.PI);
    ctx.fill();
  }

  // MOTIFS FLORAUX DÉTAILLÉS — fleurs à 6 pétales pointus en losange + cœur + anneau de points
  ctx.globalCompositeOperation = 'destination-out';
  for(let i=0; i<nBig; i++){
    const mcx = bigW/2 + i * bigW;
    const mcy = 64;

    // Fleur à 6 pétales pointus (losanges) — ajourés
    for(let k=0; k<6; k++){
      const a = (k/6) * Math.PI * 2;
      // pétale = losange depuis le centre vers l'extérieur
      const len = 14;
      const wid = 3.5;
      const tipX = mcx + Math.cos(a)*len;
      const tipY = mcy + Math.sin(a)*len;
      const sa = a + Math.PI/2;
      const sx1 = mcx + Math.cos(a)*len*0.4 + Math.cos(sa)*wid;
      const sy1 = mcy + Math.sin(a)*len*0.4 + Math.sin(sa)*wid;
      const sx2 = mcx + Math.cos(a)*len*0.4 - Math.cos(sa)*wid;
      const sy2 = mcy + Math.sin(a)*len*0.4 - Math.sin(sa)*wid;
      ctx.beginPath();
      ctx.moveTo(mcx, mcy);
      ctx.lineTo(sx1, sy1);
      ctx.lineTo(tipX, tipY);
      ctx.lineTo(sx2, sy2);
      ctx.closePath();
      ctx.fill();
    }
    // Cœur central ajouré
    ctx.beginPath();
    ctx.arc(mcx, mcy, 3.5, 0, Math.PI*2);
    ctx.fill();

    // Anneau de 8 trous autour de la fleur (alternés)
    for(let k=0; k<8; k++){
      if(k % 2 === 1){
        const a = (k/8) * Math.PI * 2;
        const rx = mcx + Math.cos(a)*22;
        const ry = mcy + Math.sin(a)*22;
        ctx.beginPath();
        ctx.arc(rx, ry, 2.5, 0, Math.PI*2);
        ctx.fill();
      }
    }

    // Trous décoratifs dans les festons (gouttes)
    ctx.beginPath();
    ctx.arc(mcx, 28, 4, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(mcx, 100, 4, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalCompositeOperation = 'source-over';

  // ANNEAU DE POINTS PLEINS autour de chaque fleur (sur l'anneau ajouré qu'on vient de creuser)
  ctx.fillStyle = hex;
  for(let i=0; i<nBig; i++){
    const mcx = bigW/2 + i * bigW;
    const mcy = 64;
    // remettre les points pleins aux positions paires
    for(let k=0; k<8; k++){
      if(k % 2 === 0){
        const a = (k/8) * Math.PI * 2;
        const rx = mcx + Math.cos(a)*22;
        const ry = mcy + Math.sin(a)*22;
        ctx.beginPath();
        ctx.arc(rx, ry, 1.8, 0, Math.PI*2);
        ctx.fill();
      }
    }
    // point central plein au cœur de la fleur
    ctx.beginPath();
    ctx.arc(mcx, mcy, 1.5, 0, Math.PI*2);
    ctx.fill();
  }

  // Lignes de POINTS EN ZIGZAG entre les motifs
  for(let i=1; i<nBig; i++){
    const lx = i * bigW;
    for(let k=0; k<3; k++){
      ctx.beginPath();
      ctx.arc(lx, 40 + k*8, 1.8, 0, Math.PI*2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(lx, 88 - k*8, 1.8, 0, Math.PI*2);
      ctx.fill();
    }
  }
  
  const tex = new T.CanvasTexture(canvas);
  tex.colorSpace = T.SRGBColorSpace || T.sRGBEncoding;
  
  // Appliquer sur un plan courbé légèrement (effet ruban appliqué)
  const planeGeo = new T.PlaneGeometry(0.180, 0.045, 16, 1);
  // Courber légèrement sur l'axe Y
  const pp = planeGeo.attributes.position;
  for(let i=0; i<pp.count; i++){
    const x = pp.getX(i);
    const xFrac = x / 0.090;
    pp.setZ(i, pp.getZ(i) + Math.cos(xFrac * Math.PI * 0.3) * 0.005);
  }
  planeGeo.computeVertexNormals();
  
  const plane = new T.Mesh(planeGeo, new T.MeshStandardMaterial({
    map: tex, transparent: true, alphaTest: 0.3,
    side: T.DoubleSide, roughness: 0.55, metalness: 0.0
  }));
  g.add(plane);
  
  // Petites perles décoratives le long de la dentelle
  for(let i=0; i<5; i++){
    const px = -0.072 + i * 0.036;
    const pearl = new T.Mesh(
      new T.SphereGeometry(0.004, 8, 6),
      new T.MeshStandardMaterial({
        color: laceCol, roughness: 0.15, metalness: 0.4
      })
    );
    pearl.position.set(px, 0, 0.006);
    g.add(pearl);
  }
  
  return g;
}

// ─── FEUILLE D'OR — fragments métalliques irréguliers très brillants ──
// Référence : éclats dorés appliqués sur le gâteau, formes très irrégulières
// avec arêtes nettes, finition ultra-métallique
function _decoFeuilleOr(T, data){
  const g = new T.Group();
  const goldMat = new T.MeshStandardMaterial({
    color: 0xF2C840, metalness: 0.98, roughness: 0.15, side: T.DoubleSide
  });
  
  // Helper : créer un fragment irrégulier (forme polygonale aléatoire)
  function makeFragment(scale){
    const shape = new T.Shape();
    const nPts = 5 + Math.floor(Math.random()*4);
    const pts = [];
    for(let i=0; i<nPts; i++){
      const a = (i/nPts) * Math.PI*2;
      const r = scale * (0.5 + Math.random()*0.8);
      pts.push([Math.cos(a)*r, Math.sin(a)*r]);
    }
    shape.moveTo(pts[0][0], pts[0][1]);
    for(let i=1; i<pts.length; i++){
      shape.lineTo(pts[i][0], pts[i][1]);
    }
    shape.lineTo(pts[0][0], pts[0][1]);
    const geo = new T.ExtrudeGeometry(shape, {
      depth: 0.002, bevelEnabled: false, curveSegments: 1
    });
    // Variation très légère de couleur (effet feuille battue)
    const v = 0.90 + Math.random()*0.18;
    const fragMat = goldMat.clone();
    fragMat.color = new T.Color(0xF2C840).multiplyScalar(v);
    return new T.Mesh(geo, fragMat);
  }
  
  // Composition : grand fragment central + plusieurs petits autour
  // Grand fragment principal
  const main = makeFragment(0.040);
  main.position.set(0, 0, 0);
  main.rotation.z = Math.random() * Math.PI;
  main.rotation.x = (Math.random()-0.5) * 0.3;
  g.add(main);
  
  // Fragments moyens éparpillés
  for(let i=0; i<5; i++){
    const a = (i/5) * Math.PI*2 + Math.random()*0.5;
    const r = 0.040 + Math.random()*0.025;
    const frag = makeFragment(0.018 + Math.random()*0.012);
    frag.position.set(
      Math.cos(a) * r,
      Math.sin(a) * r * 0.7,
      (Math.random()-0.5) * 0.010
    );
    frag.rotation.x = (Math.random()-0.5) * 0.5;
    frag.rotation.y = (Math.random()-0.5) * 0.5;
    frag.rotation.z = Math.random() * Math.PI;
    g.add(frag);
  }
  
  // Petits éclats (poudre dorée)
  for(let i=0; i<14; i++){
    const a = Math.random() * Math.PI*2;
    const r = 0.020 + Math.random()*0.050;
    const frag = makeFragment(0.005 + Math.random()*0.006);
    frag.position.set(
      Math.cos(a) * r,
      Math.sin(a) * r * 0.6,
      (Math.random()-0.5) * 0.012
    );
    frag.rotation.x = (Math.random()-0.5) * 0.8;
    frag.rotation.y = (Math.random()-0.5) * 0.8;
    frag.rotation.z = Math.random() * Math.PI*2;
    g.add(frag);
  }
  
  return g;
}

// Dispatcher : choisit la bonne fonction selon l'id
// data : objet de configuration (couleurs personnalisables)
function _makeDeco3D(T, decoId, data){
  let g;
  switch(decoId){
    // Fleurs
    case 'rose-rouge':      g=_decoRoseRouge(T, data); break;
    case 'rose-rose':       g=_decoRoseRose(T, data); break;
    case 'rose-blanche':    g=_decoRoseBlanche(T, data); break;
    case 'pivoine':         g=_decoPivoine(T, data); break;
    case 'eucalyptus':      g=_decoEucalyptus(T, data); break;
    case 'lagurus':         g=_decoLagurus(T, data); break;
    case 'hortensia':       g=_decoHortensia(T, data); break;
    case 'orchidee':        g=_decoOrchidee(T, data); break;
    case 'gypsophile':      g=_decoGypsophile(T, data); break;
    case 'renoncule':       g=_decoRenoncule(T, data); break;
    case 'camelia':         g=_decoCamelia(T, data); break;
    case 'lavande':         g=_decoLavande(T, data); break;
    case 'dahlia':          g=_decoDahlia(T, data); break;
    // Anciens (compatibilité avec sauvegardes existantes)
    case 'fleurs-fraiches': g=_decoRoseRose(T, data); break;
    case 'fleurs-sucre':    g=_decoRoseBlanche(T, data); break;
    case 'fleurs-sechees':  g=_decoLagurus(T, data); break;
    case 'cascade-florale': g=_decoHortensia(T, data); break;
    // Fruits
    case 'fraise':          g=_decoFraise(T, data); break;
    case 'fruits-rouges':   g=_decoFruitsRouges(T, data); break;
    case 'figues':          g=_decoFigues(T, data); break;
    case 'agrumes':         g=_decoAgrumes(T, data); break;
    // Pâtisserie
    case 'macarons':        g=_decoMacarons(T, data); break;
    case 'meringues':       g=_decoMeringues(T, data); break;
    case 'perles':          g=_decoPerles(T, data); break;
    case 'sucre':           g=_decoPerles(T, data); break; // ancien -> redirige
    // Accessoires
    case 'ruban':           g=_decoRuban(T, data); break;
    case 'dentelle':        g=_decoDentelle(T, data); break;
    case 'feuille-or':      g=_decoFeuilleOr(T, data); break;
    default:                g=_decoRoseRose(T, data);
  }
  // Ajoute une zone de hit invisible plus grande pour faciliter le tap au doigt
  const hitGeo=new T.SphereGeometry(0.10,8,6);
  const hitMat=new T.MeshBasicMaterial({visible:false});
  const hitM=new T.Mesh(hitGeo,hitMat);
  hitM.userData.isHitArea=true;
  g.add(hitM);
  return g;
}

function _makeDecoSVGBillboard(T, svgId, data){
  // Redirige vers la version 3D (compatibilité)
  return _makeDeco3D(T, svgId, data);
}

// ── DECO INTERACTION: sélection par tap + placement par sliders ──────────────
let _3dragDecoIdx=null;
let _3selectedDeco=null;
let _3isDragging=false;

function _highlightDeco(idx){
  if(!_3g||!_3g.decoMeshes)return;
  _3g.decoMeshes.forEach((dg,i)=>{
    // Récupérer le scale de base appliqué dans buildCake3D (stocké dans userData)
    const baseScale = dg.userData.baseScale || 1.0;
    // Multiplier par le facteur de highlight, sans écraser le scale de base
    const highlightFactor = (i===idx) ? 1.20 : 1.0;
    dg.scale.setScalar(baseScale * highlightFactor);
  });
  _3selectedDeco=idx;
}

// ─────────────────────────────────────────────────────────────────────────
// INLINE OPTIONS PANEL — affiché sur le canvas 3D au-dessus de la déco
// sélectionnée, contient taille / orientation / couleur / inclinaison.
// Le menu du bas n'affiche plus que le nom + bouton ✎ pour éditer.
// ─────────────────────────────────────────────────────────────────────────
function _ensureDecoInlinePanel(){
  let panel = document.getElementById('deco-inline-panel');
  if(panel) return panel;
  const canvas = document.getElementById('cake-canvas');
  if(!canvas || !canvas.parentNode) return null;
  // S'assurer que le parent du canvas est en position:relative pour que
  // notre position:absolute soit relative au canvas et pas à toute la page
  const parent = canvas.parentNode;
  const cs = window.getComputedStyle(parent);
  if(cs.position==='static'){
    parent.style.position='relative';
  }
  panel = document.createElement('div');
  panel.id = 'deco-inline-panel';
  // Position figée en bas à gauche du canvas
  panel.style.cssText = 'position:absolute;z-index:50;display:none;'+
    'left:8px;bottom:8px;'+
    'background:rgba(255,255,255,0.96);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);'+
    'border:1.5px solid #c9a84c;border-radius:12px;padding:8px 10px;'+
    'box-shadow:0 6px 22px rgba(120,80,40,0.28);'+
    'width:160px;font-family:Lora,serif;color:#3e1828;'+
    'pointer-events:auto;touch-action:auto;'+
    'transition:opacity .15s ease;';
  // Empêcher les events touch/mouse de passer au canvas 3D (sinon rotation gâteau)
  ['pointerdown','pointermove','pointerup','touchstart','touchmove','touchend','mousedown','mousemove','mouseup','wheel','click'].forEach(ev=>{
    panel.addEventListener(ev, e=>e.stopPropagation(), {passive:false});
  });
  canvas.parentNode.appendChild(panel);
  return panel;
}

function showDecoInlinePanel(idx){
  const data = getCakeData();
  if(!data.decos || !data.decos[idx]) return;
  const d = data.decos[idx];
  const panel = _ensureDecoInlinePanel();
  if(!panel) return;
  const allItems = DECO_CATALOG.flatMap(c=>c.items);
  const item = allItems.find(x=>x.id===d.id)||{label:d.id};
  const emo = DECO_EMOJI[d.id]||'🌸';
  const colCfg = DECO_COLOR_KEYS[d.id];

  // Construction du HTML : entête, couleur (optionnel), 2 sliders compacts
  // (taille + rotation propre uniquement — la position se fait à la main sur le gâteau)
  let html =
    '<div style="display:flex;align-items:center;gap:5px;margin-bottom:6px;padding-bottom:5px;border-bottom:1px solid #f0d8e0;">'+
      '<span style="font-size:16px;">'+emo+'</span>'+
      '<span style="flex:1;font-size:11px;font-weight:700;color:#7a3a52;line-height:1.15;">'+item.label+'</span>'+
      '<button onclick="hideDecoInlinePanel()" aria-label="Fermer" style="background:#fef2f6;border:1px solid #f5d5e0;color:#7a3a52;border-radius:50%;width:20px;height:20px;cursor:pointer;font-size:12px;line-height:1;padding:0;display:flex;align-items:center;justify-content:center;flex-shrink:0;">×</button>'+
    '</div>';

  if(colCfg){
    const curCol = d[colCfg.key] || colCfg.def;
    html +=
      '<div style="display:flex;align-items:center;gap:5px;margin-bottom:6px;background:#fef9ff;border:1px solid #ecd6e6;border-radius:7px;padding:4px 6px;">'+
        '<span style="font-size:10px;color:#7a3a52;font-weight:600;flex:1;">🎨 Couleur</span>'+
        '<input type="color" value="'+curCol+'" oninput="updateDecoProp('+idx+',\''+colCfg.key+'\',this.value);_refreshDecoInlinePanelLabels('+idx+');" style="width:28px;height:22px;border:1.5px solid #e8c0d0;border-radius:5px;cursor:pointer;padding:0;">'+
      '</div>';
  }

  // Helper pour générer un slider compact
  function _slider(icon,title,key,min,max,step,val,fmtFn,color){
    const formatted = fmtFn(val);
    return '<div data-key="'+key+'" style="display:grid;grid-template-columns:16px 1fr 36px;align-items:center;gap:5px;margin-bottom:4px;font-size:10px;color:#7a3a52;">'+
      '<span title="'+title+'" style="text-align:center;font-size:11px;">'+icon+'</span>'+
      '<input type="range" min="'+min+'" max="'+max+'" step="'+step+'" value="'+val+'" '+
        'oninput="updateDecoProp('+idx+',\''+key+'\',this.value);_refreshDecoInlinePanelLabels('+idx+');" '+
        'style="accent-color:'+color+';width:100%;">'+
      '<span data-lbl="'+key+'" style="text-align:right;font-weight:600;">'+formatted+'</span>'+
    '</div>';
  }
  // Uniquement Taille (zoom) et Rotation propre (spin). Position autour du gâteau,
  // hauteur, inclinaison et étage se manipulent à la main directement sur le gâteau.
  html += _slider('⊕','Taille','scale',0.4,2.5,0.05, d.scale||1.0, v=>Math.round(v*100)+'%','#a060c0');
  html += _slider('⟳','Rotation','spin',-180,180,5, d.spin||0, v=>Math.round(v)+'°','#c060a0');

  // Boutons d'action
  html +=
    '<div style="display:flex;gap:5px;margin-top:7px;padding-top:6px;border-top:1px solid #f0d8e0;">'+
      '<button onclick="removeDecoCake('+idx+');hideDecoInlinePanel();" style="flex:1;background:#fff0f0;color:#c43a3a;border:1px solid #ffccd0;border-radius:7px;padding:5px;font-size:10px;cursor:pointer;font-family:Lora,serif;font-weight:600;">🗑️</button>'+
      '<button onclick="hideDecoInlinePanel()" style="flex:1;background:linear-gradient(135deg,#c9a84c,#a8872e);color:#fff;border:none;border-radius:7px;padding:5px;font-size:10px;cursor:pointer;font-family:Lora,serif;font-weight:700;">✓ OK</button>'+
    '</div>';

  panel.innerHTML = html;
  panel.style.display = 'block';
  panel.style.opacity = '1';
  panel.dataset.decoIdx = String(idx);
  // Position initiale : on lance une mise à jour immédiate
  _updateDecoInlinePanelPos();
}

// Met à jour seulement les <span data-lbl="..."> et la valeur des inputs

// Le panneau est maintenant figé en bas à gauche du canvas (CSS left:8px;bottom:8px).
// Cette fonction reste pour compatibilité mais ne fait plus rien.
function _updateDecoInlinePanelPos(){
  const panel = document.getElementById('deco-inline-panel');
  if(!panel || panel.style.display==='none') return;
  if(!_3g || !_3g.decoMeshes) return;
