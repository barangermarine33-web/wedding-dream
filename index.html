  if(isNaN(idx) || idx<0 || !_3g.decoMeshes[idx]) {hideDecoInlinePanel();return;}
  // Position figée — rien à recalculer.
}

function _applyDecoPosition(idx,result,commit){
  if(!result)return;
  const d=getCakeData();
  if(!d.decos||!d.decos[idx])return;
  // Met à jour les données
  d.decos[idx].tier=result.tier;
  d.decos[idx].angle=result.angle;
  d.decos[idx].height=result.height;
  if(result.face) d.decos[idx].face = result.face;

  // ─── DÉPLACEMENT LIVE PENDANT LE DRAG ────────────────────────────────
  // Au lieu de reconstruire tout le gâteau (qui regénère les autres décos
  // avec leurs Math.random() internes → effet "elles bougent"), on déplace
  // uniquement le mesh concerné. Reconstruction complète seulement au commit.
  if(!commit && _3g && _3g.decoMeshes && _3g.decoMeshes[idx]){
    const T = window.THREE;
    const dg = _3g.decoMeshes[idx];
    const decoData = d.decos[idx];
    const ti = Math.min((d.etages||2)-1, Math.max(0, decoData.tier||0));
    const tH = (typeof HEIGHTS!=='undefined' ? HEIGHTS[ti] : 0.55) || 0.55;
    const sY = _3tierY[ti] || 0.260;
    const heightFrac = Math.max(0, Math.min(1, decoData.height||0.5));
    const rBot = _3tierR[ti] || 0.8;
    const rTop = rBot * 0.94;
    const tFracInTier = 0.05 + heightFrac*0.90;
    const rAtH = rBot + (rTop-rBot) * tFracInTier;
    const ang = ((decoData.angle||0)/360) * Math.PI*2;
    const face = decoData.face || 'side';
    const tilt = ((decoData.tilt||0)/180) * Math.PI;
    const spin = ((decoData.spin||0)/180) * Math.PI;
    // Met à jour la rotation
    if(face === 'top'){
      dg.rotation.set(-Math.PI/2 + tilt, ang + spin, 0);
    } else {
      dg.rotation.set(tilt, ang, spin);
    }
    // Recalcule bbox pour offset surface (la rotation a changé)
    dg.updateMatrixWorld(true);
    const _bb = new T.Box3();
    let _hasMesh = false;
    // Position temporaire à l'origine pour mesure
    const oldPos = dg.position.clone();
    dg.position.set(0,0,0);
    dg.updateMatrixWorld(true);
    dg.traverse(o=>{
      if(o.isMesh && !o.userData.isHitArea){
        o.updateMatrixWorld(true);
        const geoBB = new T.Box3().setFromObject(o);
        if(_hasMesh){ _bb.union(geoBB); } else { _bb.copy(geoBB); _hasMesh = true; }
      }
    });
    const outVx = face==='top' ? 0 : Math.sin(ang);
    const outVy = face==='top' ? 1 : 0;
    const outVz = face==='top' ? 0 : Math.cos(ang);
    let minProj = Infinity;
    if(_hasMesh){
      const cs = [
        [_bb.min.x,_bb.min.y,_bb.min.z],[_bb.max.x,_bb.min.y,_bb.min.z],
        [_bb.min.x,_bb.max.y,_bb.min.z],[_bb.max.x,_bb.max.y,_bb.min.z],
        [_bb.min.x,_bb.min.y,_bb.max.z],[_bb.max.x,_bb.min.y,_bb.max.z],
        [_bb.min.x,_bb.max.y,_bb.max.z],[_bb.max.x,_bb.max.y,_bb.max.z]
      ];
      for(let k=0;k<8;k++){
        const proj = cs[k][0]*outVx + cs[k][1]*outVy + cs[k][2]*outVz;
        if(proj<minProj) minProj = proj;
      }
    } else {
      minProj = 0;
    }
    const surfaceOffset = Math.max(0.012, (-minProj)*0.70 + 0.005);
    let pX, pY, pZ;
    if(face === 'top'){
      const topR = rTop;
      const rOnTop = Math.max(0, Math.min(1, decoData.height||0.0)) * topR * 0.85;
      pX = Math.sin(ang)*rOnTop + outVx*surfaceOffset;
      pY = sY + tH + outVy*surfaceOffset;
      pZ = Math.cos(ang)*rOnTop + outVz*surfaceOffset;
    } else {
      const decoY = sY + tH*(0.05 + heightFrac*0.90);
      pX = Math.sin(ang)*rAtH + outVx*surfaceOffset;
      pY = decoY + outVy*surfaceOffset;
      pZ = Math.cos(ang)*rAtH + outVz*surfaceOffset;
    }
    dg.position.set(pX, pY, pZ);
    return; // Ne PAS reconstruire le gâteau pendant le drag
  }

  // ─── COMMIT : sauvegarde et reconstruction complète ────────────────────
  if(commit){
    saveCakeData(d);
    buildCake3D(d);
    ['angle','height','tier'].forEach(k=>{
      const sl=document.getElementById('deco-'+k+'-'+idx);
      if(sl)sl.value=d.decos[idx][k];
    });
  }
}

function _endDrag(committed){
  if(_3dragDecoIdx!==null&&committed){
    const d=getCakeData();saveCakeData(d);
  }
  _3dragDecoIdx=null;_3isDragging=false;
  if(_3g&&_3g.decoMeshes)_3g.decoMeshes.forEach(dg=>{
    const baseScale = dg.userData.baseScale || 1.0;
    dg.scale.setScalar(baseScale);
  });
  const canvas=document.getElementById('cake-canvas');
  if(canvas){canvas.style.cursor='grab';canvas.style.outline='none';}
  const hint=document.getElementById('deco-drag-hint');
  if(hint)hint.style.display='none';
  _3auto=true;
}

function _getCanvasNDC(canvas,clientX,clientY){
  const r=canvas.getBoundingClientRect();
  return{x:((clientX-r.left)/r.width)*2-1,y:-((clientY-r.top)/r.height)*2+1};
}

function _raycastDecos(ndcX,ndcY){
  if(!_3c||!_3g||!_3g.decoMeshes||!_3g.decoMeshes.length)return null;
  const T=window.THREE;
  // Use CURRENT rotation — what the user sees is what they tap
  _3g.updateMatrixWorld(true);
  const rc=new T.Raycaster();
  rc.setFromCamera(new T.Vector2(ndcX,ndcY),_3c);
  const meshes=[];
  _3g.decoMeshes.forEach(dg=>dg.traverse(o=>{if(o.isMesh)meshes.push(o);}));
  // recursive=true so we catch nested meshes
  const hits=rc.intersectObjects(meshes,true);
  if(!hits.length)return null;
  // Walk up parent chain until we find userData.decoIdx
  let obj=hits[0].object;
  while(obj){
    if(obj.userData&&obj.userData.decoIdx!==undefined)return obj.userData.decoIdx;
    obj=obj.parent;
  }
  return null;
}

function _raycastCakeSurface(ndcX,ndcY){
  if(!_3c||!_3g)return null;
  const T=window.THREE;
  _3g.updateMatrixWorld(true);
  const rc=new T.Raycaster();
  rc.setFromCamera(new T.Vector2(ndcX,ndcY),_3c);
  const cakeMeshes=[];
  _3g.traverse(obj=>{
    if(obj.isMesh&&obj.userData.decoIdx===undefined&&
      (obj.geometry.type==='CylinderGeometry'||obj.geometry.type==='BoxGeometry'))
      cakeMeshes.push(obj);
  });
  const hits=rc.intersectObjects(cakeMeshes,false);
  if(!hits.length)return null;
  const hit=hits[0];
  const wp=hit.point.clone();
  const local=_3g.worldToLocal(wp.clone());
  const data=getCakeData();
  const etages=data.etages||2;
  const hF=data.hauteur==='haut'?1.40:data.hauteur==='mini'?0.65:1.0;
  const HEIGHTS=[0.84,0.76,0.66,0.58,0.50].map(h=>h*hF);
  let tierIdx=0,accY=0.260;
  const localY=local.y;
  for(let i=0;i<etages;i++){
    const tH=HEIGHTS[i]||0.55;
    if(localY<=accY+tH){tierIdx=i;break;}
    accY+=tH;tierIdx=i;
  }
  const tierStartY=_3tierY[tierIdx]||0.260;
  const tH=HEIGHTS[tierIdx]||0.55;
  const heightInTier=Math.max(0,Math.min(1,(localY-tierStartY)/tH));
  const localAngle=Math.atan2(local.x,local.z);
  const normAngle=((localAngle*180/Math.PI)%360+360)%360;

  // ─── Détection FACE : top (dessus) vs side (côté) via la normale du hit ───
  // La normale du hit est en espace local de l'objet. On veut la normale en espace monde
  // pour comparer à Y vertical.
  let face = 'side';
  if(hit.face && hit.face.normal){
    const normalWorld = hit.face.normal.clone();
    // transformer la normale dans le repère monde
    const normalMatrix = new T.Matrix3().getNormalMatrix(hit.object.matrixWorld);
    normalWorld.applyMatrix3(normalMatrix).normalize();
    // si la normale pointe vers le haut (Y > 0.7), on est sur la face supérieure
    if(normalWorld.y > 0.7){
      face = 'top';
    }
  }

  // Si face='top', on remappe height en distance radiale sur la face supérieure
  // (height ∈ [0,1] devient la fraction du rayon depuis le centre)
  let topHeightFrac = heightInTier;
  if(face === 'top'){
    const rBot = _3tierR[tierIdx] || 0.8;
    const rTop = rBot * 0.94;
    // distance radiale du point au centre
    const dist = Math.sqrt(local.x*local.x + local.z*local.z);
    topHeightFrac = Math.max(0, Math.min(1, dist / rTop));
  }

  return{
    tier: tierIdx,
    angle: parseFloat(normAngle.toFixed(2)),
    height: parseFloat((face === 'top' ? topHeightFrac : heightInTier).toFixed(4)),
    face: face
  };
}

function initDecoInteraction(canvas){
  let touchStartX=0,touchStartY=0,touchStartTime=0,didMove=false;
  let touchStartedOnDeco=false;
  let tappedDecoIdx=null;  // idx de la déco "tapée" (avant qu'on sache si tap ou drag)

  // ── TOUCH : drag direct depuis une déco ────────────────────────────────────
  canvas.addEventListener('touchstart',e=>{
    if(e.touches.length!==1)return;
    const t=e.touches[0];
    touchStartX=t.clientX;touchStartY=t.clientY;
    touchStartTime=Date.now();didMove=false;
    touchStartedOnDeco=false;
    tappedDecoIdx=null;

    // Si une déco est déjà sélectionnée (drag-placement mode), bloquer l'orbit
    if(_3dragDecoIdx!==null){
      e.preventDefault();e.stopPropagation();
      return;
    }
    // Sinon : voir si le doigt touche une déco — on la mémorise pour décider
    // au touchend si c'est un TAP (→ ouvre panel) ou un DRAG (→ repositionne).
    const{x,y}=_getCanvasNDC(canvas,t.clientX,t.clientY);
    const idx=_raycastDecos(x,y);
    if(idx!==null){
      e.preventDefault();e.stopPropagation();
      tappedDecoIdx=idx;
      touchStartedOnDeco=true;
      _3auto=false;
      _highlightDeco(idx);
    }
  },{passive:false});

  canvas.addEventListener('touchmove',e=>{
    if(e.touches.length!==1)return;
    const t=e.touches[0];
    const dx=t.clientX-touchStartX,dy=t.clientY-touchStartY;
    const dist=Math.hypot(dx,dy);
    if(dist>6)didMove=true;
    // Si on a tapé sur une déco ET qu'on bouge > 8px → on passe en mode drag-placement
    if(tappedDecoIdx!==null && dist>8 && _3dragDecoIdx===null){
      _3dragDecoIdx=tappedDecoIdx;
      _3isDragging=true;
      canvas.style.outline='3px solid #c9a84c';
      const hint=document.getElementById('deco-drag-hint');
      if(hint){hint.style.display='block';hint.textContent='✦ Glisse sur le gâteau pour placer';}
      // Cacher le panel inline pendant le drag
      hideDecoInlinePanel();
      _highlightDeco(_3dragDecoIdx);
    }
    if(_3dragDecoIdx!==null){
      e.preventDefault();e.stopPropagation();
      _3isDragging=true;
      const{x,y}=_getCanvasNDC(canvas,t.clientX,t.clientY);
      _applyDecoPosition(_3dragDecoIdx,_raycastCakeSurface(x,y),false);
    }
  },{passive:false});

  canvas.addEventListener('touchend',e=>{
    const t=e.changedTouches[0];
    const{x,y}=_getCanvasNDC(canvas,t.clientX,t.clientY);
    if(_3dragDecoIdx!==null){
      // En mode drag-placement actif : on commit la position
      if(_3isDragging){
        _applyDecoPosition(_3dragDecoIdx,_raycastCakeSurface(x,y),true);
        const placedIdx=_3dragDecoIdx;
        _endDrag(true);
        // Après placement par drag, on rouvre le panel pour ajustement fin
        _highlightDeco(placedIdx);
        showDecoInlinePanel(placedIdx);
      } else {
        _endDrag(false);
      }
      e.preventDefault();
      return;
    }
    // TAP simple sur une déco (sans drag) → ouvre le panel inline
    if(tappedDecoIdx!==null && !didMove){
      e.preventDefault();
      showDecoInlinePanel(tappedDecoIdx);
      tappedDecoIdx=null;
      return;
    }
    // Tap sur le canvas (hors déco) avec panel ouvert → fermer le panel
    if(!didMove && document.getElementById('deco-inline-panel') && document.getElementById('deco-inline-panel').style.display!=='none'){
      hideDecoInlinePanel();
    }
    tappedDecoIdx=null;
  },{passive:false});

  // ── MOUSE ─────────────────────────────────────────────────────────────────
  let mouseDownDecoIdx=null;
  let mouseDownX=0, mouseDownY=0, mouseDidMove=false;
  canvas.addEventListener('mousedown',e=>{
    mouseDidMove=false;mouseDownX=e.clientX;mouseDownY=e.clientY;mouseDownDecoIdx=null;
    if(_3dragDecoIdx!==null){
      // Drag-placement actif → click place la déco
      e.preventDefault();
      const{x,y}=_getCanvasNDC(canvas,e.clientX,e.clientY);
      _applyDecoPosition(_3dragDecoIdx,_raycastCakeSurface(x,y),true);
      const placedIdx=_3dragDecoIdx;
      _endDrag(true);
      _highlightDeco(placedIdx);
      showDecoInlinePanel(placedIdx);
      return;
    }
    const{x,y}=_getCanvasNDC(canvas,e.clientX,e.clientY);
    const idx=_raycastDecos(x,y);
    if(idx!==null){
      e.preventDefault();
      mouseDownDecoIdx=idx;
      _3auto=false;
      _highlightDeco(idx);
    }
  },{passive:false});

  canvas.addEventListener('mousemove',e=>{
    const dx=e.clientX-mouseDownX,dy=e.clientY-mouseDownY;
    if(Math.hypot(dx,dy)>6) mouseDidMove=true;
    // Si on a click-down sur une déco ET qu'on bouge → drag-placement
    if(mouseDownDecoIdx!==null && mouseDidMove && _3dragDecoIdx===null){
      _3dragDecoIdx=mouseDownDecoIdx;
      _3isDragging=true;
      canvas.style.cursor='crosshair';
      canvas.style.outline='3px solid #c9a84c';
      const hint=document.getElementById('deco-drag-hint');
      if(hint){hint.style.display='block';hint.textContent='✦ Glisse sur le gâteau pour placer';}
      hideDecoInlinePanel();
    }
    if(_3dragDecoIdx===null)return;
    _3isDragging=true;
    const{x,y}=_getCanvasNDC(canvas,e.clientX,e.clientY);
    _applyDecoPosition(_3dragDecoIdx,_raycastCakeSurface(x,y),false);
  });

  canvas.addEventListener('mouseup',e=>{
    if(_3dragDecoIdx!==null && _3isDragging){
      const{x,y}=_getCanvasNDC(canvas,e.clientX,e.clientY);
      _applyDecoPosition(_3dragDecoIdx,_raycastCakeSurface(x,y),true);
      const placedIdx=_3dragDecoIdx;
      _endDrag(true);
      _highlightDeco(placedIdx);
      showDecoInlinePanel(placedIdx);
    } else if(mouseDownDecoIdx!==null && !mouseDidMove){
      // Click simple sans drag → ouvre le panel
      showDecoInlinePanel(mouseDownDecoIdx);
    } else if(!mouseDidMove){
      // Click sur zone vide → ferme le panel
      hideDecoInlinePanel();
    }
    mouseDownDecoIdx=null;
  });
}


function startDragDeco(idx){
  // Called from panel button — put deco in placement mode
  const data=getCakeData();
  if(!data.decos||!data.decos[idx])return;
  _3dragDecoIdx=idx;_3isDragging=false;_3auto=false;
  _highlightDeco(idx);
  const canvas=document.getElementById('cake-canvas');
  if(canvas){canvas.style.cursor='crosshair';canvas.style.outline='3px solid #c9a84c';}
  const hint=document.getElementById('deco-drag-hint');
  if(hint){hint.style.display='block';hint.textContent='✦ Touche ou glisse sur le gâteau pour placer';}
  // Scroll up to canvas
  canvas&&canvas.scrollIntoView({behavior:'smooth',block:'center'});
}

function toggleAutoRot3D(){
  _3auto=!_3auto;
  const btn=document.getElementById('btn-autorot');
  if(btn)btn.textContent=(_3auto?'⏸':'▶')+' Rotation';
}

function setup3DScene(data){
  const tryInit=()=>{
    const canvas=document.getElementById('cake-canvas');
    if(!canvas)return;
    const W=canvas.getBoundingClientRect().width;
    if(W<10){requestAnimationFrame(tryInit);return;}
    destroyThree();
    try{
      initThree(canvas);
      buildCake3D(data);
      attachOrbit(canvas);
      initDecoInteraction(canvas);
      startRenderLoop();
    }catch(err){
      console.error('Three.js error:',err);
      const msg=document.createElement('div');
      msg.style.cssText='color:#c9a84c;text-align:center;padding:20px;font-size:13px;font-family:Lora,serif;';
      msg.innerHTML='⚠️ Erreur 3D: '+err.message;
      if(canvas.parentNode)canvas.parentNode.insertBefore(msg,canvas.nextSibling);
    }
  };
  requestAnimationFrame(tryInit);
}

// ─────────────────────────────────────────────────────────────────────────────
// CONFIGURATEUR WEDDING CAKE — RENDU SVG STYLISÉ
// ─────────────────────────────────────────────────────────────────────────────
// Plus de Three.js 3D : à la place, un rendu SVG vectoriel élégant.
// L'utilisateur choisit nombre d'étages, couleurs, fleurs, style, feuilles,
// intérieur. Le SVG se met à jour instantanément avec ombres, dégradés,
// effet premium. Compatible mobile et desktop, pas d'API payante.

function renderCake(){
  const d = ld('cake_'+USER.email, {});
  // Structure des données du configurateur (avec valeurs par défaut)
  const cfg = {
    etages: d.cfgEtages || 3,
    couleur: d.cfgCouleur || '#FAF6EE',      // crème blanche
    couleurDeco: d.cfgCouleurDeco || '#E89AAC', // rose tendre
    style: d.cfgStyle || 'romantique',
    fleur: d.cfgFleur || 'rose',
    feuille: d.cfgFeuille || 'eucalyptus',
    interieur: d.cfgInterieur || 'Vanille / Fruits rouges',
    topper: d.cfgTopper || '',
  };

  const page = el('page-7');
  if(!page) return;

  // Styles disponibles avec leurs ajustements visuels
  const STYLES = {
    luxe:         {label:'Luxe',          palette:['#FAF6EE','#E8D48A'], ombre:0.35, doree:true},
    romantique:   {label:'Romantique',    palette:['#FFEBF1','#E89AAC'], ombre:0.25, doree:false},
    boheme:       {label:'Bohème',        palette:['#F0E6D2','#D4B896'], ombre:0.20, doree:false},
    moderne:      {label:'Moderne',       palette:['#F8F8F8','#C8C8C8'], ombre:0.18, doree:false},
    nature:       {label:'Nature',        palette:['#F5F0E8','#A8B888'], ombre:0.22, doree:false},
    vintage:      {label:'Vintage',       palette:['#F5E6D3','#D4A574'], ombre:0.28, doree:true},
  };
  const FLEURS = {
    rose:       'Roses',
    pivoine:    'Pivoines',
    hortensia:  'Hortensias',
    renoncule:  'Renoncules',
    aucune:     'Aucune'
  };
  const FEUILLES = {
    eucalyptus:  'Eucalyptus',
    olivier:     'Olivier',
    fougere:     'Fougère',
    sechee:      'Feuilles séchées',
    aucune:      'Aucune'
  };
  const INTERIEURS = [
    'Vanille / Fruits rouges',
    'Chocolat / Praliné',
    'Pistache / Framboise',
    'Citron / Meringue',
    'Caramel / Pomme',
    'Vanille / Confiture',
    'Café / Noisette',
  ];

  // Sauvegarde la config (préfixe cfg* pour pas écraser les anciennes données 3D)
  function saveCfg(){
    const current = ld('cake_'+USER.email, {});
    current.cfgEtages = cfg.etages;
    current.cfgCouleur = cfg.couleur;
    current.cfgCouleurDeco = cfg.couleurDeco;
    current.cfgStyle = cfg.style;
    current.cfgFleur = cfg.fleur;
    current.cfgFeuille = cfg.feuille;
    current.cfgInterieur = cfg.interieur;
    current.cfgTopper = cfg.topper;
    sv('cake_'+USER.email, current);
  }

  // ─── GÉNÉRATION DU SVG ─────────────────────────────────────────────────────
  function buildSVG(){
    const W = 320, H = 420;
    const cx = W/2;
    const baseY = H - 40;            // ligne du sol
    const totalH = 300;              // hauteur totale du gâteau

    const n = cfg.etages;
    // Chaque étage : largeur, hauteur, position Y
    const layerH = totalH / n;
    // Largeur : étage du bas le plus large, étage du haut le plus étroit
    // On utilise une décroissance type gâteau wedding classique
    const widths = [];
    for(let i=0; i<n; i++){
      const t = i / Math.max(1, n-1); // 0 (bas) → 1 (haut)
      const w = 200 - t * 110;        // de 200px en bas à 90px en haut
      widths.push(w);
    }

    const style = STYLES[cfg.style] || STYLES.romantique;
    const ombre = style.ombre;
    const couleur = cfg.couleur;
    const couleurDeco = cfg.couleurDeco;

    // Couleur foncée pour l'ombrage
    function darken(hex, pct){
      const h = hex.replace('#','');
      const r = parseInt(h.substr(0,2),16);
      const g = parseInt(h.substr(2,2),16);
      const b = parseInt(h.substr(4,2),16);
      return `rgb(${Math.round(r*(1-pct))},${Math.round(g*(1-pct))},${Math.round(b*(1-pct))})`;
    }

    let svg = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:340px;height:auto;display:block;margin:0 auto;">`;

    // Définitions : dégradés et filtres
    svg += `<defs>`;
    svg += `<linearGradient id="cakeGrad" x1="0%" y1="0%" x2="100%" y2="0%">`;
    svg += `<stop offset="0%" stop-color="${darken(couleur,0.22)}"/>`;
    svg += `<stop offset="35%" stop-color="${couleur}"/>`;
    svg += `<stop offset="65%" stop-color="${couleur}"/>`;
    svg += `<stop offset="100%" stop-color="${darken(couleur,0.18)}"/>`;
    svg += `</linearGradient>`;
    // Gradient pour le sommet de chaque étage
    svg += `<linearGradient id="cakeTopGrad" x1="0%" y1="0%" x2="100%" y2="0%">`;
    svg += `<stop offset="0%" stop-color="${darken(couleur,0.10)}"/>`;
    svg += `<stop offset="50%" stop-color="${couleur}"/>`;
    svg += `<stop offset="100%" stop-color="${darken(couleur,0.10)}"/>`;
    svg += `</linearGradient>`;
    // Ombre portée
    svg += `<filter id="cakeShadow" x="-20%" y="-20%" width="140%" height="140%">`;
    svg += `<feGaussianBlur in="SourceAlpha" stdDeviation="3"/>`;
    svg += `<feOffset dx="0" dy="4" result="offsetblur"/>`;
    svg += `<feComponentTransfer><feFuncA type="linear" slope="${ombre}"/></feComponentTransfer>`;
    svg += `<feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>`;
    svg += `</filter>`;
    // Lustre doré (style luxe/vintage)
    svg += `<linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">`;
    svg += `<stop offset="0%" stop-color="#f5d77a"/>`;
    svg += `<stop offset="50%" stop-color="#d4a843"/>`;
    svg += `<stop offset="100%" stop-color="#a8842a"/>`;
    svg += `</linearGradient>`;
    svg += `</defs>`;

    // Ombre au sol
    svg += `<ellipse cx="${cx}" cy="${baseY+8}" rx="${widths[0]/2 + 20}" ry="8" fill="rgba(40,20,30,0.18)" filter="url(#cakeShadow)"/>`;

    // Construire chaque étage de bas en haut
    let currentY = baseY;
    for(let i=0; i<n; i++){
      const w = widths[i];
      const x = cx - w/2;
      const y = currentY - layerH;

      // Étage cylindrique : rectangle pour le corps + ellipse au sommet
      // Corps (rectangle)
      svg += `<rect x="${x}" y="${y + 8}" width="${w}" height="${layerH - 8}" fill="url(#cakeGrad)" filter="url(#cakeShadow)"/>`;
      // Ombre au-dessous de l'étage suivant (pour effet superposition)
      if(i < n-1){
        svg += `<ellipse cx="${cx}" cy="${y}" rx="${w/2}" ry="6" fill="${darken(couleur,0.25)}" opacity="0.65"/>`;
      }
      // Sommet (ellipse claire) — sauf si pas le dernier étage
      svg += `<ellipse cx="${cx}" cy="${y + 8}" rx="${w/2}" ry="8" fill="url(#cakeTopGrad)"/>`;

      // Liseré doré pour les styles luxe / vintage
      if(style.doree){
        svg += `<rect x="${x}" y="${y + layerH - 4}" width="${w}" height="2" fill="url(#goldGrad)" opacity="0.85"/>`;
        svg += `<ellipse cx="${cx}" cy="${y+8}" rx="${w/2}" ry="8" fill="none" stroke="url(#goldGrad)" stroke-width="1" opacity="0.75"/>`;
      }

      // ─── DÉCORATIONS FLEURS sur cet étage ───
      if(cfg.fleur !== 'aucune'){
        // Placer 2-4 fleurs par étage (plus sur le bas, moins en haut)
        const nFleurs = Math.max(2, 5 - i);
        for(let f=0; f<nFleurs; f++){
          // Position : autour du contour de l'étage, alternance avant/derrière
          const angle = (f / nFleurs) * Math.PI + (i * 0.3); // décalage par étage
          // On dessine seulement les fleurs sur l'avant (sin > -0.3)
          const sinA = Math.sin(angle);
          if(sinA < -0.3) continue;
          const fx = cx + Math.cos(angle) * (w/2 - 6);
          const fy = y + layerH - 8 + sinA * 4;
          const size = 10 + Math.random() * 4;
          svg += drawFleur(cfg.fleur, fx, fy, size, couleurDeco);
        }

        // Cluster principal en haut du gâteau (couronne décorative)
        if(i === n-1){
          const topClusterY = y - 6;
          for(let c=0; c<3; c++){
            const ang = -Math.PI/2 + (c-1)*0.6;
            const fx = cx + Math.cos(ang) * 14;
            const fy = topClusterY + Math.sin(ang) * 6;
            svg += drawFleur(cfg.fleur, fx, fy, 13, couleurDeco);
          }
        }
      }

      // ─── FEUILLES ───
      if(cfg.feuille !== 'aucune'){
        const nFeuilles = Math.max(2, 4 - i);
        for(let f=0; f<nFeuilles; f++){
          const angle = (f / nFeuilles) * Math.PI + 0.7 + (i * 0.4);
          const sinA = Math.sin(angle);
          if(sinA < -0.3) continue;
          const fx = cx + Math.cos(angle) * (w/2 - 4);
          const fy = y + layerH - 10 + sinA * 5;
          svg += drawFeuille(cfg.feuille, fx, fy);
        }
      }

      currentY = y;
    }

    // ─── TOPPER (texte en haut) ───
    if(cfg.topper && cfg.topper.trim()){
      const topY = currentY - 20;
      const topperColor = style.doree ? '#c9a84c' : darken(couleurDeco, 0.25);
      svg += `<text x="${cx}" y="${topY}" text-anchor="middle" font-family="Playfair Display, Georgia, serif" font-size="14" font-style="italic" font-weight="700" fill="${topperColor}">${cfg.topper.substring(0,20)}</text>`;
      svg += `<line x1="${cx-30}" y1="${topY+4}" x2="${cx+30}" y2="${topY+4}" stroke="${topperColor}" stroke-width="0.5" opacity="0.6"/>`;
    }

    svg += `</svg>`;
    return svg;
  }

  // ─── FONCTIONS DE DESSIN DES FLEURS (SVG vectoriel stylisé) ────────────────
  function drawFleur(type, cx, cy, size, color){
    // Couleur centrale plus foncée
    const hex = color.replace('#','');
    const r = parseInt(hex.substr(0,2),16);
    const g = parseInt(hex.substr(2,2),16);
    const b = parseInt(hex.substr(4,2),16);
    const dark = `rgb(${Math.round(r*0.65)},${Math.round(g*0.65)},${Math.round(b*0.65)})`;
    const light = `rgb(${Math.min(255,Math.round(r*1.15))},${Math.min(255,Math.round(g*1.15))},${Math.min(255,Math.round(b*1.15))})`;

    let s = '';
    if(type === 'rose'){
      // Rose : 5-6 pétales arrondis disposés autour d'un coeur
      const nPetals = 6;
      for(let p=0; p<nPetals; p++){
        const a = (p/nPetals) * Math.PI * 2;
        const px = cx + Math.cos(a) * size * 0.35;
        const py = cy + Math.sin(a) * size * 0.35;
        s += `<ellipse cx="${px}" cy="${py}" rx="${size*0.45}" ry="${size*0.55}" fill="${color}" transform="rotate(${a*180/Math.PI} ${px} ${py})" opacity="0.92"/>`;
      }
      // Coeur central
      s += `<circle cx="${cx}" cy="${cy}" r="${size*0.32}" fill="${dark}"/>`;
      s += `<circle cx="${cx-size*0.1}" cy="${cy-size*0.1}" r="${size*0.18}" fill="${light}" opacity="0.5"/>`;
    } else if(type === 'pivoine'){
      // Pivoine : nombreux pétales superposés, plus arrondie qu'une rose
      const nPetals = 10;
      for(let p=0; p<nPetals; p++){
        const a = (p/nPetals) * Math.PI * 2;
        const r1 = size * 0.6;
        const px = cx + Math.cos(a) * r1 * 0.4;
        const py = cy + Math.sin(a) * r1 * 0.4;
        s += `<ellipse cx="${px}" cy="${py}" rx="${size*0.5}" ry="${size*0.4}" fill="${color}" transform="rotate(${a*180/Math.PI} ${px} ${py})" opacity="0.85"/>`;
      }
      // Couche interne plus claire
      for(let p=0; p<6; p++){
        const a = (p/6) * Math.PI * 2;
        const px = cx + Math.cos(a) * size * 0.2;
        const py = cy + Math.sin(a) * size * 0.2;
        s += `<ellipse cx="${px}" cy="${py}" rx="${size*0.3}" ry="${size*0.25}" fill="${light}" opacity="0.75"/>`;
      }
      s += `<circle cx="${cx}" cy="${cy}" r="${size*0.15}" fill="${dark}"/>`;
    } else if(type === 'hortensia'){
      // Hortensia : cluster de petites fleurs à 4 pétales
      for(let cluster=0; cluster<7; cluster++){
        const ca = (cluster/7) * Math.PI * 2;
        const ccx = cx + Math.cos(ca) * size * 0.35;
        const ccy = cy + Math.sin(ca) * size * 0.35;
        const ps = size * 0.22;
        s += `<circle cx="${ccx-ps*0.5}" cy="${ccy-ps*0.5}" r="${ps*0.7}" fill="${color}" opacity="0.9"/>`;
        s += `<circle cx="${ccx+ps*0.5}" cy="${ccy-ps*0.5}" r="${ps*0.7}" fill="${color}" opacity="0.9"/>`;
        s += `<circle cx="${ccx-ps*0.5}" cy="${ccy+ps*0.5}" r="${ps*0.7}" fill="${color}" opacity="0.9"/>`;
        s += `<circle cx="${ccx+ps*0.5}" cy="${ccy+ps*0.5}" r="${ps*0.7}" fill="${color}" opacity="0.9"/>`;
        s += `<circle cx="${ccx}" cy="${ccy}" r="${ps*0.25}" fill="${dark}"/>`;
      }
    } else if(type === 'renoncule'){
      // Renoncule : couches de pétales superposées en cercles
      for(let layer=0; layer<3; layer++){
        const lsize = size * (1 - layer * 0.25);
        const nP = 8 - layer*2;
        for(let p=0; p<nP; p++){
          const a = (p/nP) * Math.PI * 2 + layer * 0.4;
          const px = cx + Math.cos(a) * lsize * 0.3;
          const py = cy + Math.sin(a) * lsize * 0.3;
          s += `<ellipse cx="${px}" cy="${py}" rx="${lsize*0.4}" ry="${lsize*0.3}" fill="${color}" transform="rotate(${a*180/Math.PI} ${px} ${py})" opacity="${0.8 + layer*0.05}"/>`;
        }
      }
      s += `<circle cx="${cx}" cy="${cy}" r="${size*0.15}" fill="${dark}"/>`;
    }
    return s;
  }

  function drawFeuille(type, cx, cy){
    if(type === 'eucalyptus'){
      // Eucalyptus : tige avec petites feuilles rondes alternées
      let s = `<g transform="translate(${cx},${cy}) rotate(${20 + Math.random()*40 - 20})">`;
      s += `<line x1="0" y1="0" x2="0" y2="-22" stroke="#7a9070" stroke-width="0.8"/>`;
      for(let i=0; i<4; i++){
        const y = -4 - i*5;
        const side = i % 2 === 0 ? -1 : 1;
        s += `<ellipse cx="${side*4}" cy="${y}" rx="3.5" ry="2.5" fill="#a8c0a0" opacity="0.92"/>`;
      }
      s += `</g>`;
      return s;
    } else if(type === 'olivier'){
      // Olivier : feuilles longues et fines argentées
      let s = `<g transform="translate(${cx},${cy}) rotate(${15 + Math.random()*30 - 15})">`;
      s += `<line x1="0" y1="0" x2="0" y2="-25" stroke="#6e8060" stroke-width="0.8"/>`;
      for(let i=0; i<5; i++){
        const y = -3 - i*5;
        const side = i % 2 === 0 ? -1 : 1;
        s += `<ellipse cx="${side*3}" cy="${y}" rx="1.8" ry="4" fill="#a0b890" transform="rotate(${side*30} ${side*3} ${y})" opacity="0.9"/>`;
      }
      s += `</g>`;
      return s;
    } else if(type === 'fougere'){
      // Fougère : tige avec feuilles plumeuses
      let s = `<g transform="translate(${cx},${cy}) rotate(${30 + Math.random()*40 - 20})">`;
      s += `<line x1="0" y1="0" x2="0" y2="-26" stroke="#5a8050" stroke-width="0.8"/>`;
      for(let i=0; i<6; i++){
        const y = -3 - i*4;
        const side = i % 2 === 0 ? -1 : 1;
        s += `<ellipse cx="${side*5}" cy="${y}" rx="6" ry="1.5" fill="#7aa070" transform="rotate(${side*30} ${side*5} ${y})" opacity="0.9"/>`;
      }
      s += `</g>`;
      return s;
    } else if(type === 'sechee'){
      // Feuilles séchées : tons beige doré
      let s = `<g transform="translate(${cx},${cy}) rotate(${10 + Math.random()*40 - 20})">`;
      s += `<line x1="0" y1="0" x2="0" y2="-22" stroke="#b89868" stroke-width="0.8"/>`;
      for(let i=0; i<4; i++){
        const y = -4 - i*5;
        const side = i % 2 === 0 ? -1 : 1;
        s += `<ellipse cx="${side*4}" cy="${y}" rx="3.5" ry="2.2" fill="#d4b890" opacity="0.9"/>`;
      }
      s += `</g>`;
      return s;
    }
    return '';
  }

// Fonction appelée par les contrôles pour mettre à jour une propriété
function updCakeCfg(key, val){
  const current = ld('cake_'+USER.email, {});
  current['cfg' + key.charAt(0).toUpperCase() + key.slice(1)] = val;
  sv('cake_'+USER.email, current);
  renderCake();
}

function updateDecoProp(idx,key,val){
  const d=getCakeData();
  if(d.decos&&d.decos[idx]){
    // Les clés couleur (coul_*) sont des strings hex, pas des nombres
    if(key&&key.indexOf('coul_')===0){
      d.decos[idx][key]=String(val);
    } else {
      d.decos[idx][key]=Number(val);
    }
    saveCakeData(d);
    buildCake3D(d);
    // Update inline label next to the slider (sibling span)
    requestAnimationFrame(()=>{
      const inputs=document.querySelectorAll('input[type=range]');
      inputs.forEach(inp=>{
        if(inp.getAttribute('oninput')&&inp.getAttribute('oninput').includes(',\''+key+'\',')&&inp.getAttribute('oninput').includes('updateDecoProp('+idx+',')){
          const lbl=inp.nextElementSibling;
          if(lbl){
            if(key==='angle'||key==='tilt'||key==='spin')lbl.textContent=val+'°';
            else if(key==='height')lbl.textContent=Math.round(val*100)+'%';
            else if(key==='scale')lbl.textContent=Math.round(val*100)+'%';
            else if(key==='tier')lbl.textContent='E'+(parseInt(val)+1);
          }
        }
      });
    });
  }
}

async function exportCakePNG(){
  const canvas=document.getElementById('cake-canvas');
  if(!canvas){await appAlert('Le canvas 3D n\'est pas disponible.');return;}
  try{
    // Force one render pass then export
    if(_3r&&_3s&&_3c){_3r.render(_3s,_3c);}
    const url=canvas.toDataURL('image/png');
    if(!url||url==='data:,'){await appAlert('Export indisponible, réessaie.');return;}
    const a=document.createElement('a');
    a.download='mon-gateau-mariage.png';
    a.href=url;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
  }catch(e){await appAlert('Erreur export: '+e.message);}
}

function sendCakeOrder(){
  const data=getCakeData();
  const name=data.orderName||'Non renseigné';
  const date=data.orderDate||'Non renseignée';
  const lieu=data.orderLieu||'Non renseigné';
  const tiers=data.layers.slice(0,data.etages).map((l,i)=>`Étage ${i+1}: ${l.parfum||'Vanille'} - ${l.garniture||'Ganache'}`+(l.regime&&l.regime!=='Aucun'?' ('+l.regime+')':'')).join('%0A');
  const body=`Bonjour,%0A%0AJe souhaite commander mon gâteau de mariage :%0A%0A👤 Nom : ${encodeURIComponent(name)}%0A📅 Date : ${date}%0A📍 Lieu : ${encodeURIComponent(lieu)}%0A%0A🎂 ${data.etages} étage${data.etages>1?'s':''} - Forme : ${data.forme||'Rond'}%0A${tiers}%0AFinition : ${data.texture||'Lisse'}%0AInvités : ${data.invites||80}%0A%0ACordialement,`;
  window.location.href=`mailto:?subject=${encodeURIComponent('Commande gâteau mariage - '+name)}&body=${body}`;
}

function shareCake(via){
  const data=getCakeData();
  const txt=`🎂 Mon gâteau de mariage : ${data.etages} étage${data.etages>1?'s':''} ${data.forme||'rond'}, ${(data.layers[0]||{}).parfum||'Vanille'} - créé avec Wedding Dream ✨`;
  if(via==='whatsapp'){window.open('https://wa.me/?text='+encodeURIComponent(txt),'_blank');}
  else if(via==='email'){window.location.href='mailto:?subject='+encodeURIComponent('Mon gâteau de mariage')+'&body='+encodeURIComponent(txt);}
}
